body:
  text: 雪坡集卷二十九宋姚勉撰書上丞相程訥齋書丙辰附上饒驛遞某聞相天下無他道曰受而已盡受之道賢相之事業備焉曷謂受受天下之材受天下之言是也書曰翕受敷施九德咸事此受材之説臯陶之所以相舜也又曰豫旦已受人之徽言咸告孺子王矣此受言之説周公之所以相成王也在天子之朝廷者九德備而後可合而受之皆布在列天下必無遺材矣下受人之善言而上告之君使人之言皆得達於上天下必無棄言矣夫臯陶周公豈其材不足以運動一世而必待受人材以為用受人言以為助哉蓋獨有其已則小而私兼有諸人則大而公也能大而公斯謂之有宰相之度秦誓曰若有一個臣斷斷兮無他技其心休休焉其如有容焉人之有技若已有之人之彥聖其心好之不啻若自其口出實能容之以能保我子孫黎民尚亦有利哉聖人取斯言載之大學平天下之章政謂平天下者人君之事而相人君以平天下者宰相之事斯言蓋専為宰相發也為相者亦何必他有材智而後曰賢哉能盡是道足矣某觀大丞相未秉國鈞以前休休有容之度天下知之不待相而後見也所謂天下人材平日切切然以為已任而所謂言者蓋前此身為諍臣之時以此責難於君責備於相者昔責人今受責也近朝廷所召法從諸賢雖皆有所顧忌未肯盡至然自卿監以下至於館學亦未為盡無賢者也言議之臣雖未得盡為蹇諤而能言者亦尚多也此亦大丞相略試之效也然而比者以來在下位二三忠賢何為相繼盡以人言斥去而素有德望之重臣亦以道不合而遂行夫在外者召之而不來政以在內者為占也不畏殺麛毁卵麟鳳為之不集乎三學上書言事不過草茅之狂耳要其本心無非忠於為國蓋自甲辰乙巳年間朝廷容養公論之氣至於此矣平日容養而作成之今乃痛加排抑立石以戒方來屏斥以懲既往此二事蓋京檜托逺之時所為耳晉欒武子曰不可當吾世而失諸侯以大丞相秉國鈞之日而有立石三學屏斥羣士之事可乎哉他日史官書之具有嵗月豈不重為賢相纍乎今天下之人皆以為非而不以怨大丞相者知非吾相本心耳然亦以不能救止為大丞相惜也大丞相天下善類宗主豈得以非出已意自諉乎過歸君父尤不可矣上書言事者既加以罪而斥逐雖不次拔擢經明行修之士欲以慰悅人心是無異大箠擊而小拊摩也賢者豈屑於得此哉天下固有視死如歸甘戮如飴不畏禍患之人然亦多有頑蝢無耻貪得思進志在富貴之輩此風一熾將恐所失者皆賢所得者皆不肖矣為天下國家者又何賴於不肖哉日甚一日事勢將不止此此某所以日夜痛心疾首以歎以泣寢食為之俱廢也伏被召恩承命遵道亦欲一對吾君見吾相為天下極言其不可既已至半途矣憂患日熏其心霜露日侵其體遽有寒疾不能造朝引領向東涕泗如雨然所懷不得一吐亦不自安伏見前朝蘇老泉先生以韓魏國諸公薦試舍人院雖辭召不往亦有上仁宗皇帝一書某敢援是例輒附囊封以進某有采薪之憂不能親投之匭伏惟大丞相以韓魏公自處為之繳奏得達聖聰九殞不悔某之此舉狂僭為甚恃大丞相以虛受人容納讜直必能轉以上聞某之不材於九德不有其一不敢望在翕受敷施百僚師師之列但狂妄之言得以轉達是即大丞相受人之言而告之王也繼自今天下無遺材無棄言大丞相遂為賢相之事業千萬世之下有所誇誦謂其至公至大有宰相之度如臯陶周公之於舜成王而欲肆京檜托逺之毒者無所施其巧力宗社之福也大丞相之美也保我子孫黎民尚亦有利大丞相當之矣易之剝上九一爻曰碩果不食君子得輿小人剝廬世道今五隂剝矣獨大丞相為碩果使君子得輿而小人之廬遂剝轉移機括是在密庸之妙大丞相無所辭焉某冒觸霆威萬死不贖屛伏田野以俟斧誅上丞相吳履齋書庚申三月十日某等竊觀大丞相再秉鈞軸以來聚衆賢闢言路遂使天下之勢震撼者漸定危棘者向安非大宰相扶持公道之力不至此某等所以深幸善類之得所依也昨者伏見國子博士而下數人以上書言事不遂相率去國此恐非明時所宜有大宰相平日為善類宗主而可聽其若此乎諸學官之所指者五人其甚蓋董宋臣也一閹不去而諸學官去此事可書史册否乎今雖委司業留之然一閹未去決無可留之理大宰相何可不為天下去之乎此宰相職也責君令狀以警史志聰宰相文潞公也押空頭敕以去任守忠宰相韓魏公也馮益招劉豫之侮其罪當斬特以曖昧未明與外祠而黜逺之宰相趙忠簡公也大宰相立心豈在先正諸公下此事可遜不為乎此閹去則諸學官自留矣大宰相如曰吾欲除去之但恐上以為外庭有黨是避嫌也今豈避嫌日乎大宰相欲收召前此諸賢則曰吾欲避主譁競朋比之嫌今又曰黨之嫌當避是進賢退不肖之職皆不得行也可乎哉學官去則諸生必皆為師儒而去朝行間亦必有為善類而去失人心虧國體所繫不細若厯年不能拔之疽根一旦而拔於大宰相之手民心悅而天意得內患去而外難消乃必然之理此宗社無疆之福也亦永有令聞大宰相亟圖利之上丞相賈秋壑書庚申六月某聞古之時有以千金求千里馬者既乃以五百金市駿骨以歸好千里馬之念一形不期年而千里之馬三至郭隗舉是説以告燕昭于是禮士自隗始而樂毅等皆集此戰國諸侯事也况用天下者乎恭惟大丞相正位鈞軸以來首奬恬退而抑奔競古潛之趙為祕書廬陵之歐陽為史館長沙之陳為掌故皆天下所謂恬退士也然召之而未至趣之而未行夫彼皆千里馬也而未至未行無乃市駿骨之意未白乎某願為郭隗可乎某非欲如隗之求異禮也第欲成恬退之風者自某始也某之辭校書郎至再矣而朝廷未之許是朝廷奬諸賢之恬退者雖欲以抑奔競而不許某以恬退者實以倡奔競也而可乎某竊末第者雖八年厯外考者無一日未有一日考而躐中祕未閲三月久而進一階謂非奔競不可也朝廷方以恬退召諸賢而某以奔競壞之非所以風在位也亦非所以來諸賢也孰在徇某之請而使之進退辭受不失其正之為得乎某之請不行則天下之人將曰朝廷之奬恬退者名焉而已矣姚某之辭校書者偽焉而已矣奔競者將日至恬退者將日逺所召之諸賢未必其來也某之請若行則天下之人將曰朝廷之奬恬退非名矣姚某之辭校書者亦非偽矣恬退者必日勸奔競者必日懲所召之諸賢庶幾其來也所得者必千里馬而非止於駿骨矣豈止如樂毅輩哉惟大丞相念之有關於風俗不細干冒威嚴俯伏待罪雪坡集卷二十九
