body:
  text: 雪坡集卷二十宋姚勉撰詩七言古風潘凱吳燧二察甚振風采劉仲山有詩因次其韻國家元氣幾如髮章李以來幾臺察謂章公琰李公昻英翻盆窺甕若不聞射影含沙但潜發坦途自詫忘羊腸堅氷恐已在履霜熙豐舊人正伺隙乃爾寂寂無精光抨彈巳上㫖宣諭諫不能行法當去老烏欲食不再鳴幸有新來柏臺疏蟄霆忽擊瞶者驚不待數月如陽城中書君已非偃月何事亦惡仗馬鳴奏疏流傳人吐舌未死姦諛面赬熱祇今時事尚可言奏四十章當一月直言不憚方威靈本朝未嘗言罪人但圖奏上天子喜莫管近前丞相嗔向來慶厯子唐子千古名垂汗青史瘴山炎海固鬼愁志士寧能彼易此風塵澒洞何如時麒麟豺虎方爭馳士所當為未止此志完幸聽承君規丁已春言事西歸和朱子雲賜詩韻鯉魚書來上誰字斗牛光中湖海士梅花臘雪曽㑹面桃李春風一彈指剝書得詩意雄傑鍾呂驚聞箏笛耳懦夫有聞氣可作姦諛未誅神已死奴唇爭笑乃獨否我心有同固如此君家請劒攀折檻逺勝衣繡誇歸里立朝日少諫多藁况有竹林老夫子百年易了富與貴萬古不磨天此理笑罵從渠官欲好妻妾羞人身不恥獲禽一朝固可十天下良工安肯詭古人寥寥今不見舉世滔滔此皆是蛾眉方遭衆女嫉足音忽動空谷喜我欲淨洗后土泥子為快挽天河水和楊監簿咏梅不知年換山無厯日短著書隂自惜臞仙誰與伴清孤竹裏梅花破幽寂月窗看影嗔曉奪雪徑尋花驚夜失絶憐一㸃清淡意不作羣芳妖艷質夢寒翠羽真恐涴香逺細腰何敢即廣平亦作軟媚語可笑鐡心輕變易梅州參徹梅花髓句中有味供紬繹氷甌滌筆想更竒試為此花重請益送孫龍谷煌煌南方老人星天邉飛來地上行秀眉方瞳瑣骨聳升降步履如風輕生平見說勇為義十指團欒一和氣祇今福壽天所報眼底曽孫家四世瑞祥融作合幹松豈惟義聚蒙天封義人合得松樣壽孫枝蓊勃環老龍先生教人忠與孝家法可為民則效道中有福理自然必收詩書仁義效子孫森列皆有文次公長公為弟昆曽孫早娶見𤣥孫蒲輪迎召登金門送李幼章梁間呢呢燕將雛林中櫨櫨反哺烏君前舍羮潁谷子槖中置簞翳桑夫五年得金方還養有婦有婦愁秋胡士生志大雖江湖不堪回首飛雲孤伏雌扊扅且未論占鵲日日旦及晡篋中萊衣幸可著腰下何必印若蘇因君歸去長嗟吁君有母遺我獨無為親負米今巳矣落日慟哭悲丘墟願君升堂奉甘腴毋使專美徐仲車九日簡張倅西風破帽吹不斜東籬繞行空嗅花隔墻酒熟無鄰家草堂缺醉從誰賒亦思峯頭作重九安得天風吹灧酒别駕倘作城南期賢似江州王太守送胡季㢸入太學春秋自有胡氏學盡束諸家上髙閣當時小試錦江城橫翼秋風天一鶚祇今冠帶圜橋門孤羆兀坐空狐羣近來文氣頗卑苶要使四海宗雄文余生志願遊壁水竟隔蓬萊三萬里雖然末第偶成名俗骨自憐凡可鄙君今換骨向時中六館名流自不同宰相狀元三舍選齊前碑字看填紅送漆文甫尉分宜吾兄梅花氷雪臞胸中萬卷行石渠同生丙子自兄行才學推兄更有餘月中折桂仍先余兄騎快馬余蟾蜍一行作尉表二邑春臺春風宜吹噓阿瞞綵棒謹勿設民命今皆轍中魚合得官職聽自除覔薦莫作迎逢諛寒齊話别酌霜月祝子但此霜月如欲留不可空攬袪兄出我處從今疏兄出我處從今疏有便但寄針規書送琴隱吳君天髙日烈勢欲然秧已生節未入田誰歟操琴尊師㳙使我赤地里至千風雩且歌吾自樂窮閻不可無炊煙薰時解愠民望切亟為我作南風絃題談君詩集談君蘇野塘壻也建州衣鉢傳武功山谷濠梁窺謝公談君之詩何自工君家詩有氷清翁野塘千頃涵秋風資奩盡在奚囊中蘇仙今己騎虬龍野塘釣艇君誰同贈彭花翁牡丹障洛之花圖歐公詩驚怪天巧呈新枝自言當時記者數十種姚魏後有潜溪緋蜀之花圖景仁句香雪蘂金藏不露徑圍三尺瑞雲紅尚有二花添未具此花非惟今所無世間久亦無此圖東南花樣自來小如盤能幾多如盂曉來明眼花翁作風韻宛然如蜀洛寫作花中第一花羣類一時都脫落想渠欹筆小盤礴心去化工無一膜天上司花巧不神筆底春風光欲爍籠寒不假青蒻庵護日何須碧油幕月坡堤張家園郭令公宅東街偏錦衾繡帳相接連一夜移入歌堂巔吳臺教戰娃數百漢宫列侍娥三千鮫綃十丈思公譜錦茵萬態元輿賦花自長春蠟不封根無下土蟲難蠧花翁花翁子誠能見渠此畫萬感增此花昔惟載本草流傳至唐花始好移來從武曌愛重由環兒名花與傾國初著沉香詞從此帝城春爭逐賞花期徑尺誇千朵萬錢買一枝三街九陌沸遊賞冠蓋車馬相追隨自入天朝花最盛長夀不數唐崇敬豈非洛陽天下中和氣又非長安同故令百卉巧變幻黃緋紫白深淺紅簪花下至採樵子獻花上至蓬萊宫或言此花特妖媚只解趨時爭富貴阿曌移來醜此妍阿環貴重榮猶悴四香閣上屬誰家朝恩宅裏知何地世人浪自相矜誇看到子孫能幾家我言此罪不在花自是時輩爭榮華洛人珍重姚黃不輕畀一根不入權豪第花知天朝真治世萬古天藏發竒祕洛不愛寶蜀出珍如鳯如麟王者瑞洛中富推程與邵蜀之蘇范輝相照人品亦如花品髙斯人斯花古來少後來蜀洛黨小分世間萬變如輪雲洛陽名園占治亂讀書至此空三嘆洛宫禾黍今離離蜀道峨眉更慘凄花翁作此豈無意要見祖宗全盛時京城苦熱羲和鞭日就地行祝融張傘燒空明錢塘人家苦逼仄行立坐卧皆如蒸清宫水殿山峩雪夜飲相攜氷玉潔溫泉浴罷清風來太液池邉芰荷月王公甲第連雲霄松泉竹石秋蕭蕭龍皮淺沁寒坐客驪珠直上清塵囂天上清凉不知暑炎熱人間徒自苦亦有江南雲水鄉胡不歸歟釣煙雨夢保母如兒時憶昔兒時衣百花阿母扶我上戲車兩嵗讀書未離乳書罷尋乳猶歸家年方十三失阿保弱冠慈母仙去早秖今堂上獨靈椿念及庭萱怨露草夜來忽夢如兒年阿保攜抱慈母憐人生安得常童顛只作嬰兒啼母前題魁字軸玉衡杓建天之綱枕參魁耀森寒芒總提衆星環侍傍仰望熠熠開神光有美俊容分天章收入翰墨何淋浪一筆三丈超尋常字勢直作蛟龍驤錦裝玉軸垂髙堂標靈發異呈嘉祥即吐竒䇿先衆芳巍峩姓字壓四方魁下三台炳煌煌上拱紫極天中央作第一流謹勿忘冠冕今古萬世香雪坡集卷二十
