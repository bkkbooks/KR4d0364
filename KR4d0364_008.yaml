body:
  text: 雪坡集巻八宋姚勉撰講義東宫侍講及沂邸教授時乃命羲和欽若昊天厯象日月星辰敬授人時分命羲仲宅嵎夷曰暘谷寅賓出日平秩東作日中星鳥以殷仲春厥民析鳥獸孳尾申命羲叔宅南交曰明都平秩南訛敬致日永星火以正仲夏厥民因鳥獸希革分命和仲宅西曰昧谷寅餞納日平秩西成宵中星虛以殷仲秋厥民夷鳥獸毛毨申命和叔宅朔方曰幽都平在朔易日短星昴以正仲冬厥民隩鳥獸氄毛帝曰咨汝羲暨和朞三百有六旬有六日以閏月定四時成嵗允釐百工庶績咸熙此堯占天授時之事也上言修齊治平之事已畢故以治厯明時之事言之乃命羲和止敬授人時總言其綱也分命羲仲止鳥獸氄毛分言其目也羲和南正重北正黎之後世掌天文之官欽若昊天者敬順天道之自然也厯者書也象者器也璿璣玉衡是也作書以考日月星辰之度制器以驗日月星辰之行天之日月即時之日月也周天三百六十五度四分度之一日行一日遲天一度而嵗一周天月行一日遲天十三度十九分日之七而月一周天星二十八宿也東方角亢氐房心尾箕北方斗牛女虛危室壁西方奎婁胃昴畢觜參南方井鬼栁星張翼軫四時迭見辰十二辰也子為𤣥枵丑為星紀寅為析木卯為大火辰為夀星已為鶉尾午為鶉火未為鶉首申為實沈酉為大梁戌為降婁亥為娵訾日月一月㑹于一辰星辰皆一嵗而徧天時者天道之自然也天時既定然後敬授之民使因天時以修人事故曰人時春先夏秋先冬故春秋掌以二仲冬夏掌以二叔二仲言分命二叔言申命春秋言以殷冬夏言以正嵎夷在青州暘谷日出而明也南交在交州西在天水西縣昧谷日入而晦也朔方在幽州幽都幽隂之地也宅定居也定此四地為東西南北之正然後可求地中也寅敬也賓迎也餞送也羲仲主冬故敬迎日之出和仲主西故敬送日之入平均也秩序也均則逺近皆用其功秩則先後不失其次東作春時畊作之事南訛夏時化育之事訛化也西成秋時收成之事以時所屬言非以方言也夏不化則其春雖生而秋無所成矣尤不可忽故曰敬致言敬以致其功也聖人立心立治一主於敬曰敬授曰寅賓曰寅餞曰敬致無所往而不敬也朔易則春與冬交易之際不能察則將至於寒暑易位故此職不言平秩而言平在在察也日中星鳥者二月之時日夜平分適中而星則南方朱鳥七宿之中星曰星者見于南也方嵗之春二十八宿皆安四方之定位故南方七宿見于南曰中星者以星火星虛星昴推之聖人南面故騐星於南日永星火者五月之時日去北極近而晷長星則東方蒼龍七宿之中星曰房者見於南也天左旋故東方七宿次南方七宿而見宵中星虛者八月之時亦日夜平分星則北方𤣥武七宿之中星曰虛者見於南也春屬陽故言日中秋屬隂故言宵中其實則一日短星昴十一月之時日去北極遠而晷短而星則西方白虎七宿之中星曰昴者見于南也四時舉仲以推孟季列宿舉中以驗餘星此固史官之紀述有法亦見盛帝之世每事皆用中道也析因夷隩者驗之人事也孳尾希革毛毨氄毛者驗之物理也析散也春則民散居於野以就耕因仍也夏則仍春時所居而不變夷樂也秋則物成熟而民夷樂隩温室也冬則寒氣至而民温聚孳生育也尾交接也春之生意也希少也革改也夏之時鳥獸羽毛希少而改革也毨理也秋則毛已革而整氄厚也冬則毛厚氄而温若民若物各得其所此帝堯贊天地之化育也帝曰咨汝羲暨和止庶績咸熙者又繼命之也朞三百有六旬有六日者陽數贏故日多六日隂數縮故月少六日合為十二日積三年得三十六日則除六日而以三十日為一月故三嵗一閏又積兩年得二十四日則又以先所餘六日足三十日又為一月故五嵗再閏此姑大畧言之至如十九嵗七閏之法朱文公之説已詳閏者所以權中氣而正四時也每月有朔氣有中氣如立春正月節雨水正月中之類朔不必在其月如十二月得正月節正月得二月節之類中則必在正數之月如雨水則必在正月春分之必在二月時無閏以定之則推移不齊久而必舛故有閏而後可以定四時成嵗是亦聖人建天地之中也嵗月日時無易故順天時以修人事可以日有成月有要嵗有㑹信治百官趍事赴功皆有所就衆功由此而皆廣矣春秋傳曰閏以正時時以作事事以厚生生民之本於是乎在治厯明時豈茍然哉帝堯之位天地育萬物如此故曰巍巍乎其有成功帝曰疇誰也咨若順也時登庸用也放齊曰𦙍嗣也子朱丹朱也啓開也明帝曰吁嘆辭嚚多言也訟好爭也可乎堯欲求賢加之上位放齊小人乃謂嗣子丹朱為開明以應其求帝則嘆其嚚訟而不以為可也丹朱非蠢然無知者但以其聰明用於嚚訟耳丹朱堯之子也人莫知其子之惡堯則知其不肖而不私之此聖心之大公也帝曰疇咨若予采事也驩兜曰都歎美也共工方鳩聚也僝見也功帝曰吁靜善也言庸違用則背其言也象共滔漫也天帝欲求能順治我之政事者驩兜小人之黨則謂共工方聚見其功而薦進之帝亦知其為人謂其貌象則似恭而其中則有滔天之惡也帝知人之明如此放齊驩兜共工皆小人也何堯時有之蓋天下未嘗無小人帝則知而不用耳帝曰咨四岳湯湯水流貌洪水方割害也蕩蕩水勢懷包也山襄陵平大阜也浩浩盛大貌滔天下民其咨怨嘆也有能俾乂有能者使之治也僉衆也曰於亦嘆美之辭鯀哉帝曰吁咈哉咈逆辭方逆也命天命圮敗也族類也岳曰异已哉試可乃已試其可而後己也帝曰徃欽哉戒鯀之辭九載績功也用弗成此求治水之人也四岳者四方諸侯之長唐虞之時内有百揆四岳帝問四岳以洪水方為害於民有能治者欲使之治衆乃以鯀為對帝則謂其人方逆天命圯敗善類盖愚而自用之人決不可任四岳則使帝姑惟試之帝遂以四岳之言而用鯀且戒以敬重其事乃九年而功不成丹朱共工帝知其不可則不用既知鯀之不可胡為而又用之蓋是時水患已極民怨方深帝急於拯救而神禹未出鯀自以為能治水四岳羣臣又以為鯀能治水天下之人亦以為鯀能治水帝雖知其不可用亦不可違衆之心也此帝之舍己從人也他日績用弗成舜攝政時殛之羽山帝亦未嘗貸其罪豈若後世違衆用人迨無功則又從而蔽之哉帝曰咨四岳朕在位七十載汝能庸命巽朕位岳曰否徳無徳也忝辱也帝位帝曰明明揚舉也側陋隠僻之人師衆也錫與也帝曰有鰥在下曰虞舜帝曰俞予聞已先聞之如何又問衆人如何岳曰瞽子瞽瞍之子父頑愚也母嚚象舜弟傲慢也克諧和也以孝烝烝乂不格至姦帝曰我其試哉女于時以女嫁人曰女觀厥刑儀刑也于二女釐理也降下也二女于嬀汭媯水之汭舜所居也嬪于虞帝曰欽哉此以下載舜之事也帝以年老欲遜位于四岳四岳不可則使之明明揚側陋迨夫衆與帝言以舜為可帝亦謂已聞此人但又不自足而詢之四岳四岳舉其盡難能之孝者吿之夫以自處於頑父嚚母傲弟之間亦難矣而乃能和之以孝使之蒸染漸漬如蒸物然潛移黙化使其至於順治而不至於姦惡豈人之所易能哉而帝猶以為未也則以二女女之夫以天子之二女下嫁一匹夫之賤當如之何而驕蹇而舜則能以道理降下其心於所居媯水之汭皆執婦道于有虞氏帝於是稱其欽而美之知其可受以天下而以天下授之矣堯舜之治天下莫不自齊家始濓溪周子曰家難而天下易惟難者易則易者不難矣抑舜之所以能是者亦敬也堯典一篇始終皆曰欽聖功信無以加此一説釐降二女于媯汭帝女下降故曰降欽哉者堯戒二女之辭其説雖順然不如前説有義理况以降為下嫁亦與女于時句相重複只當從前説舜曰言舜以别堯咨四岳有能奮庸奮發其功用熙帝之載廣帝堯之事使宅百揆亮采惠疇亮成其事而且能惠順者誰僉曰伯禹作司空言伯禹今為司空之官帝曰俞咨禹汝平水土惟時懋哉懋者勉也平水土者言其前日之功懋哉者勉其盡今日之相業禹拜稽首讓于稷契暨臯陶帝曰俞汝徃哉俞者然其讓汝往者不許其讓此以下舜命官也先命伯禹以為相宰相之職太振作則過於嚴而不足以養天下之元氣太安靜則過於寛而不足以起天下之精神必相濟而後可奮功廣事振作也亮采惠順安靜也禹平水土有大功如此舜不自命之為相必咨訪四岳待公論皆協而後用之蓋如此用人斯可以服天下帝曰棄稷名黎民阻飢言衆民皆艱阻於飢汝后稷言汝為主稼穡之官播布種時百穀帝曰契百姓不親五品不遜五品即五常遜順也汝作司徒敬敷五教在寛司徒掌教之官五教即五常之教布教之道在敬在寛敬則在己不忽寛則在人易從帝曰臯陶蠻夷猾夏猾亂也夏中國也寇賊姦宄寇賊在外者曰姦在内者曰宄汝作士士師掌刑之官五刑有服服受也五刑之中有當受之罪五服三就既受五刑中之當受者則就三處行之於朝於市於野五流有宅五宅三居五刑之寛宥者有流但流所居則有三所大罪四裔其次九州之外其次千里之外惟明克允惟明則方允當此舜因禹遜此三人而舜命之也棄為后稷契為司徒臯陶為士自堯時已然矣舊官則熟於其事故舜因而任之不復改命古人成功以久任也帝曰疇若予工誰能順我百工之事僉曰垂哉垂舜時巧人帝曰俞咨垂汝共工共工官名垂拜稽首讓于殳斨暨伯與帝曰俞徃哉汝諧其讓固是但往任是職惟汝諧和此舜命共工之職也後世有垂之竹矢其任百工之事可知矣帝曰疇若予上下草木鳥獸誰能順我上下之草木鳥獸欲使皆遂其生草木則在山者曰上在澤與平地者曰下鳥獸則在天者曰上在地者曰下僉曰益哉帝曰俞咨益汝作朕虞汝作我虞人之官虞人掌山澤益拜稽首讓于朱虎熊羆帝曰俞徃哉汝諧此舜命益作山澤之官也禹遜稷契臯陶伯益遜䕫龍帝皆就咨命之殳斨伯與朱虎熊羆則不復就命何也蓋四人者皆賢人雖不就命亦皆當時在朝有職位者帝曰咨四岳有能典朕三禮典主掌也有誰能掌天地人之禮僉曰伯夷帝曰俞咨伯汝作秩宗夙夜惟寅直哉惟清禮重事也故又訓戒之曰敬曰直曰清掌禮者當有此徳也敬則謹嚴直則中正清則潔肅伯拜稽首讓于䕫龍帝曰俞徃欽哉此舜命伯夷以掌禮之官也禹與伯夷不曰往哉汝諧而曰汝往哉曰往欽哉者相與羣臣不同故尊異其辭而曰汝往哉禮主於敬故嚴重其辭而曰往欽哉帝曰䕫命汝典樂教胄子胄子者天子之子至公卿大子夫元士之適子皆入大學世與之齒所以教序也直而温寛而栗剛而無虐簡而無傲詩言志歌永言聲依永律和聲八音克諧無相奪倫金石絲竹匏土革木皆物之有聲者五聲之所寄也克諧者其聲諧美無相奪倫者倫理次序不相侵奪也神人以和䕫曰於予擊石拊石百獸率舞此舜命䕫以掌樂之官樂由人心而生然教之又必自和其心而始直寛剛簡四者皆教也直者多躁暴而不能和温寛者多弛慢而不能莊栗剛者多虐簡者多傲必扶其偏而教之則中和矣直寛剛簡氣質之性所稟之偏也而温而栗無虐無傲則教也舜方命䕫而夔即言功者䕫亦堯時掌樂者也故有效可言百獸無知之物猶相率而舞則樂之能感神人可知矣皆一和之所致也以其心之和發於其聲之和和之所感者逺矣八音獨言擊石拊石者玉振乃樂之終此言其成也帝曰龍朕堲讒説殄行堲者憎惡之也讒説者誣譛之言能殄人之善行震驚朕師讒説行則衆皆懼矣命汝作納言夙夜出納朕命惟允此命龍作納言之官也出納之間不實則讒説可乗間而入故以惟允訓戒之帝曰咨汝二十有二人欽哉惟時亮天功三載考績三考黜陟幽明庶績咸熙此舜又繼命之也二十有二人者四岳一人禹稷契臯陶垂益伯夷䕫龍謂之九官共十人并十二牧共二十二人曰天功者王者代天爵人職曰天職位曰天位故其功亦曰天功也然其功之有無必久任而察之九年之後無功終身黜而不用之矣此所以賞罰明信而人莫不知畏慕也後世任人而不久責成太速賞罰又不足以勸懲其不及盛帝之治宜哉分北三苗苗民者頑不可教誨之人然舜則必有道以化之始者攝政之時則竄之於三危屏之於中國之外使不得敗吾民之俗今則又分而北之使不得相聚而為惡可化者作一處未化者作一處必皆化之而後己此所以後來收七旬之格也旌別淑慝表厥宅里彰善癉惡樹之風聲成周化殷之頑民蓋亦如此舜生三十徵庸三十在位五十載陟方乃死此史記舜之終也帝釐下土方設居方別生分類作汨作九共九篇藳飫汨作九共藳飫蓋逸書名書既不存義不可强通禹曰於帝念哉徳惟善政政在養民水火金木土穀惟修正徳利用厚生惟和九功惟叙九叙惟歌戒之用休董之用威勸之以九歌俾勿壞帝曰俞地平天成六府三事允治萬世永賴時乃功此禹言六府三事養民之政而舜復美其功也所謂帝舜申之也自判隂陽以來陽變隂合而生水火木金土五行穀又土之所生也以其養人故通謂之六府府聚也所以聚人財也六府出於天不能自為民利故必待聖人修之如水必澄治火必新潔金必鎔範木必作揉土必耕墾穀必種穫而後可以為民利也正徳利用厚生惟和則人君之事也人之有道也逸居而無教則近於禽獸聖人有憂之教以人倫此正徳也作為佃魚網罟宫室耒耜杵臼等事以教民此利用也奏庶艱食鮮食懋遷有無化居者此厚生也三者不可闕一必並行而不相悖故曰惟和能如是則其功可歌詠矣雖然有功不賞有罪不誅亦無以化天下故曰戒之用休董之用威庶天下皆率作而興事也而聖人之意亦豈徒賞罰而已哉優柔奬厲之心常行乎恩威予奪之外故又以九功之叙而可歌詠者勸之使續此生生之意於無窮而勿至於壞蓋使民不倦之意也此禹平水土以後之事所謂徳惟善政政在養民者蓋如此必欲帝舜軫此念於心無一息而忘養民之事焉是念也即克艱之念也帝於是然其言而就贊美之且以起下章遜位之意帝曰格汝禹朕宅帝位三十有三載耄期倦于勤汝惟不怠總朕師禹曰朕徳罔克民不依臯陶邁種徳徳乃降黎民懷之帝念哉念兹在兹釋兹在兹名言兹在兹允出兹在兹惟帝念功此帝舜遜禹以位而禹遜之臯陶也耄期倦于勤者舜生三十徵庸三十在位今在位又三十有三載蓋年九十有三將及百嵗之時頗厭倦于勤勞也聖人未嘗有倦心也但志氣則常盛血氣則不能無衰耳禹惟勤而不怠故舜欲以遜之禹之不怠蓋亦克艱之念也帝以位遜之禹禹則不敢當謂無所能不為民所歸依臯陶則能逺布其徳徳乃降下於民衆民皆懷愛之欲帝念之而以位遜之念兹在兹釋兹在兹名言兹在兹允出兹在兹此四句舊説謂臯陶之用刑以上兹訓此人下兹訓此徳言臯陶服念此人之罪則亦在此徳諸家之説皆如此但上文不曾言用刑不應此四句如此說且帝念哉之念與惟帝念功之念意皆相同皆以為舜之念而中間念兹在兹之念乃以為臯陶意全然不貫兼之服念此人之罪即是名言此人之罪縱釋此人之罪即是允出此人之罪又不應如此重叠故此四句頗不易訓釋某聞之師曰四句非言臯陶之用刑念兹在兹者蓋臯陶有徳帝當念之而遜以位無以易此人者帝知念之則亦在此人如釋而不念之則亦在此人名言欲遜之則亦在此人實出命欲遜之則亦在此人縱横上下則一臯陶也惟帝當念其功而遜之以此則文義皆順念字不作兩般帝曰臯陶惟兹臣庶罔或干予正汝作士明于五刑以弼五教期于予治刑期于無刑民協于中時乃功懋哉臯陶曰帝徳罔愆臨下以簡御衆以寛罰弗及嗣賞延于世宥過無大刑故無小罪疑惟輕功疑惟重與其殺不辜寧失不經過於罰而殺不辜不若過於賞而失常法好生之徳洽于民心兹用不犯于有司帝曰俾予從欲以治四方風動惟乃之休此帝舜因禹稱臯而就美其功而臯則復歸美於帝也非因禹之言又轉而遜臯陶特稱美之耳臨下之道患乎煩而不能簡簡則易從御衆之道患乎嚴而不能寛寛則得衆帝舜之治一簡易寛大而已至於罰弗及嗣止寧失不經則帝之厚賞薄罰忠厚之至好生之徳也天地之大徳曰生仁者天地生物之心而人得之以為心者也人皆有之聖人能全之耳聖人之心無非生意民感此意誰忍犯刑後世之君用法深刻賞寧輕而罰寧重者烏足以語聖人之治哉初知宣子將以瑤為後知果曰不如宵也瑤之賢於人者五其不逮者一也美鬚長大則賢射御足力則賢伎藝畢給則賢巧文辯惠則賢强毅果敢則賢如是而甚不仁夫以其五賢陵人而不以仁行之其誰能待之若果立瑤也知宗必滅弗聴知果別族於太史為輔氏孟子曰三代之得天下也以仁其失天下也以不仁國之所以廢興存亡亦然觀知瑤之事而孟子之言益信瑤之賢於人者五而一不仁足以敗之甚矣才之不可恃而仁之不可無也初知宣子與趙簡子皆議立後趙簡子則捨伯魯而立襄子知宣子則捨知宵而立瑤趙襄子能以尹鐸為晉陽用保障而不用繭絲盡取民財如取繭絲者謂之繭絲不盡取民財而固結民心者謂之保障其仁如此豈瑤之不仁者所能敵哉不待三家共攻之時而勝負已决於此時矣左傳哀公末年載荀瑤伐鄭將門知伯謂趙襄子入之趙孟曰主在此知伯曰惡而無勇何以為子趙孟曰以能忍恥庶無害趙宗乎知伯不悛襄子由是惎知伯遂喪之知伯貪而愎故韓魏反而喪之左傳之所謂貪愎即輔果之所謂不仁也左傳載之於終通鑑載之於始此以見通鑑之作上接左傳也雖然又有説焉聖朝得姓之初即此趙氏趙襄子不繭絲一念在當時自大夫為諸侯在後世聖子神孫遂有天下仁之功効如此矧藝祖皇帝紫雲樓之誓其仁愈充廣乎此宗社千萬世無疆之福也仁之一念願聖子神孫世守之知伯又求地於魏桓子桓子欲弗與任章曰何故弗與桓子曰無故索地故弗與任章曰無故索地諸大夫必懼吾與之地知伯必驕彼驕而輕敵此懼而相親以相親之兵待輕敵之人知伯之命必不長矣周書曰將欲敗之必姑輔之將欲取之必姑與之主不如與之以驕知伯然後可以擇交而圖知氏矣奈何獨以吾為知氏之質乎桓子曰善復與之萬家之邑任章之言此後世權謀相傾之術也堯舜禹湯文武周公豈有是説哉無故而求地於人固知伯之貪惏無厭也與之地而張之使驕蹙之使亡任章之心亦不仁矣將欲敗之必姑輔之將欲取之必姑與之夫子所定之周書無是語也嗚呼貪而愎驕而輕使人得以術而傾已為知伯者亦有以自取哉詩曰不忮不求何用不臧故君子之學當以懲忿窒慾為先務雪坡集巻八
