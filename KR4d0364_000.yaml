body:
  text: 雪坡文集别集類三宋提要臣等謹按雪坡文集五十卷宋姚勉撰勉字述之一字成一髙安人寶祐元年以詞賦擢等廷對萬言策第一除校書郎兼太子舍人宋史無傳是集藝文志亦失載此本為其從子龍起所編凡奏對牋策七巻講義二巻賦一卷詩十一卷雜文二十九巻勉受業於樂雷發詩法頗有淵源雖微涉粗豪然落落有氣文亦媕雅可觀無宋末語錄之俚語外間傳本頗稀訛缺特甚今以永樂大典所載各為校補其永樂大典不及載者則仍其舊集首有文及翁序稱其磊落有竒節官僅校黄本書備青宫寀又有方逢辰序亦稱為瑞之奇士觀其所上封事奏劄以及廷對諸篇論時政之謬辨宰相之姦皆侃侃不阿惟二十二巻載賀丞相賈秋壑一啟題下注庚申五月十六日考宋史理宗開慶元年十二月賈似道奏鄂州圍解景定元年正月詔奬賈似道功四月詔赴闕庚申即景定元年啟蓋作于是時與其攻丁大全封事若出兩手殊為白璧微瑕然啟末多進規之語猶曲終奏雅之意固視劉克莊之諛頌求榮差有間矣乾隆四十三年三月恭校上總纂官臣紀昀臣陸錫熊臣孫士毅總校官臣陸費墀雪坡集原序寳祐元年嵗在癸丑上臨軒賜進士第予與姚成一適相後先聮鑣入期集所一見傾盖懽若生平握手論心知其慷慨有大志越眀年予逰清江碧嶂間距瑞陽三舎竹輿山行入境問俗知其倜儻有義氣爾後渭北江東末由再晤四方傳誦累䟽囊封憤世嫉邪排奸指佞又知磊磊落落有竒節夫以成一之志與氣節奮乎百世上下而官僅校黄本書備青宫寀年僅四十有六遽修文白玉樓騎鯨白雲鄉去豈不可悲也夫不幸之幸成一有從子龍起得陛天子之學有一子元夫已受天子之命振家聲而接文脈不在兹乎龍起彚編成一文藁五十巻予讀之悲不自勝烏乎此持成一之文而已其志與氣節固自有不恃生而存不隨死而止者㫺龍川陳同父亦癸丑倫魁也嘗伏闕三上書孝廟覽之驚異俾執政召問當從何處下手晚得一第未及大用而歿又嘗自作長短句四巻酒酣浩歌一章輒自歎曰平生經濟之懐略已陳矣抑亦可悲也夫時東莱吕成公遷居金華同父數造焉成公深期之曰未可以為世不能用虎帥以聴誰敢犯子予於成公何能為役而所以深期成一與成公同撫遺編而欷歔悼吾黨之零落敢以期成一者期其子若姪景定五年夏六月甲子古涪文及翁序姚成一瑞之竒氣也未可專以文章論也予癸丑夏自吴幙入館時成一初第見其文如長江大河一㵼千里每與友朋相語必曰姚成一之文章不易及也越數年相㑹於館中見其持身之介立論之壯負氣之英且屢挫而不衰又知成一之所以為成一者同館之士其知成一者莫如予而知予者亦莫如成一也未㡬咸以罪去越三年予起家承乏於瑞則成一已下世矣其族子龍起刋其平生所為文属予序予曰成一之操守議論氣槩欲為天下國家興事立業者也豈文章而已乎天奪之早而僅以文章傳後惜也景定癸亥秋八月四日蛟峰方逄辰序
