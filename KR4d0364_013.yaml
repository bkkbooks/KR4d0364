body:
  text: 雪坡集卷十三宋姚勉撰詩五言律新晴散步晴曉芳蹊潤幽尋得自怡露粘行草蝶風舞罥花絲竹靜聞鄰話林虛度客棋意行無伴侣池上只鶯知春日即事行野醒春困看山立晝晴鳩啼青樾破鷺匝緑秧行物到忘機樂人因逺俗清覔詩無斷句敲板午茶聲山齋茅齋住翠林一徑總清隂澗近水聲入窗虛山色侵讀書依竹靜送客出花深此地無塵俗令人長道心芭蕉窗外幾芭蕉幽懷慰寂寥晚宜風颭颭秋稱雨瀟瀟清滴漁篷碎徐翻鳯扇搖進修期似爾日日長新苗嵗暮嵗莫仍為客書空默自嗟鴈聲催念友魚鱠起思家廊靜風鳴葉窗虛雪入花醉鄉聊避世天外自寒鴉山市路詢山市宿店近石橋橫老水穿簷過低窗照水明雨聲凄客思野處愜幽情沽酒聊牽睡茅柴醉不成舟泊蘭溪湖頭市遇雨望燈投野市衝雨泊征船茅店不容客栁堤聊枕舷欹眠濤拍枕起坐漏沾肩夜半瀟瀟歇推篷月在天送王仲安歸武昌武昌洲畔去端不為魚肥要超初平石同娛萊子衣夜長秋雨急天濶白雲飛何日鵲烏喜北風鴻鴈歸登四聖觀月桂亭有感石刻云紹興十三年清涼居士韓世忠建將軍休戰伐居士號清涼亭創煙蘿古山深月桂香夢魂猶朔漠風景已錢塘往事都休問鐘聲又夕陽登北髙峯秋風吹鬢影涼意足登山人立晴林杪猿啼霜霧間好山多佛占浮世只僧間我亦耽竒者禪扉日叩關冷泉亭納涼人間方鼎鑊個裏獨氷霜自是清難濁能令暑亦涼客遷愁瘴海妃浴涴溫湯惟有兹泉冷冷中滋味長放生池納涼晚歸湖面輕煙起前山漸不分鐘聲連寺答人語隔船聞吟客衣生月歸僧笠帶雲及城門未掩燈火已紛紛湖上隱者所居家計松梅竹日程琴酒碁呼猿僧到處放鶴客來時壁上皆蘇字窗門只白詩卜鄰心已決未得買山資病後久不到湖上晚與客到斷橋病後久不出未知湖上秋偶逢佳客至小作斷橋遊荷暗仍香岸栁疏猶舞樓相期明月夜更此放扁舟次劉仲山餞歸韻幾同湖上飲俱愛晚山青雅趣方泉寺離舟又浙亭贈行詩自好愁别酒休醒後夜思君處桐江傍客星富陽道中翠駕凋零盡芒鞋響葉聲晴江潮後緑寒日竹間清曝背翁微睡挑包僧自行離京才一日便覺愜幽情道傍水閣一川澄不動山色浸分明噪晚鴉寒甚窺魚鷺瘦生人家江閣好天下釣翁清想此幽居者何知有利名丈室蕭然丈室虛倣佛似僧居影與身為伴琴和鶴也無飯時三種菜香畔一函書不似僧家處曇曇髮幾株贈徐處士劒津徐處士湖海盡知名術造勾庚妙書研遁甲精寒齋留爾久别驛若為情定赴秋風約西湖酒重傾客中遇雨名韁驅逺役挈挈未遑安春只雨中過花從客裏看水聲添昨夜風力盡餘寒但喜前程濶不愁行路難及第歸入江西界得得還初隱秋風信馬蹄此心宸極北今日大江西戲綵呈君賜擎珠教御題家庭真樂近蓐食聽晨雞送梁新恩夢靁歸鄉晝錦賦歸歟梅花萬里餘同盟難此别後會定何如袍緑為親壽編青課弟書燕山今再有五桂耀鄉閭梁氏有五桂坊送王希聖歸興國赴舉之子趣裝歸占黃已在眉雕蟲觀暇日薦鶚信秋期喜有傳衣鉢慙無助鼓旗捷書來報我端的菊花時贈煜上人繞院蕭蕭竹僧中爾獨清佛燈行道影梵磬誦經聲露葉晨蔬熟風松晝茗烹夜深誰伴侣月在石窗明送趙僉判與輻美任二首佐幕此三年邦人盡説賢吏寒清夜月民暖小春天祖帳旗交綵歸裝石壓船甘棠在何許積粟市橋邉底事三年裏才膺兩薦書邦侯辨寶晚使者設羅疏知已初何計能官自有餘漢庭今欠者子政與朱虛與毛教授州有典客吏以賄得官天基節乃敢立祝壽班雖前此嘗吏之者亦不羞也而廣文毛丈獨能叱而去之充是心以立清朝必能排姦邪去不肖矣喜而賦之詩舉世無清濁誰歟障倒瀾獨能驅鴈鶩不使汙鵷鸞此事雖云小其人已可觀近來峩豸者欠此廣文官次陳肩夔韻蠻觸爭蝸角興亡土兩丘一家文到古萬世月行秋鰲可三山冠鵬須八極遊胸中治安䇿時事幾堪憂贈廬陵三劉神童唐時劉正字今復見廬陵珠樹三根秀金門一日登贈君無句錦覔我到溪氷不為炎涼變童年有此能寄題上饒周儀仲西疇聞君負北郭築室扁西疇緑水人家曉黃雲穡事秋吾生如有此外物更何求堪卜東鄰否耕餘著釣舟送胡教授之沅水任君今鳴木鐸名與芷俱香後夜月千里美人天一方往追湖學躅更挈楚臣芳了却臯比事歸來振鷺行近聞沅水路今亦是風寒忠信如先教邉陲儘易安勿云師可去甘與國辭難文武能兼盡功名更好看有感范張心許友餘耳面為朋世路巇於嶺交情薄似氷綈袍非舊戀結綬况同登亦莫他人責先施恐未能夢太夫人如平生山鹿隨麋樂林烏反哺慈傷心惟夢裏有母似兒時愛子平生念思親隔世悲松楸霜露冷北望淚交頥靈源上太夫人冢一别慈闈面春風十五花不知人有母誰念子無家社雨鄰巢燕清明壟樹鴉動皆傷感處慟哭夕陽斜題族子霆伯西征録間味西征録霜橙嚼鱠虀俊聲壓湖北詩派接江西鎮日心相憶何時手重攜相期一樽酒重與叩雲溪贈玉隆都監周抱一一别丹霞洞何年到此邦犬隨燒藥鼎鶴伴改詩窗談柄風生席清標月在江西山聞欲隱來訪鹿門龐晨興晨興未梳盥此興亦何清看竹鈎簾坐澆花繞徑行葛巾聊復正塵事即時生安得簞瓢足扄門遂野情贈趙神眼杜門人事少排闥相師來童子忙驅鶴先生正看梅煩君滕口説如我豈身媒水鏡能司馬隆中覔異才安象祖携子餞行英爽可愛贈以詩嘉其有好德秉彛之天必能世其家西蜀安公子為謀不在身倚楹惟國事于道亦忠臣偉矣雙書藁清哉箇逸民丹心天所相宜有此麒麟和薑明甫詔放山林去時人冷眼看新詩為我贈髙義似君難又説同年弟尤知取友端市將梅子隱冠尚貢公彈和葛德逺脫兔驚罝逸潛魚畏餌逃山林聊復爾湖海可曽豪藥笑多方誤棊嗟不著髙且須隨野鹿共此食蘋蒿霧豹文雖隱風蟬蛻即仙伴書猶有劒食硯豈無田發藻多師董思經敢笑邉晚成知大器天詔正求賢挽十尊長居士聘君今已矣月入少微星又失宗盟長空悲族譜亭生芻嗟莫致歌薤若為聽只喜隂功在三槐已緑庭又代作鹿門龎德公欵段馬少遊古人不可今君賢抑其流清風足廉頑厚德亦鎮浮君今復古人善士吾何求代挽寧西雲杜牧先銘墓淵明自祭文兩賢真造理百世又逢君把釣溪沈月著書山鎖雲誰能上遺藁堪辟木天雲雪坡集卷十三
