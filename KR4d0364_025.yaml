body:
  text: 雪坡集巻二十五宋姚勉撰劄子四六賀沂邸延國夫人生日劄子伏以近天孫之七夕式際嘉辰慶王母之千秋聿登上夀和薫朱邸喜溢綵庭輒羾菲儀小伸賀臆恭惟延國太夫人四德身備五福首全夫人起居有召南鵲巢之德夀母多祉歌魯侯燕喜之詩載臨𤓰果之期茂介松椿之算某横經賔塾依庇侯門大國増封願益煥魚軒之寵慈闈致養更永觀象服之宜復東宫二門司劄子某猥以謭材濫聮宫寀衛翼是選端士愧不能當侍御罔匪正人聿資協贊職既嚴於振糾身有頼於維持末由貢名先辱貽翰殆成倒置不任内慙謹具稟酬伏祈照察某自揣謭聞謬聨儲禁道術之士以衛翼慚教詔之無良小大之臣懐忠良喜導承之有助既宻竒衺之察可無瘝曠之虞未貢賤名遽頒華剡先施甚腆内媿惟深謹具稟酬伏祈鑒察及第回徐國愽依光梓里久借餘輝唱第大廷誤膺親擢雖出冕旒之異眷亦由衡鑑之至公属未拜於君門尚遲趨於師席仰勤賁翰深紉謙光禮辱先施事成倒置念挈提之至此將稱塞之謂何天下有三達尊儻與鄉童之進世間第一人物願從長者之游回田賢良送所注論語說約伏被誨箋寵頒傳帙知姚元崇之折節可與讀書得田子方而與游庶幾聞道博學將以反説約也有朋逺來不亦樂乎某人文物故家聖賢奥學馬遷於父太史克紬石室之藏韋賢及子𤣥成不寳金籯之遺他日有聞於獨立春風妙得於詠歸不為已私嘉與人共某雖叨親擢方進學知平生温飽於三場非所志也大事剖裁於一部繼此教之他有謝私尚容嗣控回易天祥送厯墨陳黄詩山中無厯不知回北陸之春嚢裏捜詩政欠問西江之派且寵以塗龍之劑以供其縈蚓之書䝉賜甚珍拜嘉有靦閉門静讀從今願惜於寸隂吮墨窮吟自此或知於尺度回張生去華求詩序伏承寳翰見遺珠聨稱張籍之古詩豈無韓子賞文潛之妙語自有涪翁茍非其人未當斯任第願輸於愛助庸少見於忠謀粤從初詩未有大序迨聖門始聞子夏之作至東漢則有衛宏之辭蓋是後來之人述所作者之意曹劉見夢乃於異世以求知蘇杜遺編何敢當時而作引如自有膾人口之語亦何資冠篇首之文降於今時甚矣陋習纔能為里巷之詠即自曰江湖之人以詩自名者于道己卑借序為重者其格益下不求工於鍜鍊第欲假於鋪張儻無劒如千口之垂又何衮褒一字之用衒䑕璞為燕玉寧取信於荆和譽嫫母為西施但可欺於師曠一經品題固作佳士茍輕許可此亦妄人與其稱三好以誤其一生孰若效寸長以補其尺短伏想髙明之見必俞狂謬之言省元學士耽句如癡好逰成癖新章累牘大集成編鎔意鑄辭欲作出月穿天之巧飴飡枕寐莫非批風判月之詞借聴於聾使削其堊願不隨於流俗期益進於古人吟家稱張祜之詩只消兩句文選愛景陽之作能用幾篇貴乎工不貴乎多求其傳豈求其序别三日刮目相待豈復阿䝉得一顧増價遂髙終逢伯樂僕無敢僭子有餘師送陳守昌世午節我獨二天竹馬肅開藩之斾月重五日蒲龍稱介夀之觴不有髮儀曷旌心賀輒馳俗禮仰獻邦君蘭佩蓉裳吟澤自甘於憔悴雪羅風葛賜衣佇被於恩榮回陳守午節送物仁政受㕓而氓方仰蘇天之庇大夫有賜於士遽増楚節之華賁然寳緘隨以珍餽紫駝出釜洗空豆粥之腸玉臠堆盤驚吐栁車之舌揚仁風於輕箑醉醲德於上尊百拜登嘉一忱懷感禦蛟纒黍諒同弔古之心煑梟為羮願出去邪之手回陳守招登髙無錢對菊正思白衣送酒之使君與客擕壺願厠烏帽隨風之座客有來嘉召敢不恭承賡飈館糕字之詩侍黄樓茰嚢之㑹飽聆誨益預切欣愉自愧寒蹤但有桑苧煎茶之具竚觀盛事即膺蓬莱賜橘之榮送陳守菊節聞誠齋碧落之吟既陪泛菊望蘇仙黄樓之㑹亦願持芹適村醸之新篘且齋厨之小供輒忘守分仰瀆崇嚴伏惟粉餈花飲之分曹烏用野酌山肴之雜列喜逢佳節聊致下忱桑落坐開應笑東籬之陋茰枝來賜竚承北闕之恩回新昌宰端午送物伏以黍節佳辰久逢今日芝亭嘉恵穆若清風輕盈艾虎之精縑珍重蒲葵之妙箑寳瓶買醉銷萬古之閒愁石鼎煎春喚獨醒之清夢辱儀文之腆厚慰節序之寂寥拜手登喜銘心儲感朱簾捲雨雖阻陪樽酒之歡細葛含風願即拜宫衣之賜回縣丞兄送菊節貧家無節正如淵明摘菊之窮厚貺盈庭忽足夢得押糕之韻腆甚羞籩之粉糗宛然送酒之白衣充我涼庖感君厚意分甘有味何殊僧厨蒸栗之香飽德知歸但誦丞壁哦松之記回洪尉伏被薫慈特頒藻翰以叨承於誤渥而俯遺之賀辭意濃贈我之琅玕語粲照人之珠玉知非所稱感極而慚某禄不逮親志慵問仕未始通書於光範乃令佐幕於㑹稽遽塵除目之中殊出意望之外方當辭避何敢承當事君之日尚長姑需痛定味書之樂可共端竢誨言回王府教櫸伏審某官先覺覺後以昭昭人凡而樂泮之諸生均㑹浴沂之雅趣灑落見曽㸃之意妙希鏗爾之音歌詠歸夫子之門每動喟然之嘆築亭寓興掲扁見心盍求之驚鸞舞鳳之書乃采此縈蚓綰蛇之作無君謨怪偉之字豈足稱歐文忠之名慕退之榮耀之言故願列王中丞之次方兹媿甚奚以謝為惟河南夫子易傳之文與勉齋先生論語之釋是曰教之以道何可郤之以辭有若華縑允為腆饋繡贈我以何報錦還客以為宜不敢拜嘉切祈宥罪某方甘窮處忽玷誤除莫審從來不任大懼或出上心之俯記尤深側目之旁憎雖命下之自天諒禍至之無日是可弔而不可賀蓋當止而不當行恵我好辭蹙予瘦額吾君未報固弗敢為山林長往之思其道不由安可效穴壁相窺之類前言特戲下拜則難尚希燭理之明誨我保身之道受施無報揆禮則非深惟李漢序引之文曽經紫陽考定之筆切聞宗匠正剗時浮敢以刋編進之函丈或侔傑作願鑒微忱拜復帥膚等祈容察回上髙項宰謝文筆峯記伏承真翰兼拜多儀花縣奏功遂啓生花之瑞筆峯記役遽䝉潤筆之頒取數過多拜嘉有靦米千石而作傳人譏陳夀之貪字三縑而易碑或嗤皇甫之侮奉北海之金者終以賄謗索南郡之錢者無救室懸由此而觀不受之是然而謝絹五百疋退之雖欲遜而終留祠牒一二通坡老未傷亷於過取宗工猶爾清議或容天教食硯於無田人至持金而為夀餽非無處則不謂之貨取儀而及物斯可拜其幣交茍能受少而辭多未妨見得之思義有如厚遇雖覺過豐然尊者之賜卻之不恭故臺餽之至僕爾亟拜輕縑素練愧文體之纎浮肥羜上尊與坐賔而醉飽肅登稽首劇感銘心不能煑字以療饑齋厨正冷自此賣文而為活寒谷將春復新昌蔡學長講請書洊承劄翰與進鄉童俾修舍菜之儀庸展恭桑之禮仲春啓月科詔自天庶一至於黌宫或可為於吉兆長者所命小子何辭合摳衣於坐隅以望履於幕下但以某頃遭家難尚有婦喪未葬難縗絰之除當遵古訓服朞不絲竹之廢竊陋晉人背師之言何取於隆師行禮之舉豈容於失禮非敢方命第請改期有如孟夏之時所謂正陽之月梅當薦實百花占雪裏之先開麥已登疇萬寳騐秋中之必熟届兹朔日允曰良辰儻許其來當潔以進先生有召無諾固不敏之宜誅君子以德愛人或可恃以無恐拱聆後命圖拜前榮謹具禀申伏祈垂丙回鬱林幸守劄子禄不及養仕亦何心遽辱誤恩俾趨行闕未敢祗拜方具控辭雲朶下頒禮意太厚風簷跪讀感媿來并伏聞改鎮於雄藩尚未恭馳於賀幅首勤温念可謂倒施展梅花四好之圖何以當此潔茅屋數椽之壁受言藏之賀陳守生日劄子兹審祥紀紱麟歡騰錦鳳維七月十日之旦肇降長生之君故萬有千嵗之詩爭致眉夀之祝有懷燕賀莫致蟻忱不腆菲儀具如别幅瀆尊是懼録意為榮回新昌應判縣送酒誤恩中秘方嚴行李之驅分恵上尊仰見折梅之意飲醲甚腆醉德惟深某官得聖之清食天之禄渟涵道味人曰甘露醴泉之祥醖醸民和家有春風醇酎之樂寧久漉葛巾於彭澤行即賜錦袍於沉香釐秬鬯而錫土田分内之事作酒醴而惟麯蘖天下所期兹辱眷存特勤餉遺獨惜甕間之吏部早呼座上之老兵進持滿道士而使前將酣一石笑烏有先生之忽化已盡雙瓶送酒人私竊兩尊要知多酌焉則適發其狂豈有終執之而不知其味敢云罍恥聊解樽愁誠齋作汝飲吾嚥之詩美過於味東坡謂我眠君去之語苦未為賢一笑置之百感均矣亟圖行役莫遂稟辭酌老瓦之茅柴尚戀里中之社拜宫壺之雨露願隨天上之班賀判丞兄致仕伏審乗車納禄錫服䟽恩退若水之急流去神仙其不逺近淵明之故里越宇宙以相輝花晩節而益香松嵗寒而不改宗盟増重國史可書某雖展賀私莫控下悃餼羊不腆麰粉併將供宴客之末觴見野人之微贄倘䝉麾納倍有光榮七夕送康倅物伏審治中别駕已分風月之清天上佳期早趣星辰之步撫兹令節沸甚歡聲竚緱山鶴馭之升快河漢龍槎之上有懷贊慶無物將忱百爾籠蒸兼之熬餅羨花簇綉樓之燕聊備末陳憐竿垂犢鼻之窮願䝉笑納七夕回康倅送物貧家無節何知結綵以穿針薄禮將忱豈謂投磚而引玉寵承厚貺光照陋庭此綺筵粉席之所宜非莧腹藜腸之可稱卻尊有咎拜賜懷慚馨餌供祠足稱愚公之乞巧清盃奉酌即催别駕之歸朝滿抱感藏拱需侍謝回致政李宰請召伏審褰裳宦路轉棹急流香山早請身於强健之時靖節懶折腰於去歸之際冠留神虎塵埃視軒冕之輕袖綰雙魚雨露拜服章之寵鄉評甚韙盛事可書某晉賀方修魯臯是懼登龍門而見元禮似憐累世之通家酌鷀杓而醉長庚又許一樽之對酒南轅即改西序當趨謹此禀酬仰希鑒察回秘監洪恕齋送物劄子某想翰林之諷帖必有新詩被拾遺之恩榮遽頒下客賜尊敢郤意厚難勝百拜登嘉一忱篆感仙蒲切玉如觀五色之絲綸宫酒傾金謹挹九天之雨露尚容侍拜専控謝私送京學進德齋午節劄子渠閣浪逰初何知於楚節齋鑪讌集曾莫助於蒲觴實以旅貧加之俸薄欲為不可負媿良多雖懷䬪飥之心奈何無麫故當角黍之宴徒羡包金輒奉百千聊旌方寸未能烹鶩謾菰葉之先求已信是龍知錦標之必奪甚慚嬰凟伏兾鑒融回戴和仲送柴菓某薪桂不堪遽得樵青之助枇杷兼餽應憐曉翠之標荷意甚濃登賜良感炊煙可舉艶吹雖媿于朱唇今雨儻來寒嚼願同於氷齒稟酬至率孚鑒是祈沂邸延國夫人生日回送物劄子庚申兼沂靖恵王府教授時作近天孫之七夕偶是微生來星使於九霄遽承異數殷勤厚意感激柔衷自揣無堪豈稱齊國魚軒之餽願如善禱長歌魯侯燕喜之詩沂邸賀皇子忠王生日劄子伏審前星毓瑞少海凝祥方大人位正於六陽為乾之子後聖母誕彌之一日載震以時驩溢國家和薫宇宙恭惟皇子忠王英資傑出令聞夙成槖有詩書濮邸之宗賢復見塵生琴瑟普安之儉德同符彌月載逢後天不老某輝承華蕚筭祝靈椿甲觀繼元春衍無窮之生意龍樓致孝日嚴長樂之朝儀頌禱意深贊揚辭淺不腆菲禮具如嗣箋仰祈穹鑒沂邸節使生日回忠王送物劄子子職懷恭何知初度春宫錫羨爰侈多儀佩德有加銘心無斁恭惟皇子忠王器姿日就德業天成家傳行葦之仁首親宗族心篤棣華之愛式好弟兄軫兹微生重以大貺維其嘉矣恵深拜於百朋還以事之壽願開於千嵗沂邸節使生日回蒋提舉劄子劬勞恩厚又逢初度之辰提領職尊遽辱多儀之貺登嘉有靦感佩維深恭惟某官懷徳忠良持心謹宻掌王宫之憲令糾察惟嚴揔親邸之事權扶持有屬特勤齒記具列目頒愛之欲生莫稱衮褒之語施而無報第増甲厚之顔沂邸貴人賀蔣提舉生日劄子楚節迫期桑弧紀旦北街天近有華初度之辰南極星輝於粲長生之瑞某莫旌賀悃聊貢菲儀細葛香羅嵗被恩榮之寵深宫邃殿日居侍衛之班沂邸節使賀蔣提舉生日劄子㽔賔中律蓬射紀辰芳艾千門將近端陽之序仙蒲九節有開耆壽之祥某莫展賀忱輙持薄貢四星内省長依宸極之尊五日宫衣永被聖恩之寵深慙滓瀆伏兾鑒融沂邸迎右相入國門劄子伏審公衮來歸介圭入覲仄席而思賢佐天子興見晚之嗟引領以俟太平國人有如嵗之望室家胥慶朝野一和某屬以拘文莫能迎拜擁舍人之篲未遂寸心睇光範之門敢恭尺楮沂邸賀郭殿帥轉官劄子伏審䟽賞明庭躋榮爵級周廬肅衛壮國勢以安彊増秩進階表上恩之崇報邦家増重朝野交驩某屬以文拘莫遑躬謁陳蕃寵渥益觀數載之承陸續慶緘尚不一書而足贊敭辭短賡詠意長賀同官冬至代作雲觀紀祥喜新陽之應律霜臺贊幕嘘生意以回春適當復長之辰預致泰亨之慶輒隨善類仰羾賀緘某官粹宇宴温和襟融盎才華瑞國慶雲五色之在天仁意育民愛日三竿之燠物歡迎令節茂介繁禧御爐騰不動之煙催朝楓陛文石轉舒長之日即步花塼某冐綰銅章阻陪珠履竹簷曝暖不禁歸夢之濃黍谷逢春願與化鈞之轉賀同官冬至代作冬浮葭管喜回陽律之新春到蓮池光徹氷壺之潔鼎來茀禄萃在英髦某官操厲嚴霜德融愛日文章雲錦殆逾綉線之工器韻天球適協黄鐘之應道隨剛長福與時偕岸栁山梅景姑吟於小至砌苔階藥朝即赴於大明某誤折陶腰辱垂阮眼以趨以走賀莫捧於兕觥俾熾俾昌頌敢修於魚尺雪坡集巻二十五
