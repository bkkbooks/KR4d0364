body:
  text: 雪坡集卷十八宋姚勉撰詩七言古風題雪巖胡則濳詩卷首君有雪巖余雪坡坡中雪少巖雪多試將二雪平章看坡中雪比巖如何有人問我坡間雪一色平鋪寒玉潔夜深明月可中庭化作氷壺底俱徹不如君巖雪更竒怪松夭矯銀龍垂倚巖一嘯望清曉千崖萬壑俱瑶池莫將多少分優劣只喜坡間同此雪蘆花月色一樣看吾雪本來無缺缺羣芳秃盡梅始花同雲羃羃天之涯蒲團竹屋坐聽雪春蟲撲窗蟹行沙書來題作雪家契最愛君書此三字世人愛熱冷即嫌我獨與君同此嗜雪無彼此只一家玉堂茅舍何等差紅壚一片㑹真趣藩籬剖破非封蝸雪堂仙伯騎鯨去天台雪巢復何處與君分釣雪江寒同唱孤舟蓑笠句題李鋭父所藏陳所翁龍軸所翁先生人中龍豪氣下吞江海空當其得意作龍首老手直與神天通雄辭妙語層層出醉中千幅筆一息不遇先生大醉時人間安肯留真蹟先生往往自寫真非龍之龍蓋其人請君什襲寶此墨此翁此墨不易得題墨梅風煙雪月水石蘭竹八軸清晨有客南昌來袖出數幅春風梅芳根不種生綃上安得的皪霜葩開霜葩能開不能謝始信筆端生造化細看入趣直欲攀亦復不知梢是畫迎風冷笑斜窺簷披煙淡竚拖輕縑豐腴略帶清曉雪踈瘦半橫初夜蟾根栖怪石增竒絶倒影寒溪照清潔斜枝蘭外侣幽姿冷蘂竹間標徑節超然筆法無糝塵正欹仰俯態逼真幾回卷軸却復展生意不窮看轉新只看幽韻自堪玩莫道無香真可嘆清香已在杳默中暗起芬芳浮鼻觀平生愛梅如愛賢恨無好句摸幽妍看君此畫得天趣妙寫無聲詩八篇吾聞古來能畫者畫馬胸中有全馬君應滿腹皆梅花不爾安能筆瀟灑想君家住西山邉萬梅谷中廬數椽月宵攜笻雪著屐坐石瞰水窺風煙紉蘭傲竹今幾年餐香換骨身可仙凝神吮墨淡一掃不覺筆下花真傳嘆豫自愛氷玉幹久藏一幅鶩溪絹請君為作雪中百花頭上開掛我壁間供客看送友人陳上舍兄弟試太學東風颯颯吹行李榮送雙龍璧池水璧池浪濶髙化龍直透銀河三萬里君家兄弟真鴈行季方學行如元方中眉不是弓刀軟個般人物宜膠庠只今膠庠多俊傑正是功名到時節陳家原有兩狀元釋褐傳臚未應别顧余亦問京華春蒼蠅願附驥尾塵干將先去抉雲雨太阿行亦龍延平送松麓李應龍彛甫攜阿穎鵬升參學老龍本自天門出躍入壁池聊換骨鵬雛天矯更不凡平視南溟渺東渤玉京道上五年前曽見鱗翮雙飛天秖今江國梅花路又送鵬雛逐龍去明年秋風層雲飛後年春浪桃花肥摶鵬髙鶱龍速化倘許共勒青冥鞿甲辰父子同榜送胡從甫劉仲山入京梅花先臘開香雪魁信已隨春漏泄送君聮騎入天京不作人間兒女别錦江俊秀皆朋儔其間偏善胡與劉胸襟巧蟠錦繡段文采互照珊瑚鈎采芹宫裏羣遊戲文字頡頏春燕翅西湖萬栁嬌春風相期同緩看花轡棘闈風動桂香秋一駑那輸雙驊騮我悲日色謾迷眼君喜朱衣皆㸃頭青天一界蟾宫路只要朋儕先著步祝君猛去化為龍行繼延平躍雲霧君不見蘇易簡不事探花與榜眼明畨狀元未為晚龍道者生日就狀元局中置酒寄以詩去年六月初九日天地光明一佛出今年六月初九日慈恩名標千佛一吾家德本深栽培庭階煜煜芝蘭開自從有子即擢第阿兒生時都帶來今朝宴客龍頭局遙想吾翁抱孫浴手攜爼豆與干戈更提一筆蒼生福願兒長成勤讀書忠孝一脉天相扶張家師德梁家固重入衣冠盛事圖姪阿鍾覔字與詩阿鍾五嵗已大竒從我覔字與覔詩栗梨不愛愛紙筆此意豈是尋常兒吟詩寫字非難事字畫是心詩是志器量充周志氣宏徑筆雄辭皆極致吾家鼻祖豐城公庭叱百萬無虓雄子孫世襲節義風流傳直至江西翁江西夫子今希有四經七舉為龍首不作孫𢎞曲學儒文章只是宗元祐祖宗積善源深長爭竒競秀生諸郎諸郎更有如鍾者引領丹山羣鳯凰曉窗讀書肯至午夜燈琅琅明月廡只今小年已勤苦從此讀書到十五貫經穿史包今古雪坡癡叔未足多十駑驥子一躍過河南朝氏曽有樣二十子弟俱髙科汝今羣從多兄弟勳業相期各如意家孰相師學聖賢廟堂再拜傳忠義羲獻帖李杜詩遺踪雖在不必追請賡慶厯徂徠頌更立中興浯水碑賀族兄寵妾生子艷紅香紫春正中扶輿磅礴清氣融玉麟夜掣香案鎖五雲裹送光玲瓏吾家自是詩書裔秀傑相承擢丹桂太丘合有二方兒省華須著三堯繼近聞絡秀生伯仁喜君掌上明珠新願言種德相扶植此子定是髙車人賀趙宰夫美任生子趙侯德與甘棠種製邑三年民善頌玉皇有詔趣歸班一夜長庚來入夢豐江羅峯神秀奪龍泉太阿光芒動玉女擎香龍吐水慈雲親抱麒麟送懷玉仙人秀眉目披羽笑出蓬萊洞竒骨崢嶸千里駿異采繽紛九苞鳯人生有子萬事足又值朝天欲飛鞚驪珠在掌鳬在舄慶事方新殊渥重周公為父伯禽子清廟明堂要梁棟長成傳取魁衣鉢天生竒材須大用此兒見說骨已異壯氣衝天搖螮蝀我識英物試使啼他日定當磐石宋賀孫舜臯子周嵗乙卯生卯君元是月中兔樂搗長生壽根固去年此際挹秋清飛駕氷輪碾風露來為龍谷曽孫兒生來一歲骨骼竒廣寒宮殿出身處仙桂須還第一枝贈新昌王藍田三子太原曽有三珠樹花蕚一團光彩聚清晨肯挾三鳯來真是王家兒可譽乃翁哦詩松竹隂三兒吾伊玉應金不須纍碁撚蠟作跳虎駿響續取河汾琴沂公不作溫飽計他日簾前退丁謂讀書有用須濟時莫止覔官求富貴訪李興伯不遇其家人命二子留宿有古人截髲撤薦之風喜詩之暮煙蒼莽浮林麓征人尚殿歸鴉宿山前知有故人家急往叩門驚啄木主人多日出未歸鵲飛三匝愁無依刲羊忽逢伯仁母設饌乃有襄陽妻竹窗掛燈見二子褒已自佳融更偉烹雞炊黍羅酒漿奴飯馬芻更充美慨然好客尚父風謫仙家人自不同古來如此能有幾截髮留賔書入史王圭他日貴勿疑不須論客母可知薦黃平仲過雪巖以詩代簡秀巖萬仞拔天起劃堮剜垠爭怪詭六花一夜積三尺化作氷壺無表裏幼輿丘壑自不凡何况有雪被此巖天教管領清凉界雪巖自號氷書銜巖前列植梅松竹三友相從吾事足靈臺片雪晛不消吐作新詩動驚俗有客有客山水仙揮毫欲寫雪洞天敲門試驚袁安眠莫作剡溪王子船贈墨客吕雲叔柯山葉姓貨墨者甚多皆冒茂實名而實非也有吕雲叔後出不假葉氏以售而其法亦出諸葉上豫省試廷對皆用其墨偶利市歸道柯山吕請詩漫紀其實昔我奏賦趨南宫路逢墨客回仙翁筆端攪動雲霧起裹送龍入天門中薰風入對經前路更覔仙翁一丸去硯光旗影照丹墀一笑天顔承雨露謝恩獨拜雖偶然回翁墨好蛻使仙時人從此填戶買錙銖可博黃金千一名一第秋蟬翼視草判花兒戲劇殿頭漬筆和金盂方得回翁龍劑力贈丹客鄒道士退之不肯學神仙寧只崛强處世間紫陽先生亦有語金鼎偷生詎能安政令白日生羽翰瓊臺玉宇髙應寒虎鉛龍汞吾豈曉獨有炯炯心如丹贈宗道士元一自稱忠愍孫號雲隱能符法煉丹黃冠元帥之子孫於今身入虛皇門當年元帥扶宇宙瑣瑣粘罕氣可吞汪黃沮撓不如意空使英雄滿襟淚子孫從此懶作官隱入雲間羞用世誓掃塵氛志未伸中宵往往泣鬼神家傳一㸃心及物燒作金丹功活人蒼生億萬方受苦莫戀蓬萊隔風雨急鞭秃角起豐隆瀉作甘霖蘇旱土贈黃道士思成祈雨感應丁已孟秋春戊午不雨三時嗟旱苦低田髙壠皆黃埃佳種幾成不入土富家倉廩鐡灌鎖民腹為雷淚為雨更遲十日天不問血肉磨牙總豺虎縣官祈禱聊具文饑聲嗷嗷恬不聞山中道士睡不著鞭龍起電驅風雲天瓢㸃滴翻駿馬一日甘霖遍天下盡將昨夜赤千里化作今朝青四野農家笑語無愁聲指日可望天太平熙朝真主聖且明漢雨不待宏羊烹或言天民天自恤或誇調燮有新術山中道士不言功飽飯熟睡聽松風贈山月道士山髙月小赤壁遊夢中道士鶴掠舟當時此鶴是君否猶愛山月懸髙秋夜深萬籟寂不囂金波行空爛將流劃然一嘯拍欄玉宇宙萬物皆浮漚題道士瀟碧此君蒼蒼誰乎植萬箇琅玕列如㦸翠寒緑淨不可唾一片化作瀟湘碧堂中有人有詩癖日坐清隂聽玉擊巖廊舜正南風琴不作江邉淚斑滴中秋放舟玉壺瀟灑澄風露一派銀河卷輕素九秋此夜恰平分氷輪碾上青霄路繞枝散亂驚飛鵲搗藥分明見靈兔荻花冷浸一汀水桂子香飄半天霧江山如畫洗塵目風景入詩多秀句乘風緩放牛渚舟仰空長歌赤壁賦狂來舉楫直欲舞興到行杯不知數此江流水自千古此月照人知幾度一年好處在今宵不到天明莫歸去西山雪嶺風掀晴空作頑冷雪欲成氷漫翠嶺白雲崷崒堆不散玉龍蜿蜒睡未醒岷峨太白橫參井移作西山竒處景浩崖安在呼使來與駕飛車登絶頂清江曲夾岸桃花燕子飛一江春水鱖魚肥絲綸百尺煙波濶午夜鳴榔載月歸扁舟一葉橫沙觜得魚爛醉東風裏緑楊深處酒醒時半江潮落天如水萬頃滄波五月凉一川紅錦藕花香緑蓑青笠鳴踈雨老樹殘烟帶夕陽野船細火夜明滅一笛風清楚天濶無魚無酒且歸來篷底蕭踈卧明月萬里西風雙鬢華江南江北老天涯瀟瀟兩岸梧桐葉漠漠半川蘆荻花柔櫓聲中山水緑一絲買斷黃金屋沙邉鷗鳥莫相猜是非不到清江曲葦折荷枯人未歸波寒霜落鴈初飛不知節物時時換又折梅花下釣磯青山四面清歌發幾㸃沙鷗起天末一任長年醉則休醒時獨釣寒江雪桃源行武陵溪邉翁好漁笭箵釣車日採魚扁舟為家葦為屋豈知世有神仙居曉來不記舟行路忽在桃花深絶處紅雲杳靉望欲迷絳雪繽紛落無數水源盡處便逢山一徑似通人往還穿花竟出洞谷口别有天地如人間青山髙下鱗鱗屋秀野桑麻深潑緑春深耕罷犢牛眠晝靜人閒雞犬熟村中老幼皆相知驚逢外人子為誰平生採魚不到此借問此是蓬萊非笑言此亦人間耳聞有蓬萊何處是秦初避亂偶此來今日已傳秦幾世漁家不識青史編相傳去秦六百年吁嗟已不聞漢魏豈復知今晉太元當時秖恐秦萬世攜家挈鄰相逺避早知秦不五十年安得種花來此地採藥山人去不歸啖松女子今何之種桃著花尚未實未必嵗月多如斯家家置酒延雞黍便好卜鄰花底住中心自喜口不言後日重來今且去悽然辭别便登舟依舊花間溪水流插竹謾標來處路鳴榔無復舊時遊顧家一念仙凡隔如夢驚回尋不得當時不與俗吏知或可重尋舊踪跡五湖雲擾豈減秦晉人合作桃源人漁郎出山自失計秦人絶踪應未仁漁郎漁郎休太息漁家自有神仙國鱠鱸沽酒醉蘆花此樂桃源人未識神仙有無何渺茫退之此語誠非狂淵明作記亦直寄便如東臯志醉鄉秦風鍥薄難與處晉俗清虛何足數願令天下盡桃源不必武陵深處所雪坡集卷十八
