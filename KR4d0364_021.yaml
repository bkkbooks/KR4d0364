body:
  text: 雪坡集巻二十一宋姚勉撰詩七言古風贊趙直閣所藏四美人畫春兠鞋踏青晴絲暖絮浮春光牡丹醉裏㣲風香繡簾不捲日低栁百囀黄鶯啼斷腸玉兒歩整金蓮穏回首光流花面粉嬌慵欲去未肯行一逕落紅愁踏損夏出浴納凉瑶臺夢斷敲門竹鳯蹬温泉新出浴侍兒扶起嬌不禁蟬翼紅綃影紅玉晩蟬聲裏追新凉藕腕輕拖龍巾長留仙裙舞風力軟不知何處荷花香秋挾扇㸔菊林梢脫葉飛斜陽寄書鴈着西風行恩情怕學中斷絶畫扇未忍髙秋藏小庭寂寞歸鴉後蹙損逺山雙峯鬬淚珠濕袖對黄花人比黄花又更瘦冬沉吟望信紅爐暖閣烘如春玉琴不撫生㣲塵梅花嗅罷寂無語千里瀟湘思故人燕釵和悶都敲折愁攪柔腸千萬結沉吟望斷信不來同雲暗釀江天雪題楊妃出浴圖温泉暖滑留餘香芙蓉出水紅生光寳釵義髻嚲龍鳯力困未必忺霓裳歛衣側歩無窮意猶勝朝來海棠睡誰知迎洗錦綳兒己在華清賜浴時題西施捧心圖紵羅山頭浣紗餘酥胷嬌擁顰不舒髙軒直葢填寒閭東家少婦羞弗如越宫選進吳王側光照姑蘇春奪色鴟夷心痛痛更深亦自顰眉但憂國贊張英玉所畫山谷老蟻蝶圖穹碑一立承天寺吟骨遂重宜州樓當年羣蟻亦䇿勲豈知湏臾夢封侯南柯一散風雨惡未若栩栩為莊周贊張英玉蟬驚螳螂圖一螳踉蹡上枯栁一螳欲上鼓劒走驚蟬側翅着樹枝性命幾成落渠手物生逺害當知幾不知猶可况已知千枝何處無風露莫曳殘聲急飛去禽言十詠不如歸去翠煙深樾江村雨蜀魄催春勸歸去勸春春去勸未休客子傷春慘心緒只今蜀土錦城荒蜀客望西悲故鄉故鄉蜀客歸不得何况當時蜀帝王泥活活黄梅蒸雨已幾時路泥活活沒馬蹄前山咫尺似千里十歩九跌行人疲漫塍白水秧欲老黄雲漸黒麥欹倒泥汙后土何時乾天若憐農放晴好着新脱故一名濶耕濶布繰車欲動蠶春暮水足秧青行白鷺着新脫故山禽呼也似催人濶耕布着新脫故也自竒濶耕濶布也自宜冬苗夏絹星火急欲着無新耕亦饑郭公郭公古時亡國餘姓名尚掛春秋書問其故國何丘墟知善不用惡不除今人皆知笑亡郭胷中亦自鏡善惡不知山髙正呼君身是郭公猶未覺麥􅌻也哥哥晨起凉潤疑秋肅格磔軥輈叫雲木似催農父急腰䥥村北村南麥皆熟屋頭塲地初雨乾栁聲拍拍兒童歡田家未敢冀一飽父老相呼先了官㸔蠶娘子得幾許流鶯前身織絲女猶抛金梭學機杼隔窻嬌喚㸔蠶姑娘子㸔蠶得幾許今年蠶慳熟處稀採餘桑葉青滿枝一年養蠶四番熟安得長似開元時婆餅焦趂晴割麥收雲黄熬爐新熟餅餌香阿婆炙餅半焦赤阿婦罵兒嗔不食山禽戱語婆勿嗔有餅可焦猶食新西家割遲麥爛死婦姑對泣空酸辛姑惡煙林望帝聲思歸風枝齊后音悽悲如何入水化為鳥猶訴姑惡無停時純孝通神泉鯉躍寃氣感天霜為虐蠐螬有味安得珍婦自不賢姑不惡提葫蘆沽美酒晴煙如潑春光濃萬花笑日争嫣紅百金沽酒直取醉有酒不醉孤東風不如遂我豐年願秫米價如黄土賤家家有酒不用沽何用提葫苦相勸百舌百禽巧作百種音一禽却學百種禽晴風暖日意自樂圓吭變換皆清吟多能不如止一得多言不如止一黙一朝閉口不敢聲莫有䜛人在君側問鴈家山已作一月踈囑鴈為取秋風書鴈飛竟去已幾日乃爾寂寂知何如曉霜鴈聲又東去急起出門呼鴈住前時囑爾為寄書汝今將書落何處鴈言丈夫志非常桑弧蓬矢示四方顧家安足就大事底用屑屑悲故鄉吁嗟來汝空中鴈黄耳猶能書徃返飛奴解逓丞相箋鷾鴯亦傳商婦簡帛書自古倩世傳詩人流詠知幾年汝今何事倦來徃應我不如蘇武賢鴈言君擬乃如此信史不如無此史當年常侍枉教欺我亦安能書萬里湖田漠漠多菰蒲就食聊寄江南居書郵安得為人作君欲覔書尋鯉魚聞鶯晝凉百禽交鳴一鶯和之殊有幽意急取書讀與相間雜既乃賦詩風吹微湍入松篁雲幢葉葢相低昻山禽此時似得意雜奏一曲娛新凉流鶯頗嫌無宫商飛來中間作笙簧廣寒一闋新霓裳天遣鼓吹吟詩腸取書細讀與相和金舂玉應聲琅琅曲終書罷各無語林影滿庭清晝長觀風馬簷間鐵馬何威獰霜力雪剱争鮮明秋風一吹陣脚動跳梁舂擊聲鏦錚何時真提十萬兵金戈鐵甲相磨鳴縛俘斬馘墟龍庭歸來馬後笳鼓聲烏鵲吟鵲噪人所憐烏啼人所唾謂鵲能報喜謂烏常送禍烏啼鵲噪何心然孰為此者皆其天預言禍至使人避比鵲以烏烏更賢欲忠於人反嗔已喜諛惡直常如此君不見九齡去國林甫相崇侯得君比干死錢塘吟錢塘家家重生女自小無人識機杼教成歌舞十二三花燕身材栁鶯語去年學得琵琶成今年學得彈秦筝豪家亟輦明珠斛來換緑珠入金谷啟行小女肩輿來親情送别羅酒盃拜辭父母登車去歡喜出門不回顧親恩無復雉將雛兒意亦忘鴉反哺阿婆八十泣送門自憐終身無阿孫笑言阿婆不湏泣舟子乗潮渡江急義娼吟雲樓余兄舊遊也余兄死平生密友至有不哭弔者雲樓鄭雲英獨眷眷不能忘慨而哭之時而奠之可謂義娼矣是可媿天下之為人友而生死相背負者余嘉其義詩以贈之燕子樓中一搦春十年紅袖消香塵尚書墓上白楊拱曉燈猶伴孤眠人楚樓佳麗清梅似識得詞中秦學士玉盂一笑古藤隂便學斷腸河滿子燕樓寂寞楚樓空鄭家雲英千古同崔徽心事照秋月玉京舊恨啼春風人生交態分貴賤况是死生情分變域蘝未綠拜無人千里素車那復見知義如今到此流冠猴襟馬皆堪羞聽􅌙春簷雪乾初日長簾花深壓梅影香美人帳中午睡起釵横鬢嚲慵添粧文窻窈窕鮫綃緑卧按古􅌙横漆玉微揎翠袖露春葱學弄梁州初遍曲拂絃輕揠三兩聲問渠學曲成未成已成未成君莫問聽取軮軋伊嚶鳴七絃一似焦琴様立鴈參差相下上左按天孫織錦絲右斡仙人飛海杖輕㧞淺揠聲短長疾徐洪纎抑復揚瓶笙吐韻出蚓竅雲車碾響升羊腸雙龍曉日吟秋水孤鸞春風悲鏡裏清猿嘹喨萬松間雛鶯惺鬆百花底平生有耳喜此聽手不能作心自醒除却髙山與流水琵琶箜篌俱逕庭樓中弄玉吹簫侣同學丹山鳯凰語鳯凰鳯凰來不來蕭史行雲在何許贈王生生能雕能染近又能郵文李松麓欲其專於一送以序求語於余松麓盡之矣姑以詩三年刻楮多苦心不龜手方只百金近來自笑巧成拙捨去二藝趨雞林文章小巧蟲雕刻大巧天機五雲色單傳此印到人間君亦當成近朱赤松麓先生嘆數窮請君專志毋分功悲絲正謂可白黒斵雕庶得還淳風方今天詔興賢急家家倒屣迎君入試按春風官栁汁更刋進士題名集從此君應百不憂十萬腰纒鶴揚州雖然文章亦徒耳萬言不直一盃水聞君一藝尤更精明珠為人買娉婷血色羅裙掩雕字囊金櫃帛當充庭馮京曽醉題角妓股上一聮云玉體貼懷香勝玉酥胷到手滑於酥妓遂雕繡之後京為狀元再過其家題一絶云氷肌滑潤帶㣲紅戱寫羲之舊筆踪血色羅裙巧遮掩不煩他日碧紗籠王生近為人市雙寵故末及之雪坡集巻二十一
