body:
  text: 雪坡集卷十一宋姚勉撰詩七言絶句春日即事梁燕無聲半掩關晝長人靜覺春閒閒中却有農歌起聲在晴煙緑處山花下聞鶯吹花不起午風輕懶絮閒絲揚暖晴詩料滿前收不盡海棠花下又聞鶯催海棠二首燕子銜春已幾時嫣然未見茜紅枝天開錦幄烘晴晝著力東風一夜吹把酒叮嚀蜀海棠睡紅何似未忺粧不嫌老杜吟無句定為淵材恨少香海棠一夜為風吹盡三首翠底紅嬌得幾時不甘飛動雪胭脂問天借醒書窗眼為報東風且慢吹不作天開錦幄紅却成急雪舞回風多應欲襯吟春步繡出香裀展徑中海棠自是百花仙霞袂霓裳下九天昨夜詔歸紅玉闕但留翠幄鎖晴煙海棠落盡葉間猶見數花狼藉吹花一夜風錦裀織就錦機空葉間尚有餘春在深處嬌藏四五紅花障緑外穠黃白外紅一屏香錦立春風天真步障豪難敵借與王家賽石崇緑隂紅滿芳蹊緑滿叢未須惆悵怨東風緑隂正耐經秋看不比花才十日紅晝步江村碧空一片水雲飛竹裏人家午唱雞江路雨晴芳草潤杖藜行遍水東西山中俯掬清泉潄齒牙仰看白日照山花山中閒趣誰能㑹更過僧房話午茶豫章道間平疇雨過稻花香草木風前舞翠光天意知儂今日出先期一夕薦新凉書塘浦橋壁密邇松楸彩霧開卧龍行矣起春雷大揮椽筆剛題柱即日髙車駟馬來題桂籍年來文物盛江西捷幟聮翩報錦溪好把香名題此籍此題已兆杏園題廷唱日待漏麗正門觚稜片月影將西鵠立宫門待啓扉驕馬似龍旗似雨不知誰是狀元歸鏡齊相士求詩二首鵠袍待對滿京華剛許癯儒作探花性淡不知花可探班頭獨立紫宸衙人間鏡是無心物物到皆知醜與妍欲得一雙如鏡眼中書堂裏坐搜賢贈賈相士相見湖山記昔年吟肩坐聳聽寒猿秪今面目何曽改剛被人呼作狀元謝田賢良送蓮藕京陌塵埃渴肺腸藕蓮分惠帶湖香羡君一葉穿花底醉吸荷筒月露凉遊湖雲錦香中著艇撑煙霞髙處步笻登寺逢好處都遊遍身似西湖過夏僧玉井亭觀蓮幾隊紅粧擁蓋青凌波仙子立娉婷晚凉孤坐香風裏如在西湖四望亭題江山風月樓三首明月清風不用錢謫仙吟思浩無邉此清若也錢能買金谷人須勝謫仙江上清風月在山葉舟赤壁蛻塵寰坡仙心事君知否不取一毫天地間風月江山自四時個中誰識活天機㑹渠結峙融流意方解吟光弄霽歸題梅谷詩藁不與春風落世間萬山明月雪漫漫谷中更有人如玉招隱不來清夢寒丙辰冬和樂魁聲道四詩蘭芷懷思未敢言美芹良欲獻君尊八珍側畔堪容得虎豹狺狺踞九閽白柄長鑱曉入山欲尋黃獨駐君顔雲深路晦東風雨惆悵空携竹笥還龍堂魚屋悵君歸桂楫荃橈蓋九芝望斷碧雲天愈逺美人南浦竟安之時節驚人欲折心空階片葉又秋侵燕歸鵙止渾閒事只恐山寒雨雪深雪中雪坡十憶近水新栽一巷梅而今雪裏想齊開只愁夜後花幽獨誰與携笻踏月來此君應似舊平安瘦節森然最耐寒萬葉瓊瑶光照眼夢披鶴􅌁倚欄干磊砢擎雲十丈松氷髯不剪照瓏鬆曉窗明眼山前雪猶似巡簷看玉龍對床風雨飽曽聽聽雪敲窗更自清舊日擁爐聮句樂而今欹枕打篷聲近郊勝處小雲居一水如龍凑佛廬長記釣蓑披雪去磚爐溫酒煮溪魚倚空銀管立嵯峨看雪須登窣堵波一覽瓊田三萬頃分明掌上見山河氷襟玉袖幾交遊儘自風流勝子猷有興可乘應不盡定無門外便回舟萬箇琅玕繞舍青風聲相和讀書聲蛛絲近日應侵几孤負虛窗照雪明帳窣銷金舊党家未知清處在煎茶便應歸去燒松葉細碾槍旗煮雪花欲折梅花寄故人驛無來使草成茵輕風細雨分寒暖已是江南數日春題雲窗詩材無限思無窮斂在唐人四句中參透此關猶細事作詩知道始為工贈畫師二首虎頭筆法得來親佳士相逢必寫真今代英雄良不少未知誰可繪麒麟胸藏天巧錦雲梭萬象都收入網羅只作蟲魚非磊落安排手筆寫山河贈石工二首削玉裁成巧自然雲根水骨更無堅不知可助媧皇否補取人間缺處天禹世龍門巧鑿人傳來心法妙通神倩渠斫取擎天柱撑拄明堂億萬春章釣仙吹鐵笛善醫眼與齒相說法尤髙穿雲裂石笛聲秋興在江湖一釣舟貫栁無魚囊有藥直鈎應是太公鈎嚴於治齒要如軍治眼當如愛護民此術儘堪為世用釣魚船上豈無人眼眵書册隱廬蝸健論誰聽落齒牙說起元龍湖海志扁舟又欲出蘆花贈吳相士二首不分麞頭愛虎頭世間能有幾封侯何如靜去修天爵此貴人人可得求盡道狐裘勝緼袍誰知富貴只鴻毛急流若使真能退不作神仙更自髙贈髙眼陳相士并序天下有兩等眼一俗眼一具眼具眼識人於未遇方窮而知其達俗眼窮則毁之達則譽之者也豈惟世人凡以卜相名號為能知人者其眼亦往往而俗窮也則曰子未可問舉第既達則曰吾嘗許其舉許其第窮達各一舌是何號為知人者亦若是邪獨陳髙眼者則未然方丙午秋榜將揭髙眼謂豫曰子虧籌可惜豫時頗忿其言越明日榜揭豫與胡英甫皆自正榜出而亞方驚異其虧籌之言有詩遺之己酉其說復爾亦驗今秋髙眼至豫迎謂之曰豫今無功名妄想矣子非再來以虧籌相語乎偕坐而笑髙眼睥睨良久謂豫曰子今雖不虧然亦虧舉首矣今年春秋作解頭吾已屬之他人子當詩賦薦豫亦未甚信其語越旬日榜揭豫春秋卷果失利僅以詞賦為第二解頭春秋則豫畏友胡季㢸也夫許人薦易許以某經薦難乃果如其言豈其嘗以舉首許季㢸故不復可以諛我姑以詞賦薦許之遂幸中耶抑真有所見耶以丙午已酉之言驗之則真有所見亦若可信髙眼言既驗復來索詩豫問其丙午之詩安在則壞爛於醬缶間久矣不復有矣窮則棄其詩達則復索其詩髙眼亦轉而俗眼耶豫所喜者不喜髙眼今日諛我之言獨喜髙眼前日不諛我之言豫之心無窮達髙眼之眼不當有窮達然後髙眼益髙而俗眼自俗豫不復作詩恐他日復為所棄髙眼曰子明年且上第他日見吾將以錦軸裝詩進矣豫笑曰世間有是人耶眼雖不低俗不可醫乃賦吾庭前之梅以清其俗詩曰請君著眼相吾梅自是羣芳合遜魁但有一般難相處玉堂也似竹籬開再贈癸丑十月黃金在手亦能揮爭奈無錢自忍饑未得酬君錢百萬且先持此一篇詩髙眼執去秋筆帖來取相錢驗之是醉狂時所書髙眼之言則驗矣豫一窮入髓安得有錢百萬以償相債耶輒效顧虎頭施財例以詩豫之諺云一字直千金一金漢法一斤金也此詩二十八字是亦二十八千金矣髙眼笑曰其如字不堪煮何贈尋賢相士三載須尋一狀元難尋却是狀元賢近時橫浦梅溪老方是人中第一仙殿直求賦狀元遊六街詩玉絲鞭裊散天香十里欄干簇艷粧但念君恩思報稱懶騎驕馬過平康離京留題蔣店閣門傳㫖放朝參歸覲親庭曉整驂葵藿丹心猶戀戀五雲繚繞望宫南瓊瑶為室玉為臺隔岸羣花照水開莫道此樓容易上天香曽到此中來宿珠橋見龍上天升天舊說有神龍今覩蜿蜒在目中莫道已騰霄漢了願施霖雨作年豐贈李樞幹三首身方否極當如泰命到通時亦似窮此事總皆由自己算來都不屬天工盡道掄魁世所榮誰知須要似王曽鳯池身到渾閒事如董如何豈足稱富貴功名不足誇肯將一第博榮華春分正欲均天下何必長安看盡花贈達齊術士二首昔年甕牖讀書時誰許蟾宫第一枝今日誤恩才入手便來爭說鳯凰池鳯凰池上亦何榮道義曽知有利名達則春風天下共窮時曉雨隴頭耕贈吕南叔談命二首開口談天數似麻向人諂笑詫榮華惟君說命能窮理說到精微别一家龍首皆求到鳯池此心只為利名馳吾儕所志惟天爵厚祿髙官總不知再贈尋賢相士二首逢人說相不求錢春色湖邉一醉顛眼法自髙人幾看不尋富貴只尋賢姦蔡邪丁兩貴臣目光不瞬漫精神相師若有尋賢眼莫看包羞祿位人再贈陳髙眼二首髙眼先生本姓陳閲人多矣妙通神地爐傳得麻衣法恐是希夷身後身狀元出應河連䜟人說先生相法真更有河連丞相出不知髙眼屬何人贈蔣儒宗算星辰看破浮榮醉色醒如貪青紫豈明經只煩君把天機泄四海如今幾福星贈張山人談命等閒客裏捧茶甌說到人間第一流圯上遺編今在否異時來問赤松遊贈古鑑相士以古為名便異今况能有鑑照人心舊聞古鑑知興替借與清朝獻六針贈趙碧眼相士李白唐宗英也能識郭汾陽今趙明叔亦天姓乃能知斛峯李先生先生當世第一流人物也能知之賢於識汾陽矣敢借斛峯先生韻送之拂袖蓬萊羣玉峯伊人不可遡游蹤煩君喚起山中睡為說蒼生渴雨龍贈天台相士龍榜鳯池俱細事十年身到待何如問天乞取百年活圖得山中飽讀書贈鄒相士三首浩蕩狂風晝雨霾燥田渴雨欲生埃煩君為覔為霖手傾倒天瓢澤九垓玉帳元戎過福州誰擔此擔向邉頭中宵敧枕難成寐底道儂無隔夜愁人生有子萬事足不問官稱有與無老子希文何事好踏渠腳步得堯夫雪坡集卷十一
