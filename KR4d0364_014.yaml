body:
  text: 雪坡集卷十四宋姚勉撰詩七言律元日試筆今嵗新元最喜晴宿隂都化作清明氣從地角天涯轉春向梅邉栁上生鵷路五更鏘劒佩虎關半夜出弓旌羣賢儻在新除目歡喜山中飽菜羮元宵雨東風已辦上元晴入夜敲簷又雨聲天下更無燈可賞雲頭應是月孤明遙知日甸驚回祿未用星橋詫太平旅舍一枝梅在燭照人紅影十分清遊曲江分韻得日字曲江磯頭山崒嵂此景江南誇第一漁舟晚弄暖波閒市樓春映晴嵐出擁肩寒吟入圖畫席地草飲成真率更叩僧房借榻眠再上山椒約明日遊感山題甘露臺講師曽此雨天花臺築山椒幾嵗華一蓋雲松擎羽葆四盤江水走龍蛇好教絶頂崚嶒出莫放濃隂薈蔚遮應有醍醐餘味在僧房試覔一杯茶題西湖竹閣寺入門才見萬琅玕便覺玲瓏日影寒峯勢近環簷外立湖光更好竹中看煙霞古淡僧容瘦風露清髙鶴夢殘已占兩亭凉坐足再須登閣倚欄干千古清風白樂天昔時曽此飽談禪自從西閣無吟跡惟有東坡嗣舊傳來往秪應湖上寺聽聞誤說海中仙我來再拜祠堂下笑摘巖花薦井泉瀛嶼孤山御園中凉坐自是瀛洲近帝鄉孤峯宛在水中央地雄海上三山境天與仙家六月凉雲母屏寒蒼檜色水精奩啓碧湖光雪中來此尤須别好著珠蓑棹玉航觀畫竹外間盾日正相仇忽有清風起筆頭坐對不知三伏熱起行如與七賢遊洗空京洛塵埃氣化作江南水石秋我有一溪恰如此因君思去理扁舟詠金橘團雪不能甜橘小酸若為有此蜜氷團比將金彈可勝軟嚼破水精如許寒泉石碎聲鳴齒頰乾坤清氣入脾肝京華六月塵生渴賴爾煩襟得自寬思家信不至又是秋風入芰荷尚無黃耳到如何慈親想自精神健嬌女應添智慧多踪跡自嗟成漫浪利名底苦欲奔波幾時了却胸中事只傍南溪理釣蓑有懷學子吾生傳癖更書癡俳笑紛紛獨喜隨篝火共窺韓子筆煮茶細說杜陵詩論交無此知心友得句常于見面時一念不教千里隔慈恩花下夢微之有懷族子秀出吾宗獨有君等閒相别又秋新江山憔悴生歸思風雨凄凉夢故人天境儘供分石釣雲溪擬卜住山鄰何時對酒聽佳句洗我胸中一斛塵贈陳柏堂道士孤山古柏鬱蒼蒼中有髙人住此堂峻入太空摩日月清蟠徑氣挾風霜葉餐曉露通仙藥子爇宵煙謁帝香已結嵗寒方外友願分一半白雲鄉題釣臺等閒伸腳動天文須信乾坤繫此身天上有星猶是客漢庭何事肯為臣秪當泉石容真隱安可文書役故人豈但雲臺髙不似釣臺草木至今春送陳新恩赴殿桂花香滿月輪秋穩送鵬程萬里遊身近清光瞻帝座手攜多士上瀛洲戊申奏對規模濶庚戌掄魁氣數周陳亮自來天下選老年更好作龍頭送同窗趙章甫上舍入京壬子春正誼羣英自藹然喜君已是著先鞭翼摶北海三千里身在西雍尺五天學舍快升優褐上酒樓莫戀軟紅邉雙親教子相期切成取功名趂妙年一别西湖又見春夢魂長是繞湖濱為煩竹閣揩題墨更向梅花道故人槐市舊逰休復問龍門佳客尚能新明年儻共昕庭對願過當時蔡與陳寄鄒希聖兄弟槐花又向此秋黃槐未黃時趂早忙龍到水髙衝浪化鵬因風厚貼雲翔棠金鏃取霜筠健越砥磨開電劒光努力晨窗并夜案天庭已動桂枝香和郡侯勸駕韻聖朝珍重設儒科總總英賢入禮羅天下豈無偕計上日邉此獨得人多仙橋快應龍頭䜟工席欣聆燕衎歌雅志不為溫飽計尚期勳業等山河睎顔欲進聖門科何意嫦娥剪緑羅拾紫不知如芥易一紅也覺占春多興賢借此雙旌重得士歡於五袴歌九萬扶搖風力健穩吹槎馭上天河和郡侯喜雨韻玉龍捲動海千尋一滴天瓢水尺深農父帶雲耕宿潤使君喜雨入新吟浪低麥隴收難速針短秧疇插未禁三日頓回生意滿天心只在我公心送趙判縣崇曖美任改除閬倅仁如愛日潔氷壺鞭不曽施豈用蒲吏服官清羞鬻獄民憐邑窘競輸租甘棠舍在春常滿行李船空月亦無展驥分州猶未稱合於紫禁著飛鳬和劉月湖縣尉不見元城不泗州令人愧汗直如流獲瞻沂水春風㸃說到濂溪太極周我豈能為前輩役君真合向古人求考亭一派今寥落還肯同登道閫不用樂魁聲道寄李後林韻寄聲道尺書春寄忽驚秋未見新除入報郵鐡漢尚踈丞相馬玉兒肯伴秀才牛欲令世事更新易可使時賢不進休子職顯揚千古事聖恩深重更龍頭一葉梧桐喚動秋分投閒散亦無郵超踰未羡詔金馬遲鈍不妨騎土牛天爵敻殊人爵貴僞心那似德心休讀書豈為榮身計何必三公要黑頭再用前韻寄後林别來知是幾三秋書倩洪喬懶作郵帛足忽傳來自鴈軸腰更喜大如牛信知蓋世名非枉吟到驚人句未休何日杖藜參口訣歸來閉戶學從頭貞心古幹健凌秋人似淵明愧督郵覽德未能儀舜鳯干時那肯食秦牛紋楸失著誰能整黃間同機底未休杜若山中人窈窕白蘋風嫋楚江頭送王新恩赴省老泉坡頴成名了曽應君家木假山父與子偕升禮部弟隨兄去入賢關龍驅萬馬空如洗鳯挾雙雛逸莫攀早早歸來榮晝錦緑衣爭映綵衣斑送萬仲榮赴省梅梢枯處忽東風魁壓千花一㸃紅歡喜馬頭飛雪處安排龍首綵雲中內訌外阻憂方大東拄西撑䇿已窮試了南宫趨北闕好輸鯁論發天聰送童子敬赴省乙卯滿望飛騰幾許年一聞充賦喜如顛金經爐冶鋒方鋭木飽風霜節始堅此去穩登雲裏路定知榮冠籍中仙近聞上蔡鸕洲合一似前年錦水連送王元髙兄弟東上乙卯科前嵗親從月殿回素娥引領到瑶臺桂枝指㸃教先折仙籍披陳看後來恰見拱辰名字接一如公序弟兄魁預將消息而今報好作百花頭上梅去去龍門客又新一鞭猛過禹濤春竚觀極論陳三䇿切莫潜兵救八人沂國素無溫飽志梅溪不作諂諛臣二難兄弟當如此及第歸來喜拜親送羅道甫歸廬陵應舉西風滿路桂枝香催整登雲步月裝羣輩總皆推德行三年稔已聽文章琅琅議論須披腹瑣瑣功名只探囊捷了早來談傑作聳聞鳴鳯瑞朝陽送陳縣尉之太和新任古來尉自號神仙况是棲身快閣天好向盤根施利器如登熟路著先鞭可知豈患無知已自愛應能不愛錢近世末僚卿相少願儲逺業繼前賢送洪右司去官戀陟懷遷怕去官近時君子退如難中書堂拂髙風袖神武門留太華冠此舉直堪驚醉夢斯人端是障狂瀾先生真正平齊子凛凛清標萬古寒寄題陳肩䕫兄弟夢草堂謝池草句本無竒千古流傳五字詩秪是可人醒枕席許多生意在塤篪信渠風雨聽眠處快甚江山得助時顧我此懷今已矣羡君兄弟撚吟髭寄題陳肩䕫雲錦窗八窗面面受新凉萬蓋盈盈擁靚粧倩得天孫雲杼軸織成騷客錦衣裳雨翻緑淨盤中玉風攪紅嬌鏡底香箇裏搜詩最竒絶吐為黼黻五文章奉題吕氏宜老堂此堂清不著珠璣只要雙親佚老宜春酒儘堪眉夀介斑衣長似乳時嬉婦垂鶴髮陪姑緯翁撚銀髯課子詩飽飲菊花潭上水雞窠猶自拜孫枝和豐城鄒端簡韻就送其歸千里攜書謁帝閽如君忠義出天根筳篿已卜回淵聽寸草還思報厚恩且共漁樵談帝霸豈無豪俊整乾坤細吟窗下廬山句亦欲鄉人訪道原批了龍鱗歸釣魚江濤帖息果天歟腰雖未印衣重綵囊縱無金篋有書日可事劉宜令伯天教名子更僑如本原培養非愚計逺業何妨厚自儲題百花林書堂書堂靜占百花林蜀錦香浮一徑隂楊栁軟風吹雨醒海棠輕霧擁春深盈樽有酒供清醉滿眼皆詩足勝吟氷雪相看人更好竹君梅友嵗寒心溪山堂玩月施府判别業前山杳靄翠煙凝幾㸃踈星隔岸燈不是飛來千里月如何照徹一壺氷天開圖畫無窮趣人在林巒最上層動智靜仁須有得欄干莫只等閒憑招友人鳯山觀雪霜風才辦兩朝晴怪聽敲窗又雨聲一夜忽生虛室白六花已與短簷平酒斟銷帳真成俗興盡扁舟且未清想得鳯山髙處好試來著屐水精城入京遇雪正月二日馬頭雪絮舞花深便覺新陽改故隂天上素光開玉府眼前一色是瓊林定知洄曲師當捷且把新豐酒獨斟萬木怯寒頭正縮梅花一㸃露春心道中積雨才起程時雪絮春雪餘又是雨兼旬肩輿聊復能安穩步屧其如受苦辛楮賤米窮嘗世味風餐露宿鍊官身一朝儻有青雲上莫忌泥耕水耨人贈俊上人雪崖雪崖來覔雪坡詩崖險坡平雪總宜每羡僧房聞竹折終强俗客聽窗知巖收泉竇無聲溜石壓梅花側出枝到了紅爐融一片須還門外尺深時題道士碧潭幽人何處倚漁竿百頃清潭浸碧寒不動一波疑水定中涵萬象覺天寬山將螺髻堆銅鏡月借玻瓈現玉盤莫作窈深無底看是間應有卧龍蟠贈朱五星貴賤由來不自齊巧將躔次說髙低星環雲漢胸羅列斗挹天漿手獨提太乙昨傳當蜀道文昌今喜尚江西中興氣運應從此試問何時復聚奎雪坡集卷十四
