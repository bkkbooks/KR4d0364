body:
  text: 雪坡集巻十六宋姚勉撰詩五言絶句五言八句梅境僊家瑶林天移來在江國誰歟境中人山立而玉色桂莊不求田二頃只種桂為莊秋滿黄金粟飽餐風露香仁山山為仁者樂况復字為仁坐與兹山對静中天地春題月磯詩藁古苔磯上立釣為月明垂夜半清歌起無魚釣得詩湖上釣者荷風湖面曉垂釣栁隂中何日能蓑笠扁舟此興同題雪竹扇此君腰不折玉立有餘清曉窻擁鼻吟聽渠落氷聲王君猷花圃八絶海棠城家住山水國種花以為城詩將日登陴圍春驅酒兵薇香洞宻粟出濃紫幽花間深黄有誰吟其間含香一薇郎若春静中見萬物各各有春意收拾入襟懷陽和散天地花谷羣花各嬌春粲若錦繡谷於焉日逍遥中有人如玉橘隠商山不茹芝對奕寄此橘巴人忽招隠似為子房出臨清橋通渠入小池循除㶁㶁鳴羣魚忽悠然過橋聞屐聲山扉一逕緑隂去隠隠花竹幽主人地行仙終日杖屨遊鑑池春風鑑池水長年弄清暉仙翁晩歸來子孫笑牽衣感山十詠書于雲卧菴壁間松闗舍舟上招提遥入松林間缺二字俗塵網是名第一闗翠鎻濃緑滴濕衣煙嵐翠交鎻名韁莫能縶方此不失我感山山以感為名可見天地情萬籟恬不作風來自松聲石橋石梁平砥似池水明鏡如晩凉散歩穏凭欄此觀魚華嚴堂寂寂華嚴堂富貴佛境界何湏九九編吾有艮一卦旃檀林心清聞妙香宴坐㫋檀林坐香元不斷莫作死灰心慈航佛手撑慈航尚欲濟我人寄語作舟者江濤𣺌無津甘露臺有唐太和年宫中亦甘露曽不如此臺空山白甘霔雪窻地爐宿松火紙帳横梅枝春蟲撲蔌蔌惟有蒲團知雲卧菴動静貴一如妙處非塊坐髙人定不死枕此白雲卧先賢八詠三閭紉蘭三閭紉佩秋志在公子蘭荃不察予𠂻江干淚潺湲濂溪愛蓮斯蓮君子花幾為佛所汙先生獨拈出萬世知向慕靖節採菊腰不為米折頭獨採菊低晚節名元亮思與隆中齊和靖探梅孤山養孤鶴宜與梅為隣處士若輕出梅花應笑人嵇康撫琴先生人中豪志不肯司馬一曲廣陵散絶世不可寫謝安圍碁安石廊廟姿豈不嫻將略氐奴驚偉人良已先得着杜甫吟詩平生忠義心一飯不少忘臣甫寧餓死願君堯舜唐李白醉酒殿前伸脚時奴視髙力士羣閹旁吐舌翰林醒不醉雪景四畫剡溪乗興山骨凍􅏢稜溪色清練練溪山中雪月如對故人面門扄隠廬深舟捩征拖轉勿云興已盡不見方真見寒江獨釣殘蘆颯欲乾枯栁漸已集彼舟者誰子被此玉蓑笠寒鱗正依藻垂餌安可及此興不在魚攜竿雪中立㶚橋騎驢飄飄風中雪瀝瀝橋下水雪寒換清骨水淺潄塵耳詩情散天壤妙處乃在此得句欲似誰岸梅是知已藍闗擁馬雪擁尚秦嶺天盡為潮陽吾馬不能前吾骨凍不殭崪屼雪中峯萬仞摩蒼蒼非馬度藍闗騎龍白雲鄉謝乆軒蔡先生惠墨九首墨以傳千古文章之印為韻孔鐸經百年誣世有楊墨天生子輿氏邪說一以息紫陽曽未逺人復詆無極先生嚴衛道功比異端闢使從武夷來惠我墨長咫黝然禹𤣥圭上有久軒字他珍不余畀遺此良有以天未喪斯文誓将立人紀孔學授顔曽有孫復能傳道脉萃一家壽此嘻其天西山宗紫陽妙㑹衆理全先生嗣派嫡再演中庸篇軒冕儻來物豈足覊聖賢素王萬世功杏壇誨三千管晏流雜霸事功止當年六經發䝉蔀今古日在天巍巍無極翁昌代正學祖生從道州地如孔出姬魯西山道州派上接濂溪武天意豈偶然真傳紹先古科目動榮想葩華競浮文既獲釣名位鄙夫豈知君愚生不此志願䇿克復勲蕞軀夕可死但欲朝有聞寥寥六經餘天下無文章揚韓特近似班馬熏何香道至文亦精萬世朱紫陽願言楫洋海安敢航絶潢世路既如此皇皇欲何之閉門事古學妙處倘可窺欣然或㑹心俯仰得自怡先生惠終教勿作門墻麾摳衣憶初時謹獨拜明訓㝠途方擿埴夷軌忽發軔始知顔四勿於此道有進敢云聖賢逺二字古心印和楊鐡菴送子監鎮之任韻五首闗西夫子家清白乃世傳傳授已到君此脉要渾全青雲開亨衢况及此妙年願言植名節照映東西川君家遺子籯只在一巻書四世續科第積善慶有餘乃翁一片心秋月行太虛宜哉有是子大似回不愚去年唱第時文陣見整齊萬花迎歸來白馬黄金覊及今催戍𤓰歩武青雲低風埃溘上征飄飄乗白鷖初仕謂之筮已是行道時為官要自强謹勿事詭隨一命可及民官正不論卑當今淮堧清犬眠足生氂文章世家難有子夫何憂吾亦有青氊未作莵裘謀駑鞭不及驥汗喘徒呀齁願随君後塵撃楫江中流番陽張君叔振觀予以其家雙瑞圖俾詩之叔振大參忠定公諸孫也惟忠定公政和八年魁天下某先世實𨽻其榜今某於叔振令子若鳯為同年生世科之契也又何辭雖不能詩謹課二首望月犀角明涵星蚌胎聚斯石卧龍枕宜有蜿蜒具龍頭君家舊有子踵髙歩層雲觸石出四海望甘霔堂堂忠定家三世蘭為祥父子繼科第菲菲姓名香雙英今復然階庭煜生光願言紉佩之百世當流芳贈星學彭砥齋彭君妙星數為人説窮通爵祿特磨鈍是名砥齋翁我鈍不可磨礲礪煩良工寸鐡足刳蟇遥遥廣寒宫贈月堂徐相士衡門選龍首摸索未容易龍首許黄扉却亦非難事濟物乃素心好爵豈予志時來亦不辭焉用早諛媚人皆以貧憂人皆以貧憂君子獨能樂中心賤榮利外物甘寂寞富貴如春花時去易凋落不如一簞瓢可以長處約雪坡集巻十六
