body:
  text: 雪坡集卷二十七宋姚勉撰狀辭免召赴行在申省狀丙辰九月八月十五日凖尚書省劄子八月五日三省同奉聖旨召某赴行在者某伏以豫琴未和豈忍為問仕之謀飛詔鼎來乃遽忝起家之召君命不容於俟駕私心猶切於循牆輒干越制之誅庸瀝陳情之懇伏念某無庸謭學偶玷末科盆盎易盈不易時而遇變斗升弗養顧何意於求榮吉任強更墓廬忍釋雖移孝之天不泯而事君之日尚長不欲為光範之干政恐誤公車之渥書不通而廢例在衛涇之本志自甘服才闋而蒙恩何汝愚之故事敢望輒加異數豈協羣言况以非才方兹學政所合竭勞於外服詎宜承寵於中宸身戀松楸願且俟及期之戍心傾葵藿尚能輸報國之忠所有省劄未敢祗拜除已寄瑞州軍資庫外謹具狀申聞欲望公朝特賜敷奏收回成命俾某仍舊待鎮東軍兩年之闕到赴任須至申聞者赴正字召中途上書而歸申省狀八月二十五日伏凖省劄八月五日三省同奉聖旨召某赴行在繼即具劄子辭免九月十八日得旨不允九月十九日三省再奉聖旨除某祕書省正字某上誤隆知靡容力避已祗召命行至半途適驟感于外邪致有傷於元氣患衝心腹痛絞肺肝恐循至於膏肓盍速加於針砭但念奔馳道路未有良醫不如退屛山林可求善藥豈容愒日惟有籲天深慮薄命之頭顱難刺清班之人物願收成渙特畀嶽祠昔蘇洵雖辭省掖之招於仁祖尚有封章之獻輒援是例附進以書欲望公朝特賜敷奏微忠拳懇或逃出位之誅弱體康強尚有事君之日得旨責任僉判一次申省狀丁已正月今月十九日伏凖省劄偹載臺疏寢某新命且今任僉判一次某攖鱗抗疏當從四裔之投濯髮數愆姑郤九關之入俾且循於外服猶曲徇於初心罪極丘山罰無毫髮伏念某養親弗逮從仕難任特因洊拜於宸恩弗敢固違於君命不圖跋草之際遽有采薪之憂竒蹇背時莫趨班底戇忠憂治輒奏囊封例汝愚而賜召則不稱所蒙援蘇洵而上書則頗鄰於僭宜干誅斥果玷抨彈自憐極陋以至愚莫察平時之隱慝至兹循省惕若戰兢雖嘗挂京頖之名不過就類申之試惡不知其日積事乃若於風聞至於輒肆驕矜唐浮華之進士妄自標榜漢狂激之黨人為唐進士則自纍其艮心為漢黨人則有關於世道積悔尤而至此速罪戾以若何尚敢冒進瞽言極陳時事冝伏妄言之罪亟加逺竄之刑但寢召綸允為輕典同罪伏儕於善類小愆亦福於微軀養痼疾於山林其何能淑懷寸忠於畎畝永矢弗諼所有省劄謹以祗受辭免校書郎申省狀已未十一月排姦抗疏曾為曲突之憂更化用賢亦玷招旌之列顧小材之弗稱蒙異渥以奚勝但當四郊多壘之秋殆匪三命循牆之日惟適么微之分庶全出處之宜伏念某癸丑叨恩丙辰誤召遇憸壬之竊政凜憂愛之盈懷既斥逐正人能不斷國家之脈而壅防言路得無睽上下之情此而弗言孰不可忍遂援先儒辭召之故事轉求宰臣上達于奏篇引疾歸家杜門省咎雖山林之窮處寧畎畝之少忘微臣不幸而受知言之名天下乃幾於遭誤國之禍神衷造斷豈容雲霧之蔽蒙宗社有靈忽喜乾坤之旋轉大姦遽拔賢相並登翕然茅茹之俱連胡爾菲葑之亦采某遭逢景運涵泳深恩願造清朝豈甘索隱然尚無州縣一日之考恐難堪館閣四庫之除朋字猶存未足當劉晏之正字異書欠讀何敢辱更生之校書既招貪榮冒寵之譏復有辭卑居尊之誚未容躐受所合自量欲望鈞慈特賜敷奏收回成命改畀真材或不棄於淺聞姑俾仍於舊貫愛之以德倘少矜恬退之忱進則盡忠敢不竭糜捐之節所有省劄未敢祗受已於今月十五日望闕謝恩訖謹具狀申聞欲乞只以祕書省正字本官賜召庶得允當辭免再除校書郎申省狀庚申六月今月七日恭凖尚書劄省除某校書郎者某竊謂安分循常古人所尚貪榮嗜進識者攸譏揆義未安瀝忱以控某昨叨收召特畀校讐嘗丐就於元班幸獲從於愚欲曾厯時之未久乃誤渥之仍頒是少忍於須臾即可超於等級內有躐遷之實利外存能遜之虛名所學謂何而偽若是况大明黜陟之日丕變澆風方顯旌恬退之流率先列位倘兹躁競能不悚慚徒負初心何禆治世仰祈鈞念敷奏宸聰毋懷反汗之嫌曲徇由衷之請俟其日月之稍積承兹雨露以何辭後進徐驅庶不失夷途之軌深培久種或能收實地之功再辭免校書郎申省狀今月初八日嘗具狀辭免新除校書郎初十日再凖尚書省劄子三省同奉聖旨不允者伏以官卑位下固知頻巽之貽愆分薄命寒終覺蹈常之為得不暌再三之瀆敢希萬一之從伏念某微科雖曰八年外考初無一日未躋中祕已是異恩曽閲厯之幾何而校讐之重畀前已辭而今受名雖遜而實貪公論謂何私心甚愧矧生在瑞陽之地乃近罹兵燹之殃生靈化為魚肉而救之不能族黨戕於戈殳而仇之未復正內有創殘之痛豈自求榮進之時真弗遑安初非為偽既籲天而未應愈蹐地而靡容再此陳情期於得請仰求敷奏俯遂懇祈倘不棄於賤庸姑少遲於嵗月誓堅素節仰答洪私違命干誅席藁拱需於鈇鉞矜從愚欲懷鉛仰戴于陶鈞辭免兼太子舍人申省狀庚申六月今月十八日伏凖尚書省劄子三省同奉御筆除某兼太子舍人者伏以肇開儲禁永扶皇極之尊妙柬宫僚當極天下之選豈伊庸謬誤在招延伏念某曩以謭材忝膺親擢允謂非常之遇每懷莫報之恩誓當竭節以盡忠何敢辭難而避事然而進當以序志匪貪榮仕三月而升天祿之班已虞不稱居數日而列承華之屬愈愧無堪方上嗣之優崇求端士以衛翼師賔輔德已皆元豐馬吕其人講讀建官亦皆紹興朱范之輩獨是令書表啓之任盍先德行文學之科厠膚淺于羣賢恐沸騰于衆論張華在西晉為博洽之士故以是職而起家顧榮於南土有秀望之稱故處此官而得譽靖惟何者豈足當之一懷超躐之愆二有曠瘝之懼未容忝冒倍切戰兢欲望清朝奏陳丹扆收回成命别擇真材知道德者與遊安有思亷之學成羽翼而難動但同商皓之心再辭免太子舍人申省狀六月二十一日伏以固邦本者元良允孚衆望選天下之端士難雜庸才辭不獲俞色徒增愧自憐戇朴雖久懷范鎮寅亮之心但念迂愚安可玷十朋良翰之列以兹未敢匪曰弗恭欲望公朝重為敷奏小臣等輩蓋車載而斗量儲禁寀寮必金相而玉映欲當其任願簡厥修彼義府姦佞之流固非所取若杜錫忠規之士何患其無辭免兼沂邸講官申省狀嘗謂得新忘故者固偷薄之習辭小受大者亦奔競之風然而義有所不可兼情有所不容已輒伸悃愊仰瀆清明某昨班祕庭兼講蕃府雖有供奉薄賙窶貧既列屬於青宫難通交於朱邸易生罅隙當别嫌微庶無共二之羞亦免求多之責謹具公狀仰申廟朝欲乞敷奏免兼沂靖惠王府教授别選班行之彥往橫邸第之經容某専一供上件太子舍人職事已未十月辭添差處州通判申本州狀今月十八日伏凖使府發下遞至尚書省省劄九月四日三省同奉聖旨除某通判處州仍釐務者某伏念上恩未報固懷戀闕之忱寵數過優亦動循墻之念蓋有非常之彥乃堪不次之除自顧何人曷當是選竊惟員外置之佐郡以居朝下出之士班某但叨讐正之虛稱曾無閲厯之實迹一朝冒此衆論謂何雖在國初每除别駕然偶失張齊賢之選通榜盡除其後因歐陽修之言此例遂改蓋謂初登仕版即豫髙官未能涵養以成材徒使奔競而敗俗董德元之七年恭政漫為識者之羞張師德之兩及相門祗重先賢之歎某初非拒命所願循常倘科目稍前者猶此貪榮則名第偶卑者若何望進未容躐取決不敢當欲望使州為申朝省乞收成命改畀名流忍飢寒而讀書方思學政厲忠清而報國終不忘君所有省劄未敢祗受謹寄留本州軍資庫須至申聞者轉官乞回授祖申省狀覬賞貪榮素匪平生之志報本反始願推孝治之恩謹瀝愚忱上干穹聽某誤叨宸渥末綴宫僚方懼罔功例叨進秩辭則近於立異受則是謂躐遷自權其宜輒控所請伏念某家習鉛槧代有簪纓雖未至於顯官亦相承於仕籍獨惟大父窮老書窗謾叨四舉之恩莫遂一階之願留其簡册遺之子孫某忝竊異科濫躋中祕幸遇明禋之大霈獲蒙賁贈於慈闈以至糟粳之妻亦霑隴墓之澤追想如存之先志亦必念親願回濫轉之一資用而尊祖庶幽明之兩得合前後以相輝其求蓋亦異求所望而非敢望官卑職小固未當二代之封德厚恩深庶或被九原之寵仰祈敷奏俯賜矜從願移孝以為忠告捐軀而報國陳實年甲申省狀庚申應舉不增嵗數見前輩無欺君之心在籍而無官年驗先儒有忱意之學知而故犯罪在不原伏念某方當弱冠之年尚為舉子之學道心未固人爵是貪想發於衷神授之夢告之君第千中一之語繼以臣年二十三之詩事乃不然志猶未己每逢詔嵗必用此年後當三十八之時始玷五百人之選乃知二字與八皆以兩畫成文但顛倒其辭以相愚不漏泄此機而明示事皆前定何煩躁競之求心乃自欺夫豈忠忱之實常懷不滿屢欲自陳倘改過之尚稽是懷諼而未己小人之朋姦罔上何所不為異時之致仕引年豈能知止其害甚大於義弗安謹具狀申明欲望公朝特與敷奏送所屬於仕籍內將年甲改正所有前此欺罔之罪拱俟誅斥雪坡集卷二十七
