body:
  text: 雪坡集卷四十五宋姚勉撰樂致語郡守勸駕樂語代作大比興能荷嶺萃多才之盛嘉賔式燕芝堂列四座之英秩秩初筵津津喜色省元學士工磨月斧巧織雲裳經學淵源𣲖接廬山之舊詞華藻麗燈傳渤海之遺藉甚月評偉哉時望蜚聲米廪一鶚橫空較藝棘闈八龍得雋天族倍七賢之盛星臺聯三秀之榮桂子香飄共登秋賦梅花信早齊報春魁我判府六館俊流雙旌間氣羲爻得趣密傳家學之精佛閣題名早繼世科之選元是蓬萊之佳客來為道院之主人適當勸駕之初大舉吹笙之禮府判黃石髙弟梓潼後身檄捧星臺心授文章之印書題天姥手提人物之衡竚看北闕之軒騰盡是東君之吹送玉京馬蹄疾齊觀上國之光錦水市河連好應倫魁之䜟輒呈口號上奉清歡主人合作紫薇郎引領羣仙覲玉皇滿袖風雲生羽翮排空牛斗避光芒錦江家䜟聲名在金榜巍科姓字香典貢春官來嵗事芝香趣下瑞芝堂新婚致語鄒娶陳新陽七日已欣寒谷之回春和氣一天快覩德星之聚夜艷神仙於華屋秩籩豆於初筵喜色盈門歡聲溢座恭惟嘉賔上舍學士太丘德宇拾遺文章傳家有狀元之榮宰社見宰相之志襄首奮翼合直上於玉堂吐氣揚眉即橫飛於璧水相攸慶燕得壻如龍舉針子送女之儀結女叔來聘之好次賔學士中庸世學安定家傳謝砌玉芝竇庭丹桂曾快鶴書之捧即榮蟾窟之遊協諧卜鳳之祥整頓驂鸞之駕在座親賔晉秦懿戚劉范世姻綸巾公瑾之風流錦衣買臣之富貴導引得仙遊之樂笑談開釀禁之嚴髙朋雲集於玳筵雅論風生於玉麈我東道朝奉道鄉直節齊國髙才子舍聯輝五鳳之羽毛絢爛孫枝挺秀八龍之頭角峥嶸欲早見於曾𤣥乃榮聫於姻好卓以西雍之人物副兹東坦之聲名榮遂結䄜同諧合卺鳳駢鸞駕月宫擁仙子之來龍燭鴛屏雲漢慶星郎之會大開宴席永締歡盟愛日烘晴祥煙藹曉松耐挺嵗寒之節梅嬌漏春信之香歌遏行雲舞翻回雪祥光院宇今年小慶於登科喜色門闌來嵗聫看於升舍某厠身樂部拭目清歡欲展心私上呈口號珠簾繡幕藹祥煙合卺嘉盟締百年律底春回寒谷暖堂間夜㑹德星賢綵軿牛女歡雲漢華屋神仙艷洞天玉潤氷清更竒絶明年聫步璧池邊對㕔樂語丙辰春再娶韶天明麗慶人月之重圓魁宿熒煌聫使星而髙會新鳳鳴之諧叶隆燕衎以綢繆西位郡馬上舍邾國故家道鄉雅望名蜚璧水咸推天子之門生身娶瑤姬自是人間之禁臠早具龍頭之眼親調麟角之膠苗夫人不識韋臯俗何足怪相里氏皆輕杜衍君獨不然力主嘉盟遂修前好次位直閣機宜竇山丹桂謝砌玉蘭衛女問我諸姑曾作齊眉之偶莊姜以為己子亦求坦腹之賢凡而汶上之田猶是奩中之物特聯星轡來衛雲軿狀元節判正字著郎揭日貴名薄雲髙誼杏花十里豈無可娶之公卿桃葉同根但欲尋盟於姊妹不矜新進士寧作小姨夫洗簡略之陋風復婚姻之古禮玉鞭親迎翟茀同歸洞房燭金榜名世間固有帝京遊鳳樓許天下無雙即看魚軒同登龍禁東位新恩待除郎中奕世狀元之系西江夫子之孫策對楓宸行矣家氊之又復袍爭草色煜然棣蕚之相輝賔在秩筵主臨吉席翠袖紅裙之歌舞瑤琴寶瑟之賡酬揮玉麈以生春飛羽觴而轉月三魁兩娶未多前輩之風流一日九遷同享長年之富貴某等欣逢盛事請播伶歌洞房華褥繡芙蓉惹得天香馥正濃鳳觜續絃新跨鳳龍頭有壻又乘龍人間二月春光好魁下三台瑞彩重酬勸不須辭爛醉詔書已下紫泥封女筵樂語雲英以樊夫人而婚既成絳雪玉巵乃西王母之女同宴瑤池偉佳壻之乘龍艷華堂而式燕西位郡封秀鍾豐水系出蘇臺姪其從姑若莊姜之已出妻之以子自孔氏之兄來眷言騶谷之外家早識龍頭之英物自合絲鞭之久接何遲玉鏡之重婚洞房花燭金榜掛名恰逢盛事繡褥芙蓉門闌多喜來主嘉盟親飭魚軒俯驂鸞馭次位宗姬銀潢衍慶玉葉分香富貴生諸王家猶勤婦道舉動得內宫體恪奉母儀族黨稱賢閨門有則齊姜繼晉皆由夫子以拜成姬氏如秦宜爾碩人之借重况蘭閣乃齊年之姑㛐而棣樓又平日之師生契同何止於四般將送遂煩於百兩狀元新閫夫人行雲態麗詠雪思髙清談謝道藴之風妙墨衛夫人之法女科若有亦當為天下狀元仙骨非常不肯嫁世間凡子曽許盧魁之上第遂諧歐九之繼姻寶鑑重圎膠絃再續小喬初嫁添羽扇之風流京兆新粧覺蛾眉之嫵媚東席恭人參軍令女刺史親孫七袠開年緑鬢朱顔之如舊九宗拜長藍袍紫綬之盈前引領瑤姬主張玳宴淺斟低唱恰當芍藥正開庭更勸迭酬笑指蟠桃同祝夀某舞慚趙女歌遜秦娥上對芳筵僭陳斐韻馬前喝道狀元歸舊壻重新此事竒駕鶴驂鸞來錦水烹龍炮鳳宴瑤池滿斟蕉葉融春色共指蟠桃祝夀期後會相逢定何日玉郎承詔入京時禮席致語鄒宴姚代希聖作月娥來瑞天香新動於姚花星使逺華春意頓回于鄒谷駐金環之壓轡開綺席以飛觴式燕又思乘龍有喜恭惟西位親家狀僉溫襟玉粹逸調金聲為𢎞文學士之孫箕裘不墜生奕世狀元之里衣鉢攸歸仁聲焯著於一鄉義概洽聞乎九族勤厚嫁孤之意尊光送女之行燕山主族之昏遂登諫議姑蘇有姻則助終秉政鈞髙掩前聞聳觀盛美我東位族長朝奉髙年重望碩德耆英平糶濟人為鄉間之司命公心服衆真宗黨之主盟深種善根力行好事未論兩家之閥閲且誇一樣之胸襟世兹劉范之婚姻美矣東南之賔主相與醉此琉璃鍾琥珀濃何以報之錦繡段青玉案某等叨居樂部敢獻伶歌月姊當年付桂香君家上第緑衣郎祇今盛事追龍首又此佳占叶鳳凰暖律潛回燕谷冷名花盡壓洛城芳從今不把朱陳說百世姚鄒話柄長女筵樂語結婚鼎族上尋姊月之歡盟送女衡門欣迓從雲之仙隊鸞軿戾止燕席綏之恭惟西位懿德春溫清標玉潔派松垣先生之族系久熟家傳嫓竹樓夫子之孫枝咸推閫範慶鍾猶子禮重送門凡季蘭女職之修皆伯氏姆儀之訓我東位里稱賢母胄出名門有女不與凡兒㑹得龍頭之壻擇婦必於儒族遂諧鳳卜之緣二姓綢繆四筵歡洽花簪王母艷瑤池玳宴之春桂近嫦娥看綵砌藍袍之耀欣逢盛事敢獻俚辭瑤姬來自狀元家真是姚黃第一花玳席艷開春富貴魚軒榮駐逺光華梅梢欲動朱簷雪竹葉微潮玉臉霞正好留連長夜飲未須催整七香車郡守宴狀元樂語竹州出狀元果應市河之䜟道院迎仙客真為珂里之榮簾幕捲以爭看山川為之改觀一時盛事萬口歡聲恭惟府僉狀元正字氣蓋諸公眼髙四海兒童走卒皆知雪坡之名弟子諸生幾坐春風之裏信所謂國人之彥是宜為天下之魁千佛首題九重親擢虎榜首登鳳池身到獨誇地位之髙龍頭春重鶴髮恩深兩副君親之望行看金甌之覆益增瑞郡之光恭惟府判華文郎中董試有功得人報國以堂下之言知鬷蔑於舉子之時識富公望著箳篁半刺平分於風月手提衡鑑八元髙舉於雲霄故今為首唱之英即向者吹送之力而我判府祕書寺丞胸涵星渚肩拍盧山衣鉢親傳早䇿楓宸之第觚稜入夢佇回荷槖之班惟此邦文宿之加臨故今嵗魁躔之轉現氣類相感不自後不自先賔主交歡醉言歸醉言舞共飲西湖風月相期北漢星辰笑紅綾餅餤之曾嘗記黃甲姓名之如舊清歡卜夜暖氣排冬成此一段風流何惜十分酩酊玉勒成行狀元過此日親逢沙堤新築宰相行他時並命某等縻身樂部拭目台躔輒貢俚言仰陪芳宴幾多文士踏槐黃實出倫魁在瑞陽千古河連留地䜟一聲臚唱破天荒金叉笑擁龍頭客寶篆濃薰燕寢香方國薦賢蒙上賞匪晨有詔下芝堂雪坡集卷四十五
