body:
  text: 雪坡集卷十九宋姚勉撰詩七言古風送陳糾任滿歸江西道院春風裏田里嘆愁聲不起黃堂太守政如神館閣掾官清似水掾官皆清誰最優寮中録參陳太丘奮身原自科第出不比刀筆庸常流生平妙得書中趣默㑹欽哉恤刑句木天玉堂未肯遊且為黎黔了寃訴操心仁恕真崔公湯瀋沐浴羣囚同雷轟電燭不留滯狴犴昔滿今俱空歸巢羣鵲依庭木春晝圜扉芳草緑政成來泛幕中蓮吏案凝塵無訟牘幾年摧政氷霜巖生怕歡與愁俱添公揮椽筆議革弊和氣靄靄生青帘感恩戴德殊未已鳯詔飛來趣行李雲衢直上驟驊騮一日進風千萬里昔公留此民如瘳今公去此民如愁父老何嘗欲君去州縣但恐難公留陳平他日宰天下大志竒材見分社况公隂德似于公寧不髙車乘駟馬于公受報在子孫天今報公及公身公身榮顯復子孫造物豈負真賢人錦帆招颭鼕鼕鼓愁聽數聲離岸櫓公還為雨澤九州多為髙安添滴雨送楊帥參之任古來幕府俱才雄子美嚴武韓裴公近時幕府養清望一事不到籌帷中先生人物宜臺省豈合官曹坐閒冷秖今時事缺撑拄袖手旁觀應不肯潯陽戈甲屯如雲天子命我參卿軍江頭䇿馬斬渠帥快作當年虞允文欲知允文宰相業只觀采石江頭捷滿望麒麟第一功不唱陽關第三疊送髙録參美任髙安之民椎且質空蒙惡聲頭上筆獨惟猾吏可怕人架鷹騰霄柙虎出貪官乞錢吏手中庸官仰筆描吏容獄情黯菼直為曲雖欲辨雪何由從先生來紏髙安獄直道仁心作民福吏知積德不忍欺囚感吐誠爭首服掉頭不肯狥上官幾回拂意思掛冠伸寃振抑必得請愧殺同列雙顴丹先生種滿甘棠了天子知賢恨官小若人底處可安排不在玉堂應鳯沼鱣鯨自不溝瀆留郡官無賢民却愁愁公歸去莫報德但祝髙門于定國送鄭編修侃罷任江城雪作隂如莫兒樣老翁啼塞路雲深日隱天不知驅馬蕭蕭使君去使君四海鄭村邉人是白玉堂中仙君謨政事文永叔五花為筆蒲為鞭民酣醇酎春風裏吏姦如魚在寒水橫江立石霓截流要使千年履如砥瓜時且及報政成漢法選表宜公卿况今世號天清明如何饑烏啼夜聲饑烏聒聒正攫肉驚起鸞鳯騰去速世間公論竟有否汙此無瑕雪團玉杭州白傅亦自無若有薏苡猶疑珠中湖築堤到今賜當時憸兒羣謗蘇先生去住輕蟬翼一笑歸歟黜如陟但民失母士失師欲取讒人投有北浮雲豈解終為昏先生即來直北門偏州畢竟著不得滂沛霖雨蘇乾坤次楊監簿上陳守賑災韻稻田碁局分郊區人煙盡障聮城隅新秧入夏種俱了一色秀緑連天鋪年豐正為憂國願雨霪忽動民愁吁浪浪竹瓦日鳴瀑爛爛苔砌長跳珠江流入市舞篙楫野潦斷路迷樵蘇孤樹空留白屋少平地欲縮青天舒犬雞登簷呌雲霧蛟鼉上岸疑江湖使君視民容有蹙憂且蕭墻非顓臾家沒半扉蛙上竈食不一粟糟為餔鶉衣鵠形避淪沒槁項髫額相攜扶下車以來宣德意但有寬政無急符溺饑沓至蓋由已食必稷奏土禹敷故侯遺我四百萬指此亟作民良圖餽無所處不受是君子貨取安可乎分甘固欲買不語溝清那肯同渠汙一朝盡散色不靳可使被澤遺匹夫錢從民來復還民塗血不用子母蚨坐令鴈澤得復集豈但魚沫聊相濡四旬奚堪水五至十室不忍煙九無只求編氓易菜色寧計私槖如匏虛方今汙吏爭侵漁溪壑不厭求贏餘官錢花破入私帑期限火急催民輸貪者盡笑公迂儒安得天下皆公迂次楊監簿新闢小西湖韻搜竒抉異三十載此湖如玉韞而待發源逺自錦江來匯流近與柴門對山川融結自古有造物扄藏深意在瘦笻曽作日尋討一見便覺天廣大兩山宛似南北峯况有層塔相映帶芰荷十里蕚緑華雪月三千銀色界深藏最有君子意自衒殊非小人態西湖每遇蘇雪堂妙句尚憶秦淮海此湖端為舊遊發㘲重未信吾州隘鐡菴蜀珍坡仙𣲖下筆作詩風雨快從今新瑞次古杭敢賀此湖貢慶㑹題河沙寺西崖河沙古寺臨江干山如蜿蜒翠龍蟠入門雙石踞席豹排雲萬竹森琅玕山中有景開屏面路入西崖羊角轉一湖橫陳白於銀一溪西來淨如練僧言此處好結亭孔方絶交呼不應竹隂深中即亭子風月為户雲為櫺寄資録事今豈少不日誅茅坐林杪飯餘曳杖一登臨看盡青天沒飛鳥晚天落日浮湖光漁舟相連鴻鴈行浩歌橫笛互相答底處更欲求瀟湘荷山對面不盈咫門前吾家錦江水何時亭子髙崔嵬年年釣蓑為此來題南昌邑大夫俞君尊公坦庵人心機擭日以非太行羊腸同一巇坦庵先生獨不爾方寸境界天平夷絃歌武城有賢子寬曠襟懷亦如此㑹令天下歸此庵蕩蕩康莊行九軌梁新恩送龍涎香杯神龍側枕瓊瑰卧表裏透薰香玉唾巧工斫取破天馨碎屑沉蘭百芳和製成七寶金霞觴猶帶嶺外梅花香醁醽一酌發竒馥滿中灧灧浮龍光感君遺我真情厚歸拜庭椿一杯酒峻第髙官不足榮人生只願親庭壽謝胡龍溪惠酒材及五德臘寒無酒虛瓶罍雪窗孤此梅花開乾簷鵲噪帳鶴舞蒼頭疾足龍溪來龍溪遺我明珠斛玉蘂仙花光照目急呼侍兒洗瓮盎壓此蒲萄一江緑缸中酒熟雞更肥癭樽竹筯常相隨故人故人來何時安得勇赴雞黍期余評事惠龍團獸炭香瓔鳬實且許以百丈山楮衾而未至青禽銜雲落蓬壺風簷快讀光眉鬚百朋珍貺羅庭隅一一皆可當清娛建溪龍焙香雲腴香瓔巧製來東吳鬅鬙獸炭竒形模辟邪天祿獅熊貙王家舄種君家鳬晴沙暖抱明月珠雅意下照仙人癯矮窗醉兀詩情孤蒲團松拂燒紅爐蝸廬積凍春潜驅侍兒金珞香玉膚月鐺著雪煎春酥窗前笑玩嬌黃雛能言直可貢上都其波及晉皆君餘獨缺一幅橫雲鋪王孫醉擁紅氍毹楮生長揖非吾徒藤床紙帳恰此須能供梅花清夢無贈棊翁挾二童皆髙奕蓬萊閬風白雲鄉瓊樓玉館相低昻蟠桃影滴仙露濕壺天晝日和春長老仙鬢眉白於雪雙侍女仙氷玉潔龍牙棋子琅玕盤消遣洞中閒日月乘風來戲塵凡中皓鵠驂以雙鸞紅女仙似是王屋婦老仙似是商山翁一聲飛雹枰中落應手鈞天仙樂作環看側睨驚相呀盡是人間未曽著人間事變如雲輪面勢更改番番新撫枰不是少竒著往往當局多迷人五老峯前白鶴址晝眠扄門日清美棋聲流水古松間忽然聞之雪堂喜雪堂欲學竟不能不如旁觀眼自明馬鞍聽朽柯聽爛局中有路能長生贈定軒游季升能地理海風吹潮濁如泥咫尺不辨魚與龜秋潭表裏氷鏡淨下瞰直可莖鬚眉乃知有萬不齊物心到定處皆能窺君心久矣波不起天地不逃圓鏡裏胸中玲瓏列星宿眼底逺近佳山水人言君腳踏四方不知君閒謂君忙寒爐曽與話清夜始覺牖戶虛生光我生之日直南斗逢人得罵不脫口而今只把定眼看得失空花總何有但愁國事紛披猖舉棋不定觀驚旁天傾地仄缺撑拄安得不動鐡脊梁贈郵文秀才風行水上真文章不羽不脛遊四方妙語綴入牙頰香意有佳客揚其芳美君金璧不願將多文為富紛儲藏牙籖玉軸緗縹囊書船貫月飛虹光鼎肉試取一臠嘗珠璣璀璨錦繡張疾指快讀下五行虎鳯蔚躍蛟龍翔尚欲效學雞林商遍索偉製豐行裝哲匠謹勿麾門墻當遣紙價貴洛陽贈真術秀才秀才天台人善談星命先兄存日嘗以詩遺之攜以來為豫言命豫不喜問富貴者也感先兄遺墨聊以賦之天台真術李秀才手持先兄遺墨來先兄已矣遺墨在三讀感噎重生哀哀餘試問子何術星斗紛翻舌端出不須問術只觀詩詩好應知術真實大凡學術總要真不真誤殺天下人近來世人多弄假不獨肆中談命者贈古朴相士巧夫縱誕爭說相口角瀾翻如剪樣眼中元不識英竒隨世炎凉分下上貢諛乞得貴人詩紅籖綵軸珍攜持未遭窮士或有贈爛在醬瓿問不知如斯等輩真肉眼砂裏精金豈能揀古朴相士却不然品題每在未遇前前時贈詩紙欲朽逢人誇張不去手古朴相士真識人識人須要當賤貧信知巧者盡虛僞惟有朴者全天淳願君終身如此朴俗態髙低不須學贈金斗相士君有金斗盍自珍持此量我非其人欲我覔印如蘇秦我寧滿喫三斗塵贈行在李主人二子李家自古兩詩仙太白長吉相後先蟠螭屈曲作妙語到今氣焰干雲天君家家裏二竒子眼如明珠頭玉峙長成學取二仙人要使詩人常姓李贈天王長老無著能醫兼善畫龍頭唐有一僧妙醫藥得大醫王三昧覺雨中盥手瀑簷飛驚嘆病龍腥唾落須臾雲霧忽銷霽白髮老人來矍鑠自言病中困行雨願得良針蘇脉絡授方寸劑應時愈拜奉仙方效思邈此事今無古信然說與時人謾驚噱早來忽得絹素軸挺挺祥龍露頭角心知此龍非病者噴霧灑雲天洗濯龍身不病澤四方萬物全生總安樂此龍此醫今是誰天王長老僧無著贈饒春卿丁已秋醫痔有功扁鵲華他不可作龍宫寶方閉金籥春卿奚氏劒江饒老眼熒熒仙授藥傳醫五世活幾人計日而愈功何神縣疣附贅夜驚失立使笑語開嚬呻方今氣運乖生盩天地中盤大癰􅂒護疽養疾誰見憂彼何人斯甘吮䑛石猶生我疢毒多能治不使如國何嗚呼安得醫國之老如此手勿談時事且飲酒雪坡集卷十九
