body:
  text: 雪坡集卷七宋姚勉撰策癸丑廷對臣對臣恭惟皇帝陛下十詔賔興九臨軒御求賢靡倦博採芻蕘兹者進臣等於廷策之以選舉之八事而欲得夫學術才智之二者以扶世道真堯舜之用心也臣來自遠方懷忠欲吐意陛下必策之以當世之務理亂安危之機而聖問所及乃止於此其慮臣等觸時諱而不使之言乎抑亦慮臣等有待對之帖括而問其所不備乎甚非策士本意也雖然人才亦國家之重事陛下求學術者則欲其達性命而學聖賢挺氣節而發言議求才智者則欲其理國家而究民事裕邦計而扞邊陲亦皆時政之大者臣敢因陛下之問而條其所以對然後以臣所欲言者為陛下言之惟陛下試垂聽焉臣聞求天下之士以文不若淑天下之士以道以道而淑天下之士正其心也以文而求天下之士蠱其心也上帝降𠂻蒸民有則孰非良心善性之賦惟民生厚因物有遷則教之者非其道耳中庸曰天命之謂性率性之謂道修道之謂教言古先聖王所以教天下者惟修其性中之道也大學曰大學之道在明明德在新民在止於至善言古先聖王明其心之明德以新天下之民而皆止於義理之極也古之所以淑天下者如此自鄉舉里選首廢於周而策士有科始見於漢既非古意矣猶未至以詞章也隋唐以來始有進士科目之誘既設利祿之習益牢然後天下之士愈不知所謂道心術日壞以至於今士習之趍猶唐舊也雖然變今之士習臣猶以為易致力焉何也自孔孟絶響以來士不知道隋之世惟一王通唐之世惟一韓愈然皆得聖門之髣佛莫造斯道之精微如通以聖人之心迹有殊愈以人之性有三品其於聖道皆昧指歸學道之士且然而况科目之士故士習難驟變焉天開我朝道統復續藝祖皇帝問趙普曰天下何物最大普對曰道理最大此言一立氣感類從五星聚奎異人間出有濓溪周惇頥倡其始有河南程皓程頤衍其流有關西張載翼其派南渡以來有朱熹以推廣之有張栻以講明之於是天下之士亦略聞古聖人之所謂道矣雖為科目之學蠱其心術而道學之功每從而救之識之明者亦多覺焉臣故曰變今之士習為易使上之人不專以文求天下之士而專以道淑天下之士則學術才智之士宜出為國家用矣陛下聰明天錫問學日新接堯舜精一執中之傳得孔孟中庸大學之旨陛下可謂知道之君矣抑臣猶願陛下推是道以淑天下之士也而陛下之所以策臣者則未免於以文耳是非所以淑天下之士也教之無素求而得之者亦陋矣間有能為天下用者亦天資暗合耳豈以道用天下者哉古之盛時自八嵗入於小學其所學則灑掃應對進退之節也禮樂射御書數之藝也十有五而入大學其所學則格物致知誠意正心修身齊家治國平天下之序也此古之士所以多全才也後世以來所習者詞章所志者利祿進士可以求仕則挾書假手者有之矣學校可以求進則詭名冒貫者有之矣世祿之家能學有幾已仕之人可試尚多賢良惟僻書奧傳之觀而道則不知詞科惟奇文麗藻之習而道則愈暗武科則豈真有山西將帥之學遺逸則不過為終南捷徑之求道之不聞弊乃至此無他上之人求之者以文則下之士應之者亦惟以文也陛下而欲一新乎士習盍亦先正乎人心人心正則士習新雖以科目求士亦皆得人矣尚何學術才智之乏哉臣請為陛下疏言之謹昧死上愚對臣伏讀聖策曰朕臨政願治夙夜不遑康寧每惟自昔帝王莫不急親賢之為務今選舉之法未戾於古而得人之效有不如人意所以每當饋而嘆子大夫咸造在庭其相與茂明之臣有以見陛下求治之切欲得人以為用而嘆選舉之難得士也臣聞求於末者不若求於本心術者本也選舉者末也今之人則選焉而得舉焉而獲本之不正而惟欲於末以求之雖日變其法而使詳日講其術而使精天下之所以應之者亦止於如是之人耳何則本之不求而求之末固如是也求之本則道矣求之末則文矣文豈足以觀人才乎故成周之時以德行道藝興天下之賢能德則六德知仁聖義忠和也行則六行孝友睦姻任恤也藝則六藝禮樂射御書數也而獨不言所謂道豈非道貫乎三者之中而有德行藝者皆不可以不知道乎是以文武不殊科有武者亦皆有文將相不殊途可相者亦皆可將古之人何以能是也無所不通之謂道知道則無所不能也成周曷嘗求之選舉之末哉鄉以三物教萬民而賔興之先教後興蓋有素矣興而曰賔蓋有禮矣豈若後世圜棘以試之糊名以考之待之者亦甚賤乎况夫古之所以用乎士者所獻之書雖登於天府所仕之地則不出其鄉閭故天下之士皆知所以自重而無所謂奔競之習今之所以教天下則異是矣六藝云者古人之所謂末節也今之士亦皆不復知矣而况所謂六德六行哉未仕者志髙科已仕者志髙位不得不止愈進愈貪棄父母左親戚背墳墓逺鄉邦逐逐然惟利祿之計則科舉之法有以壞之也科舉已久其行何敢輕議變革臣但願陛下以道而淑天下使天下之士知天爵之可貴而人爵不足貴知義榮之可尊而勢榮不足尊利祿之心輕則科舉之念輕科舉之念輕不得已而後應科舉則恬退靜重之士出而頑鈍無恥之風亦可以少息矣安有得人之效不如人意哉臣伏讀聖策曰夫學術者君子所以維持斯道者也達於性命之原窮乎聖賢之指形於氣節見於言議平昔之所講貫其要可得聞歟才智者則所以經綸斯世者也或識國家之大體或知民事之本末材術足以裕邦計謀略足以扞邊陲平昔之所藴蓄其亦有所本否歟今朕所以搜羅天下士者無所不用其至臣有以見陛下思得夫學術才智之士以為天下用而慨今世未有其人也臣聞學術才智一事也學術其體而才智其用也有學術而有才智其人則君子有才智而無學術其人則小人陛下之求人才必皆求其兩全之人最不可各求其一也至於聖問所及學術之四事才智之四事則脈絡相貫事理相關亦不可以異觀者是故達性命之原則能窮聖賢之旨矣秉正直之氣節則發忠鯁之言議矣識國家之大體則知民事之本末矣有裕邦計之材術則全捍邊陲之謀略矣臣請為陛下條陳之夫聖賢教人惟性命之學而已在天為命在人為性命則天令之自然性則仁義禮智四端之固有也是故為士者當全天所畀付之命而盡人所固有之性天命之性則一善而無惡不可執氣質之性以為性也四端之性則一真而非偽不可泥釋老之所謂性以為性也聖賢教人不過如此今之學者則異是焉資稟之下者局於功利之申韓資稟之髙者溺於虛寂之釋老髙談性命藐視輩流好虛議論者無實事功尚虛聲名者無實踐履為程皓之體認天理二字者誰歟為程頤之求孔顔所樂何事者誰歟為朱熹之欲為朝廷措置大事者誰歟明善誠身之言資士夫談柄而已固不知善若何而明身若何而誠也格物致知之説竊先儒緒論而已固不知物若何而格知若何而致也道之在天下體可以達用精可以貫粗而今之言道者則以為無用之空談不能見於有用之實學聖賢豈如是乎臣故曰達性命之原則窮聖賢之指者此也夫議論者自氣節而發也天下安有無所謂氣節而有議論者哉王素為諫官以獨擊鶻見稱則王素之氣節為之也劉安世在言路以殿上虎見憚則劉安世之氣節為之也有歐陽修之氣節則能排夏竦之姦邪如王拱辰則初雖彈竦而終則攻杜衍矣有吕誨之氣節則能劾王安石之巧詐如常秩則始雖立節終則附安石矣無氣節而有議論天下有是理哉今之士大夫氣節言議視先正似若少遜矣以訐直為矯亢以緘默為安靜以隨聲附和為不立異以無所指斥為不近名陛下非不容受直言也又非不舍己從人也而曽未有言焉者今天下之竊議時政惟曰內批也營繕也近習之弄權而外戚之除授也然而繳還內降如杜衍者誰歟論張堯佐四使如唐介者誰歟請不再建玉清昭應宫者誰歟奪任守忠節度指曾覿龍大淵姦利者又誰歟茍有一言臣知陛下必從之也無一人為陛下言者而徒諉曰恐陛下之不受得無類於欺君乎是皆氣節不立之過也而何言議之有臣故曰秉正直之氣節則必發忠鯁之言議者此也國家大體其本在仁藝祖皇帝陳橋驛之言紫雲樓之誓子孫萬世根本在斯愛養元元是為大務胡今膏澤不下於民陛下仁厚論中所謂以術輔貪以材濟虐者往往皆是有如去嵗疊見重災九郡生靈為魚鱉之墟衆大民居為灰燼之地不加賑恤民命謂何撤闤闠而廣通衢略無救正之諫侈土木而窮事力第先應辦之謀以至監司守令之官所謂承流宣化之任而諸路臺節曠職甚多弄印不除褰帷何有貪吏朘民之脂髓虐吏戕民之肌膚陛下深拱九重亦安知此是蓋不知有國故不知有民也臣故曰識國家之大體則知民事之本末者此也今之備邊重在兵食食茍不足兵何由強而今之兵賦體統乖異制閫則曰食少總餉則曰兵多制閫則曰乏糧總餉則曰虛籍嵗行和糴內斫本根邊有屯田竟無效驗徒耗事力不立規模敵至則逃敵去則舞乘軍之退則以為功愚弄朝廷希覬醲賞側聞壬子之蜀禍甚於丁酉之北兵而掩敗不言惟以捷告觀其奪回虜掠三十萬計則知殘害魚肉凡幾何人生聚良難豈堪頻蹂邊之不能禦政坐不能練兵足食以為備而徒以欺朝廷為心也臣故曰有裕邦計之材術則全扞邊陲之謀略者此也是皆不知道而然也無道中之實用而尚虛文以欺世其失固宜矣故臣願陛下求才智於學術之中而毋求才智於學術之外苟不求其學術而第求其才智雖求士無所不用其至非所謂至矣陛下而先審乎此則選舉八事臣得以次第而熟數於前臣伏讀聖策曰進士一科自唐而重祖宗盛時或一榜才百二十人而得四賢相或臚傳之際日有五色而多得名臣果何道而臻此歟近嵗州鄉貢舉率多混淆考核之法有不容略故既選於禮部又覆試於中書朕拳拳於作新者至矣棫朴之茂豐芑之仁子大夫其亦有以稱朕意者歟臣有以見陛下加意於進士之科而欲如祖宗得人之盛也臣聞求天下之士者科目也壞天下之士者亦科目也士不務道惟知工於聲病之文用不適時惟知習於套括之學其未仕也用力惟在於此其既仕也從政曷知其方失在於所學非所用所用非所學也非科目壞之乎大抵科舉之取士惟在於文不在於道故天下之士不習乎道惟習乎文每至三年謂之大比羣衆以考其藝謄録以觀其文不求之鄉評不本之宿望惟其文足以惑有司足矣初不必素行之可以服乎鄉里也惟能竊用先儒之言而謂之明理學足矣初不必用力真在乎義理也詞賦不本於理致日以雕鐫經義不求其指歸日以穿鑿至於論策之作欲觀其通達之才而乃儷葉駢花抽黃對白競為纎巧之製無復渾厚之文世變如斯可為太息然此猶自能之者也固有平時不稔於文聲一旦忽騰於榜帖由私徑以鬻舉挾厚資以倩人公道益亡科舉遂陋臣觀有唐取士鄉貢以薦而充雖或間有私情不敢大廢公論有如武陵之托杜牧一賦韓愈之薦侯喜數人允為得才今豈能及故唐之世雖曰私而猶有公議今之世雖曰公而實用私情臣為科舉之謀其説有二一曰嚴考校於其始一曰公覆試於其終科舉所選考官必有出身科第之人然後可在考校之列不知出身之士半是假手之人以若持衡安能得士臣愚以為方今諸州貢士之際以至省闈廷對之時精選考官以惠多士其或謬得科第決不使與校文則不至於滋繆種矣昔仁祖朝用歐陽修典貢舉事一脫西崑之體丕變嘉祐之文用能革險怪之劉幾得名世之蘇軾皆考官得人之驗也臣故曰嚴考校於其始今日省闈取士之後必行覆試可謂良規獨於州縣取解之時雖有簾引未免文具使鄉舉果皆得實則省闈安有不通而州郡之間奉行不恪以覆護為長厚以駁放為過苛不知取此庸流他日又將安用臣謂州郡奉行之意不恪亦由朝廷連坐之罰不嚴儻自今以往省闈覆試不通者所屬州郡真行連坐之罰則必可以得實材矣前日都堂覆試已極隄防然雖能察張奭曳白之庸未能覺溫岐潛救之巧似聞掩覆大是吏姦今已噬臍後當加意毋使人謂清明之世而猶有是也昔藝祖時徐士廉詣院訴榜不公始命覆試當時考核可謂至公雖以陶榖之子登科亦必在所審察此覆試盡公之法也臣故曰公覆試於其終雖然此猶未為淑其心也朱熹在同安嘗因縣補明布訓諭俾父兄母為子弟假手以教之欺陛下儻能以道淑人心使人知此義則能而肆假手庸而求假手者皆愧矣榜才一百二十人而得四賢相廷唱之際五色雲見而得世名臣何患不如祖宗盛時乎臣伏讀聖策曰學校之設所以教養作成慶厯中湖學最盛置治道齋以講明世務遂取其法以教太學而胡瑗職教京師幾二十年是豈徒校一日之長者歟今負笈擔簦雲集行都來者甚衆而與選者甚寡朕心為之惻然其當何道使無道路之勞而坐收教養之實歟臣有以見陛下軫念學校之士而欲加教養之功也臣聞學校者最近民而易以化民者也今之天下莫不有學而學校以養士科目以取人兩不相關學遂虛設于其藝而不于其行考其暫而不考其常能為發策決科之文則曰能事已畢問其根本當然之事則茫然不知氣習一浮風俗遂薄內則有燕安廢學之失外則有挑達在闕之愆逐利惟競於錐刀養指遂失其肩背失在於所養非所教所教非所養也太學四方所聚實繫觀瞻而乃詭冒成風遂成姦弊之藪祈恩趨利尤開僥幸之門太學尚然况乎天下有如省闈之試輒求泛免之恩使朝廷確然不行則幸門何由而啓而乃務為姑息復與放行弊例一滋公法何在朝廷曩欲士子之安鄉井乃遍州郡而行類申曾不幾時又復中變於是補闈之士雲集京師無鼓篋孫業之風如蝥弧先登之狀躁死不可勝計仁人豈所忍聞是皆啓僥幸之心所以激紛紜之禍邇者廷臣欲分路而試其法亦可謂良而臣為學校之謀其説有二一曰定教育之良法一曰示奬勵之微機夫養士欲養之以為異日用也而可徒教以無益之時文哉是必教之以三綱五常之道教之以修齊治平之序而後可也今天下監司郡守有能知理道之人乃於學校之外創立精舍講明義理意固善矣而精舍講道學校習文然則學校之士不必知道乎又不當如此異其趨也昔先儒程皓有言曰治天下以正風俗養人才為本宜訪經術充備足為師表篤志好學材良行修者朝夕相與講明正學其道必本乎人倫明乎物理自灑掃應對以修其孝弟忠信明善誠身以至於化成天下其學皆中於是者為成德取材識明達可進於善者使之受其業若皓此言則臣所謂教養之良法也科目學校自是兩塗欲立學校之規當於科目之外方今太學舍選亦與科舉並行固亦此意然舍選所取亦惟其文其所謂行則坐齋滿季無私過議罰之謂耳行止如是而已乎此特蔡京之法也况太學為然而天下之學不皆然乎程皓又曰擇學明德尊者為太學之師次以分教天下之學擇士入學縣升之州州賓興於太學聚而教之嵗論其賢者能者於朝凡選士之法皆以性行端潔居家孝弟有亷恥禮節通明學業曉暢治道者若皓此言則臣所謂奬勵之微機也雖然師儒則每難於擇焉昔仁祖朝命胡瑗以為太學師取湖學以為太學法爰教人以有用之學者也當時伊川程頤實在表倡之列天下士安有不知道者乎陛下而以道淑天下取程皓之言以為法命胡瑗之類以為師則士無道路之勞而有教養之惠矣臣伏讀聖策曰資蔭入仕與寒畯同升患其不學故嚴程試近嵗浸成文具若祥符之詔令於國學習書二年乃送審官考試淳熙之議欲令銓試本經法律各取其半令舉行之可歟書判之選唐銓部常用之至有龍筋鳯髓之譽建隆天聖立拔萃科或於內殿或於祕閣朕比以吏道之衰復書判於吏部以考獄官縣令之能否亦唐世與祖宗之舊也其法可加詳否歟臣有以見陛下欲察任子於未仕之初而且欲察縣令獄官於已仕之後也臣聞夫己仕未仕之人皆當使之知道茍不知道則未仕者固無所取材己仕者又何所取材哉臣請先以任子言之方今冗官之弊全在任子之多三嵗取士僅數百人而任子每嵗一銓以百餘計積至三嵗亦數百人矣從觀州縣之仕為進士者不十之三為任子者常十之七豈進士能冗陛下之官哉亦曰任子之衆耳閥閲鼎盛親故復多挾厚資而得美除結奧援而圖見次考第未滿舉削已盈寒畯之流亦安能及使任子其人皆能才識如吕端問學如張栻豈不足以為天下之用獨斯人之不多得耳身燠錦綺豈知陛下之民之寒口飫膏粱豈知陛下之民之餒庸者受成胥吏虐者擅作福威寒畯生長詩書明習義理決不至有是也臣謹按春秋譏尹氏之世卿譏仍叔武氏之子弱則任子之不當有明矣臣觀古人賞曰世延仕曰世祿使之有田祿而已初非使之世其官也任子之法起自漢朝必父兄真知其子弟之有材然後保任而授之位非如今之官及則任也儒者未仕之前皆知任子之可抑才玷郎秩蔭可及門則不復為是言矣是私也非公也為已子之計故不復以任子為非也是必為父兄者如先正之不為子弟祈恩為子弟者如先正之自取儒科不受門蔭則善矣然而難能也臣謂任子之恩朝廷當稍加裁抑不至冗紛三嵗一郊少減奏薦之數每嵗一銓必嚴考核之法如祥符之詔令於國學習書二年使稍知道然後如淳熙之議以試之斯可矣否則亦文耳文豈足知任子之賢否哉至若令録之官尤當深識道理使為縣令者常有學道愛人絃歌為邑之意為獄官者常有失道民散哀矜勿喜之心則書判雖不試而何害茍為不爾雖有龍筋鳯髓之譽徒美觀也雖中書判拔萃之科亦虛文也士而能為文章安有不能書判此但可以觀其曲直是非之識耳其貪如狼其苛如虎者亦何自而知之哉雖然臣猶幸銓闈之試尚可以懼愚騃之任子書判之試尚可以懼庸繆之令録也抑臣聞之試則當公不公則不必試聞之道路銓闈固可捐厚資而得傳義書判亦可先囑省吏而得案牘也儻或無之言之者固無罪萬一有此聞之者不足以為戒乎試已非古矣試而私焉曷若不試乎惟陛下察之臣伏讀聖策曰賢良之舉祖宗以收魁壘傑特之士如富弼張方平輩出焉自熙寧以試進士策與大科無異由是罷之紹興淳熙追思前憲下詔復置而應書絶少今可復之茂異之才其出否歟自紹聖以宏詞十二體取該博華藻之士比年以來應選亦稀朕方患詞采之衰欲令四方人士共興其習議者乃謂立法未盡善何歟臣有以見陛下欲復賢良之科以收魁壘傑特之士而又欲新宏詞之科以收該博華藻之士也臣聞異等大科皆當知道茍不知道名賢良者固無足觀名宏博者亦無足觀也臣請先以賢良言之今世賢良久廢不舉蓋自淳熙以後無之矣夫賢良者所以待非常間出之士也三嵗大比之時所得恐或常士於是又設賢良之科以取之能謀王斷國斯可謂之賢良能直言極諫斯可謂之賢良此名未易當也熙寧之朝以賢良與策士無異由是罷之蓋有深意自蘇軾兄弟以直言對策簡知仁宗其後立朝風節堅徑爭論新法積忤大臣故當時怒影移木併賢良之科而罷然而本朝賢良知道蓋亦可數如富弼如張方平如蘇軾轍是真賢也是真良也姦邪之夏竦傾險之李清臣謂之賢良可乎讀人所不知之書何如知人所共由之道為世所不能之文曷若為世所可用之才千門萬户之書何補於晉之衰濟水帝丘之對何益於唐之亂公孫宏之賢良固不若董仲舒之賢良牛僧孺之賢良固不若裴垍之賢良也賢良今不復試矣賢良之才臣不敢誣天下以無人也但所以取之者當以其道耳臣謹按春秋左氏傳楚左史倚相能讀三墳五典八索九丘而祈招之詩則不能知以救楚圍之汰是知記問之浩博適足以為玩物喪志也賢良之策亦始於漢朝觀其策朝董公孫之徒無非問之以謀國之大方為政之大略初未嘗以隱僻難知之事而策之也臣記楊萬里上書孝宗皇帝有曰孟子之時去周未遠也而諸侯去周之籍孟子已不聞其詳孟獻子去孟子尤近也而有友五人孟子已忘其三則記誦非孟子之所能也乃若孟子則有所能矣孟子曰天之欲平治天下當今之世捨我其誰此孟子之所能也今賢良之科不求孟子之所能而乃求孟子之所不能萬里此言則上所以策賢良之道也程頤亦有言曰漢策賢良猶是人舉之如公孫宏猶強起乃就對至如後世賢良則自求舉耳若曰廷對欲直言天下事則尚可若志富貴而得志則驕縱失志則放曠與悲愁而已若頤此言則下所以為賢良之道也至若詞學之科其文猶當貫道文不載道雖華奚觀文章所以黼黻皇猷號令所以鼓舞天下詞氣萎薾世道繫之不可不加意也陛下近者明詔四方自今三年省闈别立小詞科一試激昻表厲陛下可謂得其術矣但願陛下力而行之必有蔚贍之才出應搜羅之意謹毋以捨大就小即易去難為浮議所搖方行而復輟也又既設此科當壽其脈儻使真無可取亦當短中求長市骨而駿馬自來悅畫而真龍必至茍進取之無階則習尚之無益然臣聞之異科之才多負徑氣出而為世用每不見容熙寧之罷賢良蓋以蘇軾兄弟之故近時詞科之不取士陛下亦知之乎亦由前日詞臣忤於當國既已逆其心而拂其意所以止其身而罷其科不然何名存而實廢也惟陛下察之臣伏讀聖策曰右科之設本以示右武而求韜略非特校虛文而課騎射也兵興纍年未聞慷慨以英略著者其故何歟臣有以見陛下慨念時艱思欲得武略之士以為用也臣聞以武設科雖曰右武以文求武反不得人今之武科臣得而議之矣貢薦額狹選舉路艱於是以武為捷徑而求為右科之試能誦兵法者罕能兼騎射之習能使弓馬者罕能兼刀筆之長於是能文者代課七書能武者代執鞭弭是無非欺朝廷也間有能兼二者之長亦不過苟一時之試求其英略宜爾無聞今之文科必有五削而後改京者今之武舉不出十年而可至郡守既登武級復試文闈換侵其官已在通籍之上矣此天下之士所以指右科為速化而競以趨之也陛下於此方且求其英略焉可謂按圖而索駿矣寇準器兼將相非右科也韓琦范仲淹才兼文武非武舉也此猶文士也嶽飛韓世忠諸將亦嘗自武舉中來乎臣願陛下以道淑天下之士毋使人指武舉為速化之地則英略者出矣臣伏讀聖策曰遺逸之召當取人於巖穴如藝祖之招王昭素太宗之召陳摶真宗之起种放有光簡册矣今日亦未有可副明揚之旨者抑又何歟臣有以見陛下廣羅人才而取遺逸於科目之外也臣聞逸民之舉天下歸周幽人之求民心附漢遺逸固有國之所先也然而不求聞達而後可謂之遺逸借此以釣名者非也不慕榮貴而後可謂之遺逸階此以媒進者非也漢有樊英終於敗節唐有藏用亦至損名本朝邵雍常秩其初亦無大異審觀其後然後秩偽而雍真矣其羮藜飯糗非不欲膏粱也衣荷製芰非不願文繡也將有所待也是作偽也非真隱也夫治天下者進恬退之人固可以風奔競之士然而恬退之偽者進則奔競者愈競矣恬退之偽奔競之真也种放之出人猶議之况又不及放者乎如王昭素如陳摶斯可矣臣願陛下以道淑天下之心毋使人以遺逸為捷仕之徑然後詔內之侍從臺諌外之監司郡守舉有道之士不事科目者而旌用之則競科目逐利祿者亦可以少弭矣陛下之所以策臣者與臣所以奉天對者已略盡其概而陛下於其終復策之曰夫是八者上之所以求於下法意之未盡可商確者固朕所欲聞若學術才智二者則下所以應上之求有關於世道之大子大夫賁然來思必不恥於自言其合而具陳之毋略臣有以見陛下求言之意有加無己以八者責之已而以二者責之臣等也愚臣淺陋何足以仰承聖問抑臣之意則終願陛下以道淑天下而不必求之法也今之法意亦可謂盡矣而陛下猶以為未盡者是無乃詳於法而略於道乎今日之患乃正在於下之求上者切於上之求下上之所以求於下者雖廣其路以招延之亦密其防而檢束之已非求士之意而下之所以求上者投牒覓舉肆欺售偽無所不至又豈如漢人之自鬻哉是尤非古意也若是者既皆不以為恥又豈特恥於自言而已乎風俗益薄矣陛下不以道挽而回之臣不知其後之所趨又當何如也然此選舉事也臣觀陛下發策大廷前乎此時莫非問以當世之大務獨惟己丑壬辰不敢深及時政此則陛下養明於晦之時而當路忌言之日也而今亦若是焉何哉甚非臣之所望也臣欲深而言之則僣欲隱而不言則欺敢因陛下之所及而略言之可乎聖問之中有氣節言議之説臣於今日正不滿於是二者敢以二説為陛下獻焉一曰立中道以用天下之賢二曰奬直言以作天下之氣何謂立中道以用天下之賢湯之執中也曰立賢無方武王之建極也曰無偏無黨是故周而不比和而不同而後可謂之君子君子者未嘗有所謂黨而上之人亦不當以黨視之禹臯叶忠於事舜而言焉不合則有吁咈不茍同也旦奭同心於輔周而事有不可則或不悅不詭隨也唐有白居易不附僧孺亦不附德裕本朝有蘇軾不徇熙豐亦不阿元祐君子之所自立者如此若之何而以黨視之小人之欲空人之國者必惑其君而指君子以為黨空黨錮以危漢空清流以禍唐而指元祐臣寮為姦黨者宣靖之時空國而無君子其禍尤不忍言也獨惟有道之朝雖倡為朋黨之論而不勝方慶厯諸賢之用事也夏竦等輩結內侍藍元震上疏謂仲淹修洙靖前日蔡襄謂之四賢四賢得時遂引襄以為同列以國家爵祿為私惠膠固朋黨以報謝當時歌詠之德仁宗雖不之信未幾諸賢相繼皆去是仁宗之明如此而小人亦得以行其動搖之術也獨惟仁皇天意終定浮雲暫蔽白日即昭循至嘉祐之時皆用慶厯之彥而成功致治竟是當時指為朋黨中之人然則君子之黨何負於人之國哉何代無賢固有居今之時義膽忠肝如慶厯諸賢者而或者以譁競朋比目之陛下本無是心也臣意必有倡為是論者矣夫使真譁競真朋比固可嫉也第恐以好論國事為譁競以志同道合為朋比耳夫以好論國事為譁競則喑默唯阿轅駒伏馬者為是乎以志同道合為朋比則懷姦相結根蟠株據者為是乎此臣之所不能曉也大概今日之弊在於用一宰相則用一般人一相既去則凡在其時者皆指為某相之黨而盡去之非如范仲淹既出而吳育猶奏行其事者也非如張浚既罷而趙鼎猶不變其所用之人者也去年以庶官而論臺諫者有二前日大臣進擬其一乃已得衡山之麾其一則猶縶白駒之谷得非前日之論臺諫者其臺臣已去故可以擢用後之論臺諫者其諫臣猶在故有所妨嫌耶今之諫臣心乎體國則必如彥博之不憾唐介夷簡之不憾仲淹夫亦何嫌於此况西蜀之賢乃其所劾亦已得郡乎而乃同罪異罰一用一舍臣恐非中道也中者非執一之謂也亦非參用之謂也元祐調停為禍不細建中靖國何以為中陛下至德深仁矜念逺謫謂除誤國殄民之外並有放令自便之恩而初議旨撝他皆未及獨惟前日之柄相密黨數人首拜此惠是得無類於調停以平舊怨者乎夫其據言路為宰屬之時陷忠良不知其幾誤國殄民孰有大於此而首蒙湔灌臣甚為執事者羞之臣願陛下與大臣自今進退人才秉執公道不肖者終身可棄忠良者一眚不遺且毋使大夫有西人東人之譏毋使天下有蜀黨洛黨之説則人才之氣節者出矣臣故曰立中道以用天下之賢者此也何謂奬直言以作天下之氣舜聞一善若決江河禹聞昌言下車以拜切直之言明主所欲急聞而入有法家拂士則出無敵國外患也漢有汲黯淮南為之寢謀唐有溫造悍將為之墮膽二鮑可以斂貴戚一勉可以尊朝廷直言之有功於人國者如此上之人安可以輕視之古之危邦未嘗不箝諫者之口以自塗其耳目賀琛之言未為切直梁武帝罪之他日侯景之禍竟無與言張九齡之諫可謂忠鯁唐明皇黜之他日祿山之變曾不知覺泛觀史傳如此甚多不可枚數也獨惟盛時則不若是仁祖朝士氣最盛直言最多攻夏竦之樞密十八疏上而竟行其言攻陳執中之宰相十九疏上而竟可其奏叩銅環之呼事關宫禁也仁祖雖以是黜仲淹竟以是擢仲淹燈籠錦之詆事關廊廟也仁祖雖以是謫唐介亦以是召唐介仁祖之容養直言者如是陛下端平初政天日昭蘇積鬱頓舒久蟄咸奮諫官論事御史斥姦侍從有論思之忠百官有輪對之直以至草茅投匭學校上書華國直言何減慶厯當時天下延頸太平徒以一鑑早亡諸賢失助相踵而去漸已銷聲淳祐初年柄相當國純用私黨布滿朝端示縉紳以意而使之不敢言扼學校之吭而使之不敢議於是直氣日銷矣今雖更化神觀未收噤無能言萎瘁滋甚泛觀士大夫之奏疏無復我先正之緒餘凡而封事之文類如舉子之策平平論事小小立言惟恐傷時姑以塞責臣謂直言之不振原於直氣之久銷陛下責諸臣以先正能言之風當責聖躬以祖宗受言之事陛下聖度天廣靡直不容然而直臣去朝竟未有如范仲淹唐介再蒙顯用者得非陛下雖能容其批鱗之直而終不能無逆耳之厭乎臺諫許以風聞祖宗自有典故陛下邇者宸翰乃責其亷訪之不真如必待其真而後言臣恐自此無言者矣况其一臺臣已去職其一則猶未至國也而併罷之可乎其遜避再三久而後就而臣意其人必有可言而恐不見聽者陛下曾不待其一言而去其為結言者之舌不亦甚乎前日臺臣之罷或如聖訓之言然而外議紛紛則不謂是咸曰臺臣之僕𨽻怒於近幸之貂璫浸潤密行由此遂去臣知此事萬萬無之第惟臺臣未去之先偶有僕𨽻交鬪之事是以外議不能無疑心固不然迹則相似萬一因循不革遂長此風則漢之常侍必橫於司𨽻唐之中尉必橫於南衙矣陛下固不縱其至此然亦不可不防其微杜其漸也蘇軾有言曰姦邪之始以臺諫折之而有餘及其既成以干戈取之而不足又曰彈劾積威之後雖庸人亦可以奮揚風采委靡之餘雖豪傑不能以振起今日之患深似此言臣嘗終日廢餐中夜不寐以為方今事勢蓋有莫大之隱憂火未及然安於薪寢所賴朝廷有見逺識微之士必能為陛下陳長慮却顧之謀而邇日以來言者畏忌天下有患陛下誰與銷之臣願陛下上法仁祖之盛時次用端平之初政廣闢言路旁通下情言不可從置之無害儻或可用豈小補哉則人才之言議者出矣臣故曰奬直言以作天下之氣者此也臣草茅愚生不識忌諱忠愛一念與生俱生陛下可為忠言故敢於聖問之外竭其狂瞽亦可謂出位犯分矣大則殛而投之鼎鑊小則退而屏之山林其甘如飴九死無悔雖然陛下必不然也陛下自即位以來未嘗以直言罪士豈以臣一螻蟻而纍陛下天地之仁哉第惟臣言厯議弊端旁忤貴幸將恐第劉蕡之策者雖嘉其忠而不敢進之陛下之前耳然而臣自幼以來所學者道事君之始安敢不忠且諛悅以取髙科非臣本志茍有一語可禆時政雖黜不恨也臣固萬不及劉蕡而堂堂天朝豈唐比哉臣可以無恐矣惟陛下矜其愚忠而幸聽之臣不勝惓惓臣謹對初考議論本於學識憂愛發於忠誠洋洋萬言得奏對體一上臣經孫覆考以求士以文不若教士以道立説一筆萬言水湧山出盡掃拘拘謭謭之習張程奧旨朝董偉對賈陸忠言皆具此篇矣一上臣良貴詳定規模正大詞氣懇切所答聖問八條皆有議論援據的確義理精到非講明理學該博傳記者未易到此奇才也宜備掄魁之選臣焴臣彬之臣夢鼎雪坡集卷七
