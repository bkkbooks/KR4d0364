body:
  text: 雪坡集卷三十五宋姚勉撰記菊花嵒記上饒别駕新安劉君良叔於所居讀書之堂假石為嵒種菊滿焉既以字其堂又為賦賦菊文辭甚工余君道上饒君為余言之且請嵒記夫菊殿秋而芳者也惟君子能愛菊君子曷愛乎菊以菊後之無花者耳池臺苑囿皆可菊然非其素獨於嵒乎宜濂溪先生曰菊花之隱逸者也方春榮時紅媚紫妖不十日而委塵土菊獨不爾秋髙乃華風凌霜侵愈凛愈徑寧有稿而無隕蓋似乎特立獨行臨大節而不可奪者故惟君子能愛之飲之可以禦大災藥之可以逺明視糧糗之可以制頺齡有功於世不細菊蓋非有體無用者青蘂珍叢幽姿曉露初則武夷山之朱夫子秋容老圃晚節寒香終則晝錦堂之韓魏公也别駕君方駸駸世用而愛菊之志窮達不渝名嵒以菊其是之取乎若余也則嵒棲之素者也方將餐夕英問荒徑求見吾菊而無愧願以君之賦與靈均之離騷靖節之歸去來辭對霜月並歌之而嚼菊以咽景定元年庚申冬十月朔日髙安雪坡野客姚某記竹溪記清之徑者莫如竹清之徹者莫如溪竹與溪之清相宜也清者好焉延平吳君伯大家於劍溪之上種竹於斯讀書於斯而扁其所曰竹溪俾余書之余與君同此好者也故附陳乎竹溪之説直節摩霄修林擁雲如幽人之貞髙不可攀如君子之儼溫與厲具風晨雨夕戛鏦鏗而簸蕭瑟是竹之清也而溪實宜之澄泓奫沄皺風而鏡霜可舟可漁鷗宫鷺國湛凝而吾性淪漣而吾文觸瀨漱磯鏘氷珮而躍雪玉是溪之清也而竹實宜之溪不竹則弗幽竹不溪則弗虛使人於此灑然泠然空塵慮而淡世味非兼是不能也伯大清者也故能兼是好焉想夫夜雨水生翠碧淨娟赭日鬻波陰風觸氷月涵清而珠葉明雪壓杠而玉柯裂燠炎涼寒之互變而一清貫乎四序伯大於是竹之間探囊而吟拊琴而歌伸占畢而樂舉天下聲色榮利不與易也雖然伯大之所得豈止於清而已哉葛陂之竹而龍延平之劍而龍安知延平之劍不即葛陂之竹邪昔豐城之劍化龍于延平二龍於是合焉余舊豐城人也伯大延平人也今為同年生聞其溪上之竹初蛻而龍方將灑是龍之涓滴以雨天下豈止清而已哉抑有本焉伯大之所得則又有大於此者也詩曰瞻彼淇澳緑竹猗猗釋之者曰言淇水以其潤澤而盛斯竹也故君子有取焉有切磋之道學巳精而求其益精有琢磨之自修己密而求其益密秉而為瑟僴之恂栗發而為赫喧之威儀極而為民不能忘之盛德至善則有本者如是伯大之竹於溪不是之取乎故曰有大於此者也是説也得之紫陽紫陽得之延平延平伯大之鄉先哲也得於流風餘韻者宏矣維劍之溪即水之淇維溪之竹即淇之菉豫欲賦竹溪之詩請歌淇澳五桂坊記廣梁夢雷南震既擢第而歸里人豔之易字其所居之坊甘溪者曰五桂用燕山竇氏故事以喜書也南震謂某曰夢雷南海邑人也先是邑未有能貢於鄉者曽大父以舉首實倡之貢者乃相繼然擢第則未之聞焉行藝者不必賔興賔興者不必論爵學者無所於慕今夢雷幸以鄉舉取第里人知勸而揭其芳於閭之楣以擬竇氏夢雷不得當而亦不得辭也夢雷二親俱夀康視竇氏靈椿一株者幸過之而有弟四人皆進于學未倦竇之五桂亦庶幾能及里之人儻真以是為勸為子者思顯其親為兄者思詔其弟鄉之風俗不為無所輔也子為我書其扁矣願就記之可乎余曰可雖然盍遡其始燕山之所以芳五桂也豈無所根而遽華者哉種而茂之舊矣方諫議之種之也周人之窮恤人之孤葬不能喪助不能婚給不能衣食未嘗有倦色於是神授之夢五子出焉五子既貴顯諫議方夀健每見客五子列侍天福善之道昭不誣矣某聞南震先世亦世其德務以好生賑窮為第一事至今未見其止祖之所以啓其孫父之所以遺其子者皆燕山之似矣五桂得不似乎尋其根則知其芳故曰盍遡其始雖然又有聞焉夫花類至夥也不他乎取而獨取於桂豈無義哉桂之為物芳馨而辛烈者也楚靈均擷衆芳以菲其身而於木焉則獨取桂桂非他植類也花不芳於煙柔日媚之春而芳於風髙露潔之秋且又嵗寒不凋與松柏一節盛芬醲郁滂葩四達物有芳者莫能似焉故自唐有科目以來皆榮之以折桂而托之於月桂其萬木之首出者歟桂何以能若是哉亦曰辛烈之所發耳士之有風節桂之辛烈也豫觀竇氏兄弟立朝皆挺然剛正不辱於桂南震以妙年取南宫異等弟四人方且聨英競秀出為世用然則比竇氏之五桂者固又有在也豈止艷科第之榮哉廣之先達在昔為菊坡崔公在今為文溪李公皆辛烈而芳者也南震生於鄉里熏其德而芳矣願與其弟與其里人皆為流芳百世思焉則環南海之邦皆桂也又奚止於五他日欲書之記之請嗣執筆愛竹軒記竹以賢愛賢故愛竹三代後人物可愛者有幾大義自任利鈍不知吾愛諸葛孔明徑氣如龍傲睨姦獪吾愛孔文舉髙風逺韻不折於時吾愛陶淵明下是己矣李唐來苦瘦自甘窮老忠義吾愛杜子美俊逸踔發雄隘九州吾愛李太白虛心體道不落朋黨吾愛白樂天文古氣雄正大自許吾愛韓退之宋以來賢尤盛剛直如寇平仲偉器如范希文任重如韓稚圭豪健如歐陽永叔超邁如蘇子瞻清逺如黃魯直近時徑峭如楊廷秀又皆可愛之尤者嗚呼今皆不可復見矣而是竹也傲雪霜排雲霄簸雷霆扞風日凛然似諸君子氣象愛竹愛其似也嗚呼今人可見不可愛古人可愛不可見見是竹如見諸君子豫何幸日與諸君子遊耶嗚呼見似君子者猶愛若此况得與真君子遊耶靈源天境記莫之為而為者天也境至於天極矣豫性好泉石遇竒輒終日弗去獨恨居郛郭間有觀無竒如退之所記連之宴喜亭子厚所記永之萬石亭天作地藏以遺其人者吾居無是然心固嗜之遐搜之念弗置也維新昌靈源乃先君子世居之鄉意必有佳山水以為適而求弗可得獨愛一溪清駛東去得山而聚為境必佳未至靈源二里許實為先夫人墓近其地有玉虛壇溪流經之林薈鮮茂意所謂境之佳者必都于是詢之族族人景周曰是有佳泉石吾欲釣於斯遊於斯而未能者也往觀焉未渡溪巳有數竒石立于溪外之田如不忍自閟其竒先出此以自見歷溪橋斧榛棘以入怪石林立可喜可驚而不可名狀有如人立者有如獸蹲者有如鳳鶱者有如魚躍者窒者窈者劃者峭者俯而臨水者仰而倚山者躍而立空者竒形詭態天産自然略加人力修治當益偉請為景周次第而名字之徑溪橋而入東立一松關榜之曰靈源天境一石伏草莽如虎豹當關名之曰石門石門之內有石徑傍皆桃李成蹊由蹊而左二石對峙中空可度名之曰仙人洞洞之上峭壁層立如世所繪羅漢所居之巖巖之上有平石可坐名之曰聖僧巖巖之前一徑皆修竹琅玕青碧清寒襲人雖六月可無暑下臨溪水激湍有聲其瀦而淵者坦然如鏡舊常植蓮薰風涼月時雲錦生香可流小舟搖兀醉卧由竹徑而往崖壁峙立中虛如硤有石級可升以降名之曰石峽峽外一石枕水可坐而釣名之曰釣磯一石立水中央相與對峙常時每有鷺立其上為一橋半跨之真可為披蓑釣雪處岸側叢篠橫攲清漣與持竿類殆天然釣所也是為境中最勝釣已欲息其西有巖上生怪木根與石同色巖稍髙曠結草廬倚之有西巖夜宿意思名之曰漁翁岩拔岩而登有平地可十餘丈近溪逺山交獻清勝小山幽桂不種自生宜築臺以玩月而名之曰延月臺臺後有石壁環立松桂桂之外有竹坡坡之前壅溪水為蓮沼其北峭壁三面立形如罘罳就石為枰可坐以奕名之曰石屏屏之前桃之所可為桃源梅之所可為梅谷松之所可為松塢蘭與瑞香雜生其中又可為蘭畹為瑞香徑其下流水縈屈注蓮沼間又可為流觴曲水最後一峭壁橫截溪上捫藤蘿而登之則溪外之平田曠野皆在目矣是蓋截立界限之所雖仙塵如隔此水而升髙望逺興寄不窮又所謂無盡藏景古詩有云行到水窮處坐看雲起時終而復始之理也名之曰看雲豫嘗觀白樂天記太湖石非不侈特然皆逺取而後得之故其聚也必散是境也石不移而自具水不引而自環山不邀而自獻松竹梅桂若蘭與草木等皆不植而自有莫之為而為者非天也乎天固遺之人固閟之是孤此竒觀盍修治而呈露之况事人力不加多乎景周曰吾固有是心力不裕故未暇此非是人生欲求暇俟何日不亟而以漸假嵗月當畢備患不為耳求田問舍之俗不及此檻花亭柳之豪不樂此具天地間清氣者詎容舍此哉豫家去此雖遼然先世廬于是先夫人又墓于是終欲築室于場以居繼自今誓當佐景周以營此人生何必巳物然後適意邵康節安樂行窩凡十二家富鄭公在洛陽亦未嘗治園林謂在人者皆如在己豫雖不敢望二公竊取其意可乎歸求竹竿而釣此溪石吾愛之牛勿礪角重遊騎岡記淳祐乙巳仲冬望後之六日至後之八日豫之髙安東之豐塘相立精廬彌雨不可出越八日甲子始晴天風吹霜清暘行空燠然有春意積鬱既久思豁以舒相與二三友躡屐策笻欲謀觀覽問近地之勝曰有騎岡欣然同遊自下而升身逺益髙至山之椒心目俱快圜視林巒一覽俱下農居僧舍若在畫圖馬鞍龍集諸山皆奔放決驟如走萬騎拱揖左右前視大江際天一碧俯瞰深沼湛然泓澄逺望浮屠窣堵坡軋霄峥挺椽筆飛雲在目可摘以指清興所到身骨欲仙江差逺不可舟沼近乃下而玩沿莎岸步松徑清飈抑揚天籟微聲望沼中一小槎鷺立其上窺魚雪影相照可喜可愛立玩良久循山看竹而歸清興殊未艾也思以翌日再遊之天知此心欲佐以景初夜明星有爛後夜風動雲合恐復雨敗遊興至曉積雪乃欲尺此殆天助以竒觀而博之雅趣也擁爐劃灰是負此景乃復與二三友再遊前所遊之地木靜不風雖寒亦清笑語後先樂愈有味足瑶林目瓊柯身水晶域蓬萊瀛洲雖未必有無果有之料亦不過是矣至山頂景益竒向之林巒松竹皆玉節銀髯向之農居僧舍皆瓊田琳宇白屋髙下炊煙獨青向之諸山皆偃蹇如玉龍回翔如素鳳近之江與沼則氷壺表裏如凝瑶池逺之窣堵坡則崢嶸際空如立銀管槎鷺雖不復見而低叢點綴如鶴如鸛如鷖如鵠亦間有聨拳如鷺者江山草木雖舊而所以為江山草木則新喜極欲狂殆不可奈乃命輥瓊輦玉立為假山一食頃而就森然為峯窈然為巖窪然為洞光彩照身眩奪人目僮僕報午趣歸乃留興不使盡而返噫斯遊甚樂也斯興亦甚清也而豈徒為此遊徒乘此興哉將以博天下之竒觀於胸中而以助此文也人之胸中必有雲巒煙岩之秀而後為文古而竒必有氷崖雪谷之清而後為文光而潔前之晴之遊所以攬雲巒煙岩之秀也後之雪之遊所以萃氷崖雪谷之清也而豈徒為此遊哉而豈徒乘此興哉既有助為文則不可不寓於文以為記乃屬筆以識此景同遊者羅涇文甫羅士元英甫記者雪坡姚某字磻山記磻溪太公望釣所也公未歸西伯時隱乎是既遇陳六韜啓丹書涼武受基植成太平隱具矣古之賢乎未仕也則有隱之地摯之野説之岩亮之廬皆是養者熟天下直措焉隱非為身也叔世志隱者絶物托隱者急仕皆私耳君子弗志也幸君端中所居山曰磻非溪也名則類方年少氣鋭遽求隱或疑其絶物否亦急仕端中曰異乎是其尚友古人歟山有磻之石池有磻之魚藴而發六韜之學也敬而行丹書之訓也達事具隱時矣審官置賢位花序竹是去姦夷惡薅荼芟莠是伊傅吕葛亦人耳易曰尺蠖之屈以求伸也龍蛇之蟄以存身也請援是以記磻之隱盤隱記唐李願居太行之盤谷韓退之序之由是盤與願皆顯然焉耳噫是谷蕪矣金華之繡水有山曰盤松環南山繚一水蓋與太行之盤異代而同名異地而同勝也髙安尹童君仲光墅之目曰盤隱兼退之所釋二義名焉山距居可二里望南山挹九里江朝霏夕霞竒觀萬狀以營以築以林以池亭軒堂廬位置有序托古詩文適意語為之扁徑盤松而入一亭巋然山水不可目而盡名之曰意延臨流一舒嘯望山意延也亭之前有洲數十丈可蔬以麥漁蓑農笠風帆沙鳥皆自獻于指顧之下亭之右又可數十丈屋其間者盤隱菴也盤如僧設浮屠像堂植松柏古翠蔚然名之曰盤茂松柏之姿經霜猶茂也東竹之室曰雨淨西梅之室曰雪香北而望南山之亭曰遙碧亭下紆兩廡蒔竒花以臺後為園通以徑如别出天地玩間雲則有怡雲之亭望翠屏則有宜晚之亭艦清流則有不波之亭古松千章六月無夏坐其陰雖不亭可則獨立一關以松陰好處目之松陰好處皆亭子誠齋句也庵東偏倣李約之為蕭齋居學浮屠者外一軒名靜寄以自遊息靜寄東軒淵明語也環此山之中為亭若堂者以十數皆𨽻于盤隱隱而盤旋于此誠盤谷之樂也樂固同於盤谷矣抑豫讀韓退之序有曰盤之中惟子之宫固必有屋室不知願當時有此林池亭堂否又曰草木叢茂不知願當時有此松柏林木若梅與竹否願之有此與否固不必計然願之不仕而隱視君之能仕而能隱者不逮逺也是未可謂之同也豈惟願哉雖退之所稱亦未必同也孟子曰富貴不能淫貧賤不能移威武不能屈此之謂大丈夫處汙穢觸刑辟固非威武不能屈者而以旗旄弓矢曲眉豐頰等事為大丈夫遇者所為豈所謂富貴不能淫理亂不知黜陟不聞為大丈夫不遇者所為亦豈所謂貧賤不能移哉位廊廟而趣山林何害其為仕身江湖而心魏闕何害其為隱君之志蓋如此韓之序願之言必不同也雖然豈無同者乎豫聞君家食時遇意所至泛九里江遊盤松山陟意延入盤隱坐霜茂室睥睨松柏對竹於雨淨問梅於雪香眺南山於遙碧步野徑歷山園有雲可怡有屏可宜泛不波之舟坐松陰之關憩蕭齋靜寄之室賦詩飲酒圍碁鼓琴與浮屠氏之徒論外形骸齊死生之説其與坐樹濯泉采山釣水樂有異乎否也其同不同者有願之盤有退之欲從之且為之序遂以大顯今君之盤欲從而記之者未必如退之未知後人視今之盤隱何如昔之盤谷也然君工於詩凡盤隱一草一木皆被以篇詠必傳於後無疑此則非願所能有不待退之而顯記之者或可附此以傳則盤隱與盤谷信同也詎可以記非退之為不同哉於是為之記雪坡集卷三十五
