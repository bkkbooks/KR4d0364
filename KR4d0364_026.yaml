body:
  text: 雪坡集卷二十六宋姚勉撰劄子賀程丞相某伏以三秋殷序萬物告成恭惟大丞相樞使國公先生冕佩廟堂陶鈞宇宙帝隆重任民徯太平鈞候動止萬福某齋明盛服東鄉百拜奏記于黃扉之下仰祈鈞照某聞論道經邦燮理隂陽皆胸中妙造所運和傅説之羮以調中外負伊尹之鼎以鎮國家此吾相事也二御茵馮之請不當以此媚大君子某弗敢某兹者伏審眀廷渙號宰路升賢使熙寧早用伯淳決無新法今中國已相司馬潛弭邉釁敷綸一頒舉笏交慶况如某之為門生者歡聲載路歌舞條貫蓋與天下兒童父老共之某癸丑試蘭省時實出於凖繩權衡之下蓋嘗伏謁階墀修座主門生之禮蒙賜謂進拜逖墉仞于今四年引睇六符夙夕稽首某竊觀上自踐阼以來鈞衡之拜已十有二卓然可稱者前此僅屈一二指其餘公論昭若日星當寧思治甚勤求賢如渴自言路而政柄厯試之久知公之大可用也而後新使宅百揆之命仰惟某官忠貫日月忱通神明節操精百煉之金踐履無一瑕之玉表清風其獨立頑夫可亷窒舊姦之復來善類所恃八事入告皆切時宜舉而措之言砥可績大風渢渢震動六合某謹泚筆以和徂徠之詩某踈謬不才誤叨末第寵踰其分旋踵生災祿不逮親仕於何忍誤恩賜召非所敢安且未服外勞驟爾起家必譁物論已具辭牘懇陳下情伏冀鈞慈俯垂臨鑒某伏聞揚庭之告喜至不寐無以自見其欣慶之悃輒修儷語上瀆中涓惟是蜩嘒蛩吟蕪溷韶濩且僭越罪在不宥仰祈矜貸一賜鈞覽而擲之某有幸斯萬某眇若芥塵仰睇鈞閎何啻培塿之望霄漢不敢僭致舍人之問非簡也伏祈鈞察某襪線短材無能為役不足備屐履之任然儻有驅䇿亦罔敢辭謹頓首請目賀蔡參政某伏以金行正序寶穡告成恭惟大參相公先生以道覺民二公𢎞化生民之望天子是毗鈞候動止萬福某謹齋眀盛服東鄉百拜奏記于翹材之館下仰祈鈞照某切惟先生之身道統所關宗社攸寄在躬之福天下同之某敢拳拳仰致莫助之愛某伏自癸丑八月别拜師門今四閲年瞻前仰髙未始少替而無由一摳衣於丈席泰山北斗日與四方學者共之某切觀孔孟以來迄於周程朱張雖道統承承而未嘗一得大位以行其志今先生方以聖賢之學為輔弼之臣此非獨以得賢為吾君賀亦以得時為吾道賀某伏以大參相公先生藴經天緯地之才抱正主庇民之學立心立極繼絶學問太平非先生而誰屬百揆方殷上意有待盡展平生大學之用一洗近時相業之卑四海傾心非某所獨某踈謬無庸叨恩誤召靖惟所本無非極力挈提之賜然某祿不逮親今雖從吉不忍問仕况叨第而後猶未一厯外任起家之遽人謂斯何已具辭牘申省乞仍待鎮東軍小關仰祈矜照某區區無以鳴其賀私僭易不揣荒蕪效世俗體強裁駢儷一塵突于黃鐘大吕之側有道之文視此不直蟬蜩之嘒也倘得一經鈞覽而擲之榮幸倍萬某門人小子揣分有嚴不敢僭申鈞閎大婘福祿來寧之問惟是令似府教判嶽祕閣郎中某忝在榜下日勤尊道仰德之心伏惟處東閣之靖間養南軒之事業某不勝慰快某聞事師之禮左右無方雖未得日撰杖屨侍側伏恐有一切委䇿條目恪謹遵奉與贛守陳千峯某揆時季秋謹律風露澄鮮恭惟某官一世儒英四方侯度冕旒柬注輿蓋翊扶台候動止萬福某謹焚香九跪奏記節下仰祈委照某切謂文星耀臨五靈森嚴何物氛祲敢干次躔矧刺史為邦所以養其入為三公之望隂陽燮理妙屬剸裁而何有乎小體之奉毖茵飭鼎某不敢為御者諛某緬覩西江前是魁天下者絶罕廬陵之董蕭灘之何適羞鄉里不有英傑曷其雪之文脈久焉欎湮達尊先生破荒首出此燈一焰第第相承而如張如雷接英躅而奮矣雖以某之愚不肖亦得以瓦礫于其後夕秀之振至于今衮衮未已皆千峰實倡之也倡者難和斯易矣拭目日月髙垂太清某願鞭䇿駑鈍以從某欽以某官負臯伊掄魁之才得孔孟心傳之學玉階獨對無非忠言嘉謨家有而人誦之也薇省藥階徑登柄路輿論所屬惟是以一舉龍首十年鳳池為淺器卑識者之語寧迂步而徐驅焉雖然蒼生之望則未慰也身到黃扉展致君澤民之素藴霖雨嵗旱躋時太平某歸心稽首某踈謭無似濫嗣逸響薄命如紙才綴仕版即罹失怙之痛菽水弗養榮進奚心雖藉帡幪不即死得終制而問津宦海則未之忍也未嘗通光範以書誤恩得召俯躬自省有不敢當已具懇辭期于得請倘獲所願不勝大幸庶幾可杜柴門溫故業他日痛定事君尚長仰兾熏慈特賜警誨某伏自在京日嘗拜謁牆仞蒙被與進爾後氏名不祥末由一貢尊履何如之問伏審開藩鄉部攝事臬臺則某又以邑子而為㕓氓矣贄恭記室宜在衆先蒍後可誅曲希矜貸某枌榆晚出揣分莫敢僭詗使閎大婘為長者役奔走趨之拱俟條教通陳判府伏以朱明正序清穆薦涼恭惟判府監簿祕閣郎中鎮撫命新經理任重帝柬亷譽民孚仁聲台候動止萬福某謹三薰九頓稽奉書贄名於旌節之下仰惟財幸某竊惟刺史天也謂之天則隂陽造化手挈其柄矣矧福星所至祥靄扈之何外邪之敢寇第瑞人望公如慈父母恨不朝夕至修途方暑敢乞寬涼次舍珍簟冰盤厚加毖調庸副翹徯某比審告成甸服改鎮侯邦上念創殘之民疇能安集公有亷能之政式稱選庸綸綍一頒縉紳交頌爭為瑞得人賀某受㕓之氓其家其鄉自是均拜更生之造喜尤衆殊獨以官守所縻未繇躬拜廡下心口相語以自慶無日不然某欽以某官秋霜氷鏡之皎寒露玉壺之清世味不足以攖其心人爵不足以易其操為國集事所至可書有如桐川素號凋敝未及半載即巳蘇醒而精神之名在御屏故以惠浙之右者移惠於江之右天子之所以念瑞民者至矣瑞民之所以望公者切矣心痛者不及緩聲某敢為瑞陽之遺黎故老請拯溺者不暇徐行公其念若旱望霓之民乎某敢不稽首某祿不逮親灰心仕進丙辰誤召耻與姦朋中道驛疏籲天歸家席藁聖恩寬大赦釋不誅去年姦憸竟成啓戎公朝念其曾有辨姦之論再以校讎賜召弗敢躐分乞從舊官所請復俞只得強出去家才二十日鄉國為墟城裏破屋數間雖幸不為敵所焚而從父兄弟避難走鄉者盡為鄉之豪寇所刃家殘室毁抱此辛酸宦况何有待罪于兹茹痛包羞伏丐矜燭某揆之彞禮以民而事邦君合有駢儷之贄惟是某家痛方新心緒凋落更不能屬思於文用弗獲以瓦缶鳴于鐘吕之側尺書拙訥仰滓典籖攖觸崇嚴不寒而栗某揣分有間弗敢僭致隨軒大婘興居之問抑某於瑞則民也敢辭為役帥里人而恭教令惟宜願奉先甲通陳判府昌世劄某伏以薰時入夏爽潤如秋恭惟判府刪修判部侍郎植德公清秉心愷悌開藩有俶穹垕棐扶台候動止萬福某謹東鄉九頓首奏記旌麾之下伏幾財幸某竊惟朱幡照臨境之山君川妃駿奔翼衛孰非獻祥奉祉者奚事文茵玉鼎之劼毖詩曰樂只君子殿天子之邦樂只君子萬福攸同某三賦此章以頌某仰惟聖皇矜恤逺民謹擇良牧顧瞻周行孰為廉平謂公前在江東治有異等之效爰自省闥往綏髙安髙安先正舊治也民舉手胥慶曰先正吾父母也今象賢又為吾父母矣是慶也某實同之某嘗謂髙安蕞爾之郡然地小而實允為賦淵第近年來公之裕而私之枵收者薄而斂者厚重糴良苦民食孔艱老弱溝而壯者四方矣為邦者往往外掠賙厄之虛名內為肥槖之實計欲政平訟理而無歎息愁恨之聲者其惟良二千石乎欽惟某官廉足以律百掾之貪清足以滌羣吏之濁安而不擾肅而不嚴荷山錦水之民慕玉山氷水之化久矣自今以始庶其有瘳獨恐增秩璽書與選表入為三公之命俱至又當溥而天下用耳某不佞某自丙辰之冬迹撫封之舊獲拜履舄伏辱隆遇越於彞常假郡章以達其驛奏之囊封給官舸以濟其道還之孥纍而又重之以宴以示慈惠厚之以餽以贐逺行禮意勤渠眇眇晚末其何以登此拜别以來倐四其載杜門藏拙翻味故書天惠仁侯來為邦君乃前是嘗得挹其餘光者某何幸得以民事某林棲淵潛人事罕接不能操便駛恭贄函兹傳千騎壓境念不可不下道左之拜乃始拔蓬蒿之塞徑荷蓑笠而出山引睇車塵一遂瞻仰僭儷拙語少鳴賀私布鼓雷門流汗竟趾某㕓氓也仰止隨軒月璧星珠之眷巍在崇霄豈蟄泥壤者之所敢躐問庶人召之役則往役義也願奉先甲與上髙項宰某伏以孟秋在序涼意方新恭惟某官學道愛人宣德流化穹壤孚佑聖明簡知台候動止萬福某潔忱子墨徹贄主書仰祈財幸某竊惟郎星出宰祥靄扈臨安有客氛敢干沖粹飭茵毖鼎非佞則枝某弗敢某欽企顒昂圭璋之聞望浩有嵗月師槖無階説斯盈口天惠望蔡仁侯蒞止某以鄰壤獲溉餘波幸也而前是冠衽不嘉末由雅拜在邇如逺若嚮仰何某恭以某官地望穹隆風猷峻邁羽儀朝路疇不謂宜絃歌邑封僉以為屈置水拔薤政聲凛然卓魯之異績升聞公車之召至矣某庸謭無技濫叨誤恩惟是薄命劣人才忝末科遽抱陟岵之痛祿不及養仕奚以為雖當吉期未忍大鈞之問一字不到光範剡溪小闕忽出望外雖君命不敢不受實未能一去也方此杜門溫習舊業豈無可教拱聽砭針某久欲拜一空函以旌尊嚮之悃因循未果兹輒以拙字唐突崇聽非禮也伏丐矜其臯緩之罪某揆分有嚴不容紫蓬翠閬興處之問伏恐有驅䇿事目往役義也敢請定親劄姚娶鄒某揆時冬鳴季管春在魁梅恭惟某人德重望隆天迪人相台候動止萬福某謹蠲子墨申玷司箋伏惟財幸某竊惟祁寒在候葆養頥和視夷時宜加倍溫饔煥衽敢告中涓某漁釣錦江通使竟不能兩舍第景星在天欲覩未快髙山仰止夙夜此心某欽惟某人齊卿之道德梁大夫之文章本朝諫議之氣節自當凌厲清浮繼嘉定掄魁之事業尚欽鋒鍔亘光斗牛龍化延平匪朝伊夕某引領以俟某家無金籯一經教子次推某也學未能有成名未能有立蚖肆其泥獺笑其沙而執事獨加賞識謂其可妻揭丈汝功省元引希文媒彥國故事下執柯斧初聞甚駭厚意薦臨敢不承命率然儷語侑以菲儀聊以致問名之禮惟是道義相與固不敢為猥陋之風然執事知遇既深自當不以常壻相待一言之重可訂千金某不敢瀆請某仰瞻仙輯髙在五雲祗詗則僭然自今竊映莩末之輝安敢不修問候之恭中外崇卑惟喜康共某斗筲之器無能為役或恐弊邦有可委䇿事件惟命是恭雪坡集卷二十六
