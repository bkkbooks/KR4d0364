body:
  text: 雪坡集巻十七宋姚勉撰詩五言古風送廬陵郭僉判致仕歸并序某聞士君子之進退風俗厚薄之所闗也雖然巧進易勇退難進而得富貴以榮一時易退而立名節以垂後世難一時之榮輕於後世之不朽也而世俗之人醉名利之醪甘爵禄之豢味鮮衣華求得所欲亦孰肯捨其適心快意之地而從事於寂寞之濵哉君子則不然雖能無心於求名不能無心於立節進而得富貴以不義吾寧保吾名節退而得貧且賤也君子豈求異於人哉輕所當輕重所當重不肯以此易彼耳是故難進而易退焉君子之易常人之難也漢西都時風俗偷惰疏廣受始立髙節以障頹波然而世知賢其人終未知蹈其節自晉而下有張季鷹陶淵明一以蓴鱸去一以松菊歸在李唐時則有裴晉公白太傅皆以强徤乞身去之數君子其爵位雖殊名節一也本朝風俗㝡淳節槩相尚在上位如韓富歐陽司馬諸公皆功成名遂而身退在下位如吾鄉三劉亦以忤權貴引去難進而易退大抵然也南渡以来此舉漸罕如廬陵周平園楊誠齋則皆於爵通位顯之時而上掛冠乞骸之請同辭宦路返鄉閭之詩至今播諸人口近年以來奔競風熾昔人以為易者今愈轉而難矣嗚呼安得如前數君子者之為以挽回今之倒瀾乎廬陵郭先生以碩學掇髙科歴官髙安判佐贊理毗政盛有能稱膴仕崇資衢且亨矣而力乞掛冠于朝弗得請又再上朝廷知所志不可回乃聽去嗚呼世方以求進為心而先生乃獨求退為所難而不為所易賢矣哉位不究施未得如二蘇韓富歐陽司馬周楊之位俸薄職卑僅與季鷹淵明吾鄉三劉比然君子論人當以名節不當以位同不同論也况先生所為乃今之所難乎某辱先生知㝡深挹慕髙風以敬以嘆自惟富貴利達夫人可能全節專名不可多得常以今風俗為恥而以古風俗為慕但今未得位未能無志於天下國家他日此志獲伸或得少立事業于斯世敢不重其所難輕其所易效吾鄉三劉之為以學先生之學周楊二公者不知先生許之否乎先生之歸恨以身處異鄉且屬疾不得與東門祖帳之列切效退之送楊少尹以序而詩以寄情焉惟先生亮之世俗風波甚誰能退急流淵明存菊日張翰憶鱸秋髙躅今云逺清風孰與侔明公回末習逸韻踵前修元振才髙古林宗學鮮儔未為川上楫姑運幄中籌太守先公孝同僚上伯遊徳偕才並茂文與政俱優士有春風慕民無北雪愁寛平人自服欺紿吏應羞逸足方當展閒身欲早抽聲名從日起富貴等雲浮帝許掛冠請人多卧轍留山中無怨鶴海上有盟鷗西澗先生渙平園老叟周髙風追故國雅節映吾州巧禄慚奔競懐安鄙懦偷號應重拜散亭欲遂名休親戚娛清話溪山豁逺眸詩情入囊錦世事付紋楸陸子新茶具嚴灘舊釣裘問松猶在逕種秫喜盈疇眼覺功名夢心輕利䘵漚竇山森桂茂謝砌長蘭幽清白傳家法詩書遺子謀摩空已鵰鶚得路即驊騮事業今猶嗇功勲後必收三槐終得相駟馬㑹封侯滿砌皆朱紱㸔公尚黒頭定知豐有報此去浩無憂草色風翻翠楊花雪滚毬同歸春作伴欲借路無由某也真踈陋公焉辱庇庥龍門曽足履鱣席屢衣摳奬借情俱厚掀騰志願酬東門聞祖帳南浦想離謳心曲懷依戀江鄉恨逗遛諸生數千兩悵望送僊舟此某少送廬陵郭僉判先生致仕歸時詩也蕭灘彭君不知從何醬缶間得之而傳之副墨之子詩僅誤一二字序則遺誤多矣是雖少作然某自幼謹為文不若是其疎謬也因取未焚去藁是正之嗚呼送郭先生致仕時去今能㡬年流傳之誤已如此况古人文章去今千百年者耶為之三嘆彭君曰誤不必論重所難輕所易之語願毋忘之某曰此素志也詩文歴年多容有誤此志則愈乆愈厲矣决不敢誤也子誠於他日驗之寳祐新元冬十月望姚某書送鄧若思赴南劒鄉舉龍泉與太阿紫氣牛斗衝神物離必合龍津復相從悠悠千餘年神秀人物鍾髙密雲礽孫星宿羅心胷居常佩此劒溝瀆難鯨容朅來磨劒池清水為淬鋒秋風催斫桂逈脫塵泥蹤勉哉各努力更作延平龍次友人王半山韻詩家王半山妙語占清絶曲髙和斯寡郢曲愧春雪句中寓深意端為我軰設以規不以頌如玉得磋切予生戰塲屋一勝久未决勇餘尚欲賈磨硯欲穿鐡第慚不善斵顔汗指亦血乞靈濟楚師此敵儻可滅如君洗塵累盆盎易甄别鷹揚㑹有日奮翅脫籠紲贈霆伯姪靈源聚英氣融作雲霞精霆伯挹其秀胷府懷光晶誦書過萬巻落筆超羣英文章有餘力賦詩吟性情短章或大篇㸃翰長風生或吐健麗句氣象髙崢嶸雲濤洶萬里出沒蛟龍驚或冩閒逸句句法如天成微泉溜石壁清吹調松聲或句和且婉純如奏英莖晴風舞雪絮曉日歌春鶯或句端且嚴凛凛不可輕星辰列雲漢營壘森甲兵變化千萬狀發越無定名清標鎮浮態沈謝隳文成勁氣擬古作甫白焚詩泓不負飄逸姿孰爭前軰衡學海不汗漫安見酌復盈文章用無盡葢以天才宏宏才戲翰墨筆勢宜如傾譬之一輪月皎皎當天明晴輝照春夜花栁皆敷榮髙秋爽氣盛桂影翻凄清又如百川水淊淊地中行江湖風雨霽碧色連天平奔流出三峡谹吼雷霆爭詩歌具衆體古人所難并子詩得神助逸思隨縱横失手墮之地聲作金石鏗俊才有如此九萬飛鵬程卑哉溝瀆中安可容鱣鯨子以見吾家人才世登瀛勉哉復祖業謹勿寒宗盟某也習箕裘生涯風露檠家徒四壁立獨以道為畊文章厭卑薾壯志思軒轟紛紛笑餘子藐視如孩嬰詩書自娛悦終日闗柴荆欣然得子至倒屣來相迎佳篇出見遺未讀顔先赬遷喬不擇木求通乃於盲視我如土鷃視子如鷦鵬英風當逺避况敢事酬賡新篘日初熟我姑酌彼觥晩風入簾幕窻外斜陽晴紅爐坐相對簷馬聲鏦錚試將今古詩與子細共評幽懷味此樂鼓瑟仍吹笙胡為不留處駕言欲西征清飲不可再使我摇心旌努力各自愛共濯江湖纓訪郭徳甫美人在駒谷乆别良懷哉秋風天氣清特為斯人來踏月訪清夜巖扉肯予開弟兄儼相對松竹間古梅子姪環侍側蘭植依瓊瑰青燈照圖史新酒羅瓶罍一家三代風和氣熈春臺富學飽停蓄厚徳深栽培情周思孔子志伊學顔回皇路方嶮巇天馬須龍媒旱嵗渇霖雨神鱗起淵雷君家多生賢吾國正選才詔書明年近競踏黄花槐造榜正此天桂籍浮香催鵰鶚相聮飛燕雀更願陪訪胡景顔適齋詩僊人吟境天寛廣聞詩未識面魚鴈空來徃道周歘相遇慰此積嵗仰煙林指深處邀我税塵鞅入門境自勝萬竹颯蕭爽燈前酌夜雨談笑劇拊掌錦囊出新什句字兩俱響明當早脂車未别先惆悵嗟予走紅塵方此墮世網羨君飽林壑四序足幽賞努力喜自珍清名照天壤贈宗人簡齋博文約以禮夫子誨子淵詳説將反約斯語在七篇由繁乃入簡此學本聖賢卓哉紫陽公道統得正傳剖析到精微而後㑹大全譏以為支離此説恐未然閑邪至敬義簡易斯坤乾後學懶用功疎畧取自便藉口鵝湖詩一蹴登青天浪云即心是所學竟類禪不知格物學葢在誠意先如斯謂之簡母乃墮一偏此風近頗張門户欲自專君既學雙峯趨向尚慎旃路頭且要正莫踏船兩舷題陳致中環溪出門何所有四面圍青山是溪從山來亦復兹回環髙人潁川君結茅此中間溪光挹㶑灔溪響聽潺湲四面勿着橋徃來聽渠艱是名僊凡界亦曰清濁闗可人送過溪否則溪上還同張公望湖上避暑到四聖觀招柏堂月潭二道士出飲清晨有客來畏暑思避地凉多獨湖上一棹拍空翠長堤舞楊栁餘雨在荷芰炎蒸俱已失滿抱足清意頗思孤山頂有客具髙致扣門聞琴聲便覺洗塵累湖邉出問酒飲興隨所至池鮮煮珍甘水果剥香脆好風林外來吹面凉不醉清談詣物表絶不挂世事畫舫何人斯簫鼓正喧沸清遊彼應笑世味吾不嗜尚思攜枕簟同叩竹間寺從今日日來莫厭驚晝睡題章秀才畫山水魚龍章生畫中師神秀蟠心胷兒時學山水近復能魚龍拂素欲畫時黙吮南山松斯湏景與物以次生筆鋒畫出巧安排咫尺千萬重隂晴弄明晦近逺分淡濃雪月清瘦嶼煙雨朦朧峯有時作江湖萬派俱朝宗雲濤洶澎湃雪屋驚奔衝風平坦如掌皺縠浮溶溶因水魚更巧回翻態從容翻荷猛跳珠聚藻相噞喁中有化龍鯉静伺機便逢天門露頭角滃滃祥雲從㸔君此四畫衆史特奴傭當知各有意不特誇纎穠丈夫抱膝時清樂山水供觀魚或濠上笑倚臨流笻一朝蛻鱗鬛屣脫塵泥蹤甘霖澤四海霓望慰九農日食罪言皇帝十四載新元紀嘉熈仲冬戊寅朔午漏方中時朔風震丘壑猛籟號枯枝黯如商雪天四野昏垂垂晝炊煙始息暝色來庭帷雞登􅍻傑立鳥急林梢棲頗訝南至後晷度宜舒遲胡為景尚促疾甚駒隙馳兒童忽走報日壁無全規倉忙出仰視如月初蛾眉金烏失燄彩玉象潜光輝蒼天玳瑁色列宿争依稀老稚相喧呼伐社沸鼓鼙不知何物恠掩此清陽暉吾聞隂陽家日月以厯推日遲月行速贏縮數不齊遇朔必㑹合差忒無毫釐氣盛或相掩二曜斯一虧望日日掩月陽感隂故衰朔日月掩日隂盛陽乃㣲又聞玉川子月蝕曽有詩謂此日月者天眼生東西兩眼不相攻相食其説非食月乃蟆精伊慼葢自貽吾觀作詩人志各有所之玉川特寓諫假此為之辭日月有蟾烏此事本怪竒况自食其光安能走而飛書稱辰弗集天象昬且迷則知交相食此說當勿疑思既得其説傷心重嗟咨日為衆陽宗萬象皆影隨今者何不臧隂精奪炎曦仰空不能救涕泗紛交頥嗟嗟今之嵗天屢彰其威星文沓示變雷震洊失宜越在夏五月鬱攸煽京畿六月既望後月蝕主旱饑今兹復日食災異何繁滋天意不虛示坐井聊管窺即天以論人日君而月妃闗睢哀窈窕意在賢才思靡曼或盈前必為物欲移今者日之蝕或恐由宫闈然而吾君聖未必耽燕私君象日而尊臣象月而卑正心在朝廷昭徳可塞違國柄或竊弄耳目相蔽欺今者日之食亦恐由羣兒然而吾君明朝豈庸盲癡人主向明治武力不可隳方今北有敵負􅀢驚邉陲戰士怯不勇塞馬紛驕嘶今者日之食或由邉事危然而吾君武安肯假彼資重念此三者急務誠在兹萬一或有是是即變所基應天不以文減撤徒兒嬉如人䘮厥明必求良藥醫一片葵藿心秪恐天未知何當排閶闔碎首彤玉墀一篇痛哭䇿歴寫心傷悲一者何所陳無逸為元龜暗室屋漏中肅如對神祇願為楚莊王規諫從樊姬母效漢成帝温柔老昭儀天君必清徹智燭光發揮如日麗中天煌煌明作離二者何所陳用賢登臯䕫選衆立一相國論公主持烏臺執白簡妙選剛正姿戚里勿柄授貂璫母印纍朝廷豁氛翳在位銷脂韋末光依漢日天子是倚毗三者何所陳張皇吾六師擊楫如逖軰天寵畀節麾賣國若檜等電掃無孑遺練軍明賞罰勇銳奔熊羆南越頸可纓中行背必笞如日照霜雪殄滅何難為凡此三說者中心久思維明白可舉行匪曰徒費詞能轉亂為治可回災為釐不學后羿射不效夸父追捧輪上扶桑洗光出咸池蒼生照共仰九土光咸晞五色太平象重暈中興期昊穹耀華彩萬國長瞻依遊靈源天境遇雨各奔歸晚坐以不是溪居者那知風雨來分韻得那字奉呈一笑靈源水有天日渉勝趣多同行十數子散䇿經山坡溪行小盤礴石坐閒摩挲野菊留餘花新梅㸔微柯寒鴉落平田暖鯉跳枯荷是日冬曦温景象如春和笑談不知歸亦有載酒過忽瞻彼北山黒雲生嵳峩隂晴反覆手天測不可俄長風舞紅葉急雨翻銀河儒冠各欹墊僮屨皆奔波路滑争牛羊泥濺亂鴨鵝席地聽沾濕樽沙委駢羅五十笑百歩曵杖如横戈林間偶自芘棄甲我則那留戀歸不早顛沛逢滂沱出遊不知時廢此嘯且歌綢繆無逺慮其如近憂何兹遊已狼籍後計毋蹉跎歸歟亟誅茅結亭依巖阿震陵有帡幪樂哉澗槃薖麻子湖遇逆風嘉平既望餘玉氷發歸槳舟行苦灘澁三日葛陂上天寒嵗云晏道逺空悵惘行行且旬日僅此舟泱漭順流風忽逆進尺退或丈魚黿反出沒濤浪相潏蕩茫茫水接天四望極空敞雖令歸思滯亦覺胷次廣是時羣魚集軋軋亂輕榜紛來以千百並進或三兩懸金上絲綸跳玉中層網中間數十輩蓑笠牽畫舫沿流勤按視似是此湖長彼行良甚㨗此進不可强倘無觀魚樂孰慰岑寂想篙師不告瘁竒觀亦可賞黄昬成野泊風雨助悽愴勢如潮汐來怒若鼙鼓響吾獨安所適幸不愧俯仰緬懷金蘭友氣義特慨慷念我歸苦遲舍我願先徃亟趨南浦城擇館待稅鞅今宵此風雨露宿必草莽繼兹更三日㑹面一拊掌屠酥酒同傾共挹西山爽白鶴白鶴有竒質從古巢神僊饑餐必瑶草渇飲惟瓊泉朝飛閬苑霞莫宿炎州煙一從落塵埃六翮翦不全身居樊籠中心徃雲霄邉長鳴欲誰訴顧影私自憐清都夢如昨欲去曽無縁安得支道林使之遂飄然蓮竹鶴蓮為君子花竹有君子操深衣古君子清以仙自號徘徊蓮竹間似覺皆所好水邉立良久林外復髙蹈翩然側翅舞意喜佳客到客家江南村幽處着吟帽有蓮環釣石有竹近茶竈胎仙夜生子併入平安報朅来踏京塵乆矣不聞耗今晨三君子一見慰懷抱主人勿卻客借此日笑傲醉芙蓉庭前木芙蓉姿色夐殊異初開花微碧僊子淡雲袂逡巡改瑩白玉骨浄無滓爛漫欲謝時潮臉暈紅媚詩人第花品獨號此為醉花雖無情物司者定有意晨醒粲初發晚醉颯欲墜乃知沉湎者顛沛在造次可以為酒箴㸔花當欹器贈相道士梁彌僊羅浮人羅浮古洞天花木麗春曉僊人住其間鸞鵠飛矯矯尚有蒼生心一念百憂繞日與諸賢逰僊人如此少徐梅埜潘紫岩不可作空有贈子詩一蔡乆軒二李文溪解峯存請子善視之願言福壽兼長在白玉墀壽域躋吾民安用神僊為題廉泉凜凜清獻公盛徳世所儀當年章貢治去止琴鶴隨於水取㢘泉於人識濓溪廉泉水之清濂溪道之師斯濂願力學彼廉猶可為題騰芳書院若稽隆古時教者家有塾英材歸樂得粹學就私淑淳風日云逺美意乆不續朱君魁傑士卓見拔流俗燕山靄椿桂謝砌峙蘭玉所居必精舍髙繼紫陽躅朅來十畆地建此一書屋前山畫屏列暖翠潑晴麓騰芳掲佳扁意匠雅營築依墻御史栢繞舍君子竹雪香冠春葩月馥播秋肅回廊啟齋扉雲䕃納喬木亭橋跨天沼檻影浸寒綠中堂富圖史縹帙照籖軸仰瞻聖賢像冠履森在目虛櫺設棐几日静嘗好讀南窻􅆟明快天籟響琴筑延師啟堂壇規矩倣白鹿義方已家庭仁意更閭族朋來秀子弟户屨輻輳轂擊撞金石樂真趣寄沂浴似聞入腴壤將使任教育如斯邁種徳豐報在名禄願言衆龍駒相與䇿驥服體兹騰芳意誓必播芬馥濯纓攬荃蕙結佩擷蘭菊藝文摘香艷義理浸醲郁學苗勉哉植仁種貴乎熟大學先致知中庸必謹獨胷襟富道徳詞藻自充足當知宏施設得自大涵蓄雲龍起蟠泥霧豹出隠谷芳名㑹軒騰霖雨天下福雪坡集巻十七
