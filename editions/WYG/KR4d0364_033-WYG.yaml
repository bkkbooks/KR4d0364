body:
  text: 雪坡集巻三十三宋姚勉撰記重修報恩光孝觀記觀唐開元宫也聖宋章聖朝改景徳道君改崇寧萬夀繼又改崇寧曰天寧光堯六龍南飛永言孝思追念罔極詔天下立報恩光孝觀以奉佑陵神御在京以天寧萬夀為之紹興十有六年春正月也觀舊基最廣厥後侵為民居為御厨兵營由是遂狹至今營有碑誌可考不誣中興百年觀之棟宇日就傾毁上凌旁震靡奠厥居羽褐黄冠無所於息上念前朝奉先追孝之地弗可聴圮迺淳祐十年秋八月以龍翔宫履和齋髙士九江曹大通禱禬屢應命主觀事師至慨然以修復為已任請於大尹節齋趙公與􅊸公聴從之鳩工度材不一年傾者扶毁者葺堂廬殿廡丹耀碧粲食息用具靡細弗舉又念四方雲鶴之士至京者惟天慶報恩二觀可憇慮無以續食復請於大尹得楮五萬五千有竒買仁和徳清閒田五十餘畆嵗收粟五十餘石復觀西屋一所日可僦十千以佐蔬槱由是供給不乏集徒如雲規制日宏矣方觀未修復時人以難告師處難以易赤手奮立地闢而廣屋増而閎田益而裕寡以衆虛以盈可不謂能哉神而明之存乎其人然後知天下無不可為之事得人興失人廢也使有天下國家責者皆能為天下國家興仆植僵計欲不治得乎抑是觀則修矣觀之所以創名之所以命前朝初意孝思可知也香火磬鐘祝雨暘時祈年嵗豐報恩之一耳神州北望未復版圖不雪恥以酧百王不除兇以報千古匪報也孝者善繼人之志善述人之事吾君卧薪嘗膽吾相鞠躬盡瘁吾士大夫枕戈擊楫率寧人有指疆土畢力以修復之則光堯之志成恩斯報孝斯光矣不然扶傾葺毁徒修復是觀若豈光堯所望於後之臣子哉有天下國家者其相與懋之明州奉化縣梓潼帝君殿記髙安邑大夫趙侯某以廣徳史君劉侯某之書來言曰四明文物邦也奉化又邑之良也士於斯為盛冠南省擢甲科者若而人升三舍奏兩優者又若而人父芳子傳兄芬弟紹由進士科出秉天子大政者履迹相接握符持節而下遽數之不能終也其已然者如此後來之秀舒華發英續續愈大功名之志相與摩厲以為握造化之柄提名位之權有如蜀梓潼神君昭靈響于天下不可以不舉之祀乃即邑虛白觀之西廡立像設崇殿宇而祠之祠始於某年某日成於某年某月為費若干皆出於邑之士願因是謁記予曰神夫子不語者也安敢記抑梓潼之為神也視百祀異願有以復之古之時選舉必於人後之世選舉寄於天必於人有徳行道藝斯興矣科目之設士敝敝然日趨於文置徳行之藝為何等事糊名考校懵不知賢否誰孰文眩有司目則得焉論行然而潜搜冥索而得之者往往皆文行相稱士士浮薄儇淺者鮮克有成成亦莫克逺到若是者人無所寘力矣意必有主張是者不曰寄之天乎主宰之謂帝妙用之謂神歐陽公所謂朱衣吏首肯者未必無是事也矧梓潼神君廟食西蜀啟封王社載在祀典昭不可冺者哉祠之者宜徧天下也豈獨奉化雖然謂無神而慢焉不可也恃有神而怠焉亦不可也神聰明正直而一者也依人而行所謂依人者豈神不能自立依於人而後行乎依人之所行為而禍福之耳作善降之百祥作不善降之百殃夫非屑屑然人人而計之某善某祥某不善某殃也皆理之自然耳善則順於理以備百福不善則乖於理以致衆異故曰禍福無不自己求之者然則後世選舉雖寄於天盡人事以待天理之自見可也梓潼神君之所予者忠也孝也為人子而孝為人臣而忠非士君子職分之所當盡乎昔仁宗皇帝嘗露香禱天求所謂忠孝狀元者聖君之所求神君之所予也覬神君之予者豈有以副聖君之求乎昔擢甲科今其有出而魁天下昔位政府今其有出而宰天下此奉化之士所望於神君也魁天下者三嵗而一人非難能也宰天下者古今凡幾人非罕見也難能者罕見者其名天下後世者乎固有非止於名位而已者此神君所望於奉化之士也奉化之祀神君者尚往欽哉顧以此為記趙侯曰可武寧田氏魁星堂記武寧田徳彛倫距所居里餘有山曰石獅溪曰金雞水折而匯焉其境特秀嵗嘉熙庚子里人有夢魁星臨于兹山之巅者是年從孫允中首薦于洪癸卯弟偉繼薦戊申子可與又以童科擢由是益神所夢即山建祠祀魁星為溪前立精舍號龍峯書室萃秀子弟講習魁兆日彰矣顧未有記癸丑田君與同年余君巽龍㑹予于京請記之夫魁北斗上四星也斗在天酌四時運陰陽衆星辰皆宗焉斗星之首也魁又斗之首也魁枕參首其所枕者亦首者故首者必曰魁焉首科第曰掄魁首相曰魁弼非以其卓然冠於多士之表而絶於百僚之上歟士有所期未嘗不斯二者也雖然必有以副是名焉材識俊者曰魁傑曰魁壘器度閎者曰魁偉曰魁岸皆以其卓然者也夫惟徳以充其才學以進其識髙明光大以開豁其器度所以自立皆非尋常品彚所能及選而髙科仕而極品餘事也在我者茍未有以出乎人而徒曰欲冠多士之表欲絶百僚之上縱得之靡足稱也士所自期豈止斯二者哉世之人固有魁一邑一郡之月書者則沾沾自喜若人所不能及又進而魁鄉舉則益喜又進而魁南宫則大喜又進而魁廷唱則益大喜自視其身甚髙真若人所不能及方擢科目時已如此貴窮卿相位極人臣自處不愈髙乎自處雖髙亦可謂甚卑也人惟能視科目為不足矜然後能視富貴為不足艷僕嘗記東山楊先生有曰冠帝王之科目易冠素王之科目難冠其易者夫豈無人僅可稱者一人曰董仲舒冠其難者千載一人曰顔淵然則冠䇿士之科者必也董仲舒冠徳行之科者必也顔淵乎止於董仲舒又不若進而顔淵也正其誼不謀其利明其道不計其功董子也克己復禮以為仁四代禮樂以為邦顔子也士茍至於顔子則窮可以樂陋巷簞瓢達可以輔明王聖主雖冠百世之士可也豈止冠天下士哉田君其與子若弟懋之祠之前有二橋左曰登雲第一右曰應星龍峯之茶所曰湧月閣曰緑遶惟講堂未名因而命之曰志學周子志伊學顔説也祠與書堂並立故牽連得書祠成於己酉之十月凡五年而後記記為誰瑞姚某也八月十五日謹記并書再建曹侯生祠記使君曹公以袁之倅攝瑞時民愛之嘗生祠公于道宫之廡矣公去見思帝復命來既真畀以郡民益愛復别為堂廬以祠祠非公意也民不可禦耳天下之為守令生祠者有畏有愛畏而祠不足貴惟愛然後見民情之真公不許民為之祠而民不可禦其愛公也真矣此愛奚自哉嘗聞諸荷山稚耋之歌矣公之始攝也歌之曰使君其來民病以蘇我疇有租我市有酤寇奔而逋吏黔而癯帝念我民畀公竹符祠始建以是也公之再攝而真為郡也又歌曰使君疇來我舊曹公安爾教條無違有從平糶築倉教士益宫公其乆留福我十同祠之再建其又以是乎始而祠猶於道宫之廡今而祠乃以堂以廬于康莊之衢所以愛公者益深且使夫人觸於目而見之以繫此思於無窮也從政者見之必思公之勤而玩燕之弊革訟嚚者見之必思公之明而乖爭之習息士卒者見之必思公之嚴而驕横之俗易胥吏者見之必思公之清而貪墨之念釋繫此思於無窮又所以福我民於無窮乎此生祠之本意也公撫之宜黄人名錫字晉伯號敬思葢西山真先生之門人也為政一以道故能得民愛比改治衡南岳重矣瑞之民謂衡之民曰爾奪我公去其毋以矜我我公且進而為天下用謂予不信近有自京師來者聞天子已知公矣淳祐甲辰六月既望蜀江姚某記髙安洪侯生祠記宋徳肖天本支百世不顯多士亦惟世賢維端平初年天開日明忠正彚集平齋洪公首擢言路正色極論為國藎臣以徳諫君天畀有後子令孫懿茂其家傳迺髙安令尹洪侯起畏則公之嫡長孫也夙有穎姿公特鍾愛見者咸曰是他日有祖風烈者既長出仕英稱著聞暨來髙安煜有異政先是邑吏鷹健虎暴猱猾狼貪靡所忌憚侯至一御以嚴吏喘不敢息由是訟已聴獄已决民始得以情自達於令洞開重門塞其旁蹊投牒無所壅教訟無所匿曲直立剖民舉手加額雖受笞罰者亦莫不悦然以去謂侯為神明相戒勿欺政聲大傳愬者不之郡而之邑他邑民亦越境至每聴訟庭下至無所容侯亦人諭以理道星而出星而未入靡倦也迨侯去訟日以希矣鄉胥素弄民役侯閉之一所不使與外接按籍窮併挾詭一洗飛田走户之弊等税命役民罔有辭吏不得縱手且役户無費皆争先願為之有易俗一鄉民最貧不任役侯市田為助役莊給之粟民始不病愚俗負逋輒茹毒草戕嬰兒以死誣所怨官誅吏求多至破家侯遇此輒不理杖而令其所訟者杖而所訟者葢未之知也由是民相告語毋敢自賊軀活家全者實陰拜侯之賜侯為邑務以教化為大旌義鄉有鄭女偕鄰道士奔諼為仙去逺近翕然仙之侯曰是安有是理密跡得之論如法遂祛民惑侯曰異端之能惑吾道之不明也明諸其必由學邑學古附于郡名焉侯始鳩工度材不一月而具講有室給有廪冠規履矩蹈徳詠仁昔無今有誦絃之聲藹如也侯之初至也或歌之曰聚我胥攅而拘之舉我仙廬而瀦之我有奸蜮曷其鋤之其既去也則歌之曰我有役田洪侯市之我有學宫洪侯始之養我教我誰其繼之侯去之一年民思之愈至相率為侯生祠以祝侯夀既畢來謁記余曰侯去且朞矣而民思之不釋豈非苦吏之縱而思侯之戢乎患役之頗而思侯之均乎抑訟者之不獲理而思侯之得其情乎誣人以死者之為民害而思侯之全其生乎又否則士思其教民思其養乎邪說思其息人心思其正乎是祠之有無於侯初無損益也而祠之可以見民之忱愛有仕於此者捐帑藏為繼富之政以媚豪民豪民亦或為之祠以媚去未幾而祠即廢上下之交媚者胥偽也今是祠也不作於侯在髙安之日而作於去髙安一年之後驩然攻成不戒以孚夫豈有所媚而為之哉是可以言遺愛矣詩曰蔽芾甘棠勿翦勿伐召伯所茇去思也今髙安之士相與扶植侯之新學髙安之民相與増廣侯之役田是即侯之甘棠矣不祠亦祠矣况有此祠以旌其思哉余因是而有感焉侯之在髙安也吏戚而臞矣民懌而腴矣使侯在是民安之而不知思未必動思正以其去也民方安其長之教化為之長者已去之治何由致則官不乆任之弊也天下不難治内有賢公卿大夫外有賢部刺史刺史縣令且乆任以成之治矣令如洪侯賢也洪侯之治豈可邑而已哉為刺史為部刺史可也為大夫為卿為公可也洪侯他日其信有祖風烈乎洪侯之治一犍吏耳今天下上臺省下郡邑皆弊於吏使人人犍吏如洪侯庶幾治乎士大夫之縱吏者吏未嘗不懌且腴也然私則必笑其主之闇已得以售其欺犍吏者吏雖戚且臞而心則服之矣不然吏之過是祠者何以曰此洪侯也不可欺者也噫吏且有是言民愛信然端䝉單閼祝黎赤奮若焉逢涒灘邑人姚某記新昌陳知縣生祠記縣之難乆矣險嫓灘沸語鼎皆以難喻雞初鳴令夙興頮漱已或不及食秉燭詣㕔事吏抱文書前十九財賦一治獄令爬流水得理脈日且出悍卒持急符自郡馳來至庭吼以怒手搤吏語侵令令䇿無出又走縣卒之四鄉督之民民輸失期負桁楊列庭下鞭笞聲竟日鄉司飛走井畆貢詭淆亂甚者去其籍無所於考常賦陷入豪右獨下者甚受困令心知不可輒强顔為之自夙至暮埋首簿書塵不可舉何暇為政平訟理計間有取獄貨足賦程者天下由是鮮良邑令率不可為動劾去幸不劾亦百巧避却承乏攝者又無所顧藉席巻府庫而囊括之邑由是悉貧邑既貧雖智者無以淑其後瑞新昌其一也新昌舊號壯邑前是有令以貪敝之更數令不復三山陳侯登來繼積逋後邑如蠧木且枵人為侯難之侯鎮之以静撫之以寛治之以長者豈弟之意多於詳明優柔之咏過於敏矣嚚者情屈狡者心醉政若悶民則醇事若緩功則集勞心諄諄視人如子卓子康也撫字心勞催科政拙陽亢宗也人難是邑若不可以一朝居君以代不至首尾五年州家不能窘部使者也公恢以老成通練薦之既去士率民祠之肖其像於邑之隆道觀以致社稷尸祝之重夫為政以得人心為本然而得吏心易得軍心難得軍心易得民心難得民心易得士心難得吏心者最下吏可為姦耳得軍民心者次之謂猶可以恵致士心鏡善惡口衡臧否不可威怵利誘衆論所歸謂之公是至難得者士心君之立生祠也士率民為之信賢已其賢何若無可紀而實可紀如古循吏也陳君字某某里人擢某科竹湖李先生之上客其所自者端矣是宜賢祠既成士來請記某邑人也與被君之賜其賢葢素知之乃不辭而記且為之歌以播頌聲歌曰有煜其字伊誰之祠懿彼陳侯既去我思侯之未來邑亦瘁止侯既涖之若乳其子我賦我役寜寛不苛爾訟爾爭靡競式和升士于堂載色載教士退而游庠墊學校安民于野弗繹弗騷民遂其生耕刈繭繰如游春風如沐膏雨侯若罔功孰知侯者帝趣侯覲民縶其駒侯笑視民弗遄以驅維侯之賢匪直為邑耆徳老成周行是入民用朝夕祝侯于天天曷畀之純嘏永年奉新縣重建丞㕔記寳祐元年秋八月某在京師知奉新縣丞趙君汝瀁與之書曰有志者無事不為否則無可為事奉新丞廨在邑南墉廢不治者三十年易名南園而酤焉他丞漫不聞假處民廬或即佛老宫茍及代而去罔或議葺壬子冬十月汝瀁始涖事念不可因陋址其舊而新之今年夏五月經始七月立楹擾不及民費不匱官一惟已之奉囿竹而松沼芡以蓮公退可遊以詠非以娛已也為後之人耳役且既子為我識之某曰是可以觀為政矣夫立志於為無廢弗舉况其政乎玩志於茍雖室處亦廢况其政乎世不古仕者之不乆也俟其考以階其升奚暇問政移公之財美其私室官府則視郵傳曰吾豈乆於此或曰吾欲葺顧力弗足姑俟後之人轉相傳承棟老桷摧不廢不止凡郡邑多如此丞為甚自韓退之記藍田以丞位髙而偪例以嫌不可否事由是丞藉口取充位不及政政且漫不省孰肯葺廢以奉新一邑觀丞廨廢且三十年是三十年無丞也趙君一日起三十年之廢而新之能矣天下之事不植則僵使天下之官各盡其官之職不治乎某聞趙君之為丞紓前令之虐以寛民飢則請粟于使者以賑惕惕然以邑疾苦為已任政暇宜能為葺計捐已力而不私已欲遺後不止謂能葢賢也而某之賢趙君者又不在是其賢何有志也其言曰有志者無事不為充此一語聖賢閫可詣豈止葺廢哉志伊學顔士事也而有顔之學者必有伊之志士茍有志自一命以上如主簿尉亦皆可及物不可以位下為不得志而况於丞儻如崔斯立以丞為負余日惟吟哦於二松之間有問者則曰余方有公事子姑去則是以位不慊焉而曠其日是亦茍道非志於聖賢者伊志顔學願相與勵之以是復其書就命以為記雪坡集巻三十三
