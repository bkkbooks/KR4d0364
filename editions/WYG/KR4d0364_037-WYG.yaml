body:
  text: 雪坡集巻三十七宋姚勉撰序詩意序孟子曰説詩者不以文害辭不以辭害志以意逆志是為得之文之為言字也辭之為言句也意者詩之所以為詩也在心為志發言為詩詩者志之所之也書曰詩言志其此之謂乎古今人殊而人之所以為心則同也心同志斯同矣是故以學詩者今日之意逆作詩者昔日之志吾意如此則詩之志必如此矣詩雖三百其志則一也雖然不可以私意逆之也横渠張先生曰置心平易始知詩夫惟置心於平易則可以逆志矣不然鑿吾意以求詩果詩矣乎尚書傳序尚書孔氏傳者漢安國註其家屋壁所藏古文書也天欲夀此書之傳借魯王之壊宅以出當時上送之官帝命作傳國有巫蠱書遂寢焉由是漢西京之書惟歐陽大小夏侯皆伏生學古文書莫顯于代漢西而東馬融氏始疑偽泰誓書不合經傳求古文書得之孔氏之學始著是虞夏商周之書人知其厄於秦之大而不知其復厄於漢之蠱也向㣲馬融書不復古矣向無孔安國書亦不復漢矣吾固喜夫安國之有功於書而重悲安國之不得有功於漢也大抵西漢無真儒故六經之正者皆不顯於世往往至東漢而後定今六經之傳行于世者詩禮箋註於康成始東漢易春秋註於王弼杜預始魏晉末有出西漢者出西漢者獨以孔氏書傳耳而不得行於當時是可重為安國之悲也夫安國子孫去聖未逺家學有源流故傳書之説多正且又約文申義辭不冗費比之諸經傳註如鄭之多怪誕王之本虛無杜之昧經㫖者相去直齊楚牛馬安可終抑而使之晦哉今世之傳尚書者凡數百家矣皆外孔氏為説各隨其見而有得失某也不敢居一于此敢因孔氏之傳而采諸家之說以訂正其義惟孔氏之大乖於經者正之餘皆存弗去庶幾可以少慰安國研覃之苦志是亦書之重有幸也亦以見吾聖人之有孫克紹家學也書之説與孔氏雖不能無異同然要皆本於安國故仍其舊而名之曰尚書孔氏傳使安國復生必曰吾雖不遇於一時亦遇於千載之下云贊府兄詩藁序晩唐詩姚秘監為最清妙邇年有雪篷姚希聲亦精悍於吟余嘗欲集此二家詩作唐宋二姚集有其志而未之暇也今余兄萬安丞又出詩一編示是集殆可三矣丞兄需次萬安商羊里閈對其廬一嶺巋然兄結茅築亭其上環而竹之疏其間以逕日攜酒壺載筆牀逍遙於亭傲睨於竹程一詩以為課俗塵事一不掛耳清如此詩能無清乎三唐宋姚氏之詩人誰曰不可寳祐丙辰三月上巳日弟某書集首月崖前集序余性好山水城郭不能有之乃疊石作假山下鑿小池横木為橋環山為牆牆外植梅竹清事略具既望夜漏下三鼓月巳髙窻紙晝明予方擁衾危坐霜風㣲起竹的淅有聲棲禽競飛其間亟披衣出簷玩明月倚欄良乆步立橋上天髙月小寒影在地水澈淨如鏡魚畏寒不復出獨梅影在水間仰視梅己三兩有花清思逼人無與領此者忽記友人潘清可日嘗以集寄予未暇讀亟取讀之真若嚼氷咽雪不知孰為山水孰為梅竹孰為霜月且孰為詩也翌日書之巻首以為月崖前集序月崖近集序月崖潘清可初喜為歌詞余每以莘老譏少游者譏之乃易學詩即有警語近以壬子冬迄癸丑春藁示余類可愛五言如懐人山静處得句雁来時睡鳬從水漾乾葉聽風移嵗稔添農屋秋晴失野塘懶失營家事忙遲答友書衣分漁浪洗舟避鷺沙行思巧工書𨽻心清喜説詩省教喧夜雨霜為去芭蕉七言如荷柄已枯猶特立菊花雖老不輕飛􅀈雨驛途詩擔重溪山僧屋茗甌香行人莫作無情看一見春風眼便青莫道行雲輕出入平生只識楚襄王皆一聨之警也五言如飢欲啗梅花寒沼淺呈魚巧莫畫江天盆蕙逺聞香客衣霜遞冷七言如晝困多縁有宿酲怕妨逺眺矮營籬皆一句之警也如樵人曲如老卒嘆如思婦吟則又皆深識理道有補世教而全篇可諷可詠夫自壬子冬迄癸丑春數月耳多警語己如此况嵗月進邪吾宋詩人多潘姓今清可又新有能詩聲何潘氏之多竒才也其源委葢自安仁來矣然余觀清可讀安仁傳詩曰先生早悟閒居好豈為銅章入縣来何獨與春情思重只裁桃李不栽梅觀其詩以知其心過安仁逺矣不以金谷園為死友而卓然求以獨立於世詩當益佳余又觀子於他日秋崖毛應父詩序劍江毛應父以詩集来教予求序之予曰詩不以序傳也三百五篇皆有序朱夫子猶使人捨序而求詩序不足據也姑舎是後世詩亦爾杜子美李太白白樂天唐詩人之冠冕者各以其詩傳不以元㣲之李陽氷序傳也東坡之詩無敢序山谷之詩無敢序近時誠齋之詩無敢序信乎詩不以序傳而以詩傳也詩不以詩傳以人傳也人可傳詩必可傳矣李杜而白蘇黄而楊其詩何如哉其人何如哉應父詩思清而句逸生于劍川鍾泉阿之英其人品自異他日所進未巳能如六君子之可傳詩不患不傳也又安用序况應父之詩其首篇曰時人作詩自有體巻頭品題必名士儂詩無體無品題不作東家效西子夫不效時人求品題於巻頭見自髙也而今求序焉是亦效時人矣言未既或啞然笑于旁曰如子非名士何於是乎序贈俊上人詩序漢僧譯晉僧講梁魏至唐初僧始禪猶未詩也唐晩禪大盛詩亦大盛吾宋亦然禪猶佛家事禪而詩駸駸歸于儒矣故余每喜詩僧談景定元年庚申余祗召過豐城朋友餞之感山見其境甚清僧甚衆意必有能詩僧也主客分韻賦遣送一韻入僧寮中果有佳句出則知山中僧皆能詩俊上人其一也翌日索其近稿以臨川行巻十餘首進余讀之佳句尤夥如羣鴉爭故枝草烟平岸竹江市雁拖更則一句之竒者也雲村山店晩雨野客衣寒思鄉今日到問舊幾人存則一聨之竒者也又如七寳石云厭從饕利者莫近石邊行聞鳩云陰晴自無定未信爾音靈紅梅云盡道新来清瘦甚誰知滿面是春風則結語之有意味者也佳句雖不能盡擷然一臠可知鼎矣俊其懋之禪而詩詩而儒他日與子談當又有以啟予者上元日書于寺中之官舎毛霆甫詩集序白雲澗裡結鷗盟想得詩肩太瘦生思入江梅氷雪骨吟成風竹落花聲三衢詩人毛霆甫集中詩也予杜門空山日與蹲猿夢鶴俱無俗人影到門外到亦不納霆甫不逺千里以詩寄乃開門受而讀之稿中得此詩欣然如道余心者霆甫之心予之心也心既同故不待識而知霆甫之人葢獨立塵埃萬物之表詩十之八為梅花而韻逺思清真與梅同一清格小春訪梅摘其花嚥霆甫詩塵襟一一消盡清矣哉霆甫之詩也稿中之詩有曰陽剛將泰長君子未屯亨又曰繭成絲出空歡喜舊債新逋不了償霆甫之詩其有所興矣漢毛公傳三百篇可諷可怨先儒謂漢儒惟毛公與仲舒知道君家諫議毛公又以忠鯁著名霆甫豈徒詩哉豈止欲為詩人而已哉霆甫有弟分教髙安風裁峻潔又有以南宮魁天下人物不茍仕於時者予以是知其家學端矣以是益知霆甫之為人矣詩何足以盡之劉玉澗詩序廬陵劉成大俊氣如虹抵掌劇談酒酣浩歌真有俯視八極俗物茫茫之意嗚呼宜其詩之豪也寳祐人日姚某書再題俊上人詩集俊上人余庚申年春在感山見其詩欲進之為擷摘十數句今年初夏特來錦江見余讀其全集猶在感山時詩也問别後曽誰見曰豐城後林李先生也廬陵約山朱先生也二先生者當今之詩伯也必有以警䇿子矣而詩猶前日甚矣余之有以誤子也雖然數十篇之詩而擷摘止數十句余雖進子亦深有以曉之子矣而子猶未之悟今之來方且盡出其全集俾余品題將以行乎世余何敢重誤子乎此江湖繆妄詩客索遊者之所為也方其能吟數語粗知有韻之仄平多未識李杜蘇黄門逕即詫然自足號為詩客持其巨編長軸求有官銜人序之跋之間有顔面柔軟不能拂人情者往往强徇其意得之者輒號於人曰某已得某名公序且跋矣由是欲列於名公者續續而次之至有序跋多於詩者夫序與跋固信皆名公也如吾詩之未足以名何徒資識者醒睡一笑耳是之謂不成人之美成人之惡余豈敢不忠於告子而重誤之至此哉今雖拂俊之意使俊他時悟作詩之妙亦必以余言為忠也夫詩有意有味有韻意欲其圓也味欲其長也韻欲其逺也有此三者然後使人讀之而恐巻盡茍初讀而不知其意細讀而不見其味既讀而不覺其韻何足以謂之詩哉雕不可讀之句不可謂之竒也用不可識之字不可謂之古也欲其竒古必有妙於是者矣作之多而出之少求能於已而不求知于人皆學詩之法也詩雖小技也不好則巳好則必求其工工猶未益也不工又何所益哉子佛者也未可以語吾之上就子之所知言之詩正如子家之禪姑歸而熟㕘之詩亦如禪要飽參未須容易向人談陣無活法徒奔北車恐迷途在指南悟後欲知新句長讀時須見舊時慙江湖浪走祇何益歸看秋空月印潭蘧東叔雪林稿序上饒蘧東叔以其詩教予雪林有稿予讀之真若雪中㳺山林間目之所覩無往而非瑶柯瓊枝也詩亦佳矣古之人有蘧伯玉者吾夫子稱其為君子許其欲寡過而未能東叔豈其苖裔乎余敢以伯玉望之勿詩而止黄端可詩序吟詩必工詩定知非詩人坡仙語也詩固主於咏物然在於自然之工而不在於工於求似踈影横斜水清淺暗香浮動月黄昏此真梅矣亦真詩矣認桃無綠葉辨杏有青枝梅乎哉詩乎哉抑古之詩又不在於咏物之工也余嘗謂陶靜莭韋蘇州柳愚溪之詩皆深逺入妙然皆不若紫陽朱夫子之詩為尤妙觀感興諸詩可見矣天生蒸民有物有則民之秉彛好是懿徳為此詩者其知道乎作詩貴乎知道也豫章黄君端可以其詩下教如月鈎雲衣之詩工矣猶止於咏物予獨愛其窄室之詩曰地纔容膝可天似處心寛相在渾無媿知君所止安嗚呼必如此詩始可與言詩乎梅澗吟稿序友人胡明可以其邑彭君仲章詩一編示予題其編之端曰梅澗吟稿未論其詩視其編之題曰梅澗清巳可知矣玉立氷臞耐寒如鐵石不與春風桃李争豔媚此梅之盛徳事魁百花而調羹鼎不數也梅之在澗其碩人之在澗乎有詩人於此踏雪於凍曉立月于寂宵無非天地間詩思郊寒島瘦由淺溪横影得之􅁃新鮑逸由疎花冷蘂得之李太白出語皆神仙由軼塵拔俗之韻得之杜子美一生寒餓窮老忠義由禁雪耐霜之操得之果能是則可與言詩矣然則求詩於詩不若求詩於梅觀梅於梅不若觀梅于澗適齋詩稿序詩貴工乎雕肝琢胃鈎章棘語竦肩如寒攢眉如愁鳴吻如蛩側頭如鶴數髭斷而字安片心歸而句得若是可乎曰未也李長吉阿媻謂嘔出心乃已然則詩何貴曰貴適康節之詩曰堯夫非是愛吟詩詩是堯夫得意時詩非愛吟也得意則詩耳堯夫之詩不適乎三百五篇之詩固有出於塗歌里咏小夫賤𨽻之口未常求為文也而其文至後世老師宿儒有所不能道此無他小夫賤𨽻不求詩而詩老師宿儒求詩而反不詩如此可與言詩矣蓬莱妙音逸出人間宫羽之外風水相遭之文章善雕鏤組織者終莫及也適之為詩妙矣哉劍江胡君景顔以適名其齋又以適齋名其集嘗寫其詩寄予大抵皆適中語也其警聨甚多有自言其詩者曰酒在遣懐非在醉詩求通俗不求工嗚呼此胡君作詩之本意乎有堯夫之得意無長吉之嘔心雖不求工吾必謂之工矣胡允升詩稿序雙溪胡允升以其詩云雪溪梅吟者示余請序之夫雪清也溪清也梅亦清也疊是清而三之吟當何如哉今夫寒溪淺流四岸皆雪水㶁㶁觸石鳴有梅焉的皪蓓蕾於其間子於是時絮帽重裘裹手擁鼻側鶴頭而出蛩吻吟當何如哉不知子之詩但觀子雪溪之梅蕭道士詩序彌明不作乆矣黄冠者流挾吟巻遊公卿間類不見可人一日古洪道士蕭君致道來有詩贄予納之袖未暇讀也退讀之有曰貴登芸閣近貧止竹門清驚曰此詩人也夫貴登芸閣固不足道而貧止竹門清一語可謂能吟予之心事者可與言詩矣因盡取其詩而讀之篇妥句適時南風初薰予在湖舫中危坐芰荷淅淅響㣲雨緩吟蕭君詩葢真與藕花同一香也饒道士詩序古洪道士蕭君致道與饒君士隠皆以詩教予予在湖航中讀蕭巻畢方雋永餘味因思二君皆来詩必皆佳也顧覺小倦授童子讀展桃笙攲眠而聽之其巻首題曰蒼澗泉鳴予聽其詩清圓響亮如在廬山草堂聽環珮琴筑滴瀝飄洒隨風逺去今日何日見此二妙因書其端且摘其句以玩汪古淡詩集序張籍學古淡軒昂避雞羣退之語也武寧汪子載善詩鄉之邢吏部以古淡名之葢以其似張籍雖然詩而已哉有道味有世味世味今而甘道味古而淡今而甘不若古而淡者之味之悠長也食大羮飲𤣥酒端冕而聽琴瑟雖不如烹龍炰鳳之可口俳優鄭衛之適耳而飫則厭乆則倦矣淡之味則有餘而無窮也為今之人甘可也欲為古之人其淡乎惟古則淡惟淡則古周子曰淡則欲心平子欲追古人之淡夫茍無欲則於道庶幾矣詩安足論哉張籍豈足為哉玉泉詩集序槎溪王君君猷喜吟詩以玉泉名其集取李太白飡霞漱玉泉語也詩者乾坤之清氣也有一糁火烟者豈能吐之哉王君家槎溪上八月秋風髙乗仙槎登河漢取銀河間水浣腸滌胃乆矣是宜其詩之清也清何似曰泉聲玉琮琤景定元年正月十六夜雪坡姚某書于石亢舖彭仲珍吟稿序韓退之云富貴之辭難工窮苦之言易好夫詩者弔月之蛩之吟吸露之蟬之嘶也故惟窮者而後工非燠綺繒而飫膏粱者所能也或能焉亦異矣婣黨陳伯清攜豫章彭仲珍詩来讀之多警句予聞仲珍非窮苦者也法當在難工之科而乃工者夫不醉心於世味之醲而留意於吟咏之淡也非庸俗人所能及况工之耶仲珍以晉齋號晉進也進而不已詩當益工雖然古之詩可以興可以觀可以羣可以怨邇之事父逺之事君其詩也如是徒工于吟詠風月琱䥴花木未工也仲珍其愈進於此王月莊雲萍録序暫聚水上萍忽散風中雲玉局仙人詩語也謂人生離合之靡常也余與月莊王元剛託交如兄弟居相距亦邇而所謂聚者二三年而一焉况其他乎此記録之所以不可無也然雲雖在天萍在水雲萍之聚散雖不常而天與水未嘗不常也朋友之聚散雖不常而朋友之天倫亦未嘗不常也又豈以暫聚忽散異哉不其然不足以為朋友敢書於録之首呂雲叔雲萍録序暫聚之萍倐散之雲真人生離合喻也雲萍有録登載姓名爵里聚散雖不常而在是録者舉目皆見之葢常聚而不散也雖然一録之中英俊萃焉其有視不義之富貴如浮雲者乎其又𣺌觀萬物如江海之浮萍者乎又雲萍言外意也雲叔其試於此録乎觀之陳氏濟利堂藥序陳宣公集方藥范文正公願為相或醫東坡如宣公亦有良方行于世山谷則欲為藥市之數君子非與方伎家争短長也乃心罔不在濟人利物耳天下方伎之功獨藥可以及物抱危盭濵死楚吟痛呻比舎不忍聞俄得善藥起其死而生之其功豈細雖然藥南北異産不時得價輙躍數倍窶夫子持錢少不滿十多止百貿貿入市何從得善藥富翁貴人雖有參苓芝术之籠倉卒需亦莫辦此藥市之不可無也而近時市藥者志亦謀大利不于濟人利物聚賤易貴雜偽壊真内欺心外欺人得藥不能愈疾又甚之或不救是藥誤之也雖得大利奚其利過近時市藥者門昔驟興今輙仆安知非以藥誤人之報陳君國卿實鍳此創藥市一洗衆弊以濟利名其堂寧推己及人不削人肥己用前輩濟人利物之心也繼自今危者安盭者平呻吟者怡笑民不夭枉俗在仁夀陳君及物之功溥矣喝六作五之應豈獨叔㣲専之雖不言所利利孰大於此者雪坡集巻三十七
