body:
  text: 雪坡集巻四十三宋姚勉撰文西澗書院換新梁文壬子伏以習先聖之術當為道閫之棟梁育天下之英要作明堂之柱石惟是扶顛持危之日則知致逺任重之材平時學校之規模一旦廟堂之力量作新氣象聳動觀瞻仰鄉國之三劉凛風標於百世誦涪翁清潁尾之句天畀節之獨全讀歐公廬山髙之詩地以人而愈重或對面而攻介甫或褰裳而去蔡京鐘鼎一邦冠冕四海所以北山之名子創為西澗之書堂欲後學之得師企前修而接武自興此地益振斯文道學立己之要端士皆知本科目進身之餘事嵗不乏人聮翩登天府之書陸續擢太常之第以至賢闗之俊士競蜚帝學之英聲前者既着鞭而争先後者又積薪之居上而况地靈標異天秀發祥鳯沼波澄春色動墨池之水雁塔雲立晴霄峥文筆之峯中間一水之横陳南北萬山之雄峙氣類聿新於感召英髦皆萃於游歌誦詩讀書吾伊之聲相接進徳脩業挑逹之習不萌黽勉乎學問思辨之功講明乎脩齊治平之事有資涵養必大發揮矧居多脩泮之魯侯且代有教湖之安定儒林風動黌舍日新欲増賀燕之歡聲乃易脩虹於傑宇使工師求大木喜得四十圍溜雨之根柯立舘下招諸生便有千萬間連雲之氣槩異前此撓柔之無力知其中負荷之有人棟榱無將壓之形松栢屹後凋之操作興如是證應有開時當詔嵗之肇端士與王春而更始陋者昔而今於壯此泰亨剛長之符捨其舊而新是謀乃革變文蔚之象必有勝仁重器扶世長才驤龍首而奮九天沛滂霖雨斷鰲足而立四極撑拄乾坤仰挹鄉先生之流風益厲大丈夫之壯節不虛此應㑹見若人匠石告成兒郎賛偉東東上天京路喜通昨日飛僊橋已建連河䜟屬采芹宫西西澗髙風要與齊利禄毫輕名節重鳯凰寧作飽蟲雞南南有荷山翠潑藍雲際塔尖文筆聳棘闈楓陛占魁三北北斗魁躔堪手摘瑞陽人要瑞朝廷太史預占雲五色上上徹文章光萬丈个中人有棟梁材須信書堂真隠相下下為生靈上宗社道非小用豈謀身普與萬方為廣厦伏願上梁之後學顔志尹家稷人臯由徳行之科而冠國家進士之科修仁義之爵而得公卿大夫之爵先覺覺後已立立人與賢師良友以切磋皆由體逹用之學得明王聖主而輔相收致君澤民之功大節終身香名萬古惠政橋上梁文壬子伏以造舟為梁已閱數百年之古横江立石又為千萬世之規奠驚濤駭浪之衝屹砥柱中流之勢一新壯觀夐掩前聞州曰瑞陽江如濯錦人卧船流露團鶴起供名筆之畫圖溪從城過山到市平入當家之詩句接通衢之聚市列横艦於浮津在南唐時畫鷁矗靈祠之下至東都日彩霓飛道院之前嚴公之誌刻尚存蘇僊之詩史可攷然當春夏乆雨之積適為川谷百流之交巨浸稽天小舟斷渡河既難於填鵲民或至於為魚居人病之仁者念此於是前判府宫講編修經其始今判府寺丞吏部遂其成立非常之功必待非常之人偉哉器宇建無窮之基亦有無窮之聞深矣恩波廣鄭子產濟人之心見蔡端明利民之志既仍舊貫復就新規費博而民不知工鉅而役則簡神人驅石丁士鑿山不日成之如天造此遏洶湧奔流之注負瓌偉絶特之稱鰲頭擎玉閬之峯鎮臨波上龍脊截銀河之水来下人間力障倒瀾而東之勢若運溟而南適海藏忽呈於貝闕沙洲驟擁於鼉城利涉大川卓為巨鎮二千石治理效於此可觀十二月輿梁成方兹更劣豈特永往來之利又將增形勝之雄據彩鳳之上游挺蒼龍之左角迴山若抱界水不流而况津號飛仙宫聫貢士既作新於地脉必奮發於天荒䜟協河連即驗狀元之出象如堤築預符宰相之行此役之興所闗者大僉言太守鑿石而立三犀必有丈夫題柱而立駟馬載㳙糓旦肇建中亭式舉脩梁敢陳善頌東穏駕横天萬丈虹市與河連佳䜟合掄魁應在錦城中西逺過秦人鑿石犀橋立富平元凱力坡仙遺愛滿蘇堤南天筆峯髙碧玉篸橋與棘闈相映帶龍頭躍出浪層三北西市相通紅紫陌任渠風雨撼波濤鰲足拄天常不仄上玉脊鯨鯤横翠浪髙車駟馬錦還鄉自有相如題筆壯下鐵鎖長開燈火夜往來人喜就橋安鎮定此邦如泰華伏願上梁之後迅流中立實地上行山負夸娥之靈水鎖支祁之怪民安磐石士奮亨衢居是邦者化鯤鵬而問天津仕兹土者駕虯螭而上霄漢新栽官栁一條大路朝天勿翦甘棠千古長橋枕水桂殿上梁文乙卯伏以魁三台之呈象比比相承山七曲之妥靈洋洋如在創英祠而徼福擢峻第以聫芳恭惟元皇仙帝造化大鈞儒流司命捫參歴井肇開真王爵土之封絡壁聫奎獨秉天下文章之柄權衡才徳劑量功名自選舉以至於公卿凡祿位皆歸於工宰無往不在水脉行乎地中有開必先雲彩呈于日下睠言新瑞秀比潼川愛鳳山錦水之皆同飛鸞駕雲軿而來降式開異夢爰卜真棲我同志用協羣工肇興祀宇適際賔興之嵗聿資主倡之功㧞鯨牙而酌天漿發揮壯氣驤龍首而集霧雨超軼先驅桂籍浮香栁君染汁共登金馬同趣黄扉十年三度之狀元初何難事四海九州之宰相總在吾邦鼎建脩虹豫驩賀燕東文氣髙横萬丈虹昨夜鳳山髙處望魁星又現五雲中西千佛聫名桂籍題足下青雲生步武不妨攜手共登梯南七曲神仙此駐驂桂殿岧嶤雲表立錦江相望府潭潭北映日重開雲五色君恩增貢例新成從此渾花賸增額上好事鼎來乘氣旺倫魁出了又倫魁宰相後來重宰相下燕雀驩呼萬間厦陽和一㸃散人懐收拾洪纎歸造化伏願上梁之後異人間出盛事交輝琳宫之香火綿長甲科之衣鉢傳續父子則梁顥梁固兄弟則堯叟堯咨師友則如張之汪朋儕則若胡於吕以髙科第立大功名姚姒致君伊周佐治重趙九鼎作米一經破西賊者天聖之廷元平淮蔡者元和之進士有光于昔其在斯今自岷峨來古筠已窺帝意為國家清蜀道方契神謀吾黨勉旃斯文幸甚格天事業蓋世功名天香閣上梁文伏以冠天北闕之立班曾叨誤渥就屋東偏而建閣庸貯醲頒永兹家世之傳期我子孫之繼睠惟吾祖肇建此堂于廷尉之門閭要容駟馬王晉公之第宅久種三槐昔先人期望之甚深我小子紹承之敢怠謬膺獨對幸足三魁九萬里扶搖已快徙溟南之運千萬間突兀方為庇天下之圖敢期先志之已酬尚冀後人之相續家傳龍種池有鳳毛俾學於斯庻齊厥美紫帽簷垂雪鞭絲裊先沾天陛之香綠袍恩重黄榜墨鮮更看煙樓之過相承忠孝上報君親式舉修梁交騰善頌東皎月朝升萬丈紅日與長安天正近心馳魏闕五雲中西桂娥猶記夢中題龍頭信有親傳種前是嚴君後是兒南雁塔霄峥碧玉篸書在城南符可讀犁鋤中有府潭潭北吾家已有張師徳讀書正要濟時艱出與明堂為柱石上阿囝須如郎罷様狀元還是狀元兒更要相門重出相下燕雀交歡知賀厦吾寧無地起樓臺一念常思庇天下伏願上梁之後安于仁宅出自禮門與㸃唯參相傳聖道前周後魯俱拜君恩世科首龍虎之登勲業侈麒麟之紀一家功業萬古聲名賦梅樓上梁文伏以無地起樓臺固願學萊公之事有園秀花木亦當希涑水之賢未甘走朝市之紅塵共要飽溪山之清興稍堪寓目庻早抽身雪坡主人鷗鷺舊遊麋鹿真性初賜集英第也曾看杭州十里之花不上光範書未忍抛錦江一絲之竹惟童子之釣所有先人之敝廬占山水窟宅之中足泉石膏肓之趣隠者盤旋於幽阻雖得於天君子眺望乎髙明尚虛其地恰有坡而宜雪聊鋤月以種梅中建一樓下臨萬象雲屏洗雨納層巘於簷楹水鏡涵天挹明湖於樽爼錦千花之步障碧萬竹之油幢吟紅藥對紫薇静綸閣文書之意思撫蒼松摩翠栢屹明堂梁棟之觀瞻雖無輪奐之翬飛是亦園池之要會然命意不輕於取物而扁名獨美於賦梅見賢思齊論世尚友若廣平之顯唐室至文正之名我朝卓然英概之不羣皆以此花而寄興語雖婉媚何害為鐵石心腸志不飽温已預占鈞軸事業儼相望而玉立均不辱於氷姿凛若猶生希之則是願堅持於勁操初不尚於浮榮先天下春儲萬斛香本為盛事開雪裏枝回孤根暖方見清標古人實獲我心天下莫非吾事登斯樓也初無貯妓女藏歌舞之奢適我願兮端有砥節行厲亷隅之益窮達俱存生意榮華不趂春風白玉堂如茅舍竹籬黄金鉉在霜崖氷谷巡簷索笑誰知先憂後樂之心看影忍寒不動炙熱趨炎之想庻倚欄而無媿堪把酒以相看而况隂盡陽生機融剝復仰觀俯察中有乾坤覺仁意之黙存愛生香之不斷坐中客滿應有能同飲氷餐雪之盟門外人看未必不作齊雲落星之誚木斵而已人謂斯何聊復上梁不妨贊偉東海外連雲萬丈松嘉味儘堪和傅鼎清標元不涴秦封西野色團雲萬竹齊中有雪坡精舍在讀書聲到曉牕雞南釣月横舟在碧潭小様西湖共宴賞荷花晚日照紅酣北栝栢豫章森黛色个中有柱可擎天盡日憑欄為憂國上俯看園林春萬象夜深引手抉天河欲洗人間腥海浪下踏月看花乘雪夜政令天上玉為堂只似水邊茅作舍伏願上梁之後癯仙長健俗客不來臥人豪百尺樓平吞湖海勸梅花一盃酒共保山林斷不連甲第於雲霄且預占午橋之風月賢者樂此何妨為横水孤舟時則為之也會作撐霄巨棟稱天此景重地以人希文已做堯夫更為尚期子以繼承之事韓公所無樂天則有記請身於强健之時倘負此梅有如皦日秋山上梁文為謝飛卿作雲霄萬里未甘為求田問舍之謀風雨數椽聊以遂作室肯堂之志詎敢謂千萬間之突兀亦幸免三十年之辛勤此屋無華其人或可秋山主人胸中丘壑筆底菑畬臥百尺樓少亦有元龍之豪氣築一區宅吾將草子雲之𤣥文種孤梅於荆棘之叢餐晚菊於煙霞之表以浮雲視不義之富豈誇地上之流錢謂黄金劣教子之經自信書中之有屋雖先人之廬猶足以庇然舊宅之囂不可以居經之營之不日成之合矣完矣曰茍美矣暑軒凉而冬室燠晝牕明而夜堂深砌宜芝蘭園可花竹綠水䕶田青山排闥地無一㸃之塵埃碧桃種露紅杏栽雲春占四時之富貴暇則整安石東山之屐時乎得靈運西堂之詩旁聫花蕚之新不出枌榆之舊揷三萬軸籖於鄴侯之架且要有子讀書種五十畝秫於淵明之田未嘗無客飲酒固已自滋蘭九畹也不妨植橘千頭烹羊炮羔以供嵗時彈琴著書以娯朝夕境與人而俱勝屋於我而有餘時未可為姑且抱臥龍草廬之膝志如得遂亦能容駟馬髙蓋之車修梁肇舉於長虹吉語式殫於賀燕東宅枕秋山第一峯安石會稽非素隠蒼生都寄此山中西門外車多聽馬嘶要識主人心地處晚凉新月浸潭溪南四里名岡意可探自有睎顔真樂在籯金積玉不渠貪北萬仞荷山呈翠色夜深斗柄揭天寒魁第一星光可摘上從此肯堂基址壯等閒跂翼接雲飛振起家聲天所相下玉樹芝蘭相照射吾伊日聽讀書聲文脉要如前後謝上梁之後萃一家之和氣衍五福之慶源丹桂浮香日熟義方之訓三槐騖䕃天開世徳之符姑少俟之必有興者雪坡集巻四十三
