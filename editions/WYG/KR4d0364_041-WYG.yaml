body:
  text: 雪坡集巻四十一宋姚勉撰䟦劉翠微罪言䟦天理在人心未嘗亡也奸檜背國挾外寇以制其君附者擢拂者斥朝士宜無一人敢言矣忠簡胡公乃有䟽上新州王盧溪以詩餞亦夜郎謫天下宜無一人之敢言矣翠微劉君乃有罪言信矣人心未嘗無天理也劉君惜不在班朝在亦忠簡矣班朝忠簡嶺海亦必忠簡也然士之忠義豈計班朝與嶺海哉忠簡書名萬世翠微罪言世乃有不知者然士之忠義豈計知與不知哉忠簡當時言雖不行扶持天地至今頼有此書在罪言中謂國家當養直士氣為社稷福其是之謂歟劉氏子孫其世寳此書養此氣窮則為翠微達則為忠簡窮達一天理無忝乃祖矣寳祐丁巳姚某為翠微之孫有徳書忠穆公行實䟦疾風知勁草板蕩識忠臣忠穆公當傅正彦狂悖時昌言正色排之無少懾至作杜鵑詩召勤王師感動忠義公卿滿朝以死尊君者獨公一人耳天綱人紀幾紊公乃能如此彼當年世有噤不敢發一語者獨不媿於公耶伏讀行編降心三嘆張少師邵字才彦墓銘䟦少師奉使時其忠義之氣足以折敵而詩書之化又有以柔之南北息兵有自來矣公在敵乆知敵有歸淵聖及諸王宗室意勸檜遣使迎請由是忤檜嗚呼使公言得行境土雖未復淵聖及諸王宗室獲歸國耻猶可半雪也每念公言恨不食檜之肉書考亭三帖後同年友伯慥示某以考亭夫子與蓮蕩先生三帖某拜手欽翫仰見夫子格言大訓無所往而不寓一曰向見意氣頗多激昂而心志未甚凝定此須更於日用之間益加持敬工夫見得本來明徳之體動静如一方是有入頭處夫子此言豈惟蓮蕩先生可行之正為某軰後學地也二曰某連年疾病今歲差勝然氣體日衰自是無復强徤之理所幸初心不致忘廢亦時有朋友往來講習偽學汚染令人恐懼然不得避也三曰某衰於疾病更無無疾病之日明年便七十矣區區偽學亦覺隨分得力但少文字不能得了恐為千載之恨耳夫子年愈髙而徳愈茂血氣衰而志氣盛黨禁方嚴經厯患難曾不少變方且欲了文字以詔千載其與宣一聖七十二而成春秋者何異持敬功效乃能如此偽邪眞邪無黨禁不足以見先生之學然則偽學之禁天益以表夫子之眞歟某三復三帖而三嘆書元齋䟦後漫塘立齋二先生某生晩不及識陳君子實以元齋說與䟦示某得觀遺翰九拜敬嘆前哲已往一字一墨皆可厯代寳也雖然盍求其義夫元萬善之所從始也故曰善之長元包四徳如仁之包四端元即仁也故曰君子體仁足以長人體元之仁天地間何莫非吾生意又奚止復一家之元氣如先世之取科第而已哉願因先生以元名齋之義而求仁焉庶無負二先生之說之䟦之意書邵堯夫眞蹟後邵子之學某未能窺其妙也邵子之妙烏在在於觀觀物篇所謂皆自我而觀之是也觀之妙妙矣哉易曰復其見天地之心又曰觀其所感又曰觀其所恒又曰聖人有以見天下之賾而觀其會通非謂觀之妙乎觀象於天觀法於地伏羲作易之初盖然矣觀之妙乎妙矣自我而觀妙於觀矣孟子曰萬物皆備於我矣反身而誠樂莫大焉程子曰静後見萬物自然皆有之意皆妙於觀者邵子之妙最於觀處得之邵子臨没且曰吾欲觀化一巡觀至於死生之際則妙於觀者盖不囿於死生而超出乎死生之外矣妙矣哉夫觀即格物也物格則知至矣此邵子所以妙而神也雖然必有以用其力焉某聞邵子嘗大書檢束二字於坐右夫此心必有檢束不至放縱而後可以觀天地萬物古今皇帝王伯之變檢束者用力之初也眉山宋君可傳出邵子觀物篇眞蹟示某某焚香寳誦觀之其字畫荘正無一筆放縱其於檢束中得之明矣後學何敢不力宋君既珍此帖如金玉必有得於邵子之學之妙不知某可與共學否書李文溪吳誠山龍王廟詩後此寳祐甲寅文溪解章貢節舟過呉城山而作是詩也文溪於是横野水之舟又三年矣余讀是詩有感焉乃集騷辭四句書其後見意靈胡為兮水中載雲旗兮駕飛龍望美人兮未來極勞心兮􅍵􅍵書牟存齋草東宫二制後此存齋牟先生在玉堂時草令東宫封忠王制及冠禮制也先生常為安君象祖書之今為舊物矣若先生者宜在師傅衛翼之列乃以脫靴亭之記不得授承華門之迎先生何病雖然綺園終必為仁孝愛士者采景定元年七月日門生姚某百拜謹書先生所書二制後歸諸安君象祖氏書洪玉父奏藁後江西龜駒玉鴻之四洪猶江東封胡羯末之四謝也生恨晩不及識前軰寳祐癸丑幸得與徽猷公四世子孫述為同年生暇日出公在思陵時奏藁某拜手讀曰噫此前軰文章也意忠實而語精簡今之葩華其文以舉子策體為奏對者視此媿矣里後學姚某謹書䟦雪浪閣詩右雪浪閣詩一集道士劉應時所裒也巻首誠齋東山二先生詩在焉晳倡參和與此閣俱千古矣跳作漩花雪山立濺得琳房滿山濕與潭底魚龍天上立樹梢鶴鵲身都濕之句讀之使人毛髮盡立未登此閣奇觀皆在目中矣况觀浪於江觀詩於閣乎䟦師濓堂記周君宣仲以師濓名其堂濓溪萬世師也天下師也而况派其宗者哉夫子為我朝正學之祖師夫子取水初源也侯師聖見程先生語未徹往見夫子語三日自謂如見天之廣大再見程子程子曰是必從濓溪來師濓之功如此夫雖然侯生之言止可隔壁聽程先生終未深與之何也受學之初每使求仲尼顔子樂處既得矣吟風弄月以歸有吾與㸃也之意嗚呼是眞師濓者乎故師濓者當如程子寳祐五年夏閏之晦姚某書䟦麗曉樓記章貢劉氏作樓名曰麗曉取坡僊日麗崆峒曉句也廬陵王南山記之筆力高邁記末謂聖人知進退存亡不失其正深造理窟丁巳秋客有過余山中為劉氏求䟦余也雖未登斯樓讀斯記而山川草木丹青之葉鱗甲之洲如在八境圖畫中見矣抑余有感焉坡僊是詩之作紹聖元年八月十七日作也公是時往赴惠州白鶴山矣余因此重有感焉後坡僊作詩百六十有四年瑞鳳凰山人姚某䟦䟦林平父文集右林平甫所作賦二古詩十三律二十一絶句六記雜文四上皇帝書及䞇見書各二予讀其詩賦迫騷駕選行閣等作酷似韓退之東野聨句䞇見二書如鄒陽枚乗至讀其留趙庸齋書論火災書又慨然其忠愛也今世詩人文士不多得能文者少能詩能詩者少能文如平父眞亦難得雖然文章不必過奇古之人詩以禮義為止文以貫道為器也平父而以詩人文士立名是亦可矣如不止於為詩人文士也他日當扵是集之外觀之䟦張英玉行巻張英玉歸自京師以行巻寄予凡詩二十四首余愛之者過半其清也葢自逋僊孤山之梅樂天竹閣之竹來也其豪也葢自天竺飛來之峰海門雪屋之潮來也南溪老子詩曰閉門覔句非詩法只自征行自有詩余於英玉行巻之詩益信跋吳玉壺梅花百詠右玉壺先生吳元叔詠梅七言絶句百細讀之殆是二千八百片梅花合成不然何句氷而字雪也寳祐癸丑與其令子為貴同年第因得拜觀時秋七月也錦江姚某謹䟦䟦上官叔權篆𨽻羲之俗書趂姿媚數紙尚可博白鵝書至于羲之後世以為絶矣而退之猶曰俗退之之意不禹碑周鼓未止也凡為文章宜畧識古字君家何所吾欲載酒問奇䟦李彛甫廷對策稿松麓李彛父自為舉子時以策鳴塲屋如萬同年定翁程同年則明皆其門人以策擢上第獨松麓不偶歲丙辰試太常復不利以特奏恩奉大對余時在江南泉石間謂朋友言今年特奏第一人必松麓新榜至松麓乃第在三人皆咎予言之不驗予亦自怪也不幾時鄒君鼎實歸自京道東莊饒先生之語謂始奏松麓為特奏科第一人偶正科之首亦自其選不欲皆出己姑位在三既上乃别親擢以首正科遂兩失之大悔恨誤屈松麓人始信余言之不妄余亦自喜其有以知松麓也特松麓阨於命而不得逞耳夫阨松麓於特奏命矣又阨松麓於第三尤命也夫雖然唐文宗時李郃第賢良劉蕡不第自當時觀之皆以為蕡惜由今日觀之士皆誦劉蕡策甚習知蕡切直名甚著初不知有李郃也本朝歐陽永叔知貢舉初欲以第一處東坡疑其為門人曾子固屈之第二是年廷唱之首則章衡自當時觀之皆以為東坡惜由今日觀之但知東坡氣節文章為吾宋第一初不知有章衡也然則以劉蕡比松麓不必恨其不太常為擢第以東坡望松麓又不必恨其不特奏第一也所謂第一葢有大於此者矣豈在於第之中否科之正特高下哉松麓為人氣宇軒然自為舉子時發為文章葢已撫餘子而立其上必有以第一自處者勉齋黄先生曰異日結裹須要作世間第一流人物嗚呼若勉齋此念斯其所以為第一乎余也固以是望松麓跋張樗寮遺墨璨上人示予以張樗寮請堪笑翁住翠巖書及祭笑翁文詞翰俱美予三復三嘆釋之住山猶儒之居官也釋之高者不屑於住美山儒之高者不羡於為美仕笑翁與樗寮相得如此猶不少屈况肯如其他買院子住者乎及樗寮翩然去國笑翁明日即來尋泉石盟作翠巖西堂其進退合於義若是其終文援黄龍山谷故事托樗寮以死樗寮亦承所托不負之皆可觀也樗寮平生視美官如敝屣故與笑翁志同道合今儒之中清風如樗寮者不可多得釋之中亦少如笑翁噫世道何其日下耶觀樗寮與笑翁書笑翁不啟至再至三終不啟樗寮謂赴法不赴法啟緘不啟緘有何干涉欲笑翁之於此下一轉語也此一段公案千古話柄由釋學論之雖不啓緘徹底分明雖不住山住山已竟無在無不在何必指山門罵佛殿而後謂之來住山耶予固學儒者也不當戱作釋氏語謾代笑翁下一轉璨上人肯之否再紙書南山一盃亭壁六詩并䟦寳祐丙辰冬余趨正字召至上饒聞眼釘得政棄官竞歸既拜䟽將登舟為南山留半日賦六詩書於一盃亭之壁時住山洪野衲也又五年庚申再過之山已易主主人乃敬雪崖矣雪崖相愛重為余言戊午歲山巔古木摧折損亭半屋獨壁儼然豈山神好惡與人異特與護持之邪雪崖又謂壁字乆易漫漶俾余再書于紙將刻之梓以壽其傳意亦可嘉矣余愚拙不入時羣兒每聞其語必慍山中方外之客乃愛重之如是豈所好惡與羣兒異而獨與靈山閣之山靈同邪一笑為書時九月中澣後八日余方以言者論其黨履齋姚某書䟦洪上人所藏十八羅漢畫十八阿羅漢皆世之偉人也伊川先生曰佛是西方之有賢智者唐末五代天下無人才僧中乃有臨濟徳山趙州諸老故余謂十八羅漢皆世之偉人彼其英邁雄特視人間世猶蠓蠛聞佛說大乗心領意悟遂住世而扶持之其所謂降龍以鉢解虎以錫者非眞能幻詭變怪馴伏山海間之龍虎葢以理制欲降解胷中之龍虎耳夫以其英邁雄特之姿超然遠舉淡泊於世味之外非偉人則安能吾觀此畫鉢降龍者顧視毅然而英錫解虎者容貌釋然而笑其餘或坐或行或凭或語或視或聽類皆人欲不足以累其天世故不足以嬰其心謂之偉人也固宜雖然特無世味而已非忘斯世也忘世則不住世矣吾觀十八人中二人者曰應供獨十六人者日在山水間夫能降解胷中之龍虎必能馴擾世間之龍虎方今龍鬬淵虎滿道最畏臨濟徳山趙州軰隠山中不出願賦招隠有肯應供者固請宜來畫藏於感山寺道洪上人元得本於浙江乃西蜀龔秀筆䟦者雪坡姚某時景定元年上元日與友六人啜茶同觀題曾輔之雪澗詩集廬陵曾君輔之以雪澗自號且號其詩問義奚取曰澗猶身也雪猶心也澗而雪之其潔吾身而白吾虛室者歟寄興而吟夫安得不清是宜霙焉而章氷焉而句踏瓊瑶而問梅撼玲瓏而詠竹其清也固宜雖然澗不受濁雪不受汚君之雪澗清矣謹毋使濁君澗而汚君雪可乎昔豫章朱子儀在京政府諸公與之談詩子儀云諸公豈可與談詩者竟不與語然則雪澗之詩可使匪人者汚濁之哉輔之與王南山游甚深試以問焉必以予言為信題眞上人詩稿眞上人詩别藁大山蕭先生已為摘之矣奚再假乎予之摘有可摘故重為之摘昔人於梅詩有愛横斜清淺一聨者有愛雪後水邊一聨者有愛屋簷斜入一聨者人謂不以此定作詩者之優劣正以定評詩者之優劣也予所摘之詩是己未論所摘優於别藁與否可以見所摘之人劣於摘别藁之人矣前軰言僧詩患其有蔬筍氣由是僧人作詩惟恐其味之類此僧詩味不蔬筍是非僧詩也眞詩入清絶處如風松韻澗月鶴唳臯寫荒寂處如宿鴈秋蘆寒鴉晩日益進不已直與賈島異時同調也亦有一説眞之詩藁曰禪外余不知所謂禪也然聞其説絶文字屏思慮有一語文字一毫思慮皆目之眚也鏡之塵也而可終日鷺其肩蛩其吻營度詩句哉苦思而縁之痩劌心而病之嘔可乎否耶吾儒之善學者詩則贅汝敎之絶學者則詩贅子未忘儒乎棄其學而學焉可也惟欲禪乎息其所已能而進其所未能亦可也退之送靈師云方將歛之道且欲冠其顛賈浪仙固嘗冠其顛矣世之稱島者止以其詩焉與未冠其顛一也真其邁之雪坡集巻四十一
