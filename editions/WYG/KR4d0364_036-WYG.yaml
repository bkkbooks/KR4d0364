body:
  text: 雪坡集巻三十六宋姚勉撰記臨江陳侯生祠記太史大山蕭先生以書來道渝之父老言曰渝之民徳陳侯之去己害也生為立祠請記之予里人也言之疑乎私子學春秋宜識褒貶以筆授子某再拜謝不敢僣書三至又不敢辭乃記維寳祐五年秋七月部使者宏齋包公辟某人為渝令意其嘗攝邑事知民瘼也顧乃負所託先攝時己貪酷無善狀渝人曰庶幾改之厥既至貪酷猶舊渝人始蹙額相告曰推之不去何古今皆是人耶老幼攜扶愬之郡陳侯弗忍民之困劾之朝卒汰去渝之人乃歌曰驅我虎逐我狼虎狼去民農桑昔雪霜今春陽侯之徳曷可忘徳之不敢忘乃相帥為侯生立祠以祝侯貴且夀且為他日邑令勸戒噫郡而置之守邑而設之令皆為民也茍無大得罪於民民亦孰肯疾視其長使之必不安其位哉藉守以劾令令去而祠以報守又豈以此操制其上以為令去留在巳使後令惴不敢出一語哉第其貪且酷迫於民肌膚不可與一日處故求能去己害者去之也葢亦甚有所不得已焉耳古癸辛為天下君虐我則讎猶不能遏斯民之怨且怒而况君百里者哉驅逐於民宜也是不足為勸戒乎今夫天下之為吏者貪酷聲相聞不思為吾君愛養本根動皆斵國元氣使知曽子出反之説庶乎懼而率徳改行焉則是祠之立可勸戒天下吏不但邑也或曰祠之為勸戒信矣子記令某人隠氏名不書夫曷足以為勸戒乎曰是春秋㣲而顯之法也如是乃所以為勸戒陽虎竊寶玉大弓吾聖人不書曰陽虎而書曰盜天下萬世孰不知為陽虎哉令某人者葢生于文學政事之家人謂必佳子弟乃不念厥紹以至于此今用春秋此法記之讀是記者必皆知其為某使某人得此記讀之亦將赬然赧而雨然汗也傳曰君子之善善也長惡惡也短語亦曰惡稱人之惡惡訐以為直記陳侯之徳善善之長也泯某人之名惡惡之短也又何必暴之白之稱其惡而訐為直哉一念之克狂乃聖機渝之民始猶望其改之吾今也終猶庶其改之也無能改於其徳豈惟身辱家亦且墜則是祠也不獨可以勸戒天下吏又可以為此令勸戒矣勸戒無所不至太史先生所謂春秋褒貶法其在是乎吾聞陳侯治清江束吏嚴聴訟明鎮民静遇士禮刑期于無刑善政可記者衆是祠獨以去渝民害立故他不書陳侯名日强嘗位于朝為登聞檢院葢退翁子云是年冬十有二月髙安姚某書豫章新建浄社院記豫章胡君宏甫以書來言曰里有浄社寺曰古佛宫也唐㑹昌時已有之山曰長樂寺曰長安乆矣鉅宋治平三年始賜今名中更兵而燬隆興甲申有僧曇慧曇應者始復之煥於其舊曇應之徒曰了澄了淳了洪皆克紹初服今主寺僧曰覺傳者又了洪之嗣也於瞿曇法外精黄帝岐伯書以活人為佛事寺之裝嚴者益偉傳老矣欲志其修復莫能自謁於宗工是寺也某舊嘗游焉間賦之詩詩故在壁不能無情也用代覺傳請於子願為之記予復之書曰寺之始末與僧之能子之書偹矣焉用贅試相與述浄社之義可乎夫寺之所以名浄社者葢必合淨土蓮社之名而名之也瞿曇氏言西方有淨土有蓮花凡皈嚮其法者死必生彼土蓮花中以是説鼓動天下中國人有樂其説者結集為蓮社日誦佛名號以祈生于厥土在晉陶淵明唐白樂天諸君子亦為之以是尊信日衆夫淵明樂天豈真不達死生晝夜之理信此茫昧不可詰之説而幸生此身於蓮花者哉其意葢有在矣淵明之時温裕强臣更擅而迭霸也樂天之時牛李二黨爭傾而互軋也二公也自知不可以有為於斯世故一以彭澤折腰去一以香山退老歸當時孔孟之大學未明無以自適其心晦其迹故混身於蓮社寄情於淨土特託焉耳豈實以為有淨土之可遊蓮花之可生哉瞿曇氏說三乗其上乘髙妙者超然無所染着視所謂生淨土蓮花必曰幻化妄想葢心地淨明即是淨土何必西方逈脫泥穢即是蓮花何必淨土何佛非我何我非佛生之日誦厥名死之日冀生彼土佛學之髙者固巳黙笑是説矣况吾儒乎吾儒之所謂淨者在書為精一執中在易為洗心藏密在語為克己復禮在孟為盡心知性所謂蓮者在周子之說曰出淤泥而不染濯清漣而不妖中通外直不蔓不枝香逺益清亭亭淨植嗚呼此吾之所謂淨土蓮社者也夫宏甫吾儒之英其必然乎予之說茍然巳其以是為記仁智堂記金溪危侯季梁舊家於邑闤闠之南湫焉得閒壤距其居百步前有溪溪上有池可魚有園可花竹且宅於山水之要有曰翠雲嶺者有曰卓筆峯者有曰仙山者嶒􅗆􅍶崒竒踴秀躍則山之峙乎前者也有自翠雲闗而發者有自石眼泉而溢者有自白面塢合流而來者逶迤委折自逺湊近則水之匯于前者也危侯自紏廬陵歸始得以其俸之贏築堂以為讀書之地左竹右木嚮池偭溪春則翠色舊葱練光繚繞夏則濃陰四合陂澤如秋秋則木瘦潦淨月焉而益清冬則水落石出雪焉而愈絶殆人間希有之境也堂以仁智名雖取選詩卜此仁智居之語而究其本始則亦自孔氏智者樂水仁者樂山之訓發之夫動而無窮者水也智之達於事理周流無滯者實似之靜而有常者山也仁之安於義理厚重不遷者實似之夫智者豈必不山之樂而仁者豈必不水之樂哉特指其動静之似耳仁智四端之二人所同有本無所輕重其生質則有近於仁者有近於智者故其成也氣象似分焉如夫子則元氣不可名也如顔子則可以仁言矣如孟子則可以智言矣雖然仁者必智智者必仁不仁不足以為智不智不足以為仁非智者不必有仁仁者不必有智也茍局於一不得謂之兼體用矣紫陽夫子作精舍于武夷其堂亦名仁智其詩曰雖無仁智心偶自愛山水蒼崖無古今碧澗日千里夫無古今者體也日千里者用也危侯其亦有得於此乎性之仁其情之發為惻隠性之智其情之發為是非充之則達徳也危侯尹髙安其治盜議獄緩刑或以不快人意譏之侯曰吾非不能斷擊特非辜而誤則不可耳此心也其是非之正惻隠之真乎充乎此言則智仁之達徳幾矣顔之仁孟之智可希矣紫陽之仁智堂講道之堂也危侯之仁智堂亦讀書之所也必有得乎此矣故記之汲古堂記豐黄君叔淵以汲古名其堂請以言記之將朝夕觀之以助其汲夫學有古有今今之學雨集之澮射鮒之谷也淺而不足汲汲亦易窮古之學其無底之壑千仭之淵乎愈汲而愈無窮不汲則亦無繫於得喪汲之則停蓄不可勝用汲之古得一勺之潤亦賢於今學之無源者况汲之深乎雖然浩浩萬古渺無津涯載之者書書汗牛充棟不可勝窮讀之如望洋向若奚以汲欲汲盍知所用力也巳古之人有汲之者吾見其進未見其止顔子也任重道逺死而後巳曾子也深造自得居安資深取之左右逢原者孟子也後之汲古者能如三先師乎汲古之書當汲古之道古之道通百聖而一源溥萬世而同澤也棄焉而不學者未繘井者也學焉而不至者汔至井者也能自修者井之甃也甘自暴者瓶之羸也汲古者必有修綆乎綆孰是曰志士志於道不至於賢且聖不止斯為善汲雖然循序漸進可也母一掘而求井味書堂記番陽洪君粹一扁其居堂曰味書俾予記之夫人莫不飲食也鮮能知味也天下之味衆矣孰為正古之人有嗜芰者有嗜羊棗者有嗜芹者有嗜醯者有嗜茶者甘齒飴口之味疥痂腥魚之味熊掌豹胎之味不同也而均有味者焉書亦然味訓詁章句之學者有之味詩歌詞賦之文者有之味僻書異傳之記者有之味佛老清虛之言者有之味刑名術數之説者有之皆味也而皆未足為天下之正縱味之亦獨味耳獨味者味之偏同味者味之正也雖然人之所同味而往往至於人所不味此日用飲食與聖人之書皆天下之正味而知味者實鮮其以此夫聖人之於書也易牙之味也天下皆甘易牙之味而易牙先得我口之所同者也味不求於聖人之書豈其正味聖人之書非味書也味道也味道則淡而實腴者也常而實精者也優而柔之使自求之饜而飫之使自得之虛心而涵泳切已而省察兹味也其雋而永者歟富貴之味易窮聲色之味易厭愈味而愈有味者惟聖人之書耳聖人之書孰是曰六經六經之味何先曰四書四書自何而入曰致知曰持敬知則能味矣敬則常味矣番人多從紫陽夫子游洪君之外家至今有寳紫陽之帖者源委有自來矣願母雜以他味一和堂記天地間有至和之氣自太極流行散在民物邃古以來若大庭氏葛天氏此和肫其未鑿也唐虞成周泰和其在賢朝物野比睦黨婣一和所融百順攸萃甘雨祥露景星慶雲藪鳳郊麟民在仁夀日晏春燠和乎其可知也唐虞成周逺泰和不可復然在天地間亦未泯沒固有一家而唐虞成周者第不能比屋見耳豐城熊仲顯其一家之唐虞成周者歟仲顯生平安分不越三子雁行立諸孫蘭擢玉峙皆克承厥志豈弟雍穆相師成風闔門郁郁無間言父詔子兄帥弟夫倡婦祖抱孫色不一赬語不小誶誦絃序塾翰墨塲屋歳時伏臘炮羔烹羊獻酢拜稽春風㳺而醇酎醉仲顯亦樂其子若孫之能此也作堂燕怡以一和揭而楣之俾予書之復俾予記之予忱慕而欽之試為繹之夫大和在乎能保合也故龢可以乆知和而和必以禮節孰謂禮天理也子思子之經曰喜怒哀樂之未發謂之中發而皆中節謂之和中也者天下之大本和也者天下之達道夫不能和者喜怒哀樂之不中節也人能於喜怒哀樂未發之前體認此心之中允執之而勿失則喜怒哀樂無一之不中其節矣中者葢和之本和者葢中之達也達之可通於天下致之可位天地育萬物豈止一家之和而已和之義大矣哉君銘諸心僕記諸壁草堂記杜子美居浣花谿有草堂白樂天居廬山亦有草堂二公詩人也皆有草堂之適蹇驢破帽扶醉晩歸與抱琴書引妻子老泉石趣同也世徒以俗豔少樂天詩不知其清逸之妙不減子美草堂同矣詩異乎雖然不徒詩也子美一飯亦君樂天諷諫諸篇可國風比詩云乎哉二公古矣二堂墟矣名至今重天下詩云乎哉必有由致矣幸君端中學詩者也心二公之慕營草堂于廬之西興趣髙矣由古人三百篇之詩求二公所以為詩由二公數百篇之詩求二公所以為人草堂庶乎退之有言曰富貴無能磨滅誰記天地萬古百年須㬰盍謀與草堂不朽者使後之人指今之草堂如遊浣花谿曰斯子美也如過匡廬山曰斯樂天也則草堂三矣雙桂亭記昔王晉公種徳既邁知子必相欲驗厥報植三槐于庭責天之償如劵斯執魏公果以名徳擢秉國鈞子孫繼承不顯亦世煜煜盛事至今誦稱施氏之桂其王氏之槐歟同年施君有大家於通州崇明崇明文物邑也施氏又邑之望也先是君之曾大父以詩書起家知其後之必茂乃於諸孫講肄之地手植桂二而扁其楣曰雙桂厥後有遷役桂弗可徙君大父與昆弟析其根而植之仍舊扁焉桂日茂文脈日衍戊戌君二季父偕擢第嗣是登賢能書者亦相繼人咸以為植桂之驗比歳居復徙君之父恪承先志於所居之西廡植桂立扁又如其舊而俾君之兄弟讀書於斯癸丑君擢第植桂益驗君謂某曰桂於吾家固不敢望王之槐然三世于是輙有驗不可以不記子於我為同年幸記之某曰諾雖然君家之居三徙而桂三植矣而桂之茂如昔擢髙科者愈盛吾知君家所植在徳不在桂也陵谷之遷變不常草木之榮悴亦不常而君家之桂隨植而隨茂豈非根心之徳寓於是桂之根歟不然王侯邸第駢列異卉植桂者亦衆髙臺傾而曲池平桂則翦而童燼矣安能隨所分之根隨所植之地而俱茂乎萬形皆有弊惟理獨不朽某於君家之桂益信君其益種厥徳以昌斯文則君之弟又將擢穎世科伯仲聨芳如君之二季父而雙桂益驗矣王氏之槐豈専美乎蘇長公贊王氏之槐曰鬱鬱三槐維徳之符某敢借斯言以贊君桂養齋記予性質苦狷急遇物觸即莫能受甚病之思自藥一日靜坐得一字曰養榜以名齋自警也養之義大矣哉養則𢎞不養則隘養則充不養則餒徳以養純才以養裕學問以養涵深器識以養廣大孰為養葢有要道養其大者為大人養樲棘而舍梧檟養一指而失肩背非養之善養之善莫若養氣心者氣之主莫若養心心之不能養忿與慾敗之也忿不瘳吾戈矛慾未浄吾陷穽忿必懲慾必窒然後可以持志而養氣氣善養則充且𢎞矣充且𢎞則所養正而聖功寓矣豈止藥吾性質之病而已哉雖然懲忿窒慾養之善也奚而懲奚而窒曰獨不聞周夫子之言乎澹則慾心平和則躁心釋豐城王氏家廟記王氏家廟者豐城王氏之始祖也諱威北平王諱處直之子唐末巢寇披猖天下無有先舉兵援王室者北平王之兄忠肅公諱處存首倡義聞賊陷京師即慟哭不俟詔分麾下兵二千間道至山南衛乗輿語及國難輙流涕以是將士感激為之奮又遣使説李克用率兵復京師以勤王䇿勲第一忠肅公歿子郜弗克嗣軍中推北平王為留後始以朱温表封尋絶梁請自效于晉救王鎔翦幽燕取魏博與梁戰河上十餘年王未嘗不以兵從晉之滅梁王力為多王有養子都孽子郁公則其幼子蛇鵲見妖獍梟不道公北走契丹契丹主欲爵之後以襲王氏晉髙祖不可遂止公不安於契丹竟自北而南徙家于豫章豐城之城頭里有至徳觀鐘銘及碑可考葢自契丹歸時中原雲擾故避地于江之南也自五閏積至今凡二百餘年子孫蕃衍盛大别派分枝星列棊處緜亘十四五里皆一姓舉進士者代不乏人團族彬彬皆儒公之十四世孫某懼其族之衍而歳且乆將忘其所自出也乃於其里白馬山之陰立一廟而取其族譜圖刻于中俾公之子孫至斯廟者皆得因流而尋其源焉族之人雖數十百千而其來實出于一則協比友睦之心油然以生不至於親盡則疎相視如路人美哉斯意乎夫知有母而不知有父者禽獸也知有父母而不知有祖者庻民也為士則知有祖矣知有祖則知有祖之始矣聨宗協親族序可以和别生分類譜牒可以考是廟之立豈徒云乎哉抑王氏知其祖之所自出又當知其所自立也忠肅公倡天下以勤王北平王絶梁賊而助晉與公之舎契丹而復中國皆卓然知義理之正而不茍焉者也此其所以有後歟生於亂世全身逺害雖不襲爵土而無憾第欲吾身不泯沒於契丹獲歸死於中國而遂足公之識尤非五季人所能及此公之所以尤蕃衍盛犬歟不然西宅之變中山之禍王氏無噍類矣公以一身自契丹歸王氏之脈僅如綫今三百餘年子孫之蕃衍盛大乃如此其何以能爾邪明君臣之分嚴中外之辨萬形弊而此理不朽也王氏子孫其世此心後之興者必盛於今矣寳祐元年三月日姚某撰并書武寧田氏希賢莊記天地之大徳曰生人為天地之心必能流暢天地之生意然後俯仰而無媿先儒謂仁者天地生物之心而人得之以為心仁也者葢天地之生意凡天地間何物非我一物不遂其生吾心慊矣士君子之生斯世達則仁天下之民未達則仁其鄉里能仁其鄉里茍達即可推以仁天下之民此晦庵朱先生取成周縣都委積之制而為社倉西山真先生又廣晦庵未盡之意而為義廪也社倉貸以濟農義廩糶以濟末農末均足而後無一人不被其澤仁意畧盡矣雖然猶未徧行於天下也希我先覺厥惟後人武寧田君倫徳彛與兄佐徳賢從子可簡元行偕其族之子弟采二先生之意立法以濟鄉里歛穀六百石為貸本號希賢社倉者希晦庵也率楮六萬緡為糴本號希賢義廪者希西山也先是甲寅正月君從子可復因讀義廪規慨然有感歸與其兄之子允中謀之協徧告之族咸曰善七月甲子君弟偉徳英自姑蘇以書遣三萬楮來翌日乙丑即鳩工築舍於江陰鄉之水口里命其族之能子弟曰可乆曰允恭者職其事貸息什三糶視歳直減錢百以貸之息補糶之折貸春散秋歛十家為保糶惟及細民人日一斗始歳十有一月至明年夏六月終日别以五斗糶行旅法既具書來告成予讀其規三為之嘆夫希賢難也舉其族而同志於希賢尤難也姦豪猾富挾多貲以為不仁之具惟知什五取厚息歳歉躍髙賈耳孰肯念民之餒且殍間念及此一人欲之十人旁而沮之亦孰肯翕然以和今田氏父子兄弟獨不爾可復首建議允中曰諾可立薦執事可乆允恭曰聴區處規畫法良意美告之其長徳美則曰活鄉井之命即所以活一家之命又曰利害相半人猶為之况有利於人無害於已徳彛則曰先儒曰食者人之命宜於此少加仁心又曰置田蓄穀為子孫計安知子孫真能有之私諸己者不若公諸人塤鳴箎酬珩蹌璜應倡議而即協貽書而即從書至之明日而倉即建推家以及鄉推鄉以及旅雖淳熈吳氏兄弟得師之說而即行之者殆不是過也可謂勇於為善矣猶未也初徳彛以書來某復之謂息什三不若止從晦翁之什二糶僅減錢百不若仍糴之價而糶之如糴之貴則糶當賤未幾徳彛復以書来曰子之言是也斯不謂勇於為善乎希賢亦賢矣使所在倣而行之則是法可徧於天下天下無一民之饑也此二先生所望於後之人也或者則曰田氏固賢矣私貯儲而官不與知他日邑有暴君汙吏或侵移之何如予曰仁人心也誰獨無是心哉昔孝皇頒朱夫子法於天下正欲天下皆行之也官不行之而民為之民自為之而官奪之誰敢哉所當力行者曰公曰乆耳公則乆矣晦翁之規社倉也或疑其似荆舒青苖法然用心實不類荆舒之青苖主於富國私也晦翁之社倉主於仁民公也公則仁不公則不仁公則乆不公則不乆田氏兄弟父子但力持一念之公以求仁則天地之生意無窮二法之惠乆矣乙卯冬十有二月瑞陽姚某記并書清湘竇仁孟晉窻記清湘竇仁孟篤志嗜學熙齋鄧貳卿名其讀書之窻曰晉取易明出地上晉之義也丁巳秋仁孟訪余於山中請為言其義夫仁孟讀書於是窻之間蚤而作覩朝日之出試嘗有得乎方宿雲翳天萬宇冥冥舉世昬瞀目者未視足者未履也畢逋成晨啟明在東赫然金鉦躍出渤澥浴咸池晞扶桑碾青霄而上四表一明殘星韜而宿霧歛矣自朝至中愈高愈晰翾飛蠕動跂行喙鳴檣浮轡走莫不各得所欲此明出地上之晉也而明明徳者實似之日愈進則愈明徳愈充則愈光明徳在躬天予全體如日之無虧欠也有生之䝉本體雖具而知識未充如日之初出而未甚明也學聚問辨格物窮理以極於髙明光大之域則是日愈進而愈明矣惟精惟一允執厥中學至於中而止日亦至於中而止過中昃矣自朝至中明出地上之晉也自昃至暮明入地中之明夷也昃雖未入地駸駸向乎入矣有夷其明之義矣是故日中宜照天下學者之學至於不偏之中無過不及然後可明明徳於天下大學中庸一道也日有光自明也物無不照新民也晉之象曰君子以自昭明徳自昭所以使人昭歟未有昬昬使人昭昭也然則自昭明徳用力自何而始河南程子釋是象曰去蔽致知嗚呼此愈進愈明之本乎仁孟當有味乎程子之言雪坡集巻三十六
