body:
  text: 雪坡集巻三十九宋姚勉撰論論語先進於禮樂或問先進於禮樂野人也聖人何以從先進曰以其質也或曰以質則無事乎文矣乃又曰周監於二代郁郁乎文哉吾從周則又文之從矣奚所從之異乎曰不異禮樂之情則從乎質禮樂之文則從乎文情而文則靡矣文而質則俚矣文情本於質而有文以文之然後禮明而樂備記曰鐘鼓管磬羽籥干戚樂之器也屈伸俯仰綴兆舒疾樂之文也簠簋俎豆制度文章禮之器也升降上下周旋裼襲禮之文也是皆非禮樂之情也然舎是則不足以為禮樂清廟之瑟一唱而三歎有遺音者矣大饗之禮尚𤣥酒而俎腥魚大羮不和有遺味者矣是則禮樂之情也情者文之根本文者情之發揮故曰知禮樂之情者能作識禮樂之文者能述然則從乎質者作禮樂之意也從乎文者述禮樂之事也而奚以異雖然則吾從先進聖人葢亦有激而言也其以世變之日趨於文乎故欲反其本孟子學問求放心孔子曰操則存舍則亡孟子曰學問之道無他求其放心而已矣孔孟之言一也皆欲復其本然之心而有之矣夫子之所謂舍即孟子之所謂放夫子之所謂操即孟子之所謂求也無以操之則舎者終於舎矣無以求之則放者終於放矣人莫不有是心也心之所以不得為心者物之誘而念之流也豈惟下愚為然自聖人之外雖賢者不能免特愚者則舍而不能操賢者則暫舍而即操耳愚者則放而不知求賢者則暫放而即求耳然心吾心也非外物也其舍者非果於亡一操之則亡者存其放者非終於失一求之則失者復此夫子所謂出入無時莫知其鄉葢此心雖舎之放之亦不即散逸而不復也有時而出有時而入牛山之木濯濯者未常不萌蘖之生但患不知其出入之時入之時寡出之時多且莫知其歸宿之鄉耳夫子此八字最善名狀夫人之心今夫不知操存求放之學者有不蹈此失者乎要不可無體認省察之功也一覺其舍則即操之一覺其放則即求之力到功深念念純熟無所謂舎無所謂放矣如之何舍者不知操放者不知求哉孟子所以設為雞犬之喻以小明大以見此心之不可不求也雞犬特外物之㣲者放則知求此心乃吾身之主所以享受天命之理乃聽其放而不知求是視此心不雞犬若也豈不大可憫哉桐梓知養而此心不知養雞犬知求而此心不知求此孟子即物喻心所以警夫人者極為至切學者一味斯言可不一大警懼哉然則何從而求其放心曰孟子葢常以夜氣旦氣之説明指以示夫人矣人於旦晝之時所以泊亂此心者不知其幾千萬緒惟於夜氣靜定之時旦氣清明之始則可以見此心之本體斯時也茍能求之則放者不至於牿亡矣是不可無體察之功也而所以操之則又在於求之之後書曰雖收放心閑之惟艱閑之者其操之乎操之有道曰敬孰為敬曰主一無適何自而能主一無適曰非禮勿視非禮勿聼非禮勿言非禮勿動請從事於此四勿趙簡子置後趙簡子欲置後而無所適書訓辭以授二子三年而問焉伯魯遺之無恤識之乃立無恤卒祀趙君子曰是不可為萬世法昔商帝乙欲舍受而立啟太史據法爭之曰不可有妻之子不可以立妾之子遂立受商墟焉人皆悔帝乙之不立啟也然君子則善太史之法何也亡國之禍小奪嫡之禍大也亡國之禍止其國耳嫡庶之分不明焉則後世效之其禍及萬世故寧亡其國而嫡庶不可亂嫡庶不亂不幸而亡國如受者鮮矣嫡庶亂幸而不亡國如襄子者尤鮮也是以春秋大居正謂簡子為善於擇子則可矣以為可萬世法則未也晏子家施不及國昔齊陳氏以施得民將有其國晏子謂齊景公曰惟禮可以已之在禮家施不及國公莫能制陳遂有齊後世皆為晏子惜也愚獨謂不然夫天下之患當救之於其萌不當救之於其明患之萌也救之易其明也雖欲救之難矣方魯昭公之三年齊景公即位之九年也晏子與叔向語已患陳氏之施矣而昭公之十年陳鮑逐欒髙而分其室晏子既不能相齊君以遏其漸方且勸之以遜邑戒之以藴利而復語之曰可以滋長陳子於是致邑於公分無禄者以邑周貧約孤寡者以粟且舉陳錫哉周之詩以明能施之義陳氏之施葢大於此晏子教之也教之以可以滋長之術是教之以取齊國之術也教陳氏以取國之術而復教齊侯以制之無異誨之竊而導之捕也晏子得為齊忠臣乎夫以小惠求民心亂臣賊子之巧於取國者例能也宋鮑竭粟以貸饑齊商人驟施以聚士魯意如食隠民以為之徒其智盖相祖也陳氏而不為鮑不為商人不為意如則己茍有志焉固不待教而能也而况有教之者哉是宜其聞可以滋長之言而即誦陳錫哉周之詩也可以滋長此何言乎教之於其先安能已之於其後乎晏子教齊侯以禮之時去教陳子以施之時纔十五六年耳而陳氏之勢如此非晏子教之誰至是哉假而齊侯亟從晏子之言亟止陳氏之施齊失民矣又安能禦民歸陳氏哉是驅之也教齊侯以已之之術不如勿教陳氏以滋長之術長且滋之又焉得而已之斯言也特借以盖其非耳譬之水焉濫觴之流既開迄至排山倒海之勢則雖有隄防亦無所用然則終不可救乎曰可魯定公之時三家張矣一旦孔子行相事墮郈墮費如振槁木至女樂餽孔子行而成卒不果墮尊君卑臣强公室弱私家聖人盖自有道也使孔子在齊則陳氏不難制矣而齊景公欲用孔子晏子譖之孔子去齊齊安能制陳氏哉史記世本或問堯以二女妻舜信乎曰信書載之史述之奚而不信史可不信書可不信乎曰然則史謂堯黄帝四代孫舜黄帝八代孫是同出黄帝之胄也且堯女乃舜之從曽祖姑也八代孫可娶四代孫女乎曰否吾固曰史可以不信書不可不信也八代四代孫之説載之書乎載之史乎書固不載之也史則繆矣繆烏可信哉且史之説本於誰乎葢本之於帝王世本等書也世本等書非出於六經非出於夫子曲儒末學訛誕相承之言耳奚其信苟以為信則史又嘗曰契十四世而有湯稷十六世而有文王且謂稷契皆帝嚳之子葢兄弟也十六世距十四世纔兩世耳而周之兩世乃經商之六百年契之十四世何促稷之十六世何長耶吾是以知其系之不然也使堯舜均為黄帝之孫則固天子之胄八代去四代亦未大逺堯何以得自唐侯而為天子舜何以居側陋而鰥在下耶皆天子之子孫相去未逺一何貴而一何賤耶舜果堯之族則堯欲遜以位直以授之家人耳又何必咨四岳而揚側陋耶吾是以知其必不然也且後世謂天下之人皆出於黄帝者其説尤繆開天闢地以来帝王不可考據夫子所稱而可信者黄帝之前固自有伏犧神農也伏犧神農之時人之類多矣今而曰天下之人皆出於黄帝則伏犧神農固無後也耶伏犧神農時之人之固無後也耶叔孫昭子論仲尼曰叔孫昭子之不勞不可能也牛殺叔孫氏之嫡而立昭子出於非所觀望之中一旦而得百乗之家立三卿之位牛葢有大造於昭子也昭子立而牛戮焉且曰牛亂叔孫氏殺嫡立庶以亂大從不諱乎已之為庶而明孟仲之為嫡不知有立己之小惠而惟知有叔孫氏之大從若將終身不可忘之私恩而乃决然棄之不啻土梗昭子豈少恩之忍人哉以公滅私見善明而用心剛耳若昭子者豈不毅然大丈夫也哉夫百乗之富不可以驟至也三卿之貴不可以驟升也牛不立昭子昭子亦未必有是也今昭子不此之顧使有一毫求富貴之心能若是乎此所以為不可能也於是可以為萬世法矣周平王為太子幽王立伯服而黜之申侯其母舅也扳犬戎伐周室弑幽立平而去平王踐天子位苟能告之方伯告之諸侯正申侯之無君誅犬戎之亂華則公義明私恩廢周之威復振周之道且復興矣平王不知此義方且徳其母家逺屯戍之天理泯而人欲行周之所以衰也使昭子而不戮牛牛且挾其立己之恩専制叔孫氏之家以及于魯牛且一陽虎矣惟昭子奮發大勇迅速不留故叔孫氏得以為安而魯猶得以為秉禮之國亂臣賊子知亂大從者雖至於立已猶以義不與也於世教豈小補哉是獨不得為萬世法哉漢之君而知此義則擅權之五侯誅而漢不陵矣唐之君而知此義則定䇿之國老誅而唐不晚矣如之何其知私恩而不知公義哉知之者僅有漢宣帝焉霍光有立己之恩而不免於赤其族庶乎知此義者雖然亦未為知此義也使霍顯不毒許后山禹不謀廢立族豈赤乎麒麟圖像爵姓不名私恩猶在念也是宣帝亦未能如叔孫昭子也抑宣帝猶武之嫡孫霍光猶曰廢昬立明也後之殺嫡立庶而借廢昬立明以文其姦者當以叔孫昭子為法荀息論荀息以傅奚齊死公羊賢之君子非焉曰是非聖人春秋之意孟子曰可以死可以無死死傷勇有子曰信近於義言可復也夫人莫不有死而死有二或太山焉或鴻毛焉荀息之死太山之死歟抑鴻毛之死歟吾見其為鴻毛也死所以成其信而息之信則非近於義也可以無死者也使獻公初以荀息傅奚齊為息者告之曰廢嫡立庶亂之招也申生廢焉而立奚齊非愛之也其將召亂乎臣不敢聞命君命祗辱茍如是獻公幸而聽則晉可以無亂不聽雖得罪亦可以無死今也不能正救其君徒將順以成其惡雖死吾不謂之能死矣夫受遺託孤重事也忘生徇義忠節也而死於奚齊遂為不得其死士豈可以輕死哉息之言曰臣敢竭其股肱之力繼之以忠貞息將何以為忠貞乎不陷君於不義忠也以己之正而納君於正貞也今也獻公溺於私愛以亂其國而不諫可謂忠乎成其邪志可謂貞乎里克以息之死為無益非惟無益於奚齊葢亦無益於息也傅奚齊之為非矣奚齊殺而復立卓子是遂君之非也其可乎聖人作春秋於奚齊書曰君之子謂其特君之子而非晉之君也奚齊之不可君則聖人之不賢荀息可知矣或曰春秋不君奚齊何以君卓曰貶必於其重者奚齊貶矣卓為君息為大夫特據實而書耳若衛剽之類耳聖人豈以不食言賢荀息哉不食言而以為賢則不食於盜賊者皆可以為賢矣有子不必曰信近於義孟子亦不必曰可以無死矣若荀息者特匹夫匹婦之為諒也左氏曰詩所謂白圭之玷尚可磨也斯言之玷不可為也荀息有焉夫以荀息之言為言之玷庶乎知春秋聖人之意矣雪坡集巻三十九
