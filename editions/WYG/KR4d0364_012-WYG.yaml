body:
  text: 雪坡集巻十二宋姚勉撰詩七言絶句題小西湖主人胷次一西湖新展蘇堤小畫圖待種梅花三百本請君雪裏訪林逋再題小西湖和張𤦺韻閤前白倚竹扶踈梅似逋僊柳似蘇待向山椒結茅屋更添偉觀占江湖深深晴日漲湖煙開着蓬牕飽㸔蓮只怕客來童放鶴又催花裏棹歸船記得臨風玉樹前聽詩長愛思飄然肯來重結鷗盟否新有湖亭八九椽題恵政橋生愁杜宇呌津橋呌入南人贊眡朝安得砥流如此石康衢日日聽童謡題藍橋芝堂自瑞天朝宋竹郡久更江左唐願似誠齋詩句説朝京舊路再筠陽題長沙鋪君向長沙驛舍來驚心此路想遲回漢庭賈傅曽還否風撼空山葉欲堆題左國寳後村桃李隔墻花滿園卯君曽此賦東軒秪今左氏莊如許恰在東軒近後村題胡景顔雙清堂盤桓松菊陶元亮俯仰山泉白樂天長謂若人無復有後身却在石溪邉題靈溪道旁水閣一碧無波湛淺溪釣舟已繫打魚歸碧山黄葉排如畫中有聮翩白鷺飛題崔莊庵壁碧潭見説有龍蟠萬里滄溟氣欲吞此去風雷轟蟄起大施霖雨霈乾坤筆峯秀聳帶溪縈人傑當知是此生説與山靈湏借助從今姓字達天京題月巖巖影嵌空月欲圓天風吹動碧雲端到天一半已如許真到廣寒應更寒題松風閣萬松排立撑雲表虛籟生風秋月皎了翁安在不可呼雪鶴飄然下林杪題鵲巢寺脩竹蕭森影過墻屧聲寂不響回廊道人獨坐清無對飽殺薫風一味凉孤山納凉雙鷺窺荷弄水香一蟬嘶栁送斜陽京華凉處惟湖上更有孤山第一凉遊冷泉亭宿四聖觀晝日追凉到冷泉晩風呼酒醉湖邉醉中興懶休歸去試叩丹房借榻眠題四聖觀小蓬萊湖光平接碧天開浮世笙歌下徃來箇是蓬萊真絶頂如何只道小蓬萊四望亭觀荷花面面湖光面面風可人㝡是白芙蓉分明飛下雙雙鷺纔到花邉不見踪孤山聞木犀湖面清風拂酒盃異香一片自天來明知不是荷花了金粟漫山昨夜開木犀絲絲朝雨濕牕紗薄日疎雲弄霽華可是都城秋事早新凉更有木犀花賣花擔上買秋光分貯氷壺沁曉涼滴取露珠供硯水筆頭已覺帶天香甆缾對貯碧金叢萬斛香藏一粟中侵曉起來清馥滿夜來真睡廣寒宫芙蓉水芙蓉了木芙蓉湖上花無一日空巻却水天雲錦段又開歩障夹堤紅遊下竺園穿洞扳巖日幾回瘦笻欲去復徘徊園丁亦怪經行數笑道今朝官又來九月十日晴簷雨牕風隔夜秋曉㸔天宇忽雲收菊花尚在仍佳節未必今朝蝶已愁九月十三日飲湖上閉門十日厭塵埃纔見湖光眼便開㝡愛平堤楊栁外幾舟撑去幾撑來别西湖别了東坡更樂天重來薦菊又明年欲行且止真難去再泛西湖半日船漸是梅花雪片時鴈書底苦趣歸期雖然未賞西湖雪猶及梅花第一枝道中即事路盤山行崖挿天儂行山頭下有船逆船上遲歩行速舟人指儂誇為僊霧氣澒濛水氣蒸上與寒日爭昏明江心有船不可見惟聞咿啞摇櫓聲霜融霧消又作晴四山日氣烘春明黄葉如金紅如錦枯梢無葉更覺清心馳家山恨不飛兩旬欲作一日歸征衫尚絺未足苦天寒親老未授衣蕎麥花開如雪鋪新霜寒早半欲枯故山今年熟此否讀書夜飢需餅爐誰家玉雪花嬌兒頓足嬉笑牽爺衣韓家阿拏今已矣有誰門前迎我歸天晴日短亦覺長客行一日兩舍强道傍蕭蕭木葉下天風又辦明朝霜橘纍金印楓錦衣夾路相照生光輝我非買臣與季子但有菊佩芳菲菲我亦欲懐三赤珠陸郎有母繄獨無治生復無人諫止亦豈能有千頭奴怪梅蟠屈如龍蛇小紅如粒欲作花雪坡一株恰如此歸歟月明㸔横斜道傍紡女道傍女子雙髻鴉兩足如雪踏紡車村莊人家只如此齊宫歩歩生蓮花贈陸伯容掛琴無壁一長吁可是儒冠竟誤儒好把清波回涸轍莫教白眼哭窮途陳明卿覔瓦葢屋玉川幸有數間屋子美怕巻三重茅為君覔費易陶瓦夜牕寫詩聴雨敲早起觀雨餘蛛網嫩凉催讀矮牕書曉色初分恰雨餘莫笑頽簷無活計四邉寳網掛真珠七夕分韻得絲字柳子中庭乞巧時始知抱拙不汙卑向令早似愚溪日未必緇塵湼素絲題蜀江觀漢中元元年光武中興三十有四年也是夏洛陽醴泉湧出飲之者痼疾皆愈自建武數至中元三十二年然光武興於更始元年尚有二年也寳祐丁巳上即位亦三十四年矣瑞蜀江觀靈泉復湧功與漢泉等先是淳熈十二年曽湧觀以是建今復湧是吾君聖徳昭天漏泉軼漢光規孝祖也不然何此瑞復見瑞之陽乎維時先臣某嘗歌詠之矣某不肖逢今昌運詎敢黙然謹拜手稽首而作詩光武中興三十年愈民痼疾發靈泉吾皇何止如光武瑞井宜通瑞錦邉孝祖淳熈極盛時此泉曽發蜀江湄綉衣酷吏雖湮塞難掩公朝賜石碑飛昇千載許旌陽一念吾民尚未忘循吏儻憐民疾苦開泉療疾又何妨幸喜甘霖做嵗豐靈泉又奏濟人功但令姦猾銷聲好莫禁民躋壽域中題嚴子陵釣臺倡周節義有夷齊釣渭鷹揚可太師西漢頽波無砥柱先生只合一綸絲扁舟誰不過嚴灘喚醒貪夫醉夢寒名教扶持真百世豈徒當代懾曹瞞封了全燕不復臣友朋從此廢天倫子陵不為光皇屈要識君王有故人懐仁輔義戒阿諛萬古先生兩句書長徃不來安有此始知王佐在樵漁除夕前一日湖中望西山有感西山青處近家鄉先世衣冠正此藏明日千門俱祀嵗墳前誰拜一爐香思江南筍蕨先生亟去理山齋筍蕨春甜味正佳一夜東風催變緑筍吹成竹蕨成柴贈陳龍湖蜿蜒寒碧捲深清一洒甘霖澤萬生此際莫驚蟠蟄好近冬時節不妨晴題王昭君謝却君恩入塞塵宫花從此不能春丹青莫恨毛延夀婁敬先為作俑人送周縣尉卿月滿秩歸清浮寒露在氷壺一節三年更不渝莫道來時琴鶴在而今琴鶴一齊無采棒年來可怕人先生一念只慈仁吏奸却立晴氷曉民瘼皆甦化日春鄉户生愁役破家買田助義息紛譁從今閭里皆安業男課犂鋤女績麻自古髙安欠學宫新庠贊立竟誰功青青子佩争絃誦總在先生化育中方今天下少貞廉廉有如公豈暫淹見説東皇思柄用姓名已向玉瓶拈送京學林申甫京庠林申甫余舊同舍生也庸齋先生趙端明嘗為書小隠萱堂四大字申甫復欲余書既有先生銀鈎鐵畫在前後學不敢僣也姑各賦之詩林飛倦翼已知還小隠何妨且住山未始便為長徃計回頭魏闕五雲間右小隠萱草忘憂底鮮忘慈親鶴髮坐髙堂羨君有此忘憂得如我添憂萬斛强右萱堂送歐陽應䕫瀧岡六一先生鄉也舊有祠中廢弗葺應䕫請於郡興之是可嘉尚索詩為賦祠宇重修復舊觀喜知家世未灰寒秖今陛下如仁祖安得先生作諫官寄題章貢劉氏麗曉樓玉虹翠浪雪堂詩底事山光曉獨竒㸔取隂雲都捲處直湏天下大明時題梅莊郭成甫瘦吟帙倚着梅花讀瘦吟氷章雪句照人心未應只為吟詩瘦且占春風笑上林梅似臞僊瘦為詩清寒直欲不勝衣吟成雪裏調羮句此句却令天下肥小漿題壁用趙信國韻雲脚崢嶸日欲西釣舟箇箇泊前溪客牕不寐君知否枝上饑烏夜正啼踏梅聊爾過江西月裏漁竿冷挿溪料想故園春事好亂花深處聽鶯啼菊節宿白沙次友人韻野市難為側帽紗家山猶逺雪鷗沙退之尚有衣堪凖悔不留君醉菊花贈李森幞頭冠幞非古也然所以莊其首則亦古意京師工此製者甚多獨真李官人為第一求詩為賦之如龍驕馬出東華競指横烏席帽遮盡道李家模様好㝡宜頭上帶宫花贈施大夫履鞋漏院穿霜聽徹更催班影踏禁花行不湏更待尚書諫聽履先知有直聲贈劉仲圭占牌書銜莫羨一條氷美職髙官不足稱何事只存天爵貴令名長與日俱昇天巧都存篆刻中得君刀筆即榮通鳯池誰信曽三入闗吏猶猜八十翁張道夫惠大小硯五走筆戲謝蛾眉五硯列牕前漬墨磨丹總可憐試向鶯鶯主人問大鬟何似小鬟妍贈敷上人遊五山拄杖挑雲過五山無心出岫倦飛還參禪未用多行脚道在如如不動間贈煜上人石牕八牕本體自玲瓏鑿石為明更不同遮莫獼猴常應外直湏蟾月鎮當中寄感山二詩僧到感山尋雪山樵詩僧不遇寄以詩又入旃檀寮中見几上有江南麥詩問誰作乃有如是佳句衆以真半顛對問居何地則云南峯王月莊云是嘗欲見余説詩者雖未識亦合寄以詩欲聴茶鼎轉風松底事雲房白晝封應在山中採樵去雪深何處問行踪右寄雪樵讀君桑葦踈籬句知得猶存用世心拄杖借將來解虎不湏深卧白雲深右寄半顛江南麥詩欲改一字謾録于後江南麥似草離離哨騎貪青隔岸嘶驚得村翁無計較旋樵桑葦縛疎籬元本是多計較改作無字覺尤有味顛以為如何贈僧雪翁雪翁來覔雪坡詩氷雪相㸔太絶竒一片紅爐參徹了梅花香透玉横枝丙辰祗召入京道信州題一杯亭山行頗覺興悠哉到此何妨飲一杯爛醉不湏愁世事明朝醉醒又愁來趙福王飲一杯於此南臺福王所建一片荒碑立翠苔空餘基址鬱崔嵬此臺湮廢渾閑事山北如今未有萊跨鶴臺唐時有僊人于此跨鶴昇天僊人白日上青冥鶴去臺空喚不應千載令威歸得否雪堂有客夢如氷寄題茶山汪玉山為大魁後從曽茶山學于此文獻風流想故家玉川室邇已人遐何時細賞文清竹與客同煎陸羽茶文清公有手植竹在題祥符寺鐘樓前有古木可三百年山在雲間幾上梯㝡髙縁有福王祠尚憐不及樓前木得見祥符極盛時贈長老洪野衲舉目茫茫宇宙間畏塗險甚太行山鑊湯隨地無氷處只有僧廬野衲閒洪長老惠藤杖髙僧挑月一枝藤惠我登山脚便輕澒洞風塵􅉘虎惡從今險路穏支撑㳂江買魚不得詢之則前此多為官船所强取故有亦言無因成三絶江行安可食無魚問着笭箵總道虛底事官船渠不賣從來汚吏喜侵漁分明翠籠掩金鱗鼓枻飄飄不可親底事官船渠不賣官人不是愛魚人人間到處有魚羮我亦扁舟栁下横一任官船渠不賣歸歟鱠玉煑深鐺過麻子湖遇逆風有作我自甘心欲背時舟行一任逆風吹去帆今日誇輕捷只恐前灘也怨遲自喜扁舟載月明渉湖底事不宜輕象痕深没風仍順今日天公亦世情時見有自吾州解官歸者數船滿載且遇順風來去船皆欲便風天心豈解兩相從儂㠶一順渠應怨不若從渠且苦儂兹行已誤出山來得就蓴鱸亦快哉造物莫嫌歸未是故教風力倒吹回世道如斯决意歸此心不怕八風吹吾生忠信無休日天下風波有定時時丙辰十二月次鄒希賢買魚不得三首衍為漁翁問答六詩問漁翁撥剌金鱗競躍淵决非明月載空船有魚不供行人買莫是漁翁不愛錢漁翁答游魚驚餌總沉淵一任携竿晩立船今世有錢人總愛漁翁豈獨不貪錢再問魚器如何盡擁虛未應寒鬛總依蒲終朝竟夕渾無得莫是君鈎太直無漁翁答𣺌𣺌澄江湛碧虛風㠶一幅掛輕蒲吾鈎豈直魚鰕設入釣文王未解無栁文一釣易得文王漁翁問見説京糧舊日籯學將湖舫入江撑而今歸去應無事蘆笋蒿芽錦鱖羮答漁翁茅屋無金可滿籝湖邉小艇却堪撑縱無介甫魚羮飯也學東坡飽菜羮和陳和卿四絶絶交久是孔方兄賒得村醪小欵迎君豈真無食肉相夜來􅂼筍太僧清梁燕無聲晝掩扄若為消此畫堂清急呼覔句陳無已莫撚吟髭且一枰蚤裏溪人又饋魚未容歸興動蓴鱸秪今更辦開蔬供君若來遲釜恐無空齋長夏永如年鶯囀林隂鷺水田只好更尋棊一局莫孤花影午時天和龔宗諭五絶多少掄魁豈獨今道心誰勝利名心只知晁董前頭立何似周程樂處尋吾儕從仕為家邦豈羨科名世少雙激浪湏㸔巋柱立犯顔安可畏郎撞學不求名况為官官甜初不似儒酸無能富貴都磨滅真作浮雲一様㸔聞僅二知雖賜也道傳一貫必參乎已私克盡融天理表裏通明月在壺名下惟知不可居誨言終日反三隅愛人以徳今忠獻莫道前賢久已無勸學示子元夫事業功名在讀書聖賢妙處着工夫區區只為潭潭府不敢如韓訓阿符弈棊有感奕秋鴻鵠未湏驚一着才差敗一枰不信但來茅屋裏紙棊盤上㸔輸贏己未秋杪敵騎雲擾聖主神斷斥逐元姦臺臣始有抨彈之疏因成二絶一惜言者之後時二願局面之堅凝也牕紙暾紅枕上知破寒初聽一聲雞雖無風雨瀟瀟度也勝隣家曉不啼右失曉雞積雨霖霪忽報晴元來依舊有清明霜天護取晴牢着莫放寒雲半㸃生右喜新晴嘲猫斑虎皮毛㓗且新綉裀嬌睡似親人梁間縱䑕渾無䇿門外攘雞太不仁嘲燕蓬蒿塞徑掩柴闗紫燕離巢更不還大厦連雲成就日重遊簾幙有何顔詠蜂百花頭上選羣芳收拾香腴入洞房但得蜜成甘衆口一身雖苦又何妨贈電眸陳相士巖電當年説阿戎清談于世竟何功君今雙目真如電舉世忠邪一覽中贈談天星數王子貴談天客子晝敲門相對晴牕話一樽到底忘言方是妙梅花枝上㸔乾坤雪後同友人觀梅簷珠瀝瀝雪初晴酒滴寒槽雜溜聲旋釂梅花斟夜月人間那得箇般清和姚𣙜院送茉莉韻清甚氷葩淡不粧能從盛暑到秋凉瓊樓合着移春檻却向山齋供凈香雪坡集巻十二
