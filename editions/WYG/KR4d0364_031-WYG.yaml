body:
  text: 雪坡集巻三十一宋姚勉撰書答安撫徐矩山書庚申伏自三月四日洊領尊賜翰墨嘗附便遞拜答比者恭審出命中宸予環外服大則踐政塗之地小則歸從槖之班綸綍一頒搢紳交賀况於門人弟子六載間闊誨侍自此乃日快厥心長有摳趨之便其喜實倍等倫方欲馳牘以賀而又荷軫念再捧教函餽以賙其貧書以發其陋感激交并有如先生時之正人朝之重望與西澗葉先生在履齋更化之初蓋天下擬其為第一畨召客矣拂鬱公論以至於今今石相還朝無日不委曲為諸賢地於是當召者始召而先生與西澗先生首在弓旌之招矣前日公論之鬱者至是而始舒朝野蓋共為之慶惬也抑齋意一二先生還已就治否但所慮者抑齋老先生未肯便出耳愚意謂不如歸此二大老於朝細氈廣厦珍閒之館以佚之别命時賢為先生及西澗先生之代然後為得但未知愚説得行與否耳履齋此畨再相聲譽頗減於前不甚惡丁之黨而善類曾仕於謝之時者每以為謝之黨某一日勸其召外間諸賢答以外間今無賢可召某試枚舉未召者且及於福建路監司四人履齋至謂葉先生為謝之黨某力辨其不然而終不以某之言為是也今右相則不然内無私人外無雜客進擬必詢於衆必出於公除目日有快人意者若得政事一出於中書使得以盡展布天下庶乎有瘳但今有用忠樸謹實之人不得用譁訐取名之士之戒飭使所用果皆忠樸謹實誠國之福但恐緘黙取容者便謂之忠樸謹實切直敢言者便謂之譁訐取名則不可耳今庸齋已不來西澗又未至在朝幸有王脩齋江古心劉朔齋及洪恕齋數公耳而楊平舟已召可繫天下之望更得先生與西澗先生蚤入氣脈必漸完復也某待罪於兹家鄉不堪回首直是無况味所願武備修舉今秋敵人不敢再渡所在殘破州郡漸漸修復鄉里亦稍得如其舊故山可棲則汰斥而去甘矣浙西初有缺雨之患今已霑足自江西來者亦云然一稔在望亦可少遂憂國之願想治境亦更氣象佳好所望如此也區區有懷侍日并謝答提刑李後林前者嘗附吳尉之便拜書籖室自後疊捧敎墨嘗奉一箋託鄱陽同年趙書記稟復兹於志夫處又得近所賜書敢因志夫之歸率爾具答秋壑先生歸相甚急意人才如庸齋先生之得温陵陳千峯之帥廣右平舟西澗矩山三先生之有召命皆委曲為諸賢地也趙德夫之為秘書歐陽巽齋之為檢閲陳和平之為架閣又専以恬退而加旌録近時後村復以秘書監召日閲除目多是快活條貫使天福宗社政本盡由中書太平日月可冀但有不能不遇巷納牖處耳此更㸔天意秋壑安則諸賢有望否則覆出者不知幾人矣履齋之初治原不曾浄潔至於今倍覺費力敵國外患之稍紓法家拂士之未有誠如尊誨秋壑先生未入國門前兩日之除授既正相位後戒譁訐取名之指揮近者初四日元非貶謫之天筆皆使人凛凛也九十日春晴霽少三千年内亂離多吟哦此語每切浩歎所願今年秋風髙時無去年戎馬之事秋壑先生只在廟堂乆之須有回斡機軸否則裴度復出視師氣象便又非今所觀矣此間非可乆處之地家鄉又殘破無可歸賤累又衆其若之何先生丐祠今廟堂却恐決然未許且是脩齋古心二先生相與扶䕶甚至集賢亦甚相知決無履齋末路之危疑也鄉邦除人尚是此月十八日與新廣德趙丈交割必是二十日方去自五月十五日無太守至七月十五日左右方有之鄉邦近日不知更是何等模様不堪回思也陳致廣府判廟堂甚注意次第亦必得麾矣平齋帥廣集賢蓋謂今年寇決不自廣至故欲以前此廣右規模行之平齋素有威譽為廣人所信是以易節江上則要做托裏工夫故用李叔興也志夫且喜已成事壬戌可到殿可喜可賀學舍諸公本欲留之過十八建儲後却歸志夫謂業已辭齋閤聞有恩例而復留似有顧戀不若飄然竟去趨向如此亦甚髙也集賢歸來且做了一件大事甚幸甚幸此前時宰相所不能者也宗社無疆之休宣鎖又是恕齋當筆拜相建儲已兩畨大典冊矣父子一家皆兼内外兩制豈人所易及亦甚傾意先生令某導意某輪對在復月初或䟎入此月末謾丐尊悉令妷之闕某未知曾成否前者得其書云此辟若成則可留鄱陽佐叔父城守故某以為不可今聞尊諭闕與俸皆在建陽則無不可者矣終不若涵養望實待太平之闕為尤佳僭越及之拜復草率萬罪仰祈尊察答發運洪右司某江西下士素欽先正之風節文章恨不獲身親而師之象賢有人如老泉之東坡紫巖之南軒乃所願承下風而望餘光也不自意癸丑僥倖誤恩時遇先生長者彌綸省闥某得遂拜履幕下辱盼甚異又值褰裳去國澟然髙風萬牛莫能回之某雖欲再侍見不可得也僅以拙句鳴心過廑覽擲自時厥後某罹天之屯值人之否致命遂志於山林之間望紫氣如隔蓬萊弱水三萬里無夤縁聴教誨獨日冀金昆玉友正人登用轉旋機軸以福天下而眼釘未拔之日乃聞確執先正在寳紹間介石之貞心不為利屈化絃既改盍似端平而猶煩使傳何邪給餽之不窮議築之不擾簡在上心而擢用必矣某踈謭不足為時用去年鄉侯陳刪修家書能道執事先生力借齒牙餘論於公朝俾叨誤召不求而薦此前輩諸老之用心而今人之所無者某何以得此於門墻哉自為此來首合即以書謝又念執事先生方為古人之公某何敢為今人之私用是未敢然每念及此亦不免寳緘珍餽反拜先施某之媿可死矣回風畧此聲意又不能端且悉圖君子之歸為國士之報則所願也伏丐賜察與知軍王南可某不拜儀範者十年不奉詢候者亦三載可謂取踈外於大君子之門矣然屈指當世人物則必曰執事念賢仰徳此心實未嘗踈外也去年冬伏聞把麾横浦清標勁節與庾嶺梅花相映照宜以一書賀然某謂履齋新更大化與先生長者非不相知要之則當使之柄烏臺清之則當使之望粉省不當淮陽汲黯平原望之也不惟未惬公論亦未惬愚意故不敢以為執事賀履齋此行可為而不得盡為又竟成去去之日庸人孺子小夫賤𨽻皆咨嗟歎息滿道履齋身計則得矣如國何所幸秋壑來歸人望猶有繫屬前者賢之未聚自今猶庶幾此乎聚之執事行且召矣江上肅清一舟一騎不留實為大慶吾國永世之福吾相蓋世之功也頃聞大府管下數邑有寇縱横不知信否此等饑民嘯聚料亦易帖妥之也外阻内訌一切皆息風寒數處一切用功必使今冬以檄呼敵渡江亦不敢來然後吾民方有向安之望經綸之手恐不可袖也某敝鄉乃甘棠遺愛之地寇敵在近南北皆止五百餘里當事仕者恬不為備禦計已不能為而又忌人為之遂誤生靈化為魚肉延及清江亦同此禍言之甚痛也某待罪於兹念此全無好况所幸南寇既北之後漸可經理然神觀豈得頓如昔乎云云末繇侍見惟有匪朝伊夕迎拜脩門耳天向暑伏惟為吾君吾國壽斯道斯文某不勝拳禱回提幹陳志斤書某相知以心不敢復為寒暄長語以溷聽瑩首所鑒察某伏自去年冬得侍誨論無非適用之長算濟時之良䇿使執事之說與某之說皆得行郡有城城有兵鄉有勁旅豈遽易入入亦豈遽易殘破奈之何茍安者不肯為嫉能者不樂為百計千端必欲撓敗萬一敵若不來其說似未害也然敵在數百里間中間又無險阨阻障豈有不至哉敵至而前之茍安者嫉能者皆受害矣以此見天下未嘗有不可為之事亦未嘗有不能為之人患有不肯為不樂為之人沮撓之耳豈獨吾州哉某去年在山林時真自念未能有功於國深欲䕶其鄉乃所以報國反覆思念惟有築城壁葺山寨而皆教閲民兵以衛之貧富相資主佃相養一可以不費官司二可以消弭盜賊三可以輯睦鄉里四可以防遏禍亂寓兵於農相友相助三代之良法也而當時昬昬之人聽瞶瞶之說第一不肯築城第二不許修寨第三不許教兵而輕儇淺躁忌功生事之徒倡為讒言扇惑臺閫而不許寄居干預之令下矣寄居與豪傑措置非自為也乃朝廷之命州郡之請也驟請而驟罷之在某者固無所損而一切寄居豪傑並不敢干與武備規模盡皆廢壞銷兵櫜矢自謂太平不踰時而寇騎至矣誰之罪哉天眼昭昭必有受其責者也某去年山寨民兵既皆為所罷無一可恃方只得為自全計謀趨召命前時毁家教習所費甚繁無以為行計又一月而後能動所以不敢告别者恐有牽率於左右也某正月三日起行又以辭免校讐乞從舊班之請未下至豐城候之上元日方始得報十七日起行至臨川則聞哨馬已在豐城隆興對岸矣去鄉一百二十里履平地而入空國知必受禍但此身已出歸亦不能徒手搏虎徒自悔自恨日憂日愁奈南鄉一帶雖有尊契兄之可恃而在城則如之何某離郡後鄉曲更無一人自西來疑慮日甚至玉山風坪聞清江一走卒風傳吾郡已破尤未之信至白沙渡遇陳刪修之子㩁院來迎其父得其家書則吾鄉郡果被敵哨矣西望慟哭更無如何只得且入京國二月十二日供賤職時已有所聞知尊契兄以兵與敵戰得馬及敵首級上之宣閫其事甚偉與今之擁重兵不敢出戰者萬萬不侔見履齋相君時即以白之履齋亦甚稱賞云待得實當旌以官惜宣制二司不肯申上某三月十八日得家信得田教授信方擕往見東閣見都司欲為申述不旬日履齋又去矣履齋初欲使某歸仕經理某以掣肘者未去力辭之幸而不來來則又進退維谷也右相以今月二十八日入朝公道開明所行皆是快活條貫宣局已罷制閫已除世界漸漸有分曉賞功之典必次第舉也倉司有申徑申朝省如何他多欲言紙窮莫究有便時賜誨者幸甚雪坡集巻三十一
