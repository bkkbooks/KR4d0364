body:
  text: 雪坡集巻四十七宋姚勉撰祝文西澗書院祭魁星維斗有星第一曰魁上拱紫微旁列三台司文之權光芒昭回鬼斗入夢先兆有開偉茲澗堂鳳山崔嵬江湖川閩雲蒸英才有詔興賢士争踏槐邀靈于星文刃恢恢秋風聯韉鈴聲喧豗春榜蜚英禹門之雷昨庭唱臚百花之梅萬里榮途瑞慶大來徼福投誠尚相之哉正誼書院祭魁星魁第一也北斗七元在天為衆星首而魁者乃斗之第一星也魁之枕參則曰參首杓之擕龍則曰龍角東蒼龍角亦二十八宿之第一星也杓之所擕猶第一宿而况魁乎魁傑立名取象在此前輩有言曰科第當作狀元仕宦當作宰相學術當至聖人言皆當為第一也士之逺大自期立志要當若是此吾正誼師友平日之所講明也嵗壬子詔賔興壬為天一子首十干明年癸丑丑為斗牛分魁兆開矣維七月朔乃三秋之第一日用率衆俊蕆禮大魁神之相之貢于鄉若漕第于太常䇿於大廷使臣正誼之人皆第一自此卓然為第一流人物于斯世維魁星實照臨之賜第後謁先聖子路問事君子曰勿欺也而犯之臣等日奉對于大廷弗敢背先聖訓盡勿欺之義抗犯顔之忠昭事君之初也聖天子容受直言誤膺親擢臣等非敢以是干祿也臣事君以忠願終始之兖國公克己復禮公之學也四代禮樂公之事業也夫四代禮樂蓋克己復禮之推耳全體大用詔後之人某等其曷敢弗力鄒國公先師有言曰古之人修其天爵而人爵從之今之人修其天爵以要人爵既得人爵而棄其天爵古之人乃所願學也今之人敢告不能西澗謁劉屯田曰先生之志利祿秋毫先生之風廬山俱髙嗟我後人仰止先覺富貴何榮願保天爵謁劉祕書曰世嘗以為髙安未有魁天下者先生年十八以春秋對為第一非魁天下乎雖然此易能也温公則從安石則忤非不可奪之節乎力疏其蔽自攻厥非非克己之學乎是難能也學其所難能而不止於其所易能此後學之事謁劉檢討曰方賊京之勢炎滃趍者其瀾倒吾知有天子不知有權臣凜乎斯言千古可作髙山景行實獲我心謁陳宗丞曰奉天子命為州者言政而已安及他公創始書堂講貫理學此盛心也雖然衍文公道脉於此邦公之倡也續文公道脉於此邦公之望也願與同志共學之乙夘秋祭魁星某等謹以連薦早登髙甲之儀致祭于北斗第一魁星之神曰昔在癸丑魁躔炳靈俾某駑鈍誤恩天庭此魁非難三嵗而有魁而難者衣鉢授受猗歟聖代何僅二堯實以兄弟首臚天朝若顥若固去華師徳父子科名世此魁脉卓卓横浦嗣以應辰有斐師友皆第一人前美罔專願繼芳躅尚期顯相斯文之福祈雨迎利貺秋且成矣常暘暵之不恵厥終民且艱食邦侯迎禱亦既感通民之望霓尤冀沾足惟王廟食茲土民恃以天胡寧忍予俾至斯極用是肅奉珍駕徃即道宫率籲合欽以請甘雨神旗肇舉􅗈霈隨車三日為霖豐我穡事惟世祀之永永無斁迎龍王大禮大川能興雲致雨則祀之瑞有神龍于潭攸宅蓋一方之司命嵗且秋矣不雨害成焦焉弗寧艱奏是懼比邦侯延致神御祠于郡庭亦既禱而雨矣茲百姓重迎之道宫以祈神其矜而從所欲乎起蜿蜒于重淵布雲雺于曾宇沛澤三日普施四郊惟龍君是望永享祀于兹土嶽祀祈晴此以下並代作膚寸之雲不崇朝而徧雨於天下者嶽也今既沾既足矣霖霪滋久適害嘉禾洪水屢滔尤使小民艱于厥食吏不能乂以致暘若百姓奚咎齋心潔已祇謁于祠神之相之易常雨為時暘以茂毓斯稼且使鰥寡罔或告病神之貺也吏之望也利貺廟祈晴夏暑雨小民惟曰怨咨既霖而霪將害于稼不能乂民以臻暘若繄吏之罪惟神廟食此邦必軫念于百姓有衆斂此常雨易為時暘自今以始嵗其有神其尚克相之祠山靈順二廟祈晴天作淫雨害于粢盛維吏之愆民則何罪潔蠲祇肅䖍謁于神其排豐隆掃雲師收歛隂霔顯行清暘庻㡬黍稷實發實秀以遂兹有嵗吏不敢忘神之徳祈雨曰雨曰暘皆欲時若仲夏五月霖雨連作䖍謁于神憂稼之傷神之聽之雨回而暘今兹兼旬多𤾉少雨早稼雖登晚稻之苦載敬載肅復告于神神聽昭如終恵我民駕風驅霆旁暢甘澤既優既渥豐我黍稷曰雨而雨民不旱憂奚吏之功惟神之庥迎城隍祈雨神廟食兹土福庇我民應禱如響乃夏之月迄於今不雨苗欲槁死民將無年吏無善狀以干天和民亦奚罪敢奉神御徃即佛宫齋精潔誠為多稼請命神其鞭豐隆驅雲師滂施甘霔以成我嘉穀吏不獨拜神之賜千里之民飽神之庥迎仰山祈雨神有掌于天實職風雨稼且穡矣常暘暵之民將無以食吏為此懼奉神主于佛宫為民請甘雨之賜轉槁而蘇回歉而豐神反掌間耳密雲隨車涷雨洗道肅御之初敢以此告迎龍王祈雨噓雲吐雨厥惟神龍王實司之歉可使豐不雨月餘苗且槁死王食是邦忍使及此敢奉神御于梵之庭靈旗歘來駕風鞭霆載霶甘霖活我嘉穀感神之庥曷日而足謝雨比以亢陽日驕心與苗槁並走羣望輯而祈之神恵顧歆甘雨隨格吏何以得此神之福我民也雖然願神其終福之今也膏雖施而未周槁僅蘇而未澤神不福我民無前日之雨矣神之福我民繼自今猶大有望於神也三日以徃為霖願神其終福之豐年報功有祀典在戊午春祈雨春事方興早乾已甚未見播種豈有收成念蠢蠢之為氓將嗷嗷而乏食謹隨里衆䖍告穹旻雖略遂於沾濡尚未臻於滂沛似聞旱勢逺自上京蓋千里以皆然不一邦之獨爾臣憂惶愈甚寢食不遑深虞羣小之蔽君是致上天之降怒自涉茲嵗益異前時日月為之無光霾霧從而肆翳雷音不震得非號令之或乖雨膏愆期無乃恩光之失施實闗宗社之計䀌傷畎畝之心惟祖宗三百年積累之仁而海宇億兆姓生靈之衆咎在臣下罪非小民矧敵國之方强賴本根之自固儻成旱勢禍起蕭墻臣興言及兹過慮彌切上而憂國下則哀民惟仰籲於聖聰庻可回於否運是用勤拳百拜懇切瓣香願憫愚忱大施甘澤油然雲沛然雨盡救暵枯鼓以雷潤以風遂通泉脉代謁先聖仕而優則學學而優則仕聖門髙弟語也某學未克優茍祿而仕視魯語愧矣亦庻㡬於仕優而學乎昔者子游聞諸夫子曰君子學道則愛人某雖不敏請事斯語代謁諸廟某公族一寒來此佐幕惟神廟食茲土祗事之始用敢告䖍聰明正直而為神公勤亷介而為吏職業攸宜吏不敢不勉呵禁不祥俾獲安處則惟有神福之代告本衙土地某稍食于此邦爾神血食於兹宇神之職于幽猶吏之職於明也民之安静惟吏職之吏之安静惟神隲之詩曰靖共爾位好是正直神之聽之介爾景福文昌醮宿建詞語大比興賢又值設科之嵗前期卜日用嚴事帝之忱恭按金科肅陳寳醮冀潛通於肸蠁庻均被於祥釐伏願天鑒積誠神欽宿戒朱衣豫送早標仙籍之姓名紫詔鼎來同奪亨衢之步武早朝詞語夙寤求賢式際明揚之旦昕朝奉對期沾顯擢之恩嚴肆覲於玉宸冀仰通於璇極伏願清光俯照穹鑒昭垂貫日懐忠早被臨軒之冊告辰定命獲趨待漏之班午朝詞語日麗中天極容光而必照帝臨下土冀微感之濳通當午影之融明望端門而載覲臣等枌榆同社葵藿傾心駒隙易流不敢荒於暇日桑䕃未徙願早立於大功伏願恩被春朝光承晝接傳臚麗正獨班穿龍影之旗講事延英十刻轉雞人之漏晚朝詞語月魄載西僊籍已香於丹桂斗杓揭北魁躔先動於寒芒肆舉朝儀聿嚴夕禮惟天隂隲有欲必從凡而幼學以壯行期於朝奏而暮召伏願書燈課效進登霄漢之梯御燭分光趨上星辰之履正醮詞語天為國以生賢欲扶世運士讀書而求仕思應時需故當選舉之辰願在捜羅之列臣等誤蒙帝渥謬玷仕階然猶均願於在人不敢私求於榮已歸誠穹宇祈福鄉閭初非為微臣希進之謀第欲遂多士亨通之志庻㡬盛事疊見此邦出人品非常之才為明時有用之器恭望聖從凡欲神格衆誠副英君忠孝之求儻偕穹擢任天下國家之責願竭精忱又文昌醮詞伏以脩其天爵固可知人爵之從簡在帝心庻克動君心之眷故求之顯者不若求之隠而得乎幽者斯能得乎明用嚴昭事之儀式合精祈之敬臣等迂踈寡識庸謬非材誤荷穹恩已濫躋於仕版尚期盛事復層見於鄉閭念兹里閈之儒久事槧鈆之學幸逢大比願擢髙科非徒為富貴之謀實欲效君親之報仰祈睿鑒俯燭愚誠賜之名第以發身俾以忠忱而事主伏願三魁傑出重增九貢之名四相並登益顯一邦之盛夀帝君疏右語電繞神樞光啓發祥之兆天頒科詔偶鄰毓聖之辰夀胥慶於無疆福尚祈於廣布伏願極天比峻與物為春凡合敬以同誠各儲恩而垂祉催班楓禁青囊早領於進書較藝蘭宫黄甲預占於賜第裕垂嗣續榮被鄉閭上元縣醮詞語萬家為邑謬承宣化之流一念在民庸瀝祈安之懇恭陳寳醮䖍禱璇霄伏望帝鑒昭臨天庥滋至上元校善蚩氓既遂於全生下考成書拙政尚期於免戾代沂邸生日設醮詞語伏以人情欲壽矧懐愛子之心太上好生庸瀝祈天之悃揆予初度冀此永年重念臣妾男某仰䕃層穹承恩懿邸惟藩惟屏願如漢家磐石之宗俾艾俾昌期受魯侯如岡之祉恭延羽客祇設瓊筵伏願帝垂以慈神介之福萱花不老仙家日月之春長蘭葉有光石室山河之誓逺沂靖恵王諱日設黄籙詞語前王不忘兹際超升之日永世克孝聿懐追逺之思吉蠲為饎齋戒事帝恭望鳳旂降格龍駕來游對越在天儼神靈其未逺克昌厥後綏夀祉於無疆雪坡集巻四十七
