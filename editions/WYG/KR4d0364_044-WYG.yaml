body:
  text: 雪坡集巻四十四宋姚勉撰長短句沁園春太學補試歸塗作錦水雙龍鞭風駕霆來遊璧池有一龍躍出精神電煜一龍戰退鱗甲天飛一様軒拏殊途升蟄造化真同戲小兒時人眼總羨他騰踏笑我卑棲促裝且恁西歸信自古功名各有時但而今莫問誰强誰弱只争時節來速來遲無地樓臺有官鼎鼐命到亨通事事宜三年裏看龍頭獨露雁塔同題賀新郎京學類升時作劔吼蛟龍怒問天天功名兩字㡬時分付生箇英雄為世用須早青雲得路却底事知音未遇兩度入天飛折翼謾教人欲嘆儒冠誤竟不曉是何故休休也無憑據有如椽健筆蟾宫湏還髙步若使長材終困躓社稷教誰扶助信淺水留龍不住萬頃碧流通大海向波濤濶處興雲霧須信道這囬做賀新郎京學類升後作長嘯山中臥嘆從前二十年來因循空過自是惺惺并了了奈這五行尚左遇好事許多磨挫浩蕩醉鄉狂莫檢筭傍人笑得唇焦破誰信道只恁麽從今牢把江湖柂要做些勲業歸來則个不見彭余朱李輩摠是白身人作震耀得聲名許大萬一老天青眼顧又何難印佩黄金顆時來到也還我霜天曉角湖上泛月歸秋懐軒豁痛飲天機發世界只如掌大筭只有醉鄉濶煙抹山態活雨晴坡面滑艇子慢搖歸去莫攪碎一湖月沁園春送友人補太學一部周官學問淵源山齋得來最雄姿直氣不塗脂粉仙風道骨不涴塵埃萬里青雲相期濶步底事向天門折翼回君知否這白衣御史卿相胚胎時人休用驚猜機會到功名節節催看蒲質易彫何如松茂菊花已老須是梅開萬事何難時來得做且信天工次第排從今去願徑遊璧水直上蘭臺賀新郎及第作嘗不喜舊詞所謂宴罷瓊林醉遊花市此時方顯男兒志以為男兒之志豈止在醉遊花市而已哉此説殊未然也必志於致君澤民而後可嘗欲作數語易之而未暇癸丑叨忝誤恩方圓前話以為他日魁天下者之勸非敢自􅃷也夫以天子之所親擢蒼生之所屬望當如之何而後可以無負之哉友人潘月崖首求某書之是其志亦不在彼而在於此矣故書不敢辭是年一陽來復之日姚某書月轉宫牆曲六更殘鑰魚聲亮紛紛袍鵠黼座臨軒清蹕奏天仗綴行森肅望五色雲浮黄屋三䇿忠嘉親賜擢動龍顔人立班頭玉臚首唱衆心服殿頭賜宴宫花簇寫新詩金牋競進繡床争蹙御渥新霑催進謝一㸃恩袍先綠歸袖惹天香芬馥玉勒金韉迎夾路九街人盡道蒼生福争擁入狀元局沁園春夀同年陳探花憶昔東坡秀奪眉山生丙子年蓋丙離子坎四方中氣宜當此嵗間出英賢河嶽重靈星辰再孕來自赤城中洞天新秋霽萃一襟爽氣風露澄鮮玉階同聽臚傳伴寳馬如龍絲裊鞭正椿庭未老同躋榮路萼樓争耀相照魁躔即似坡公金蓮夜對身作玉堂雲霧仙憐同嵗但乞如夢得分買山錢賀新郎送楊帥參之任唱徹陽闗調伴行人梅拂征鞍曉霜寒峭金甲雕戈開玉帳樽爼風流談笑看䇿馬從容江表自是藥堦苔砌客巻經綸且泛芙蓉沼襟量濶西江小允文事業從容了要岷峨人物後先相照見説君王曾有問似此人才多少便咫尺雲霄清要四世三公氊復􅃇况蜀珍先已登廊廟但側耳聽新詔念奴嬌和尹司門與蔡侯詠雪貂裘夜冷怪地爐煨酒經時難熱曉起盤風天舞絮拍手兒童歡悦客裏新吟天葩翦巧思與梅争發使君屬和雪花同是三絶未説賦就梁園陽春拍調壓倒唐元白早晚聫鑣花底去共看朝霞銀闕朝退歸來清虛堂裏醉酒淋漓墨而今且對聚星堂上賔客沁園春夀婺州陳可齋九月七日四海中間第一清流惟有可齋看平生踐履真如氷玉雄文光燄不涴塵埃元祐諸賢紛紛臺省惟有景仁招不來狂瀾倒獨中流砥柱屹立崔嵬掛冠有請髙哉但清廟正需梁棟材便撑舟野水出航巨海有官鼎鼐無地樓臺製菊齡髙看萸人健萬頃秋江入壽盃經綸了却馭風騎氣閬苑蓬萊滿江紅壽鄧法曹仙苑蟠桃恰則是而今初熟王母遣飛瓊捧獻絳金紅玉笑把九霞鸞鳳斚滿斟七寳蒲萄醁為長庚此日自天來慇懃祝仙子唱長生曲仙客獻長生籙活千人鄧禹隂功俱足五鶚早呈公府剡萬羊自有中書祿更從頭安享八千年人間福沁園春夀張府判夫人梅笑東風只兩日間又新嵗華有玉龜阿母獻三蟠實蘂宫仙子飛七香車春滿蝦簾雪晴鴛瓦牕户非煙籠翠紗萱堂上看衣翻戲綵觴捧流霞君家元是仙家㡬度看菖蒲九節花來劔池丹井平分風月一溪流水猶泛胡麻夀慶千秋榮封兩國綠鬢猶深楊栁鴉長生藥在蓬萊頂上不必丹砂水調歌頭夀趙宰桃李河陽縣春又到花枝先庚三日鰲山晴雪放燈時金宿争華玉婺來入仙閨清夢光動綉湖西人物東都令句法晚唐詩兩年春三種異十般竒朝天近也紫泥催起舄鳬飛總羨童顔綠髮榮綰金魚玉帶日侍赭黄衣來嵗𫝊柑宴人在賞花池水調歌頭夀趙倅㣲雪弄新霽寒月上初弦長庚入夢間生采石錦袍仙分得天孫雲織掣斷麒麟金鎖來自玉皇前丹升凭泥軾風月興無邊詔書來催入覲占春先栁邊花底細騶輦路響鳴鞭榮侍金鑾殿上更向沉香亭北半醉拂華箋來嵗今朝裏人在八花磚滿江紅送郡守美任萬里西風吹送到五雲鸞紙催促文章太守入朝花底清節髙横秋一片仁風散作春千里漾恩波溶泳錦江中深如水難臥轍留行李但側聽星辰履看麒麟案側即催榮侍紅藥香中翻詔草紫薇影畔裁詩綺更宸旒已自覆公名金甌裏沁園春送權倅許張幹萬里清風吹送錦帆入南浦雲看拂天旌斾攀留不住迷津舸艦歌舞相迎二許家聲三洪地望今代風流第一人蜚英早合詞林視草書閣翻芸飛芻逺餉三軍特借作紅蓮入幕賔把西山暮雨暫時收捲荷山明月小試平分甦醒枯魚剔除深蠧箇是人間有脚春難淹久看詔催入侍香案麒麟水龍吟癸丑五月致政生日在京作芰荷香雨初收竹風槐日凉清曉年年祝夀今年更比常年時好教子收功五雲金殿初承親詔早臚𫝊三日夀稱千嵗多應是如公少遙想夀椿堂上飲霞觴捧孫㣲笑已見兒榮更看孫貴茅分蒲召上第歸來綵衣挂綠蘭堦生耀九霄中一㸃光明夀星髙照沁園春七月朔夀盧守一葉新凉又是西風吹轉素商攬玉壺英氣鍾為人物銀河精采融作文章司巧天公攙先七夕分付天孫雲錦裳騎龍鳳自九霄飛至萬丈光芒早年奏賦長楊飽挹盡瀛洲風露香問石渠天祿借將班馬荷山錦水暫作龔黄藥省春風薇垣夜月令佩僊花侍玉皇明年裏飲夀椒何處宣勸持觴沁園春夀陶守鶴髮鴉髫歡捧霞觴酌丹井泉慶湘山峯頂飛來古佛劍池洞裏活底神仙春雨慳時千金斗粟民仰使君為食天公知否只活人隂徳合壽千年寳猊香噴沉煙環艷翠明紅擁壽筵最一般竒特鳳雛新貴斑衣綠綬光彩相鮮帝命師臣欽哉有子飛詔看看又日邊黄封酒到明年今日中使傳宣沁園春夀王髙安七月二十八日超逸天才文如三松詩如盧溪自白蓮賦就已髙聲價梅花句出逺見襟期玉塵精神瑤林風韻雪裏神仙小氅衣緱山夕已再經旬浹戲鶴重歸花間鳬舄輕飛便一似元規報十竒最風流膝上雙親未老三槐手種分付佳兒又想夷吾帝恩王某鈞軸舍人知未遲長生藥在玉盤麟脯瓊苑蟾芝沁園春夀楊帥參十月生次日子之官摘玉蘂梅泛金葉蕉祝公夀齡筭今年比似常年夐别翠煙紅霧香藹門屛鳳詔雲霄龍光牛斗輝射南州孺子亭看看是伴元戎小隊花栁郊坰傳家有子明經渾不要黄金遺滿籯向月中傳與一枝仙桂襴斑衣上更著袍青明日𤓰期今朝椿壽好醉芝蘭玉樹庭公知否老人星一㸃映泰階星賀新凉送易子炎運幹之任冷眼三邊處喜舍人水濵躍馬上京西路三國英雄千載矣形勝依然如故這勲業向誰分付袖裏翰林風月手也何妨戮力風雲䕶談笑暇詩吟過峴山㡬載無人顧幸如今剪除荆棘掃清飈霧換得東南新局面政欠十分著數筭人物須還羊杜玉帳籌邊機會好把規模趲出中原去天下事書生做沁園春夀程丞相崧岳降神昴宿宣精挺生偉人整淳祐乾坤浸如嘉祐太平事業了却端平扶日中天拱辰北極一洒甘霖埃霧清春寰海聽農歌載路邊柝沈聲旂常萬世勲銘便與國無窮垂令名似青山流水洓川賢相黄花晚節魏國元臣五緯芒寒六符色正輝映老人南極星蒼生福開八荒夀域一氣洪鈞沁園春夀賈丞相章武中興淮蔡欲平晉公已生信天生英傑正為國計擎天著柱要自支撑萬里長江古稱天險去嵗裏風濤忽震驚公談笑把雲腥霓翳一日都清歸來奠枕于京有輝煥明堂前一星稱衮衣廊廟楓宸眷寵綵衣公府萱砌春榮著片公心辦雙明眼長與羣賢扶太平無它願植萬年宗社萬古功名沁園春夀陳中書湖海元龍逸氣飄然可百尺樓愛文光萬丈星辰絢彩爽襟一掬風露澄秋衘字氷清班心玉立海内而今第一流繙書了紫薇花浸月夜攬詞頭著身已是瀛洲問更有長生别藥不是生來已帶神仙道骨毫端自有富貴封侯拜賜黄封承恩青瑣見説香名又覆甌從今去了福公事業從赤松游沁園春夀趙倅道骨仙風海上騎鯨端是後身把銀河天巧鍾為文采劒津寳氣融作精神壺玉儲氷掌金擎露胷次全無一㸃塵年年裏早花朝六日長慶生申箳篁濯錦江濵人盡道如公清最真合沈香亭北金牋奏曲恩披獸錦醉拭龍巾泥紫頒來梁黄飛去自是八花磚上人從今後看大鈞播物萬象皆春沁園春餞張倅明月扁舟輕逐江鷗翩然賦歸任顛風掀舞濤山浪屋少須平定一碧琉璃栁絮浮雲有無根蒂到底不磨真是非呵呵笑笑人情似紙世事如棊宜堂事事皆宜把杯酒論文更有誰記風雲滿席吟情浩蕩龍蛇滿壁醉墨淋漓别後相思有書寄否春在梅花第一枝重相見約栁堤撑舫竹閣尋詩沁園春送友人歸蜀拂劒整裝光射紫霄斗牛色寒大丈夫不作兒曹離别何須更唱三疊陽闗晝錦還鄉油幢佐幕誰道青天行路難從今去聽聲名燄燄飛動岷山征途少飲加餐要做取功名久逺看捲長風吹醒劒閣雲氣更須砥柱三峽驚湍聞道槐庭已登安石此去須彈貢禹冠明年裏踏梅花有分相見長安聲聲慢和徐同年梅江涵石瘦雪壓橋低森森萬木寒僵不是争魁百花誰敢先芳氷姿皎然玉立笑兒曹粉面何郎調羮鼎只此花餘事説甚宫粧松竹嵗寒三友恨竹汙晉士松涴秦皇雪魄氷魂回首世上無香西湖有人覓句但知渠清淺昏黄竒絶處五更初裏横月帶霜栁梢青憶西湖長記西湖水光山色濃淡相宜豐樂樓前湧金門外買箇船兒而今又是春時清夢只孤山賦詩綠蓋芙蓉青絲楊栁好在蘇堤賀新郎憶别薄晚收殘暑嘆西風暗換流年又還如許鴉背斜陽初斂影雲淡新凉天宇人袖手闌干凝竚鄰笛喚將鄉思動聽愁聲又入梧桐雨秋到也尚羇旅故人只在江南渚想應嫌久戀東華軟紅塵土寄逺裁衣知念否新月家家砧杵魂夢想鵞黄金縷雁影不來天更逺寫書成欲寄憑誰與知客恨兩蛩語賀新凉程秋幹席上作牕月梅花白夜堂深燭搖紅影綉簾垂額半醉金釵嬌映座寒處也留春色深意在四絃輕摘香塢花行聽啄木翠㣲邊細落仙人屐星盼轉趣嬌拍人間此手真難得向樽前相逢有分底須相識愁淺恩深千萬意惆悵故人雲隔怕立損弓鞋紅窄換取明珠知肯否綠牕深長共春憐惜休惱亂坐中客妓喚惜善琵琶雪坡集巻四十四
