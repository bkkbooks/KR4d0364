body:
  text: 雪坡集巻四十二宋姚勉撰雜著制三首擬宏詞作參知政事石之端除昭文殿大學士平章軍國兼樞宻使歙國公監修國史加食邑實封制勅門下朕置左右而以碩輔庸鎮有邦求俊彦而廸後人茂興文治疇咨一徳董正百官敷告大庭渙敭顯號具官某中正而純粹肅括而𢎞深量可包荒振河海而不洩氣常配義塞天地而至剛直而温簡而廉涅不緇磨不磷圭角渾乎其弗露器宇澄之而益清夙耀郎星已涵逺業近聯卿月愈著清華玉潤金相龍騫鳯翥肆勤政筦宻賛廟謨直方大不疑所行身能任道耆壽俊越在厥服志在澤民重厚如勃而不至少文凝逺如璟而益堅持正具瞻師尹可謂大臣庸升上相之班兼總元樞之政房善謀杜善斷藏諸用以彌縫蕭也規曹也隨載斯民於清浄陞華書殿倚重經筵庸開古歙之封仍衍真畬之奉茂昭前人之謨烈式告我后之謀猷嗚呼均四海統百官汝其慰天下以維巖之望鎮外夷撫諸夏汝其凝國勢於如磐之安予欲弼成道徳汝礪乃金予欲燮調隂陽汝鉉斯鼎益著圭璋之聞以收簡冊之勲知樞宻院事管少穎除同中書門下平章事集賢殿大學士監修國史進封宣國公加食邑實封制勅門下朕蒐擇英髦若稽簡牘丙魏同心而輔政漢治以興房杜以文而濟兵唐業以創是登豪雋爰作輔臣布告昕朝咸知朕意具官某剛健而特立敏鋭而有文早掇髙科毛遂脫穎而出志輕好爵梅福掛冠而歸載嘉恬退之風㧞寘校讎之選才無施而不可道常黙而不言上而古今治亂之原悉知所自下至期會簿書之細亦綜其詳本末兼該精粗具舉終身不易其節一毫無欺於心越在經筵極陳治道以蕭何為刀筆之吏謂其止漢於秦以夷吾為小器之人謂其終齊於伯論道必先於周孔陳謨必及於唐虞詳觀小心知可大用翦鬚賜藥欽哉無碩䑕之貪飛帛旌忠善爾有鳴鷄之度灼見人才之皁白不搖羣議之雌黄擢自樞庭陟之亞輔督承明著作之任黼黻皇猷兼麗正禮樂之司粉繪王典肇開中山之國庸易管城之封申錫真腴增加峻秩庶膺光寵益懋事功嗚呼克紹乃辟于先王朕方受四海之圖籍勱相我家惟吉士爾其同萬國之車書還淳風於畫卦造契之初躋至治於議禮考文之盛一心輔治萬世有辭吏部尚書元黙卿除參知政事集英殿大學士燕國公加食邑實封制勅門下武公如圭璧而有文蔚著清華之望商王引金礪以命相有資磨切之功惟邪正有薫蕕之分則君宰不膠漆而固歴敷朕志廸簡王庭具官某極深而研㡬義方而敬直器質粹萬金之寳精誠堅百鍊之鋼自感會於龍雲無淹藏於豹霧書氊擢第以文章行有用之才紆綬臨民以道徳洗積汙之染如石其介有玉者礲昭然能黒白之分不使至紫朱之亂摩頂放踵而利天下無翟子兼愛之偏研精覃思以摭羣言得昌黎鉤𤣥之學擢自客卿之列置之翰苑之班播告交修出納惟允光啟奎星之運功在凌煙之圖臣有黔夫齊可稱於四寳僉曰伯禹堯盍錫於𤣥圭擢之喉舌之司典我銓衡之選考書九品激濁揚清事判五花綜名核實薫染人才之善刮磨君徳之光嵗寒知松之後凋香乆與蘭而俱化庸登政筦峻陟文階載易薛封肇開燕國申錫圭田之奉寵升書殿之班玉我于成繩君以正嗚呼恭而思道朕嘗夢上帝之賚予用以圖功爾其念寧王之遺寳勿徇斜封之濫冗勿專簿書之句稽若昔召公實啟爾土尚其夾輔庻可匹休銘月硯銘桂其植兎其趯天之月孕于石為雪坡文之璧文璧其光月宫之祥龍尾硯銘圓模象月鼎足類蟾是謂黮瑁灘之龍尾石嘗見賞於雪堂之子瞻志學銘仰止尼山師十五志于學生知且猶爾而况我後覺勉哉立斯的知行互切琢㑹如顔氏子如有所立卓虛齋銘人心本虛惟虛則靈不物於物乃明其明有我之心茍横於内思紛念擾斯蔽而昧己私既克欲浄理融八窻玲瓏霽月光風應物虛舟外無所忤生白虛室内靡或汙隨事酬酢周流六虛何物非我天下廣居究厥用功本乎主一惟心之虛惟理之實訥齋銘巧言鮮仁惟訥則近若昔君子言訥行敏曽唯於魯顔喟以愚黙而識之其知道乎木齋銘剛毅木訥子曰近仁惟性固有惟質是存矧木之義於時為春生意勃滃其仁肫肫彼葩匪華反根乃真是木亦質於仁為親雖未盡仁亦仁之鄰彼巧令者志在恱人匪人之恱盖私其身是其仁心已伐厥根尚謂之鮮聖辭之温曷若木者弗漓其淳有美周君信厚恂恂以木名齋得仁入門君家絳侯重厚少文尚克安劉為社稷臣使充其質雖聖可均惜弗之學輪河之漘子今能木於質已純所願克己以顔為倫視聽言動惟理是循清欲如鑑弗留一塵充拓恢豁心包乾坤此木幹長由貞復元毋止絳侯元公是尊知非齋銘趙君徳輿謂某曰某之親友劉君少敏以知非名齋請銘之夫知非聖賢學也今之人多藉口於蘧伯玉夫伯玉行年五十而知四十九年非此莊語也荘語蓋寓耳年至五十而始知四十九年以前之非敏於學者如是哉不莊之徇而由吾聖賢之法可也作知非齋銘明者制念察之於㡬豈必如蘧五十知非五其十年吾生之半于此始知用力差緩聖年至此妙極知天毋謂聖逺希聖者賢知者其真非者其偽能知其非乃識其是物格知至然後意誠意茍誠矣非何從生視聽言動四非之目以勿制非顔子之復毋止伯玉君其學顔非知之艱行之惟艱月心齋銘維善喻者以月嫓心徳明為陽慾晦則隂隂陽消長為明淺深是月本圓吾性本徹理由慾蔽明以隂缺介然有覺如月朏時進至於望有全無虧少怠操存是哉生魄愈缺愈微以至晦蝕善養心者常如月中虛明瑩徹不雲太空遡厥用工自致知始廣而充之大用全體詹子泉父月心自銘願如濓溪風月滿庭箴懲忿箴褊縱斯躁躁發斯暴心為氣使奚以學道粗厲猛起顛風震霆孰若凝湛山峙淵渟顔怒不遷曽出辭氣有容乃大有忍乃濟汝不懲忿虧中敗和去道日逺人如汝何夙興箴古之聖人明徳靡晦昧爽丕顯未旦已待予何人斯雖旦猶昧保茲清明興夜未艾趣時箴投機之㑹間不容穟乗時不為將隳乃事臍弗可噬駟弗可追事豫則立謹勿後時積學箴夫學猶織寸絲丈尺由賢希聖其道在積一日間斷其功必隳毋忽寸隂分亦惜之平躁箴大賢之度何所不容一觸而動是謂淺中汪汪萬頃撓之不濁充量以識進識以學戒欲箴乾男坤女大徳曰生豈資汝慾而縱厥情顔如舜華何啻土芥徇慾忘身君子所戒節用箴施雖弗靳奉己當嗇儉雖勿固浮費當惜節用亷取可使有餘大學生財用之者舒改過箴人誰無過能改則無有過弗改是謂下愚昔者顔淵過則不貳已改於心寧改於事賛解星賛一元躍躍刀截其角文字發祥秋薦横鶚由是而徃益厲厥鋒焉用牛刀寳劔化龍魁星賛魁枕參首揭大有光騰踔飛動化為茲祥俯視餘子眇然斗量持此安施槩平四方吕雲叔家吕僊畫象賛僊而墨故所磨之劑成金色墨而僊故得刀圭者皆升天回翁之𤣥留為家傳世之號為子墨客卿者孰敢並驅而争先耶太平寺觀音像賛妙音三界聞明鏡萬象入一切普現身巖前童子立劉叔榮觀音像賛劉兄叔榮得村邊鄭先生感現瑞相觀音聖像欲勒之石以施於人之信嚮大士者求善知識賛之衆莫敢當也因以遊戲翰墨三昧謾作一賛托石牕和尚寄上儻可用試鑱之不則覆瓿寳祐六年春雪坡姚某賛紫燕䨇吟紅杏塢黄鸝百囀緑楊枝箇中認得真消息露柱懷胎養下兒琴操友山李道士抱琴來為予作三曲請詩各為之操九臯青山鬱兮白雪深四無人聲兮鶴鳴在隂聲聞于天兮而有遐心吁嗟乎有美一人兮無宻爾林君臣慶會衣裳治兮帝巖廊五絃歌詠兮民物阜康禹臯䕫龍兮劔佩鏘鏘吁嗟乎安得君臣兮如此一堂觀瀾若有人兮江之干志在流水兮必觀其瀾清風蕭蕭兮水聲潺潺吁嗟乎世道江河兮誰底其間文試筆因成是筆也南昌賀發之所造也發以筆名聞自昔矣暇日友人攜筆以遺且曰珍之平生將不廢其用因以廬陵羅燮之墨試之紙潤而光皎字峭而體勁果非劣毫者客乃問曰筆之初也始於䝉恬乎曰未也曲禮有史載筆之語周公有援筆寫龜圖之事莊子有䑛筆和墨之說則筆之為筆其來乆矣不始於䝉恬也雖然此不必論也即筆之功用而言之可也嗚呼用於鍾王顔栁之徒而春蚓秋蛇浮雲驚龍名重天下矣用於愷之摩詰之流而馳譽丹青陶鎔物態號稱絶世矣五色於李嶠而為真才子生花於太白而才思逸贍矣用於古人其功如是我而用之必猶今之視昔也將見重於千鈞過於飛泉六草三真偉後超前或静几明牕春日舒長含情凝思欲篇欲章則必輕妍其管健逸其毫應吾心思之洋洋豸冠而揖側堦而立記言與動書佞與直則必隨心應手驚風走雨助吾英鯁之翼翼寫列女傳勒磨崖碑再拜獻文精神怡怡則必龍虎騰拏妙奪春芬使吾過於元而髙於虞中書日處萬務來去應機酬酢風雨霜露則必助吾英斷炳吾神判使吾先於房而邁於杜名遂功成投簮謝纓山觀水游風哦月吟則必滌吾塵懷暢吾幽情使吾飡朝霞而跨白雲隨時所適任意所如縱横震耀各得其妙豈止前數子而已邪客曰善然則將何而用之曰藏以待時俟價而沽不特封之管城而拜之中書精舍名犬精舍未有犬為防丐諸鄰而得之欲以名呼焉命之曰學虎學虎之義有二欲其為吾學舍之虎也欲其學虎之威以御暴客也或曰畫虎不成反類於狗狗不可以比虎也予曰不然畫虎而類狗固不可名狗而比虎奚不可名以此固可以見吾精舍之地雖養狗亦如養虎也亦可以見吾精舍之人其馴虎必猶蓄狗也何不可之有哉於是寫餕于槽投骨于地呼學虎而命之曰汝犬也而名汝以虎要當如駑之睎驥可也是必視如虎之眈然吠如虎之闞然歩如虎之妥然蹲如虎之昻然夫如是則伏而鼪鼯使之不敢晝而趍屏而狐狸使之不敢宵而啼穿窬之類息心胠篋之夫遁迹使吾精舍之人居有旁護行無後顧汝學虎之功也汝當學虎之威嚴而不當學虎之暴而饞汝當學虎之深居而簡出不當學虎之鬬勇而衝突吾不願汝秉識含靈墮虛無穽而為趙州之有佛性亦不願汝䑛鼎食丹入幻妄闗而為淮安之吠雲間吾不願汝逐鷹兎而為斯之牽黄亦不願汝執虎豹而如穆之來白吾不願汝為韓之盧亦不願汝為宋之㹱吾不願汝為華之猘亦不願汝為旅之獒嗚呼汝其能以力報主逺為書郵如黄耳乎抑能以義戀舊從遷隨返如烏喙乎其能銜骨而獻䤋乎抑能保金而不去乎其能忠君而不食乎抑能以仁而哺異雛乎使厖者固不可不吠而能詩之客來山林則又當如何將軍之出迎也習麛固不可拂主人意而功名之㑹鼎至則亦不必為魏元忠之家怪也謹無溺井而齧人于門以制人口舌謹無驚越之雪而蒼黄吠噬以召閙取喧謹無以尾續貂而亂真偽謹無身服繡􅄢而啓僣奢謹無効桀暴而吠仁堯謹無聼晉嗾而搏宣孟謹無以一食之怨而挾憤以殺客謹無以一饑之廹而懷饕以䑛砧謹無竊秦宫之裘而甘為盜之名謹無効盤瓠之僣而化荆蠻之俗能如是則可以稱是學虎之名矣虎亦且不汝狗若矣汝有功於主人如此他日主人學優而仕當清其政刑逺屏攘敓使汝之樂於卧花隂安於生足氂也以是報汝今名汝以學虎尚有以稱其名哉於是學虎摇尾如喜拜足如謝而去檄檄諸鄉教民兵築山寨文本朝之化感人心乆被海涵之澤普天之下皆王土誰無星共之思惟天意必福中華而人和斯有地利用𢎞丕論爰激羣忠上報三百年之國恩下全億萬姓之民命仰皇家之仁厚待邊裔以寛容致彼干誅敢於犯順然而佛狸窺宋第足彰送死之愚苻堅寇淮適自促喪邦之禍彼何足畏我貴自强彼驅吾民為先鋒既每有倒戈之患而提孤軍入重地又徒成入穽之擒犯兵忌而不知料敵情之易敗吾知其無能為矣天亡之其在此乎願易茲畏敵之情而作此鼓勇之氣與其散之四方而各失其生聚孰若同此一心而自足以扞防教民可以即戎有備自能無患守土封疆城郭仝為效死弗去之謀設險山川丘陵合為以全取勝之計宜依山而築寨庸衞國以䕶民貧富相資主佃相養用古者寓兵於農之意以時乎教戰於守之中外而屯内而耕各有攸處攻則勝守則固何憚不為道徳之威成安强仁義之師敵節制若使一庶邦之衆志是増㡬百萬之勝兵官不調丁無天寳石壕之吏人能被甲即成周井畆之軍隐然虎豹之在山驅爾蟁蝱而出境軍容整肅國歩清安逺消朔漠之埃氛宻絶潢池之萌蘖莫良此䇿明聼斯言朝家旌敵愾之功信如金石史册紀安邉之事炳若丹青各堅忠義之忱勇赴功名之㑹故茲檄告咸請通知雪坡集巻四十二
