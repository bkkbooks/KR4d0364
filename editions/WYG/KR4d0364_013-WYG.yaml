body:
  text: 雪坡集巻十三宋姚勉撰詩五言律新晴散歩晴曉芳蹊潤幽尋得自怡露粘行草蝶風舞罥花絲竹靜聞鄰話林虛度客棋意行無伴侣池上只鶯知春日即事行野醒春困㸔山立晝晴鳩啼青樾破鷺匝緑秧行物到忘機樂人因逺俗清覔詩無斷句敲板午茶聲山齋茅齋住翠林一逕總清隂澗近水聲入牕虛山色侵讀書依竹靜送客出花深此地無塵俗令人長道心芭蕉窻外幾芭蕉幽懷慰寂寥晩宜風颭颭秋稱雨瀟瀟清滴漁篷碎徐翻鳯扇摇進修期似爾日日長新苗嵗暮嵗莫仍為客書空黙自嗟鴈聲催念友魚鱠起思家廊静風鳴葉窻虛雪入花醉鄉聊避世天外自寒鴉山市路詢山市宿店近石橋横老水穿簷過低窻照水明雨聲凄客思野處惬幽情沽酒聊牽睡茅柴醉不成舟泊蘭溪湖頭市遇雨望燈投野市衝雨泊征船茅店不容客栁堤聊枕舷欹眠濤拍枕起坐漏沾肩夜半瀟瀟歇推篷月在天送王仲安歸武昌武昌洲畔去端不為魚肥要超初平石同娛萊子衣夜長秋雨急天濶白雲飛何日鵲烏喜北風鴻鴈歸登四聖觀月桂亭有感石刻云紹興十三年清凉居士韓世忠建將軍休戰伐居士號清凉亭創煙蘿古山深月桂香夢䰟猶朔漠風景已錢塘徃事都休問鐘聲又夕陽登北髙峯秋風吹鬢影凉意足登山人立晴林杪猿啼霜霧間好山多佛占浮世只僧閒我亦耽竒者禪扉日叩闗冷泉亭納凉人間方鼎鑊个裏獨氷霜自是清難濁能令暑亦凉客遷愁瘴海妃浴涴温湯惟有兹泉冷冷中滋味長放生池納凉晩歸湖面輕煙起前山漸不分鐘聲連寺答人語隔船聞吟客衣生月歸僧笠帶雲及城門未掩燈火已紛紛湖上隠者所居家計松梅竹日程琴酒碁呼猿僧到處放鶴客來時壁上皆蘇字窻門只白詩卜鄰心已决未得買山資病後乆不到湖上晩與客到斷橋病後乆不出未知湖上秋偶逢佳客至小作斷橋遊荷暗仍香岸栁疎猶舞樓相期明月夜更此放扁舟次劉仲山餞歸韻幾同湖上飲俱愛晩山青雅趣方泉寺離舟又浙亭贈行詩自好愁别酒休醒後夜思君處桐江傍客星富陽道中翠駕凋零盡芒鞋響葉聲晴江潮後緑寒日竹間清曝背翁微睡挑包僧自行離京纔一日便覺惬幽情道傍水閣一川澄不動山色浸分明噪晩鴉寒甚窺魚鷺瘦生人家江閣好天下釣翁清想此幽居者何知有利名丈室蕭然丈室虛彷彿似僧居影與身為伴琴和鶴也無飯時三種菜香畔一函書不似僧家處曇曇髮幾株贈徐處士劒津徐處士湖海盡知名術造勾庚妙書研遁甲精寒齋留爾乆别驛若為情定赴秋風約西湖酒重傾客中遇雨名韁驅逺役挈挈未遑安春只雨中過花從客裏㸔水聲添昨夜風力盡餘寒但喜前程濶不愁行路難及第歸入江西界得得還初隠秋風信馬蹄此心宸極北今日大江西戱綵呈君賜擎珠教御題家庭真樂近蓐食聽晨鷄送梁新恩夢靁歸鄉晝錦賦歸歟梅花萬里餘同盟難此别後㑹定何如袍緑為親壽編青課弟書燕山今再有五桂耀鄉閭梁氏有五桂坊送王希聖歸興國赴舉之子趣裝歸占黄已在眉雕蟲觀暇日薦鶚信秋期喜有傳衣鉢慙無助鼓旗㨗書來報我端的菊花時贈煜上人遶院蕭蕭竹僧中爾獨清佛燈行道影梵磬誦經聲露葉晨蔬熟風松晝茗烹夜深誰伴侣月在石窻明送趙僉判與輻美任二首佐幕此三年邦人盡説賢吏寒清夜月民暖小春天祖帳旗交綵歸裝石壓船甘棠在何許積粟市橋邉底事三年裏纔膺兩薦書邦侯辨寳晩使者設羅疎知已初何計能官自有餘漢庭今欠者子政與朱虛與毛教授州有典客吏以賄得官天基節乃敢立祝壽班雖前此嘗吏之者亦不羞也而廣文毛丈獨能叱而去之充是心以立清朝必能排姦邪去不肖矣喜而賦之詩舉世無清濁誰歟障倒瀾獨能驅鴈鶩不使汙鵷鸞此事雖云小其人已可觀近來峩豸者欠此廣文官次陳肩䕫韻蠻觸争蝸角興亡土兩丘一家文到古萬世月行秋鰲可三山冠鵬湏八極遊胷中治安䇿時事幾堪憂贈廬陵三劉神童唐時劉正字今復見廬陵珠樹三根秀金門一日登贈君無句錦覔我到溪氷不為炎凉變童年有此能寄題上饒周儀仲西疇聞君負北郭築室扁西疇緑水人家曉黄雲穡事秋吾生如有此外物更何求堪卜東鄰否耕餘着釣舟送胡教授之沅水任君今鳴木鐸名與芷俱香後夜月千里美人天一方徃追湖學躅更挈楚臣芳了却臯比事歸來振鷺行近聞沅水路今亦是風寒忠信如先教邉陲儘易安勿云師可去甘與國辭難文武能兼盡功名更好㸔有感范張心許友餘耳面為朋世路􅇖於嶺交情薄似氷綈袍非舊戀結綬况同登亦莫他人責先施恐未能夢太夫人如平生山鹿隨麋樂林烏反哺慈傷心惟夢裏有母似兒時愛子平生念思親隔世悲松楸霜露冷北望淚交頥靈源上太夫人塚一别慈闈面春風十五花不知人有母誰念子無家社雨鄰巢燕清明壟樹鴉動皆傷感處慟哭夕陽斜題族子霆伯西征録閒味西征録霜橙嚼鱠虀俊聲壓湖北詩派接江西鎮日心相憶何時手重攜相期一樽酒重與叩雲溪贈玉隆都監周抱一一别丹霞洞何年到此邦犬隨燒藥鼎鶴伴改詩牕談柄風生席清標月在江西山聞欲隠來訪鹿門龐晨興晨興未梳盥此興亦何清㸔竹鈎簾坐澆花遶逕行葛巾聊復正塵事即時生安得簞瓢足扄門遂野情贈趙神眼杜門人事少排闥相師來童子忙驅鶴先生正㸔梅煩君滕口説如我豈身媒水鏡能司馬隆中覔異才安象祖携子餞行英爽可愛贈以詩嘉其有好徳秉彛之天必能世其家西蜀安公子為謀不在身倚楹惟國事于道亦忠臣偉矣雙書藁清哉箇逸民丹心天所相宜有此麒麟和姜明甫詔放山林去時人冷眼㸔新詩為我贈髙義似君難又説同年弟尤知取友端市將梅子隠冠尚貢公彈和葛徳逺脫兎驚罝逸潜魚畏餌逃山林聊復爾湖海可曽豪藥笑多方誤棊嗟不着髙且湏随野鹿共此食苹蒿霧豹文雖隠風蟬蜕即僊伴書猶有劒食硯豈無田發藻多師董思經敢笑邉晩成知大器天詔正求賢挽十尊長居士聘君今已矣月入少微星又失宗盟長空悲族譜亭生芻嗟莫致歌薤若為聽只喜隂功在三槐已緑庭又代作鹿門龎徳公欵段馬少遊古人不可今君賢抑其流清風足廉頑厚徳亦鎮浮君今復古人善士吾何求代挽甯西雲杜牧先銘墓淵明自祭文兩賢真造理百世又逢君把釣溪沈月著書山鎻雲誰能上遺藁堪辟木天雲雪坡集巻十三
