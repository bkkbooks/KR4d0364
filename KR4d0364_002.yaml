body:
  text: 雪坡集巻二宋姚勉撰封事庚申封事二月四日供正字職翌日奏二月吉日承事郎秘書省正字臣姚某謹沐齋裁書昧死百拜獻于皇帝陛下臣聞天下未嘗有難為之事人主不可無肯為之臣以肯為之臣輔有為之主天下事難者易矣易之象曰雲雷屯君子以經綸夫屯者難也不曰君子以畏避而曰君子以經綸豈非世雖屯難正可經綸之日乎有經綸則屯者亨矣但患無經綸耳方今天下之事勢有可惜者一有可憂者三而幸有可為者四可為者即所謂經綸也臣請疏言之姦相丁大全欺蔽聰明壅塞言路敢於言者必加之竄以不得其言而去者又重之以誅陛下踐祚三十餘年何嘗有此大全葢欲以此箝天下之口而恣已之私也臣於彼時知有今日久矣是以丙辰祇召已至中道不願與之立朝疏陳其姦亟歸俟罪自時厥後大全朋姦罔上日甚一日凡天下之所謂忠臣良士必皆汚之以數百萬極重之贓而壞其數十年自修之節用其腹心十數輩布滿諸路行一切不䘏之政白科彊抑什取六七謂之和糴以失盡陛下之仁心妄以富國强兵自詭特不過竭天下之膏血以奉陛下目前之欲耳此即蔡京豐亨豫大之説王黼應奉享上之舉也富國者如此彊兵者又安在哉夫已未之敵戊午之糴之應也昧者猶曰幸有戊午之重糴猶可以給己未之禦敵殊不知若無戊午之糴則決無己未之敵矣陛下知漁舟渡敵之罪起於袁玠不知超擢用玠者非大全乎使陛下去年大悔悟大更革之時厥既登庸左右賢相亟去大全及其黨與投之四裔則天下大悦衆憤盡紓百將一心三軍同力敵即退伏消弭矣姦臣誤陛下之罪甚大陛下責姦臣之罰甚輕此固陛下之仁厚也然天下謂陛下尚有眷顧大全之心他日必念其能生財不念其幾誤國必至復用重害吾民是以怨尚鬱而未紓憤暫解而復結加以奪官之命越數月而後下求言之詔亦越數月而後頒古人所謂改紀其政者當一反前之所為而乃癰疽之根猶伏胷腹瞑眩之劑未徹膏肓使天下有悔過不盡之歎夫前日悔過之不盡則今日禦敵之不盡也且可為而不勇為今雖欲為之亦緩下之劑矣此臣所謂可惜者一也去年秋敵在鄂渚耳未至興夀也冬則南在湖湘北至興夀耳未至江西也今則在江西矣臣所居之郡瑞陽所鄰之郡清江今聞皆已殘破矣隆興之邑凡八如分寜如武寜如奉新在章江之外者今皆躪蹂矣如豐城如進賢在章江之内者今皆奔潰矣是八邑而失其五也支體已翦腹心能自固乎萬一敵用避實擊虛之謀捨隆興而不攻或自南康而渡或自豐城而渡或自清江而渡或自章江之源而渡越西江一步所在州郡不過如興如夀如瑞如清江耳陛下何以限隔之哉此臣所謂可憂者一也金本無謀皆中國為姦相患苦之士民為之嚮導既犯鄂渚又出廣右蓋用巫臣疲於奔命之謀伍員多方以誤之之計萬一牽制重閫以一兵徑渡下流而來以一兵倐自海道而至陛下又何以待之哉此臣所謂可憂者二也敵之初破蜀也一嵗一鈔掠之害其耕奪其聚殺其民人使不得供其軍賦謂之涸水取魚之法纔掠即去雖去不歸以一帥蟠伏興元以為嵗大入之計不數載而全蜀陷今興夀二州聞已為金所有矣萬一如烏珠欲築建康避暑俟秋復動之計留患腹心何有窮已此臣所謂可憂者三也雖然豈可徒憂之而已哉髙宗皇帝六飛南渡之初國勢未定烏珠亦嘗驚犯江浙當時事勢可謂阽危迨其次年大作措置則曰今冬敵來似有可勝之理又曰雖以檄呼金渡江亦不敢來矣然則金之渡江不足慮也但使之不敢再渡可也陛下君臣儻能以髙宗皇帝之時猶可有為為心則臣所謂可為之四策皆可行矣何謂可為者四一曰築城壁以衛州郡二曰敎民兵以䕶鄉里三曰分責任以全境土四曰一體統以集事功敵長於野掠短於攻城鄂渚有城則不能攻長沙有城則不能㧞豫章有城則不能近衡全永以無城而破興國夀昌以無城而破瑞陽清江又以無城而破城之有無利害可覩也去年冬臣在瑞陽嘗勸守臣築城乃取橋梁寺觀塔廟之石以助之量功命日用為艾獵城沂之法則三旬而可濟守臣雖是其説竟為幕僚沮撓而止不過曰恐費州縣之財粟也今財粟果安在哉孰若以一州之財粟衛一州之生靈乎縱乞朝廷一二年上供綱解而為之朝廷亦必不計也不愈於為敵所蕩則亦無所謂上供乎今天下之無城者不獨瑞陽也陛下寜忍不念其民哉臣所謂築城壁以衛州郡者此也鄂渚官軍之外有義士壯丁數萬人長沙官軍之外有鄉隅丁夫數萬人皆能相助戰守民兵之於鄉井用力尤至也敵之所以彊者空國而皆兵使吾州縣皆有民兵以敵之彼亦安能遽犯勝敵之策莫良於此朝廷去年亦嘗許州縣結民兵築山寨矣不知後來何為而遽罷農隙講事寓兵於耕葢亦近古也主佃相養貧富相資可以弭姦可以敎睦亦不費官也若畏其為盜賊畏其相讐殺則但當區處之得其道勸率之得其人耳督之以才且賢之里宰總之以才且賢之時官不肖而不為鄉里所服者不使也天下安有才且賢之里宰時官而肯為盜賊肯相讐殺者哉敵至而民殘敵去而民盜有民兵而如是乎無民兵而如是乎軍新招則不能精軍既多則患無養固不若民兵之不費也但不必盡取保伍以為民兵保伍者止為姦盜之防民兵者當擇强壯而敎敎之以洞貫之弩敎之以拒馬之鎗敎之以陷陣之斧斷無調遣止衛其鄉利而誘之激以厚賞民必樂從矣去年臣在瑞陽守臣嘗遵朝旨委臣以敎閱民兵之事略有緒矣但未幾而報罷罷一月而遂遭哨騎之苦守臣得百十民兵走一小山寨方能免禍民兵山寨不可謂無用也使盡如臣言鄉鄉皆兵處處皆寨豈至是哉臣之州痛矣無可言矣今天下無民兵者不獨瑞陽也陛下可不念其民哉臣所謂敎民兵以䕶鄉里者此也廣右湖南江西州郡今固殘破矣可殘破而已乎殘破方新修復亦易但一人而為之則難衆力而圖之則易耳且以江西言之閫之在九江者宜命之修復興國夀昌兩軍閫之在隆興在清江者宜命之修復瑞陽清江兩郡及分寜奉新諸縣官許辟置財許移用則修復之事可次第舉矣修復既畢然後命四監司各取所近之州郡分而掌之責其守禦責其應援失地則加之罪卻敵則重之賞但是分任防扞之責至於本司職事如刑獄如茶鹽則仍前日之職而掌之宣閫大臣則加總其權於上不立唐人藩鎮之名隂合中興鎮撫之使祖宗之法不必變而列郡皆蒙其利矣廣右湖南諸郡推此意而行之江東福建兩浙亦用此意而預防之責有所歸力皆願効臣所謂分責任以全境土者此也責任雖分意嚮當一要皆為國不必争功髙宗皇帝初在臨安嘗有聖製曰願同越勾踐焦思先吾身髙風動君子屬意種蠡臣此詩也葢髙宗皇帝中興之規模也越之謀吳臣種治内臣蠡治外髙宗聖心葢有見於此其後用趙鼎張浚為左右相遂用此法鼎居中秉政進退人才浚江上視師専任邊事表裡相應舉天下而運之掌矣使三十六年之間皆此規模中原即日可復獨惜吕祉之間一萌兄弟之好遂失而秦檜乘之矣今二相同心濟謀萬無不和之失更願堅凝意向事事一體人人一心運掉四方身使臂而臂使指所在諸閫亦宜同體國事共濟時艱謹毋曰吾皆執政也吾皆大臣也勢敵權均胡可相使如此則天下之事誰其為之哉臣所謂一體統以集事功者此也此四者皆可為之事也即屯時之所謂經綸也世之無事庸夫髙枕而有餘世之多事聖哲馳騖而不足今日聖哲馳騖不足之時也仁宗朝言者論吕夷簡曰大富貴吕夷簡享之大憂患留與陛下臣今亦曰大富貴丁大全享之大憂患留與陛下為大全㳺説者必告陛下曰大全之時州縣未多殘破也殊不知此敵則誰致之哉屯者大全之所遺患也二相則經綸其屯者也抑臣嘗求經綸之道扵屯卦而得其説願末有獻焉初九一爻為動之主屯之經綸君子也其爻辭曰盤桓利居貞利建侯聖人釋之曰雖盤桓志行正也以貴下賤大得民也是三者經綸之要道也屯難之時未有攸濟故盤桓而不速進但所利者在居正在建侯在以貴下賤耳居正者順公理而無私邪也建侯者聚衆賢以自輔助也以貴下賤者屈已求謀而廣忠益也鼎之相也權倖請謁内降差除一切格止黄彦節之移竹栽㣲罪也責軍令而禁止之馮益之買鵓鴿曖昧也亦予外祠而疎逺之陛下今能聽大臣如此否乎此居正之道也吕本中張九成潘良貴魏矼胡寅范冲朱震之諸賢萃本朝韓世忠岳飛吳玠吳璘王彦之諸將布襄淮荆蜀陛下今有人才將帥如此否乎此建侯之道也天子罪已而求言宰相謙冲而待士詔近臣編類奏疏擇而行之陛下今亦求言矣曾有見之施行者否乎此以貴下賤之道也是三者髙宗皇帝之所以亨屯也髙宗皇帝之時豈不尤難於今日哉而能有為若此則亦當時有肯為之人無難為之事耳今如曰不可為使陛下當髙宗之世將不固邊圉而捍敵騎乎遐荒朔漠之人蕩然窺闖内地如升虛邑纔十數哨騎入境千萬人皆望風而潰曾無發一矢與之抗者臣甚為中國羞也願陛下為宗社大計與二三大臣亟圖之臣冒犯天顔罪當萬死然臣枌榆已失今而後以罪去已不如前者在上饒驛奏封事時尚有可歸之路矣觸鼎鑊斧鉞而死乃其甘心臣無所逃罪臣某實惶實懼頓首頓首謹言雪坡集巻二
