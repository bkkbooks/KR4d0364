body:
  text: 雪坡集卷十五宋姚勉撰詩七言律廷唱謝恩赭袍黃屋儼臨軒獨立班頭領衆仙五色雲乘金殿日一聲雷繞玉除天浮榮何敢矜科第實地惟知學聖賢深重君恩無以報疾風草徑雪松堅恭和御賜詩叨塵愧甚鶴乘軒誓報洪私敢塞源回有聖明真願輔軻於仁義豈忘言清朝長欲諸賢在公論常扶一脉存湛露獨霑慚過厚盍推四海遍皇恩聞吳山鐘舉世昏昏醉夢中一聲震撼自天宫鼇呿大海三山動獅吼危巔萬獸空待漏早朝驚假寐求衣宵起寤宸聰須臾濁霧都收斂喚出扶桑皎日紅寄題武安節推同年萬君定翁露香堂露香取趙清獻公夜則以日所為告之天也是官也蓋清獻初仕云盡將心事寫成碑大要操修在不欺此一瓣香前輩似只三箇字老天知素瓶貯豆應先滿匹馬攜琴料自隨吾榜得人今又盛㑹排介甫擊升之送鄭編修侃子四省元文章得印天嘗靳家世傳燈古亦疏幸甚遷能紬石室惜哉昶亦誤銀車君今自是人龍子名復髙橫薦鶚書讀飽鄴侯三萬軸放高通德舊門閭著身書帶草堂中得與郎君硯席同能學鳴蟬宜賦好不求野鶩自書工壯懷直擬聮龍虎别恨休驚背燕鴻他日東山香宇宙格齊方不負誠翁次韻黃東野德明且識初識敲氷燒葉煮槍旗一笑平生識面遲道上孔程傾蓋日酒邉賀白解貂時飽參霽月光風趣似讀晴煙暖霧詩未識黃先聞有晚煙晴帶濕春霧暖生香之句甚欲為雲從上下只愁龍去渺無期奉餞萬安贊府兄長之官有客來從仕國中多時竹馬閙兒童爭言記壁崔斯立今屬詩家姚武功一節清如金掌露十分明似水晶籠先聲已好為官易飛鶚聮翩遇順風天下如今怕縣灘廬陵見說縣尤難抉搜隱匿嘖豪戶遲鈍催科怒上官革弊有方須是漸恤民到底莫如寬萬家壯邑雖煩劇邑相能賢儘易安吾族年來亦自竒兩年兩度報瓜時班行笑我難安腳州縣輸君省皺眉學不濟時非有用官能及物儘堪為山林肥遁方深密夢入春池但寄詩和趙提刑韻送吕堂長主簿道在顔瓢樂不憂清風端可繼前修朅將西澗重新了莫是東萊再出不學校諸生俱嚮仰文章太守共賡酬戍瓜忽及東吾道輕重從知繫去留擘脯鈎鱸倩老羝離腸那肯話酸悽題橋舊事傳卭蜀衣錦新榮耀㑹稽蜀人又得閬州主簿未領衆星朝極北且擎一柱立天西鳯鸞止止寧棲棘五色雲間有紫泥乙卯七月庚子魁祀禮成同舍諸新元相與宴擬鹿鳴也故敢亦擬勸駕詩呈幸領此意四州八邑此同窗鏗石鏘金日擊撞鵬翼相將摶北海龍頭更奪過西江蒿蘋是日開先宴茰菊他時捷各邦橫浦自期吾豈敢玉山對䇿又無雙次友人示詩集辛亥春杖藜看笋數犀株天墮香雲五色書落月照人驚夢昨光風識面記春初珠駢巧語誰能揀錦比新詩逈不如轉讀轉佳難去手眉間愁思為君舒錦江前日解征鞍剩擬春衫凖酒歡杜宇有聲催客去海棠無伴與誰看而今栁巷青春老又是秧塍白水漫君欲相思須命駕休言别易盍簪難去嵗春風客帝京西湖煙雨過清明蘇堤畫舫春三月天竺清鐘夜五更行李褁書歸舊隱野花沽酒賞新晴只緣未讀時文熟端合山中且菜羮次韻諸友遊雲居又是東風栁絮時催春尚喜杜鵑遲雨晴蔓緑侵髙木風定殘紅閣舊枝眼底好山娛意思耳邉幽鳥話心期雲居見說郊行樂不得騎驢背錦隨絮風絲日揚新晴望栁前川學大程浪不起花澄沼徹雲無留葉太虛清林間整屐聞鶯語竹外搘笻數蟻行底事春愁都減盡新來不似舊鍾情和松窗主人薦墨客詩久不欹眠聽說詩心茅又塞介然蹊那能蠶雨鳴窗葉徒自雞天舞甕醯詩態笑看雲靄靄客懷喚醒曉凄凄龍香惠我真安用君有佳篇好自題和通判直閣立春聞鶯寂寂江城又立春土牛何物竟無神試傾官酒梅花畔不似園丁菜把新綵勝豈留良夜夢紙窗靜拂隔年塵東風畢竟於人好早有鶯聲入鬢唇畫角聲中曉喚春依城栁眼又精神試呼臘蟻梅邉酌恰喜朝鶯雪底新幽谷暖融空翠濕上林香動軟紅塵燕樓暗想翻新曲惱破朱櫻一㸃唇和張公望苦熱韻火傘停空更不移此身如著甑中炊蠅方附熱爭投案蟬欲追凉别過枝靜話竹窗煎雪浪倦投水館卧風漪渠儂箇底休嫌熱聞道瀘南正出師一榻尋凉晝幾移畏看煙火欲停炊喜聽晚雨鳴荷葉安得秋風起桂枝林靜獨宜眠緑䕃波寒誰伴釣清漪讀君妙句真如濯願拜敲推一字師題朱氏梅芳書院暇日訪炳昭祕書于新創之精舍見其所以為學喜而賦之玉梅蒼竹擁氷壺中有揚雄宅一區地占清虛開境界人從確實作工夫窮經得趣床橫易體道存心壁畫圖格物致知功用大的傳願繼考亭朱題胡景顔雙清堂石灘江上一詩仙家住雙清小有天句裏出竒超象外人間無事到吟邉讀騷長在滋蘭畹好客多留種秫田見說尚參顔樂處今時誰似若人賢題華嚴寺庚申正月五日蕭寺恭拈一瓣香漢宫遙上萬年觴庚申再造皇基逺甲子新開御厯長萬物總歸春宇宙八荒都入壽封疆小臣政此朝天闕葵藿傾心仰太陽送别張倅滿襟霽月皎無塵愛客寧嫌客過頻倚竹題詩驚思妙傍花尋栁見情真如今南浦傷行客此處西湖有主人與著三年端的約孤山同訪早梅春送别趙倅寶婺星邉太白仙馭風飛下錦河邉朅來盡散陽春腳歸去獨撑明月船名重題輿千里郡詔催步履八花磚只愁此後民艱食誰與邦民作食天和友人春雪韻曉來積雪被長巒約住春和縱臘寒諂賀豈堪隨味道髙眠且只學袁安謾驚栁絮攙先舞獨愛梅花奈久看安得化為千萬庾放教糴事一分寬丁已春夏之交巨浸屢至小民艱食郡侯請諸寓貴講行賑濟漸就次第僉幕有撓其議而變其法者楊監簿再來請入局商榷不赴寄以詩趂晴亦欲强追陪爭奈濃隂墨樣堆燕子才銜春色至鵓鴣又喚雨聲來從教野草爭先長勒住名花莫浪開世道而今總如此竹關深閉且擎杯戊午喜罷和糴聖主天姿本至仁豈容重糴久傷民聳傳丹鳯銜來詔愧殺蒼鷹枉做人方峻符移譁呌突忽收箠楚罷吟呻歡聲和氣乾坤滿爭祝皇齡萬萬春到處相思虎政苛設官本意果如何民今不足將誰足糴本名和豈是和一例冉求增聚斂幾人陽子拙催科昨來投劾歸歟者到底賢聲却不磨珍重蕭灘刺史賢能令四海遍皇恩奏篇才上旋如請明主何嘗不可言彼已任教書課最若人方稱册臨軒正愁舉世皆喑啞也有朝陽鳯呌閽虐糴安能峙糗糧只因根本暗中戕並緣鼠猾豐衣食受納狼貪富槖囊中户白科都罄室列城黑腐謾盈倉邉塵澒洞烽煙急民命如絲謹勿傷和鄒希賢舟中遇風雨湖干野泊不知㬰水國荒寒愴旅情一夜奔雷吁可怪滿空寒雨注如傾颶風翻海驅潮勢戰鼓轟天震地聲到曉定應三尺雪短篷忽漏赤暾明次方峻峯餞行韻并柬蛟峯公孫曲學聽渠阿正則寧隨上下波浪憶笑談今已矣不知眠飯近如何故人几上書應少俗客門前屨豈多賴有頴濵相慰藉夜床風雨對東坡和劉山居見惠之什久矣蓴鱸欲趂歸自知花樣不隨時巖張欲保君心泰英竦終嫌聖德詩榮辱不知欣我在怨尤俱泯恃天知達官格子那能學橫艇何妨釣野池喜逐秋風馬後歸及君猶未戍瓜時盡傾無底囊中語細讀新吟卷裏詩好趣莫教兒輩覺此心惟有故人知只愁天欲孤籠翼早晚芙蓉在緑池西山庵居作者于今已幾人謝天放我出紅塵尋渠林鹿沙鷗伴乞得孤雲野鶴身閒味聖賢皆古意靜觀景物四時春元正除授君知否食邑西風號逸民贈術士姚有應自號通靈心神仙口一㸃靈虛鏡樣明只須提掇要常醒微幾才動先知吉萬象交森獨測靈至寂靜中能有感遍酬應後却無形死灰枯木都非法但讀吾儒一字經仙在虛懷不可知神仙有口欲何為餐風吸露囂塵表說地談天爛醉時不帶一星煙火氣儘饒三寸帝王師到頭莫把真機泄靜默元來未是癡代謁張别駕入境歡聲聽野農題輿今有曲江公官居寒露清氷裏人在光風霽月中席有新詩吟客滿案無滯牘訟庭空只愁驥足難淹久行捧絲綸入漢宫放浪江湖已幾年袖攜長劒倚天邉草廬不見蜀諸葛采石謾思唐謫仙虎穴未能酬素志龍門端合謁時賢鄉邦幸有乖崖在庶許諸生學李畋挽趙制機見說襄陽墮甑時公嘗前此料危機傷心漢峴疆重拓回首羊鄒事已非安得籌邉書日報誰能薦士剡天飛當年子羽知吳玠尚作西撑一柱巍雪坡集卷十五
