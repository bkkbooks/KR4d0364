body:
  text: 雪坡集卷三十宋姚勉撰書上大參蔡久軒書丙辰十二月某比僭拜書伏廑賜答兹不敢縷敘以瀆師聽某仰蒙憐念榻前力薦遂忝召恩祿不逮親本不忍問仕第以殊恩深異且先生在某不敢不一來初離鄉邦則聞有立石三學之事某已悔其出矣行至臨川見屏斥學校士類之報私心大為之傷痛上三十三年如天之度未嘗有是也小人誤之以至於此亦欲到京流涕痛哭一言而去又聞先生以道去國而未見報及至上饒得觀所傳御批則知時事大異夫所謂大臣者以道事君不可則止先生此去甚合于道而乃以為此風不可長然則貪榮嗜進頑鈍無恥此風顧可長哉先生既不在朝某安可一日與羣小並立已決意不復出仕歸讀先聖賢書竟買舟自信江西去矣然欲吐之忠滿懷憂愛不能自默妄援蘇老泉先生以疾辭召試上書仁宗故事僭作一書與申省辭免狀偕往廟堂懇訥齋丞相以韓魏公例為之轉以上聞聞與不聞却在丞相某但欲盡吾心之所安耳非不欲到京後言然候班對則尚逺請賜對則必為羣小所遏絶近時欲言而不得者不知幾人矣某不欲更犯此陷阱枉為所誣衊而去則心事不能以自明故不若見幾而作不俟終日先生以大臣去國猶以為此風不可長某螻蟻小臣若一言竟去得禍必重他日開嶺海之路者自某始是某招禍於善類也及河而反庶可以自靖矣亦知先生取道自信歸閩某欲小候但某既有封事不欲使羣小謂先生與某商量做來則門弟子重為先生纍故亦不敢伺見三年不得承謦咳一旦相隔止百十里許又不得一親炙而行天也如何以泣以歎先生歸在雲谷之下某明年春専自寒鄉徑往一拜師門庶可小留以卒業亦不在今日一見也第恐某拒違君命犯觸時諱或至竄斥則所願不得遂耳儻藉庇存得免於罪躬執杖屨兹不逺矣預切欣忭書藁未達君父不敢拜呈等乞鈞察天氣栗烈伏惟為宗社道統壽重里有委役某恭承與佑神蔡仁齋書某拜别道德之誨已三載蒙恩祗召亦謂即可遂一答拜行至上饒去天已半忽覩邸報則知尊公大參先生以道去國此舉勇甚近時不能明去就之義者皆愧矣不惟見先生與近時諸公不同亦以見魏公有南軒之子贊決之力髙於庸俗千萬也甚盛甚休欽羡欽羡先生既已去國某安肯一日與羣小並立乎其位已決意不復出仕歸山林中讀書然愛君忠忱不能自己妄援蘇老泉以疾辭召上仁宗皇帝書故事作一小書極言時事却不敢激訐但以用人聽言立説願保持初意書未上達不敢以藁拜呈恐流於訕上訥齋一書及申省辭命乞嶽祠劄子却别紙録呈大槩封事之意與上丞相書其意皆同但丞相之書辭稍徑封事則微婉告君之體不容不爾也轉以上聞與否却在丞相某但欲盡其在我以求此心之所安某非不欲到京後言但近時能言之士往往未及一言即為羣小遏絶先得罪去某茍至此心迹無以自明故不若不落其阱為是聖賢之學最要明出處兩字文公先生釋不入不居之章有曰君子見危授命則仕危邦無可去之理但在外則不入可也蘧伯玉可卷而懷之亦聖門所深取故某日夜忖思中道見幾而作未失及河而反之義是以翩然自信江竟歸尊兄其許之否某昨在上饒邦侯陳寺丞處見尊年丈書亦知斾從取道由此自當伺候一見但不欲羣小騰謗謂某中道見尊公大參而後去所上封事乃商量為之如此則某重為師門纍故叔向不告免焉伏祈尊察某明年春儻不以罪斥嶺海即自家山徑拜門墻則是時進而請益於師退而就正於友某樂也賢於與羣小並立逺矣幸終教之臨行忿忿拜字不肅等惟賜之矜恕某平時於天人二爵看破極分曉區區一官棄之猶敝屣欣然于心若使某貪榮嗜進阿附今之權姦以希不次之擢有死而已某不能也歸家杜門讀書其樂甚大伏乞照察通侍郎牟存齋書某門生也當時修起居之禮而八年山林不能布一武於庭拜一字於几負罪萬萬雖然事師者必有以不辱於師之門不在於以世俗之禮事也迹之踈先生必不罪心之親先生必有以知我矣某癸丑别丈席後即嬰大故忍不死丙辰服闋冬祗召道聞巨姦得政不欲前驛奏一封懇程相國轉聞引疾徑歸席藁俟罪至正月遂得寢命之劾初以韓愈得出宣公之門自竒至是又以韓非得附老子之傳自慶不自意有此遭逢之幸也先生清標徑節天下所知彼何人斯乃敢汙白圭之白莫不為先生憤而某則獨為先生賀也夫以脫鞾亭一記取禍公論日月萬世杲晰緑野午橋何以異金馬玉堂哉抑今之時則不當聽先生緑野午橋也朝有杜富韓范邊無契丹元昊倚需環召以重朝廷疽根已除正氣斯復某每食必禱深念不可久曠門弟子之禮獨貧不能遣使輒恭咫尺託同年丈子及翁拜之簡慢有誅曲祈矜恕晚春漸暑伏惟為斯世斯文壽愛即霈霖雨以澤四海某不勝拳拳與計院王南山書某至敬無文弗敢為世俗寒暄浮語以溷崇聽仰祈宥察某拜别朝矩積嵗仰與山髙中間先生以外庸課最入六院不能賀繼聞以太夫人憂去國不能弔二罪併糾其又奚辭兹審已御祥琴即膺召綍某不特為左右慶蓋將為天下慶先生文章之言語妙天下剛直之風采動朝端舉世謂寶祐之王洪必繼端平之王洪矣洪竟以朝陽鳳鳴而王素之鶻乃暫斂其翮鎩而未擊中外之望尚孤也雖然先生謂履齎毋與噲伍之言世皆播誦使斯言早行豈至大壞極弊若此之甚耶是又可惜也抑熙豐諸人破壞灼爛至於不可收拾又必賴元祐諸賢徐起而拯救之巧匠恐不應久袖縮於不善為斫者之旁也昨嘗與鄒學録丈話及仁祖時有吳正言嘗為審刑官奏議可上心將除御史未幾以憂去然數年後亦除言官以此見合作官職自是推不去此事甚與先生前日類前者類後者亦必類矣第不知先生當今之時得前之位法筵龍象之所觀何義為第一乎卧庵膝吟靜觀羣動必有偉見儻可教之否某養親不及問仕無心獨以上恩未酬去秋誤召辭不獲免冬強一行才至半塗時事駭人憂感至疾不能前往深知主上聰明偶為羣小所誤又不得自默拜疏以聞而竟歸故山閉門俟罪罪大罰小僅從寢命愈切悚惶益密益深以恐以懼第方茍安藜羮藿粥之粗遣而又有荆叉布裙之深悲憂患相仍情味日惡雖素難而行無可尤怨亦切自痛也先生豈無可以玉其貧賤憂戚者乎願安承教兹因鄒學録丈往賀趙侯開藩知必到廡下以拜輒附狀以訊起居窮約之中更無可以侑書者然苞苴之講亦非所以事先生不惟無之有亦不敢伏丐重察與蔡佑神公亮書某久不拜君子動靜之問仰心渴如中間甚欲一造門墻謁侍尊公大參相公先生就訪南軒於魏公之側以遂承師親友之志念此久矣薄命多蹇厄會日殷去年春而有悼亡之悲今年春而有哭弟之戚家素貧嗷嗷數百指待食於某而又罹此患苦身單子幼叔出而無季處安可逺役於是此願未克即償遐想尊年契兄於家庭父子唯諾之間皆聖賢道德性命之奧其樂不可量也時事日異於前惟有掩耳不敢聞閉口不敢語而憂則不少忘而已在畎畝間惟知農事春旱久種幾不入土初夏之末方雨秧苖已老入田穟不復長穎栗甚稀秋穫可十分之五糴五百萬二在江西鄉間乃當四十萬常嵗苖斛七萬耳必六其七乃可足殫其地之出竭其廬之入不能也明年殆無粟可食矣某若不為餓殍必亦流民之一也能無憂乎杜門林棲不敢交人事然時報亦竊聞一二向覩除目見尊年兄有泉臺幹官之命尊年兄其亦肯屑於一出乎將朝家不欲使賢者久間邪人皆山林誰其為國家辦事固不可皆不出然今日風俗瀾倒甚矣所賴為君子者立腳堅牢少為之砥柱庶幾猶可以救貪得嗜進頑鈍亡耻之風此某之拳拳仰望於兄者惟執事謹之重之天下宗師之家大賢執政之子甲科名勝之流舉世之所瞻望焉者恐不假乎祿仕也某極貧為貧固亦可仕然決不敢枉道以信身餓死事小失節事大也惟髙明察之尊年契兄識見超然必有以處此烏用某僭愛而莫助聊復覼縷耳遊之道久客髙安聞其歸趂秋試因便奉書以溷執事恨不能細有便風幸乞時有以教之與節幹鄒仲逺書某至欽尚質不敢為世俗寒暄問候語以瀆尊覽首祈垂照某拜别教誨忍數年矣伏自江臯奉餞朝帆蒙被贈處之言以為針訂頑愚之藥石至今誦憶不敢忘徒以出處殊塗去仕國復遼逺末由尺書以訊興居雖然在金華猶可言也今治在廬陵而某亦失於恭先長者之問不敏之罪其又奚辭兹諗簡知賢侯創辟藩郡以春秋康濟之學贊威文節制之師幕府有人風采震聳伏惟歡慶深擬錦晝少敘賀私乃不知即赴瓜時莫獲侍拜崇瞻翹仰徒切下忱欽以某官盤胸以蓬萊道山之書縟筆以春濤瑞錦之作才美固超乎餘子之上矣而且造徹理窟湛如其扄涵泳聖涯粹乎其宇允為儒家有用之學昭代必任之才緑水紅蓮暫焉借重紫樞黃閣政此需賢姑背日以斜飛即覽輝而翔集某鈍而弗穎方不能圓僅竊末科遽罹大戚問仕之念已懶矣丙辰誤召甚不願一出故山獨以君命莫違國恩未報懇辭弗允強顔一行僅至上饒時事駭目諸賢相繼去位臺諫與士為仇三學所斥逐諸生纍纍滿道景象如此自知雖往亦決不能入其保社又聞新有榜約揭示朝堂朝士不許上書對班不納副封者多不得對欲言又復不可然又不欲默然不忠告而去妄陳封事以書托丞相轉聞抱疾歸家杜門俟罪聖度天廣釋而不誅僅從寢召罪大罰小愈不自安益密益深羮藜藿而味故書不敢與一毫世事然而君親弗報抱歉尤多未知所以自立以為始中終之孝者先生長者能不念而教之乎拳拳昱望敢不稽首某久欲以賤姓名到几格苦無其便兹永豐稅院豐城王丈元剛某之友也舊在端齋先生幕底去年四領舉今年復失南省不無問祿之想往賀端齋建臺又欲求小小辟闕然不敢自請竊知鄉先生為端齋所推重無言不讐以某邑子黨童俾以羽言為請於下執事伏惟春風齒頰特有以噓其枯而吹其生幸甚幸甚某末由侍坐請益惟切傾瞻聞有中庸解已成書便風賜副本鐫教尤感有鄉邦委䇿晚出之所當承奉併希融照回鄭持正書昨升父詹丈遞至所賜書陳誼甚髙荷意深重某聞賢者在敝鄉久矣無由一拜乃今得觀偉論雖未識面而已知其心執事舉近世諸老及今諸公而勸戒之藥石之誨也抑近世諸老非某之所敢望也而亦不敢勉強也今時諸公其富貴則非某所尚也其人則某所不能為亦不敢為也無益之請如干與外事請謁州縣某平日不為之有請者必掩耳而走今亦無以此請者獨間嘗作一二文字以習氣未除不能不拈筆弄墨耳然亦無害於道理乃作之未嘗有過實者也斂影韜芒慳惜咳唾自今亦謹聞命矣等時論如蛙黽之鳴遵大賢如規矩之正此則某之素志敢渝此言子路聞人告之以有過則喜諸葛孔明亦言但勤攻吾之闕今而後茍有過聳聞砭針新年許賜迂臨幸甚雖杜門當掃關以俟奉答草草伏惟孚亮與提刑李後林某伏自去臘仰蒙賜書嘗僭具咫尺謝不敏計徹尊覽某是行趨京甚欲自屬邑安仁至統郡伏謁以洗尊慕之渴以請開警之誨有定嚮矣不謂十七日離豐城才一朝夕忽王將使元剛馳疾足報敵騎已在隆興對岸石頭渡欲過湖窺浙某深恐到使郡之後萬一道路或梗不可得而赴京雖依二天之覆可以茍安然聞雞而避不足以為忠死而無名不足以為節不仕則已既肯出仕則事君當致其身身也者吾君之身也非某之所能自有惟宜勇往前進捐軀效死於吾君之前以盡已之職分用是又不可得而進拜詢之道路至使郡自安仁而來尚須三日自使郡而出上饒又須四日中間豈不蒙延留數日則動是旬餘權其事體又不若以旬餘而亟趨君所也惟是豈無救急之著當言之事合條陳於吾君吾相之前者皆不能受耳提面命而去為之悵然不侍尊誨三年相望使治二百里欲一見而不得見抑天也夫雖然先生必時有便郵入京因風賜教千里亦如侍席也某未龜侍晤又是何日向風依依伏祈以道壽重為國扞藩即歸禁近柄用以福天下回文本心榜眼某久不奉起居無時不仰德也去年春忽見當路辟尊年魁入幕府相去遙逺不知就與否又見吳同年節卿亦在其間料必有談笑青油之樂亦欲探便遣一書相聞而不能至秋乃見前之辟年魁者轉而為後之怪舉以駭以愕以歎以惜非為左右駭愕歎惜也以其好賢之不竟也尊年魁清標徑節何疵可指特今之世喜佞惡拂在在皆然必是積忤不能堪耳然終不見其毁日月之辭前月道三衢會陳劑院景初同年方能言其故果如某之所料此於盛德何損公論在天下曲直有所歸矣聞居在苕霅之間佳山秀水應接不暇而耻堂存齋二先生又居是邦必時相往來其樂可以想見也二先生天下孰不知其賢而前此眼釘極其誣衊以相窘辱天下又誰以眼釘為是而以二先生為非哉某前日供職之明朝即伏闕下進一書言眼釘之日凡天下所謂忠臣良士必皆汚之以數百萬極重之贓以壞其數十年自修之節正為二先生及平舟先生言也某之言雖無補亦可以見積憤久欎於胸到此即欲吐耳今何如時而可使二先生及尊年魁者在野哉大抵今日上下祗以北兵未退為憂而不以賢者未進為慮所謂元氣壯則無外邪直以此等語為迂闊殊不知豈有天下賢者皆聚朝廷而亡人之國者哉某雖不得數見廟堂然每見必言此但羽言未足動其聽耳尊年魁自合經筵諫坡中人小亦當且儲之學館但恐尚執三考格法則未免又勞外任補考耳資格者豈所以待非常才哉雪坡集卷三十
