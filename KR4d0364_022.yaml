body:
  text: 雪坡集卷二十二宋姚勉撰啓上丞相吳履齊啓庚申溫詔起家誤忝校讎之新渥俞音從欲仍還考正之初班妙轉大鈞曲全小物愛人以德合義之宜嘗謂荆公除官而每辭不辭掌制晦翁侍講而不受願受說書觀其進退之間居然真僞之辨然而養培後進之器質源流前輩之典刑薦及相門文正深惜於師德徑躋翰苑忠獻不願於子瞻豈圖斯今復見先正某忍窮如鐵抱鈍非錐昔者將朝亦欲正天下之字吾之不遇乃未拔眼中之釘方秦鹿之肆欺何魯魚之訂舛肥遁之利苦節而甘生不願登京檜如市之門身何幸逢文富並朝之日然君子載質惡其道之不由茍虞人以旌非其招而敢往請安於分隨獲所求胡珵之初去是官自甘東徹之纍籍溪之肯趨此召直為張劉而來輒企前修幸符鄙志兹蓋恭遇大宰相樞使國公先生忠良麟鳳廊廟蓍龜周公受人之徽言伊尹乃天之先覺翕受敷施九德咸事俊乂在官兼收並蓄一藝必庸短長惟器采此葑菲種之蕙蘭某敢不盡職鉛丹厲心精白雖幸氷山之久圮尚憂天步之多艱深恐議春秋而廢防秋不敢泥魚魯而忘存魯止戈為武遹觀戢兵禁暴之功鑿鼓作歌尚頌己亂息爭之美編摩辭淺皈嚮意深賀丞相賈秋壑啓庚申五月十六日帝舜班師乃干羽舞周公入相以衮衣歸福被生靈功在社稷天開巨宋代有元勳寇萊公澶淵之功成章聖太平之治張忠獻江上之捷定光堯再造之基雖措國於泰山磐石之中尚挫敵於長江大河之外未有坐縳踰疆之帥盡驅入塞之渠前無古人有若今日恭惟大丞相樞使國公先生經文緯武之略出將入相之才身佩安危力侔造化三代而下稱王佐獨有孔明四國之長問公年一如裴度斡回世運康濟時艱斷鼇既奠於西維飲馬誰開於南牧方叔涖止伐玁狁而蠻荆威召虎來宣營江漢而王國定天下拜更生之賜上心寬孔疚之憂日月重明乾坤再立王于出征我用是急遄奏膚功皇曰來歸汝遂相豫載咨一德蓋既有撥亂興衰之烈又當為深根固本之思立少師曰三孤職太宰建六典深識朝廷之大體首清機務於中書典故問東府文學問西㕔自當大事刑獄責廷尉錢穀責內史惟鎮外方商出於市旅出於塗賢和於朝物和於野民歌快活之條貫士誇公大之規模庶政惟和萬邦作乂然而愛山甫而莫助圖伊尹之有終因景德之勝而天書以孤注之論起轉紹興之戰而和議由二䇿之說行今固萬無此難一有立政其惟吉士必勿用於憸人繩愆而格非心在交修於后德茂建無疆之聞益彰不世之勳成績紀于太常則髙美矣令德辭於永世惟良顯哉某性本山䴢迹徒天祿昔作明允辨姦之論非欲釣名今賡徂徠聖德之詩又虞涉怪有懷難默因頌敢規聊鳴賀厦之私非有問釣之想文正惜師德之競寧蹈此風子韶為忠簡所知願觀異日寸丹有藴尺素未殫見侍郎江古心啓天之未喪斯文必將有主師者以傳其道敢後親仁歸心一代之宗工拜手當家之正印嘗觀佛氏可謂異端然正法眼藏有待乃傳而宗派心燈不輕所續况此扶持於彞教詎可間斷於真傳先後進貴乎相須師弟子難於兩遇歐陽公放出頭地必東坡而後然陳履常敬為瓣香非南豐則不可每自嗤於劣識不深肯於時流獨惟咳落而唾飛則必心恱而誠服弗圖今世乃有古人望康廬千仞之山昔悵無於飛翼立程門一尺之雪兹得遂於素襟所逢甚竒其喜欲舞恭惟祭酒侍讀侍郎先生受天間氣為世英流筆寫雄辭變化雷霆浩汗河漢胸蟠大巧轇轕璇璣經緯星辰嗟今之人罕言而理儷花鬬葉顛倒相尚習以成風抽黃嫓白眩耀為文讀之短氣卓以七儒先之精粹寓於一王法之森嚴春麗鯨鏗偉栁骨韓筋之製金聲玉振蔚周情孔思之章兩美具兼四海寡二自宜鼓吹聖作黼黻皇猷播言綸而盤誥殷周秉史筆而典謨虞夏而乃蘭之畹蕙之圃荷其衣蓉其裳動而得謗名亦隨之初何傷於日月天之欲治時則可矣寧終捨於山川還之經筵持以從槖切劘君德追琢人材奴𨽻知青天白日之明學者如泰山北斗之仰和聲以鳴國家之盛在溫純深潤之辭交泰而相天地之宜究經綸位育之用有如某者素願學焉富貴飄風之榮華恬無此欲聖賢實地之踐履誓力於行久矣仰髙於焉就正謹再拜問作文之關鍵求一言為進德之階梯庶於口講指畫之間躍然心領神㑹之妙孺子可教矣倘能受衣鉢於師門先生其許之或可備桷榱於道閫敷棻辭淺皈嚮意深見祕監洪恕齊啓空山肄學心師世掌之文中祕服寮耳側家傳之誨素是待秧之稻今為托根之梅久懷南豐一瓣香之誠來侍東觀羣玉山之長躍頑爐冶就正範模恭惟大監國史直院先生號行祕書推真學士以洞庭雲夢之宇吞蓬萊道山之藏人品坡公老泉其父而叔黨其子淵源程氏正叔為弟而伯淳為兄觀近時不涴權門之塵即先正安吟老圃之賦其在端平之君子乃篤忠正之世家鄱陽之三於焉嫓美豫章之四視此懷慙峙海內龍門之尊擅池上鳳毛之美胸蟠五色之線補帝衣裳手演六經之麻新民耳目而且汲引後輩延譽諸公有先進以為之先使小者得成其小書其門而去即在郊島籍湜之間瀹以茗之珍遂進黃秦張朝之列所以士求品目人願依歸某跡雖後於及門身已同於長廏昔民于邑飽聽阿戎之談後客于京屢進卯君之坐如聞誤渥甚辱溫噓公之求不待士之求古所有而非今所有轉麟煙開雀影幸隨碧落之班附鳳翼攀龍鱗儻在青雲之上棲身天地感德丘山受校書謝丞相啓六月十六日陶鈞萬類例叨序進之榮師式百僚復佩時中之誨揣分雖懷于重愧䝉恩何敢以固辭待之非常宜以何報自義理之學不講而利欲之習相挻一日九遷誇張盛事三入四至流播美談至於偶得之微科尤曰速化之捷徑鳳池十年之語皆詫為榮龍首四人之詩頗懷不滿所慕甚小自處何卑皆世變之使然於已分乎何有某人雖未古志則匪今雖徹骨之酸寒終無心於甘暖排雲而呌閶闔適逢虎豹於九關引風而去蓬萊遂與鳳凰而千仞漫浪一第侵尋七年人笑拙迂坐閲董德元執政之嵗自嗟閒散尚半張子韶寓寺之期孤根暖而萬木之折可憐野舟橫而千帆之過何害微管仲其左衽矣欣聞一正天下之功歸周公以衮衣兮復見勿用憸人之政裂此芰製荷衣之服登之藝香花露之天閲月僅三承渥至再義然後取其取不厭夫豈其然前之不受則受之非殆無所處怵惕惟厲啓居靡遺翹翹車乘招我以弓敢辱髙位以速謗坎坎伐輻胡爾有特必以無功而刺貪昔有司嘗求程子厯任之文而舍人尚譏晦翁遜官之僞矧如後學敢望先儒深畏笑嘲未容祗若匪怒伊教無言不酬謂孤竹子之清未若聖時當知所擇而蘧伯玉之耻獨為君子毋閡於同稽首誨言浹背流汗賜之大禮之過知之至既深相國之恩洋然動峩然纓于然來敢在諸賢之後欽而承命賤不敢辭兹蓋恭遇少師特進大丞相國公先生八柄詔王萬邦為憲旁招俊乂列于庶位惟暨乃僚咸懷忠良罔匪正人以承厥辟三握髮三吐哺以下白屋一舉手一投足而轉清波至公無私小善率録用𢎞丕訓昭啓愚衷某既拜玉成益嚴珍護雖知仕止久速之當可終覺安恬靜退之為宜富文忠之告范純仁固勿遜清資於臺閣文潞公之薦韓持國政將抑浮競於縉紳關繫惟深敷棻則淺除太子舍人謝丞相啓六月二十八日在周有武燕翼子以詒謀惟尹暨湯求哲人而輔後極天下之妙選開皇家之太平胡為譾材亦誤殊渥若稽古昔嚴護儲闈贊之羽籥干戈詔以弦誦書禮三公三少莫匪正人之居一話一言必惟成德之彥至後世有舍人之職在朝廷如省掖之榮匪専以文所重惟德朝錯以知術數為教毋乃刻深鄭莊以推賢善得名失在趨和獻釋奠頌者乃匪人之比進承華針者竟姦人之歸惟張茂先以忠正聞而杜世嘏以亮直著寥寥千古磊磊幾人惟我天朝多王吉士然居文字之任率皆禁近之臣在至道元年時則有昭文嶠在天禧四載時則有翰林殊自璧水範模而兼者三由蓬萊長二而領者二或以天子言動之史或以御史耳目之官委任至隆擇使彌重用能成金昭玉裕之德開星輝海潤之祥運祚之長源流此選繼自今日盍追前人某朴思無華鈍材不穎但有山林枯槁之氣初無臺閣溫潤之文夜照焰於青藜讀書未遍日談經於朱邸講道無竒忽承命於龍墀俾陪班於鶴禁雖崇文館校書之𨽻舊在春坊然諸王府記室之卑豈堪宫寀濫厠青闈之屬允由黃閣之知兹蓋恭遇少師特進大丞相樞使國公先生德厚而功髙識深而慮逺五百里曰荒服既逖蠻方萬億年敬天休乃隆國本皆身任於大事以力扶於丕基若神文與子之時臣琦定䇿若光堯建嫡之日臣鼎贊謀柬忠純良實之流明孝仁禮義之習師傅馬吕講讀震沖萬夫之望皆來一時之勝特盛致使德陽之誤拜及於天祿之冗員某謹乃攸司欽于時命何敢賦洞簫而取恱亦願撤邪蒿而進規為國士以報待國士之恩誓求死塞愛吾君必先忠吾君之子當效糜捐四六載陳萬分一見雪坡集卷二十二
