body:
  text: 雪坡集卷四十九宋姚勉撰墓銘菊坪朝奉致政壙志嗚呼此先君子菊坪先生之墓也姓姚氏諱某字行簡瑞州新昌人寓髙安髙大父曰特奏狀元進賢府君曾大父曰釋褐狀元黃州府君大父曰汀州府君考曰學正存齋先生妣曰周夫人生母曰楊太君辛亥五月十有八日生寶祐癸丑十有一月十有五日沒明年二月十有七日葬于隆興府新建縣西山之雲峰男二人介先卒女四人將窆勉泣血志曰先君子生時鬻田而教子損己以益人為善孳孳老而益篤勉既竊第書來曰爾毋貪好爵當損秩增貢以利無窮十月勉至自京師僅一月而先君子沒矣欲養不俟哀哀蒼天百日卜葬西山之巔嗚呼陵谷後或變遷仁人我哀尚封斯阡石莊范學録子堅壙銘郡東七里新塘岡拱山環水吉且良郡之文師范石莊大帶深衣此焉藏先生之文古辭章髙視韓孟揚其芳蛟龍蹄涔脫名場藥不龜手授客方弟子輩行爭頡頏先生騎鯨返帝鄉甲子僅周人䀌傷斯文有脈夀且長於乎先生不謂亡潘司户宗權墓志銘嗚呼此吾同年進士潘君宗權之墓也始宗權偕某登寶祐癸丑第在京師相好甚歡請某為書氷壑二大字蓋其自號也宗權儀貌端碩清英照人真若一氷在萬壑皭然無纎壒埃某意其致逺器也不相聞者三年一日其伯氏泳書來請為宗權銘墓則宗權死矣哀哉追思相從期集時如隔日事臨分屬酒軒然意氣相許孰謂斯今乃隔生死昔求書者室之扁今求書者壙之文尚忍伸紙握筆邪第其伯氏書援退之哀歐陽詹哀辭故事為同年請某萬不韓若宗權則於詹無遜不可使不聞于後乃為位而哭哭已銘宗權諱謀世宜春人唐之時有曰圖曰洵美者以文顯宗權曾祖某祖某父某皆韜光弗耀宗權生而重厚寡言孝友天至執父母喪一如禮哀毁骨立處兄弟宗族穆無間言救喪佐婚靡間戚疏嗜書如飴好客如渴多與名卿賢大夫遊如滄州程先生息庵湯先生西澗葉先生皆見器重精通毛氏詩學為文章泉湧瀾溢宜春退之所嘗蒞郡士至今學韓之文而宗權尤邃一舉於鄉即擢第殿射貫鵠由迪功轉升修職郎授鎮江府户曹參軍未之官驟得疾終于正寢將屬纊謂其兄葬已必求某之文以為銘某豈足托以死者邪宗權生於戊寅夏四月壬子沒以甲寅夏五月己卯僅三十有七娶南雄法曹參軍孫公裕之女有二子繩孫振孫皆幼嗚呼天豈不福善夀仁邪而於宗權獨不可詰與之名不與之祿與之德不與之年奮焉而踣隨榮焉而悴繼經綸之志齎入冥漠豈受氣大化得其清者以為德為名而不得其厚者以為福為夀耶銘詔方來尚慰其志葬在縣南仁孝鄉聚龍坑原祖塋山之右其日丙辰二月壬申也銘曰嗚呼宗權有文而賢宜福宜夀乃不假年萬里亨衢一息可到擢第期年遽以歿告濟時有志曾不少施子稚妻孀見聞為悲幸哉有兄克訓其子可箕可裘雖死不死不負子托揚名于阡慰吾同年嗚呼宗權周恕齋墓志銘濓溪周夫子曰師道立則善人多信哉言也古先盛時以德行道藝取人於比閭族黨比閭族黨之長則皆耆英碩彥為後進式然後德行道藝相師成風今之世為前輩者率不能自重後生小子浮躁譁誕能為數語華靡不根之文即自視以為孔孟不過如此由是德行道藝之風愈微則鄉無前輩之過也茍有前輩為之師必不爾恕齋周公則新吳之鄉先生也某聞其能淑艾後進久矣先是新吳有華林書院名流多此焉出遺風寖逺疇嗣厥音公與同邑王君立書院于登髙山之麓萃英秀而教之中設講堂四齋旁列扁曰道藝曰文行曰才德曰器識謂藝者必本於道文者必副以行才者必將以德器者必深於識也豈徒習訓詁工聲律哉余嘗得其序齒圖觀之從之遊者幾數百成人者不可勝計信矣師道之不可不立也今典刑亡矣關風俗不細哀哉公諱允成字子韶恕齋其號也世為豫章之新吳人曾祖某祖某父某母袁氏公豐頥廣額龎眉秀髯望而知其君子也天性孝友內外無間言雖待臧獲未嘗疾聲怒色博學強記通貫經傳以至天文地理隂陽雜技醫學卜筮之書與夫稗官小説靡不諳究采其言之有合於道者皆編稡之手抄未嘗倦也邑人多師宗之考德問業踵其門者相接皆稱鄉先生焉吾鄉松垣幸先生不輕許可獨稱為友人凡仕于邑顯于時之士大夫皆欽企尊慕以禮交際屈之以重學校與人交數十年如一日利不茍就害不茍避推忱待物赴人之急如己恬淡靖退不喜奔競少而能賦每一篇出士林爭先傳誦膏沾馥丐輒效場屋而公獨不偶僅獲貢璧水之名而公不之計寒窗冷几愈愈如也周平園有曰得鄉舉易得鄉評難公其有餘於鄉評而不足於鄉舉者歟嘗遇異人授以丹鉛龍虎之方曰服此可以返老還童其祕之公曰白日升天奚益以其方燎為藥濟里之衰疾者年將九十步履輕健視聽不衰將終自志其墓遺誡謂子孫吾平生聖經賢傳心體躬行自覺超踰釋老歸盡之日謹勿信地獄之説而作佛事喪禮一從古制遂以癸丑十有一月二十有八日終於正寢生於淳熙乙酉蓋年八十有九可謂卓然達理至老死不亂者矣娶劉氏孝慈和勤後公一年生先公九月卒夫婦皆享上夀白首同歸亦異事也子三人潢潨洵中子早世女二人適邑士張師儉鄒時英孫三人柟杞楫曾孫二人焱榮諺曰三世為儒收功詩書矧四世皆儒者乎是必有興者公所著書有注孝經一卷文集二卷理究一卷雜志三卷甲寅十有二月壬申以治命與劉夫人合葬于上堨先塋之側其孫柟來請銘銘鄉之老師宿儒某不敢辭銘曰嗚呼恕齋耆儒之賢立師道以就善人言合乎濓溪無鄉舉而有鄉評言合乎平園敢以二周先生之言而銘鄉先生周恕齋之阡陳允中墓志銘寶祐元年癸丑秋九月髙安壺春陳君卒越一月某歸自京君長子之子珤孫以書來言曰先大父不幸棄諸孤家君暨二叔父斬焉衰絰中不敢書使珤孫告于下執事惟先大夫將沒時進諸孤而語之曰我死必合于浮塘之葬銘必於姚子成一請之當不吾靳也諸孤奉遺言弗敢墜謹使珤孫請子是行從政于吳逺將不暇及幸早為我銘之某與君諸子遊知君為悉也宜銘某觀洪範之次九疇以夀富康寧攸好德考終命為五福求之世每不多見間見亦罔克偹某所知獨君能兼之方淳祐丁未某聞君有泉石之勝造焉圃曰依緑一溪繚其中瀦之為池環之為洲臨之為亭榭引之為流觴曲水時春且半花木層出如錦繡領客觴詠幅巾杖屨毫眉玄髮出入桃蹊竹隧間如世所繪老人星地行仙者某亦甚羡之也君平生不殖貨而財自裕不豪奪而産自豐十數年不一至城府丘園宴適延儒教子之外無所事可謂夀富康寧矣靖惟其故則攸好德一念實為之先是陳宜都王子孫家九江纍世不異號義門其後徙髙安君之族其别也君諱大用字允中曾祖某祖某父某皆世隱德君少孤事母兄以孝弟著性好學求師數百里外習詩通大義遂以儒倡其族至今文物彪炳家人人儒登賢能書者相繼壬子嵗君仲子偕族孫凡三人同時領江西湖南北舉今年其孫又以通九經擢童子科君之教也君諸兄歿行於族為長率以禮訓以義患難疾病萃力相援扶毋敢後者教育兄子某如己子迄有立姻戚鄉黨或有爭不詣官府咸之君取決焉君曰某是曰某非皆悅服願釋爭以去武斷健訟見君皆黯有愧色尤樂周急嵗飢捐粟以賑提點刑獄使者翟公常平使者楊公常以其丁未壬子之糶簿上之朝乞旌其子以官而君不願也君又謂榖以養生藥以愈病皆活人事患藥市多偽甚病而速死戚不忍乃即旁舍為藥室選良醫如古方製善藥以濟人而不牟利賴全活者甚衆可謂攸好德矣夀富且康寧宜也君自中年場屋不偶即棄弗事聚書聘師付功名於子若孫營壺春老焉有别業二曰鶴嶺曰廣城去家各數里皆築室將俾孟仲二子處之今年九月九日君在鶴嶺泛菊觴越四日戊子得微疾謂家人曰我未嘗有疾今疾殆不可起遂召子孫訣而歿可謂考終命矣君娶王氏先二十年卒子三人長績貢為博士弟子次應炎即江西漕舉進士次紱亦進士業女五人長適胡日升次鄧震龍次晏燦次胡鼎來次李元龍皆為儒孫四人宜孫振孫珤孫雋孫珤孫則擢童子科者也孫女三人長適鄒淮次許鄧子彪未嫁次尚幼君平時為義方訓晚年竟及見其子若孫之效驗以歿天之福善也後有興者當未艾又範所謂子孫其逢吉者歟君以淳熙癸卯二月乙亥生年七十有一諸孤將以明年甲寅十有一月奉柩如浮塘合母王氏葬從治命也某亦感君將歿之言不敢負所托焉即為之銘俾葬而刻諸石銘曰嗚呼陳君派義門天資粹靜如玉溫五福兼備德所根壺中之春自乾坤儒倡其族卑從尊椿老桂茂昌蘭孫吁嗟德人不復存善積未報裕後昆不于其身于子孫運屬姚公伯武墓志銘姚之宗為瑞之新昌著姓者二家邑郛者出自濰州蓋中散大夫恕之後也家靈源者出自豐城蓋𢎞文館學士思亷之後也族雖異然得姓自有虞氏則一凡詢新昌姚氏者咸以為一族而二氏子孫亦知柯分同根派别共源等百世而上由耳孫而遡鼻祖不可以異視相與講同姓之好甚密真若出一族者非若周秦之劉宋衛之孔為碏為尚之石為宋為燕之樂其始既異其終卒不可合者也運屬公諱公烈字伯武其先濰州北海人中散在國初仕至上柱國傳至銅匙縣令某者君之髙伯祖也初以太學上舍生及進士第後以忠歿王事廬州教授某者銅匙府君之弟君之髙祖也曾大父某以伯父任得仕再轉而丞新昌因家焉自濰州而為新昌人蓋自此始大父某父某皆韜英含章不願仕進君生而穎悟弱不好弄既長溫而文簡而有禮母龔氏龍圖端之孫君在褓中已失母十有二又失父事繼母栁夫人以孝聞克自力學師雕友琢寒暑靡懈楊侯大異晏君大烈皆所嘗與同几席者也習毛氏詩究三百五篇之旨為舉子名煜煜震場屋既命弗偶則翩然舍去以詩書燕娛其身心稼雲于田花組于圃詩歌棊酒日與賔客樂之蓋不羡名韁之縶宦轍之騖也家饒財纍資至巨萬然不有其富輒分以惠貧嵗每祲鄉大姓操為富不仁之心挾災射利閉糴以翔粟直一唱百和無毫髮惠利心色人于菜殣人于塗而不之顧蓋相望皆是公獨不為此遇歉必盡發其廪減價糶以賑飢賴全活者不可勝計童顛兒齒歡呼攜扶揭綵為幟誇誦盛德拜其門以謝者日以百數荆溪吳侯某將漕江西邑令趙侯某上其事於臺乞旌以勸荆溪嘉之召補寮屬日與燕接訪一道利病時朝家方行和糴荆溪詢以敷糴事宜公力言非便宜聽民自與官為市荆溪是其説將請于朝而官之會去弗果人為公惜公曰吾但欲為當世賢者所知不計已之官不官也既歸為善益篤邑計闕即預輸賦以助在官在民皆恃公為命脈喜教子延名儒以為之師自講習外一不以事纍治家肅而有恩下孝上慈繼母卒追慕號痛有促織飛集几筵七日夜不動人以為孝感邑令刻之碑紀其事繼母先適醴陵劉氏有子公待之等同嵗時餽問不絶睦宗族以和接姻戚以禮處鄉黨以恭濟閭里以惠蓋一鄉善士也荆溪使長沙公欲往則疾已革矣生於壬戌之三月歿於寶祐癸丑之十有一月僅五十有二未歿前一日夢神人召至一官府告之曰此公治所也既寤為家人言之翌日而歿某嘗歎世降俗末仁義之道微貪叨之習熾知欲而不知有理知己而不知有人近年以來有豐嵗無豐民年穀不登閉糴之害如前所云矣間稔民宜有自養富多資者平價糴而盡之無圭撮藏于野深扄固鐍幸水旱以牟其利民不問豐歉皆艱食舊時民以凶年病今樂嵗亦病矣造物者憗遺一二如君之人以蘇吾民亦可以少厲薄俗乃不畀之夀而早奪焉冥冥之中其無天耶然生則不官之明死則必神之幽又不可謂之無天矣世之嗜利無饜惟欲自肥者聞君之風其亦少勸乎公娶栁氏其母之兄子先一月卒四子應興德潤皆嘗貢成均有聲有俊亦皆通經能文孫之英之秀女孫一人皆幼易曰積善之家必有餘慶天也其在斯乎君歿之明年甲寅諸孤將以十有二月葬公于邑之太和鄉金印阡先期來請銘曰吾宗也不可辭某遭閔凶不能文且先君同以是嵗月歿僅五日隔言及公歿之月又惕焉重先君之痛其何能銘然新昌二姚氏其子孫相好也久銘固非禮辭亦非義禮有可以義起斯銘也不得與他文辭比雖不文姑以不文之辭銘之曰伯武之賢邑人之天胡不夀旃以為民年施者益遐報者必厚金阡峩峩尚福厥後李廷章墓銘瑞新昌義鈞里李君諱廷章字煥卿紹熙庚戌十二月七日生淳祐庚戌八月二十二日歿寶祐乙卯十有一月庚申葬實在太和鄉之峰潭章洲其族兄萬安丞紀厥素履友人郭君霆發以書先其孤來請銘某讀萬安之編品之曰鄉善士某聞李君善名久且萬安暨郭君又某平日之欽而信者也有言靡不實顧行述已備可信後毋庸贅姑為銘銘曰今人常言世逺三代疇知古淳往往猶在有人於此行修于家鄉里稱善謂古非邪嗟嗟李君朴楙醇媺識不識者歡曰善士不入城府若龎德公化鄉無爭彥方之風任恤睦姻安分循理智傾力奪恥有諸已昔者李願樂隱于盤山美水鮮惟適之安今之李君豈其苗裔生無怨嗔沒有嗟喟勿謂其歿不歿善名千載之下人信此銘拂雲居士塗君墓志銘新吳塗氏有數子從余遊問其族某賢以子儀對戊申道新吳亟訪之登拜既即以真率具觴余於所謂拂雲閣者耆德粹重兄弟燕怡諸子森侍皆衣縫掖衣與客論文説詩不知其處約也癸丑余歸自京君之子夢青以書來言曰先君子不幸以微疾棄諸孤矣將以治命葬于里之華塘惟先君平生喜教子矻矻靡倦擇名師從之遊南康有胡氏學得自考亭俾夢青兄弟往師之雖鬻産以資費不計也夢青兄弟幸知聖賢書乃未能奮身儒科以慰其志橫目俗民多以教子無益騰笑起譏先君略不為動曰學問人也功名天也不可以天之未應而怠其在人者且學不在是愈不倦事親孝為兄友處族義與鄉和年登八帙耳聰目明且歿遺言詔諸子母徇佛老今葬矣不有銘以傳後大懼不孝夢青不能求之當世顯人願求之子幸哀我銘諸某素聞君賢且及識雖一别五六年不再見歷歷猶在心目貧而能好客鄉里稱善人猶可及惟一意教子俾從知道者遊且不以窮達易其志非有卓識疇能之此一事已可詔後敢不銘君諱某子儀字也曾祖某祖某父某娶周氏伉儷黃髮子五人山甫夢青一覺仁甫吉甫女二人長適進士王清叔次適進士曾子雲孫男九人曾孫男九人皆業儒四世儒家必有興者銘曰稟秀為人尤秀為士位髙金多不克儒子義方有訓一念在兹圓冠環立以孝事慈家為儒門身享遐夀泰無不足是即貴富有深其根厥實必蕃君雖不存以子以孫揭汝功母王夫人墓志銘寶祐元年秋八月辛酉望越五日甲子揭氏母王夫人卒將葬來請銘夫人中子成大字汝功者初館於余之婦翁鄒君家聞余而未識也翁適遴壻汝功密偕之相攸贊曰此正佳壻歸省其母母問遨遊豐瑞間識何士具以告母大喜語笑異常時余時已知其有陶士行王叔介母風也採之鄉譽益信夫人名如玉字季瓊在家時六七嵗已間女紅端靜如成人賢女也長適揭氏相其夫正伯躬井臼而逸之學俾從主一張先生遊有寇亂保姑喪不去賢婦也正伯客遊四方十餘年三子齊丘成大必端皆夫人自教夫歸男女已冠笄成立矣性不羡侈富族親豪右宴召未嘗往夫歿力貧以畢婚嫁治家有法鄉里有則賢母也生於淳熙戊申歿於寶祐癸丑年六十有六葬于書家坡夫人聞其子之言知余而賞之余曾不能升堂一拜盍銘其葬使後世知有夫人名銘曰書家之坡詩書家之母之藏也母訓家以書其後必昌也雪坡集卷四十九
