body:
  text: 雪坡集卷三宋姚勉撰封事擬上封事庚申三月三月吉日承事郎祕書省正字兼沂靖惠王府教授臣姚某謹昧死百拜裁書獻于皇帝陛下臣聞祖宗朝許館職非時言事仍許銀臺進入與臺諫等祖宗之所以優異館職者何也儲材於館閣正欲其言天下之事也然而不當言而言謂之躁當言而不言謂之隱必其事關國體人不能言然後館閣之臣抗章極論胡銓之竄范如圭留之朱熹之劾葉適辨之曾覿龍大淵之恣王十朋論之是皆得其言而後言也臣於先正諸賢無能為役然亦待罪中祕不敢緘默取容是以供職翌朝亟言時事今則事有大此繫國安危隱而不言臣實不敢臣伏見初十日聖旨以太學博士臣徐庚金等去國委司業何夢然勉留謂方今多事毋徒紛紛為中外盜賊之所窺伺姑惟體國臣伏觀至此涕泗交零方當陛下更化用賢之時豈容有學官盡去之事衆聽惶惑群心驚疑載在史編貽譏萬世此非細故小變也陛下委長官留之固足以見體群臣之意然庚金等之所以去又豈無其故乎得非以近日所上兩書未見施行不得其言而去乎臣聞庚金等所上之書乞斬丁大全董宋臣五人以謝天下其意雖是其言則似過於躁也陛下未見施行蓋必有待庚金等即相攜而去其事亦未免過於激也然其心則實本於忠愛覩天下大勢之危急故心痛不及緩聲耳其辭雖未必可盡行聖心獨不可為之裁度酌其當權其宜而行之乎陛下而惠從諸臣之言酌其當權其宜而行之則有好善忘勢之賢有從諫改過之美天下之人必謂陛下屈萬乘之尊而伸庶僚之賤克一已之私而從衆論之公羣憤泄舒士氣興起敵國可卻外患可消當時稱明而萬世誦聖也陛下而不從諸臣之言忌醫護疾反謂以彚而征吉者為植黨謂出晝而庶王之改者為要君具文而留實聽其去天下之人必謂陛下忍於空學官而不忍於去貂璫忍於去善類而不忍於去姦相上滓聖德為纍不輕下失人心為害不細雖欲中外盜賊之不窺伺不可得也陛下即位以來凡皆見矣獨未有學官群然去國之事耳學校師儒所以教育天下之士一朝盡去此何等氣象哉先儒周惇頤曰天下勢而已矣勢輕重也極重不可反知其重而亟反之可也陛下端拱九重抑嘗思天下之勢何以至於今日乎臣跧伏草茅日夜念天下事察此熟矣陛下端平甲午淳祐甲辰去姦任賢天下駸駸有向治之勢也把握而堅凝之其勢豈趨於下哉其失在於把握凝定之不堅耳然猶驟仆旋起才傾即扶未至如後來之甚也故臣子之去者復歸人心之離者復合有如丁未之歲臣徐霖疏攻趙與􅊸葉大有言不行而去陛下疊遣朝臣而留之然不去與􅊸大有而霖竟去霖雖去而與􅊸大有陛下亦終去之也是以五六年霖復以召還而大有之陷害忠良與􅊸之掊斂民怨其禍亦旋息獨以與􅊸之去稍緩言者不已雖在京泮亦皆紛紜至辛亥而遂有京泮逐客之變朝廷以草茅之士視之甚輕無復有慰留之舉故其後逰士間有北附南趨之禍又至壬子臣蔡抗與太學諸生共攻余晦言不行而皆去朝廷亦再遣朝臣留抗留太學諸生抗雖竟去而晦亦不旋踵而罷也故次年抗復以召還而晦之貪虐百姓亦不深被其害獨以晦之去不出於真朝廷尚以為材癸丑又起之帥蜀故其後有全蜀陷沒之禍以此見陛下從人言而勇於去邪則天下之勢轉而如此咈人言而疑於去邪則天下之勢激而如彼也然是時公論時明未至盡廢隂長陽消之會泰往否來之交則在乙卯洪天錫之一去耳天錫疏攻二閹言不見信翩然竟去亦不復留自此北衙之勢始盛於中朝宦官之名方播於天下陛下未嘗有好遊幸之失也而人則曰宋臣誤陛下以修飾湖山營繕靡麗矣陛下未嘗有殉貨利之愆也而人則曰宋臣導陛下以講價西園賣官鬻職矣陛下未嘗有奪民生業之過也而人則曰宋臣誘陛下置御前莊及御前房廊矣甚至引丁大全為相則曰宋臣聚丁大全之黨則曰宋臣援方大猷躐貴則曰宋臣與丁大全蔽蒙邊事則曰宋臣不知宋臣實如此否也而天下之議如出一口則以洪天錫一斥不復而致此耳一天錫之去未害也自此姦壬竊政憸黨如林臺臣不敢糾繩給舍不敢封檄侍從不敢論思班行不敢輪對言路壅塞媕婀成風屛斥諸生誣衊善類在者不敢言言者不敢去又有人臣敢輕於去國重加竄削以為人臣不忠之戒雖以臺諫遭黜左遷亦皆忍辱包羞靦面目而坐朝著禮義亷恥之四維盡皆廢壞元氣既耗外邪遂侵致有徑敵透漏而不知之禍此蓋言路壅塞之致也夫曩者京學逐客之時即後來太學屏士之漸也曩者太學諸生空學而去之時即今日學官空學而去之漸也不銷其萌勢遂至此陛下安可聽其勢之愈趨愈下乎去年陛下改紀更絃悔過罪已拳拳乎任用非人左右蔽蒙之戒復開言路旁逹下情天下方有極而將返之勢挽回不力後將若何臣謂陛下今日方當召回首言二閹者以明陛下本無庇宋臣之意抆拭諸賢以明丁大全誣忠良之非已召而未至者趣之使來肥遁而未召者加之亟召以繫人望以重兵端庶幾可以回天下之勢豈有諸賢猶未至國而六七學官乃忍使之去國乎學官為國排姦言不行則已去朝臣必有留學官者言不行則又去學校諸生失其師儒亦將叩閽請留言不行則又去在朝失直言鯁論之士空國無章甫縫掖之流得不盡失天下士大夫之心乎是驅天下士大夫而去之也既失天下士大夫之心必失天下之人心是驅天下之人而盡去之也而可乎學官所乞誅五人其四前此已略施行猶可勿議宋臣招致人言如此猶未有毫髮之罰陛下又何愛一家奴而不以慰天下之人心哉為宋臣者亦當思所以自全也漢之曹節王甫其權盛矣他日東都宦者之禍非曹節王甫遺之乎唐之仇士良魚朝恩其焰熾矣後來唐末宦者之禍非士良朝恩遺之乎然則庇而護之者適非所以保全之也髙宗朝張浚在督府上疏乞斬馮益趙鼎謂其罪雖曖昧未明不可不置之疏逺遂與外祠外祠雖不如內省之樂也而馮益則無康履之事矣孝宗朝甘升亦竊㺯威福厥後孝宗出升湖州居住湖州固不如錢塘之美也而甘升則無童貫之誅矣然則疏而斥之者正所以保全之也陛下聖明決不效漢唐庸主之所為以留為後世之禍髙孝兩朝家法具在陛下必能舉而行之也當此大勢危急之時陛下而能為逐姦逺佞之事易於反掌不難於拔山則學官之去者可還人心之疑者遂釋輿論稱快和氣致祥上天必悔禍敵人必墮膽天下之勢亂可轉而治危可轉而安矣此萬年無疆之休也亦萬世無窮之聞也惟陛下亟圖之不備臣昧死百拜時三月十一日也學官去館中有書援之通進司弗受復自草此書欲明日伏闕而十一日晚已有逐董之命遂不果上雪坡集卷三
