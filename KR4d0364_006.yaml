body:
  text: 雪坡集卷六宋姚勉撰箋宫僚賀皇后册太子箋庚申兼舍人時作寶圖光啓由關雎王化之基玉册誕揚重燕翼孫謀之命慶流宫壼福在宗祧中賀恭惟皇后殿下坤體順承家人正吉塗山聖德宜乎繼禹道之能賢太姒徽音所以有武王之為子贊成睿斷允出母儀永為萬世之規茂介兩宫之祉臣等備員儲寀拭目景光實為千一之逢曾蔑萬分之助器歸長子已紓漆室之懷夀祝聖人願效華封之請宫僚賀皇太子受册箋天子當陽肇舉建儲之禮王言作命聿嚴奉册之儀神悅人和禮明樂備宗祊有慶中外屬心中賀恭惟皇太子殿下粹質金相淵姿玉裕主器莫若長子有宗廟匕鬯之責存遺寶以紹天明有室堂災播之任在顯膺瑞玉端秉植圭丕煥前星拱承北極某等濫聨宫寀欣覩上儀奉雕珉而涖東宫幸際百年之曠典從青蓋而朝太室聳聆兆姓之歡聲宫僚謝皇太子賜宴箋星暉海潤位新正於東宫露湛陽晞恩共承於北闕以燕以衎為龍為光中謝竊以建元良者所以埀萬世之基示慈惠者所以侈一時之典置酒而侍必商山園綺之流給膳以珍在瀛洲房杜之彥某等猥非妙選曷稱盛儀茲蓋恭遇皇太子殿下視膳孝隆主鬯任重酌道之源核仁之藪傳聖上訪儒之心由義之路入禮之門得君子招賢之正推忱樂與執饋載親不遺宫寀之微俾與賔筵之秩某等餐和甚至醉德惟醲樂鳴鹿之蒿蘋不知所報撤鮑魚於爼豆願竭此忱賀皇太子正位箋伏審肇建儲宫於昭盛典聖人以天下為大器爰重貽謀宗祀饗上帝於明堂聿嚴主鬯拜家有慶運祚無疆中賀恭惟皇太子殿下文明溫恭孝友仁愛乾稱父坤稱母允為宗子之賢月重輪星重暉咸仰副君之德舜守帝堯之道一文朝王季者日三心謀大同天迪從保某猥承鳳詔入侍龍樓愧無贊道之文未稱承華之選惟君子命惟君子使誓當殫引翼之忱與正人居與正人遊願益就髙明之學傾心懇切拜手敷陳除舍人供職謝皇太子箋賢聖仁孝聞天下方新謀燕之詒左右前後皆正人有賴朋龜之益若為膚謭誤入選掄中謝伏念某曩玷微科未酬異渥馳心魏闕每懷漆室之倚楹厠迹石渠忽尾商山之侍宴願忠雖切揣分無堪茲蓋恭遇皇太子殿下問道承師敬賢好士春學干秋學羽時敏厥修史誦詩工誦針日聞者正遂令孤陋亦厠羣賢某愧乏竒才幸非曲學近周召之賢則善所望親仁非堯舜之道不陳是為效報謝皇太子賜馬箋學務時修獲侍潛龍之邸禮隆晝接特承用馬之恩揣分未堪拊心重愧中謝竊以載驂載駟君子來朝乘牡乘黃在公載燕畀之五良者見其好善豫之四牡者所以褒功若為一介之微得御六間之駿茲蓋恭遇皇太子殿下珠庭質粹金輅望新以駿馬不獻東宫為賢以龍樓不絶馳道為孝前明師後勸講樂豈銜橛之間趨肆夏步采齊行有鸞和之節念茲駑蹇乘以駃騠某敢不恭侍靮羈欽承鞭策述德車樂御之理講帝驟王馳之方命彼載之道敢辭於云逺薄言駉者思願一於無邪沂邸賀皇后立太子箋庚申兼宫教時作坤道資生為天下母震宫主鬯乃聖人男九廟奠安三靈闓懌中賀恭惟皇后殿下塗山興姒簡狄生商衍國家之慶源贊宗社之大計若昔昭陵建嫡式由光獻之功髙廟定儲允出憲聖之助承天與子視古有光臣忝列近藩獲觀盛典龍樓致孝益隆保護之恩燕翼貽謀丕享延洪之福沂邸賀皇太子受册箋前星正位震器有歸暈日開祥離明繼照一人有慶萬國同歡中賀恭惟皇太子殿下徽柔懿恭溫良寬裕謳歌曰吾君之子亦既有年賢聖繫天下之心久孚衆望肇正儲位益隆我邦某忝屬宗藩喜聞典册萬年受天之祜在致孝忱三代有道之長願親端士沂邸賀皇后太子入宫箋坤宫主靜在母不煩甲觀僝功翼子以燕三宫欣慶九廟安寧中賀恭惟皇后殿下齊體紫宸儷尊皇極椒塗壼壁式開宜衆之祥花繞禁庭昭受問安之禮立承華於近闕名繼照以為堂某忝列宗藩實深慶賀親闈密勿龍樓嚴日致之忱子職恪共鳳斚上天齊之夀沂邸賀皇太子入宫箋肇建春坊聿新甲觀洊雷為震位爰正於在東前星近心辰載瞻於拱北神人交慶朝野同和中賀恭惟皇太子殿下處已溫恭傳家忠厚學益躋於聖閫孝恪奉於親闈體元將以長人仁為安宅朝日以明有敬禮乃入門密依紫禁之天丕闡青宫之地某鳳麟屬近燕雀情深館有𢎞文知已妙俊英之選苑無博望斷不聞賔客之私雪坡集卷六
