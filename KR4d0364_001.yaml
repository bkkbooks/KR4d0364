body:
  text: 雪坡集巻一宋姚勉撰封事丙辰封事十二月吉日承事郎新除秘書省正字臣姚勉百拜獻書皇帝陛下臣江西一寒學未聞道癸丑奉對大廷有司第臣策在第四陛下念其愚直親擢以冠羣才受恩西歸福過災至未及一月即遭外艱得禄既不逮親從吉未忍問仕陛下曲賜憐念以趙汝愚故事起之疚棘之餘顧臣何人蒙此異眷不由五剡之薦而即登於通秩未有一日之考而遽玷於中除恩大難勝感極繼泣雖乖親養合報主知不忍固辭願移忠事祇承召命已至半途將咫尺於天顔忽驟嬰於寒疾欲進不可有懷莫伸臣伏見前朝蘇洵奉詔試舍人院辭不拜命輒陳奏篇今也㣲臣敢援為例僭以書獻惟陛下試埀聽焉夫陛下之所以召臣者豈欲榮臣以美官哉葢念其前日之能直言時事故進之耳有君如此何忍負之陛下既親奬於其先則是既信而可諫矣不得以未信為謗自諉也臣前此獻策於陛下有曰立中道以用天下之賢奬直言以作天下之氣臣之所謂立中道也者葢欲消去朋黨所謂奬直言也者葢欲廣通下情言雖若迂事則甚切臣今所見無異於前臣觀陛下聖度如天明見如日忠厚如仁祖英果如孝皇信用忠賢容受切直恢張士氣長育人材䕶如圭璧愛如桐梓正人暫去而即召言者雖忤而必容四方稱仁萬世誦聖雖盛美殆難縷述此二事實最可稱如端平之甲午改元淳祐之乙己壬子陛下此時之用人聽言青史書之葢無窮之令聞也雖然臣願陛下兢兢業業保持初意而已驚心邇日駭耳異聞不知彼何人斯乃爾上誤陛下臣知陛下之本心不爾葢必有簧鼔聖聽者也臣初離瑞陽忽傳時報乃有立石三學之事臣固已駭之矣猶恐實有蹈非彞典而累敎育者唘行數日漸至臨川則聞兩御史之章大斥三學舍之士不知所謂益重厥疑至於近時號為敢言之臣亦皆相繼而廢罷臣於是益駭焉臣至上饒得觀邸報則臣蔡抗又已去國臣之駭者至是愈甚矣夫斥逐學校之士以禁天下之言者此京檜侂逺之時所為耳今日聖君賢相詎宜有此哉以學校未離韋布之人在平日豈無市井之過然而外議初不謂然但知為前日上書之人故今致臺諫復仇之禍其間雖有一二士不與上書姓名皆謂朝廷借此以葢非不知蹤跡欲掩而愈露况不與前日上書之士亦是攻乙夘去相之人斥士者縱不以此而加誅得罪者豈不藉此以自解此聲一出天下謂何必謂朝廷今諱人言自此誰敢獻其狂直言路一塞所繫不輕儻使國有大姦將恐無復言者敗亡軌轍前古所同敢於沮抑人言是豈為國忠計夫帝王大徳在於納諫朝有直言謂之國華陛下聖明豈不知此三十三年容受人言之盛徳忍於一旦斲喪之乎又豈不使天下妄議陛下欲進用私人恐言者藉藉先斥士以塞來者乎又豈不使天下妄議蒙進用者援引其同列以排去與已為仇者乎朝廷之上縱無是心天下之人不能無是議也此蘇軾所謂家置一喙以自解市列千金以募人人必不信謗亦不止也臣觀陛下今日之所進用者其眷未必如前日之嵩之也亦未必如前日之與􅊸晦也然三學之攻嵩之􅊸晦則陛下不怒不斥何獨於今此而遽怒之斥之邪天下於此疑矣非所以視方來也夫敢諫有鼓進善有旌書愆有板設於朝市古先聖王之欲以來諫也古先聖王本無可諫之事猶不能無求諫之心陛下本有好諫之心何遽設為拒諫之具三學之立石臣恐諫鼓謗木不如是也漢文帝止輦受言言不可用者置之言可采未嘗不稱善夫言之真不可用者容之可也而何必拒之哉方文帝有獄繫周勃之愆賈誼進刑不上大夫之説自後文帝體貌大臣以弄臣輒嫚戲於朝廷在丞相亦得伸其國法文帝之用誼言如此又何嘗聞有誅斥賈誼之事哉漢文帝三代以下之賢君猶能若此陛下姿兼五帝道邁三王又豈可出文帝下乎臣知陛下之決不然也昔章厚蔡京之徒上誤祖宗立姦黨碑於内殿賢如司馬光乃以為姦黨之首一時小人自謂可以欺天下也而石工安民乞不刋其姓字恐併譏於後世今之學官奉承此事不聞諫止寜不有靦面目於石工乎立石之餘繼以斥士此殆角公論以求勝挫善類以取快者矣甚非盛世事也夫易進難退者世謂之小人難進易退者世謂之君子儻有一毫貪榮固位之意豈逃鄙夫患得患失之譏陛下今所進用之人使其真有徳之可尊有才之可用人望所與官職何辭遲之嵗年試用未晚何必驟擢之臺察驟長之諫坡又驟躋之政府哉使其本無驅逐前相之心能納藎言為法受惡或有丐祠求去之請豈非髙尚退潔之風心事靡他人言奚䘏何必無一語以及去不幾時而受遷哉是為臣者不以難進之君子自處而以易進者自處為君者不以難進之君子處之而以易進者處之矣臣恐陛下君臣未必甘受此名也驟加進用欲以勝公論寜不適以滋公論乎夫公論者當使之在上不當使之在下也不幸公論逸而在下在上者當有隂消潛弭之以使之平不當壅遏抑絶之使至於激也語曰天下有道則庶人不議朱熹釋之曰天下有道則自然不議非箝其口使之不議然則箝之者豈非所以激之歟東漢末年之黨錮皆激致之耳激而致此豈天下國家之福又豈忠臣志士所願哉邇者臣蔡抗去國之由與臣夢炎臣逢辰之罷臣雖未知其故傳之道路不知信否皆謂臣抗因救三學之士其説不用而行至於臣夢炎臣逢辰之寢命去官則謂朝廷恐其有言先事逐去臣逢辰則是去年上疏排近倖之士臣夢炎則是前日越次求對欲言時事之人果若人言尤是不可臣不知今日何為而如此得非疑其為朋乎昔唐𤣥宗時劉晏以神童為正字𤣥宗問之曰卿為正字正得幾字晏對曰天下字皆正惟朋字未正蓋譏當時有朋黨之小人也晏之在唐後來乃鞭策聚斂之人未為知道但其當時所對則亦可謂至言臣今蒙陛下除官適是此職敢借劉晏朋字未正之説願陛下有正朋可乎本朝歐陽修在仁祖時嘗作朋黨論有曰退小人之偽朋進君子之真朋蓋謂小人之偽朋不可有君子之真朋不可無也以利為朋者小人也以道為朋者君子也君子公於為國故志同道合不能不皆出於愛君小人私於為身故朋姦結黨不能不皆出於竊位君子小人之判葢如此君子小人之分朋其初若未見損益但君子之朋與治為朋小人之朋與亂為朋其究極則天壤遼絶有關於天下國家之安危存亡耳知人固堯舜所難然察其用心則君子小人亦不難辨陛下天資睿哲閲歴精深致知既明於此葢昭然黒白中庸知仁勇之三徳陛下之所素講貫而體驗者謹毋使天下謂陛下知足以周物而仁反至於惠姦勇反至於斥賢也仁勇失其所施則是知亦為未盡矣陛下毋疑在朝諸臣之分朋植黨毋謂在朝諸臣之背公狥私但當審而察之孰邪孰正其朋於為國乎抑朋於為身乎其朋於愛君乎抑朋於竊位乎其朋於盡忠竭節乎抑朋於狥貨殖利乎左右其有譽阿大夫而為朋者乎嬖臣其有進商鞅而為朋者乎執政其有與臺諫而為朋者乎臺臣其有與諫官而為朋者乎外戚其有與宦寺而為朋者乎無之則善矣如有之則必不逃陛下之明鑒也乙夘去相不能知子賄道濁汚人孰肯與之為黨今年去相致君無術功烈甚卑人孰肯與之為黨至於乙己壬子之善類甲辰庚戌之魁彦則天下所謂忠賢不得謂之為黨也指其黨於陛下之前者恐未足以為黨而隂相黨於陛下之前者陛下不可不察其為黨也君子無罪可名無過可指小人欲激人主之怒不過以黨之一字目之則必犯人主之所惡耳至於所斥逐之黨則大抵皆君子也以黨為名空國君子小人異世同術莫不皆然黨錮空而漢危清流空而唐禍元祐姦黨空而宣靖之變作小人至此亦非其福矣豈獨君子哉事久論定君子小人之名萬世之下昭若揭日在黨錮者人謂之君子殺黨錮者得謂之君子乎與清流者人謂之君子投清流者得謂之君子乎列姦黨碑者至今謂之君子立姦黨碑者得謂之君子乎小人亦何利於此哉故朋黨之名在今日朝廷之上決不宜有有立黨之説以告陛下者即黨之尤者也惟陛下察之臣願陛下精别真偽之朋廣開衆正之路已斥之士終與叙還已去之賢旋加收召端平之善類今皆凋落所存者不過一二賢老乙己壬子之善類今散在四方者幸尚有十餘人至於新進鯁亮之流亦且不下十數皆宜引以自近寘彼周行雖有嬰鱗逆耳之言當廣乾坤容納之量直士聚則嘉言日進公道開則治勢日張天下未有求治而不用賢而不聽言者也昔仁祖皇帝慶厯之際登用諸賢不一二言皆為小人以朋黨傾去亦嘗執政而用夏竦亦嘗宰相而用執中然而小人暫親即疎君子暫散而即聚迄至嘉祐一皆正人躋時太平功在社稷天下皆謂陛下深似仁祖陛下可不繼仁祖所為乎國家自宣靖以來無復人才至紹興初年方得涵養成就未幾又壞於秦檜至孝宗皇帝又加之涵養成就是故乾道淳熙之盛無減慶厯嘉祐之時先皇之初年人才皆孝宗皇帝之所涵養成就者也一壞於侂胄再壞於彌逺士知有利禄而不知有亷恥之節人知有諂諛而不知忠直之風夫今天下之士所以正論昌言濱死不悔屢仆屢起曾不挫折一躓一奮曽不畏縮者乃陛下三十三年之所涵養成就耳以三十三年之極力涵養成就者一旦斲喪之可乎不特此也祖宗三百餘年之所涵養成就者而一旦斵喪之可乎此臣所為痛哭流涕而不能自己也故敢妄發其狂言願陛下保持其初意使朝廷常有賢士陛下長為聖君臣雖養痾山林食荼如薺不然臣之來也不過一留夢炎一方逢辰不罷則斥耳臣妄援蘇洵躐上封事罪在不赦但臣筮仕之始於朝臣未有素交至如三學諸生亦皆懵不相識初無附下罔上之意皆出愛君憂國之忱知則當言言則當盡至於出位實不自知席藁私室以待鈇鉞臣雖受誅亦願陛下用人聽言保持初意而已惟陛下留神臣惶懼惶懼頓首頓首謹言雪坡集巻一
