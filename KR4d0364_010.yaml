body:
  text: 雪坡集卷十宋姚勉撰賦秋懷賦天時倐兮如流西杓揭兮復秋露零零兮蘿薜風嫋嫋兮梧楸草蛩凄兮夜弔夕陽亂兮蟬愁嗟物理兮若此焉人情兮銷憂想征夫兮天涯嵗月悠兮未歸懷故鄉兮千里羌目斷兮魂飛悵思歸兮閨中罷膏沐兮飛蓬角枕粲兮衾爛耿獨夕兮誰同夕風起兮凄凄瞻大火兮流西氓蚩蚩兮多寒嵗無褐兮疇衣棗纍纍兮欲丹寒苦早兮隂山哨騎肥兮將馳兵何時兮戍間節物驟兮駸駸日復日兮秋深幾何人兮悲秋羌獨集兮豫心微無酒兮以逰酒莫銷兮此憂彼其子兮不知覆謂豫兮何求嗟時事之日非暑已退兮寒凄嘉禽逝兮鸇擊蕙蘭摧兮蒿肥簷雨兮浪浪寐復寤兮宵長西風兮鴈行梗泛泛兮異鄉望家山兮飛雲明月思兮故人我不如兮季鷹思鱠魚兮羹蓴孰有山兮可耕孰有溪兮可釣願從子兮是問一登臨兮長嘯蘭國賦為左氏作孔素臣之苗裔兮厥鼻祖曰丘明謂蘭有國香兮載於傳感麟之經耳孫有味乎斯言兮爰嗜蘭以為朋若靈均之在郢兮蛻衆濁而獨清夢天與己國兮以蘭而為名其封疆雖不越夫九畹兮塞宇宙而皆馨試周逰其邑都兮芳菲菲其若英繚夫容以為池兮扈江離以為城建薜荔而為門兮合百草使實庭蓀壁桂棟兮掬椒成堂辛夷為楣兮藥之為房芷葺荷蓋兮橑之杜衡戶素枝而赤節兮家緑葉而紫莖天氣如春二月兮光風泛其載榮又如秋之云初兮露瀼瀼兮朝零人好修而信姱兮俗嚮清而偭汙久而不聞其香兮若居夫沅湘與澧浦荃為之君兮蕙之為妃杜若為之大夫兮菊為卿以相之君子衆芳之所萃兮紛揭車與留夷薋菉葹不使盈室兮屏萸榝而不使充幃服蘭衽之芬菲兮結蘭佩之陸離焚蘭膏以為炬兮蘭藉蒸以為爢啓蘭宫而擢秀兮闢蘭省以儲材演綸言於蘭坡兮萃緗帙於蘭臺士同心而如蘭兮斷金其利民化善人之蘭室兮無薰染乎鮑魚之肆芳草不為蕭艾兮荃蕙不變而為茅惟以蘭為可恃兮匪薰蕕之混淆鼓蘭枻於江之湄兮擁蘭旌而在郊朝馳馬於蘭上兮夕弭駕於蘭臯人間乃有斯國兮無一蔓之穢雜雖壤地之褊小兮可并包乎六合於兹焉且止息兮憺清興其安窮倐蘧蘧而形開兮乃得之於夢中寐既寤而復思兮欲倣佛其遺迹乃種蘭乎丘園兮重之郊圻之申畫遂開國於兹土兮奄其疆域加千本為食邑兮餐風晨與露夕亂曰以蘭為國兮蔓草必刪願移之吾國兮遍國中而皆蘭為國之道兮種蘭乎觀梅花賦壬辰之冬雪霽寒麓有二其客訪我梅屋炙晴窗之新暄酌癭樽之清渌值余梅之暖吐巧裁鏤乎氷玉出臞仙於山澤揖處士於巖谷微風天落暗有清馥幽間淡雅照水橫竹客謂主人曰天英地華融為百花或以香珍或以色姱觀其爭麗而奪秀蓋亦千芳而萬葩何吾子之皆不取而獨內交乎斯梅耶主人顧客而笑曰養竹于庭所以標醉吟之清滋蘭在畹所以風靈均之馨君子好恬而樂素不羡侈而慕榮桃李華而近浮松柏質而少文未若斯梅之為物類於君子之為人今夫異萬木而獨秀冠羣芳而首春是即君子之材拔衆萃而莫倫立清標而可即正玉色以無媚是即君子之容羌既溫而且厲寒風怒聲悄無落英嚴霜積雪敢與爭潔君子之節也瑤階玉堂不增其芳竹籬茅舍不減其香君子之常也在物為梅花在人為君子皎茵璧之連接瑩壺氷其表裏既物我之通稱又焉得舍此而取彼兹豫所以內交於斯梅而植之以為庭實也方其林梢盡枯瓊蕚孤出霜風肅肅庭有愛日負朝暄于檻砌而翻玩乎書帙此時此花味我間適又如殘雪在簷寒月侵室浮雲四卷天宇寥閴倚欄干而長嘯遇神人於姑射此時此花助我飄逸嗟吾屋之半間陋才止於容膝惟此花之清絶相娛笑以朝夕開醉襟於酒觴生妙思於吟筆使豫舍此而他好殆將喪志於玩物矣况夫若作和羹爾惟鹽梅味可世資從古以來方將薦實於鼎鉉豈徒脫迹於塵埃彼百花之紛紛亦何有於我哉客聞此言色笑心悅挹清芬而度酒嚼瓊𬎼而咽雪醉相枕而不知同一夢於霜月嫉蚊賦顧余宅之近市兮既湫隘而囂塵值炎夏之藴隆兮加倍蓰之惔焚夕余冀其小紆兮復擾豫以聚蚊風箑倦于長驅兮煙烽煩于屢薰曾一寐之不遑兮羌雜揉而紛紜豫也中夜以興振臂拊髀而長嘆曰嗟哉黍民眇然汝形喙纖鋭其針利翼浮儇而絮輕不爽處于髙朗之區而潛伏于奧僻不顯行於大明之書而竊出於昏冥大之不能如虎豹之怒以戕人之生也次之不能如蛇虺之螫以傷人之形也顧所求之幾何特血肉之微飽曾奚足以害人酉營營而至卯蓋類乎無所能之小人徒聚其力而為君子之撓若乃熾日方夕餘暑未收體倦氣呀珠汗雨流敧枕風櫺庶幾少休乘日入而慝作大呼類而嘯儔鬨焉如雷滃然如霧趨炎附熱蔽牖蒙戶忍長日之枵腹謀一食於向暮遇裸裎而不為凂吮痂癬而不為汙隂肆毒而中傷慘有甚于膚訴方睡睫之欲交忽奮拍而驚寤左方驅而右集東忽散而西聚盈耳根而鼓譟藹萬口之和附羣攻競齧多不知數飢無所擇飽不能去纍纍紅粒滿壁羅布襁童驚泣竈婦嗔怒呼燈就爇隨觸隨仆曾不為之加少羌難得而驅捕受其患者居多極人情之同惡爾其風榭豪室氷館貴家簟紋凝水厨羃護紗無纖隙之可入雖一喙而莫加何蓽門而陋巷爭鼓吻而搖牙彼蟲類之齧人固有蚤而有蝨或傍緣而肆侵或跳梁而逞黠然皆緘口無聲潛伺竊發獨爾蚊之可憎蓊喧譟而強聒如自鳴其得志曾不思其苟活此其為患之最深而國人皆曰可殺者也豫又重哀之曰嗟嗟汝蚊何役役兮形則微眇志戕賊兮乘時炎熱投間隙兮晝伏夜動謀血食兮羣聚成雷聒終夕兮維爾之故不能息兮欲粉汝形特一摑兮煙烽火燧矧可炙兮仁心愛物微亦惻兮汝寧擾我不汝敵兮物盛必衰不可極兮今勢雖張後則衰歇兮秋風掃除影滅迹絶兮戰蟻賦蟻之有生微軀眇形穴居蠕動為蟲之靈禮克辨於尊卑智能卜乎晦明羣慕羶而沓集各銜粒而經營語其義則感恩而穴犴言其勇則萃力而制鯨合庶彚以概觀亦有能之可稱何弗安乎性分乃從事於戰爭若乃柱礎潤流濃雲鬱興潢潦慮及丘垤思升授兵於審雨之堂整旅於檀蘿之國列行五而序進勢有類於征役數越千萬隊分什伯黍民肆騰翥之勇玄駒逞奔驟之力初曼衍乎牆隅旋圍繞乎砌側登爽塏以屯集養鋒鋭而待敵緣階厯坎負塊依石若創營而立壁也交持競齧以力相格若陷陳而縱擊也弱者散驚強者攻克若追奔而逐北也利吻如鉗各銜所獲若獻俘而斬馘也方且圍户之前入穴之隙軍拔幟而漢勝師館穀而晉食隳沙礫之樓觀空羶穢之儲積乃整衆而還歸類志滿而意得一寓目而觀戲吾重為之太息使殷師聞之必以為牛鬬之可駭而蒙莊覩此豈獨哀蝸戰之不釋耶嗟夫太朴既分百偽斯動逐利隨欲鬬智角勇弱役於強寡奪於衆迭相憑陵日鬬而鬨雖以蟻之至眇亦紛拏而總總又孰知夫擾擾之無益而南柯之為夢耶是不獨蟻之為然也天下之區區何以異於蟻穴之微人心之好競何以異於羣蟻之知相古先民鞠旅陳師蓋欲戢乎暴亂非樂耀於兵威奈世道之日遷異往聖之所為韓白騁其巧孫吳奪其奇驅萬姓於鋒鏑爭一戰之雄雌竭民膏於中國要邊功於外夷財力既凋憂患乃隨鑒在邇而弗悟轍既覆而尚追安知教修而崇服德敷而苗歸蓋亦曰佳兵者不祥之器聖人不得已而用之宜堂賦為張倅作魯丘稱好賢之詩兮曰如鄭之緇衣惟周司徒之善於職兮國人美之而曰宜適子館而授粲兮衣茍敝而又改為邈千載而誰嗣兮乃復見於此時粵髙安之勝區俗清媺而易化乃以從遊赤松之仙人而為平分風月之別駕居無何而政成思欲樂其間暇爰啓新堂以宜字之騁椽筆而成記發江山之潛輝有龎者眉左扶右携來觀厥成載笑載怡私問于公之客曰宜堂之名何居其此堂之宜我公乎抑我公之宜此堂乎顧天衢之方亨兮展驥足于千里決非如休亭主人所謂之三宜也又非如竹樓使君所記之六宜也以宜字堂厥有其義客如知之願為父老言公之意客曰叟不讀公之記乎公之意在於爾民而樂事其寓也故其為堂也不雕其楹不峻其宇席可函丈室如環堵寓意於鼓琴奕碁之間而意不在於樽爼托興於賦詩吟嘯之時而興不在於歌舞故能無所往而不宜而斯堂也亦真宜行樂之所是故煙晴景明花菲栁縈則宜於春翠隂鬱蒼氷壺晝涼則宜於夏風露鮮霽則宜於秋之晨雪月爭清則宜於冬之夜焚香讀易則宜於自公之餘品茶評詩則宜於對客之暇頌聲溢清水之庭訴牒稀蔽棠之舍此宜堂之無所不宜者也况夫鄰碧落之洞天對蓬萊之絶頂荷山自獻其萬狀錦江橫陳乎千頃揖安期於九霄吸流霞之八景宜騎氣而馭風而遊于方壺圓嶠之境又不特製菡萏於劍池酌清泠于丹井也宜之義大矣哉孰為之宜蓋有其故鈴閣無有蟹之嫌寮幕深詠魚之趣全芒刃於解牛微捷徑之窘步此堂之所以為宜而斯名之所以無負也言未已父老欣然而笑曰宜之義知之矣而斯堂則豈公之所宜乎我聞佩仙花吟紫薇時則有白玉之堂列三槐植九棘時則有中書之堂公之所宜盍宜於此而豈止宜於分雌堂之半席乎客以為然遂從而歌之歌曰公作新堂是名以宜可以飲酒兮可以賦詩攬風月兮無邊樂朝暮兮四時身軒冕兮志丘壑匪堂之樂兮樂民之樂時和嵗豐兮民物阜康公領嘉客兮來宴斯堂撞鐘兮擊鼓鼓咽咽兮醉言舞祝公眉夀兮俾熾而昌公宜天下兮豈止宜於此邦抑公之宜兮奚堂之居匪槐堂之位則玉堂之廬雪坡集卷十
