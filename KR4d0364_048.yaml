body:
  text: 雪坡集卷四十八宋姚勉撰祭文祭師范石莊先生嗚呼先生之學出史入經先生之文孔思周情振筆吐辭藻絢華發春花意生秋水瀾活不鄙謂勉可學古人毋陋之習刋陳叩新孟子丘明次則韓氏匪此三者請姑舍是文史之暇教之經綸如是尊主如是庇民評古商今竟朝窮夕間語他人終莫詣極才大用罕名位弗羈放意杯酒窮達不知勉叨誤恩誨出夫子陸奏蘇書言猶在耳受恩罔極報施未能天胡奪之遽夢兩楹如勉來歸旋茹荼毒方父之葬又師之哭茲奉冠劒藏于新塘恨以寢苫不能室場明日遂行巵酒為别先生何之有淚皆血祭友人幸科院嗚呼季哲之才英拔豪竒松垣為父𢎞齋為師學與識以俱髙文若武而兼資議論豪宕而不羣器局卓犖而不羈騁筆成文吐辭為詩波濤橫湧風霆並馳昔者叩閽纍疏便宜指病陳藥皆可濟危使當言路決不飫仗馬之粟抱寒蟬之枝有志事功歷遊邊陲審勢識便氣吞強鄰使得兵柄決能快長纓之係奮折箠之笞諸公見賞薦剡上飛僅金閨之通籍分大農之攸司嘖煩言之遽興羌以是而為非身在山林宣室見思意公道之可明帝將與之節麾何一往而不反竟客死於京師公之東去適我西歸欲勸公以勿往騏驥逸而難追曾日月之幾何成古今之長離冢嗣方鰥而未孫主孟克家而早嫠次郎短折而未窆孤女擇歸而猶遲天胡奪之甚速乃浩然而長辭齎壯志而永終不盡用於明時國失此才家失所依興言及此感涕漣洏聞别音之琅琅不浩氣之少衰愚鈍如我亦託以遺於此時而猶記安敢負於心期哀斯人之不可見嗟曷日而忘之雖然公之平日見如蓍龜死生一致昭晰無疑其歿也瞑三日而復活其活也噱一笑而遣醫若一肘之屈伸以去來而為嬉然則如公者蓋所謂烈丈夫之事豫也何敢又徒為兒女子之悲祭表兄吳景蘇嗚呼吾嘗聞諸吾母曰兄之生也外祖書林先生實甚愛之曰是他日可以昌吾門矣及兄之長博通六經諸子百家摘杳抉冥文撼場屋煜然有聲人皆謂書林先生之有孫矣夫何屢試不偶壯志雕零放意麴糵玩心黃庭視人間世之功名富貴榮華聲利若皆不足以挂意而惟馳神於飛霞八境之太清然猶冀兄之存也尚可以繫吾外祖之書脈而豈謂兄之年僅及於天地之數乃遽委骨而蛻形嗚呼自兄母而言則兄吾姚之甥也自吾母而言則兄吾之表昆也自兄之婦而言則又吾之從女兄也豈惟瓜葛疊戚重姻於兄之歿悲感倍增孀妻煢煢義聚之家固可以畢其老兄無子而有五女髙低駢立誰依誰聘嗚呼兄之生時有不適意而委之度外者死而有知其亦漠然無情耶是重可悲也所幸兄家以義為門孝慈如一今雖無子而從兄弟舉其葬則他日羣從中之多子者尚可謀以為兄之後女之長也又當共擇所歸使無失其托以慰兄之靈獨惟外祖諸孫今失其長孟舅二子今僅存幼名也學通六經而身不一登於貢利也家徒四壁而粟不一儲於瓶雖然名利亦不過儻來之外物所可道者既歿而猶為人所惜公論在於日月之鄉評生雖窮困於布衣而未嘗妄取於非義生雖放曠於杯酒而未嘗踰越於凖繩是非甚明而未嘗談人之長短學問甚髙而未嘗縱已之驕矜謹訥重厚退如不能凡今之人一藝可稱身儇吻薄足髙志盈孰如兄者尚有典刑嗚呼哀哉嗚呼哀哉祭族子霆伯嗟某與子雖為族人於族之中又密且親豫幼學年子已俊發來遊場屋詞藻清拔先君謂我此文叔兒起慕起畏奮然思齊後此六年在辛卯嵗豫叨薦名折翼而墜子來慰我射目中眉惠我以啓教我以詩斯文締交實自茲始宗盟見推俾執牛耳以至今日凡三十年分則籍咸情則運連子天資髙博學強記顯經隱傳爛漫肝肺揮筆灑紙驅風駕雲笑罵詼謔動皆成文寫興為詩風雅膏馥引行縱草龍蛇起陸以若人物眼中蓋希人滿謂子桂林一枝命不副才事乃大謬釋志利名肆意詩酒伯倫太白今古此懷蘇二黃九夢魂往來金玉窖塵軒冕壞土白眼富兒閉口阿堵視物甚眇自處甚髙酒酣八極挺然人豪豫方窮時髙臥抱膝頽簷敗壁相與終日豫昔喪母宅兆未安吾母汝母子山吾山先體之藏子廬之側雲溪風月天境泉石誓言他日皆隱於斯牛韉同騎魚篠對持如何蒼天奪子之速芙蓉冥冥脫屣塵俗去年正月詔召覲京子遣幼子隨余東征今年此時子則已沒素車白馬來執子紼敵犯鄉國幸爾無虞如何一疾竟隕其軀夏秋之交亦聞告病汝子亟歸書止弗聽豫忤權幸九月遂歸氷溪早涸反棹以遲十月中間方此善達乃隔浹旬死生契濶病不饋藥歿不撫尸遺恨千古豫罪奚辭子之此心不間生死我爾之身無念婦子昔昌黎伯祭姪老成辭誼婉惻皆豫之情有食終喪否則遂取豫豈敢忘昌黎此語吾子欲教汝子亦然豫豈敢失昌黎此言死生由天道義由我子知豫心必信其可秦源先壟明日遂藏幽明永隔來盡此觴祭外甥吳英孫曰東坡之甥曰栁山谷之甥曰洪吾無坡谷之賢見汝之幼而穎則冀其如坡之柳谷之洪也嗚呼吾今失望矣豈料爾止於此乎岐嶷之狀如在目前姢好之容尚存夢裏哀哉猶能歆舅與外兄之祭否代祭髙參政二儀間氣萃乎峨岷篤生我公為時偉人伯塤仲箎韡韡棠棣追翺逐翔名蓋一世昔在嘉定公守于鄉遇寇阻訌力扶蜀方帝嘉駿功奮迹朝路執簡司綸金玉王度外贊戎略內隆主知式遄其歸晉登樞機真德實功衣被天下危言核論福在宗社國步方棘是堪倚毗哲人其萎天不憗遺嗚呼坤軸西折壁玷甌缺今無我公誰拾潰裂天凍地濛哨騎數驚今無我公邊塵孰清正人晨星諸老霜木今無我公善類疇福默默仗馬局局轅駒今無我公昌言孰謨邦失柱石士無宗師人亡國瘁聞者涕悲惟先君子志合道符俾我小子綴于葭莩在癸卯秋拜公西府姑蘇一舸亦侍步武遇我獨厚杖屨日從色笑誨言溫然春風别公來歸荐歷憂患陟岵既悲絃瑟仍斷相去遼濶心親迹踈維是棘人不遑寧居曾幾何時公遽捐館拜公不復泣繼而歎教誨在耳威儀目前回思曩時一夢六年悼亡之初辱賜勤慰復賜為銘幽壤榮賁惟公於僕恩意至隆宜公之夢酸痛攪𠂻維婦窆期不逺伊邇往哭不能悵隔千里遣使設奠矢心以辭哀哀魂夢尚克鑒之祭胡上舍宏甫文嗚呼宏甫博學多文意氣軒豁邁德絶羣發為文章該貫義理馳騁古今意盡斯止其在場屋谹然有聲讋彼萬夫羣瘖獨鳴跬視青雲囊探丹桂命不副才動得困躓憤不直已寄徑鶡冠人謂由此亦可美官君曰噫嘻非我所樂豈其鞍馬借此薦鶚重湖之北大江之西出其緒餘輒魁南闈上之春官一第直摘到天折翅幾點龍額顯顯季父立于周行爰自胄監蜚英天庠謂當此時凌厲奮發如何荆璞屢獻屢刖言事竄斥學校積輕君曰歸歟家在赤城種竹蒔花池藕畦藥吾沙有鷗吾嶼有鶴亦既間暇詩書自娛胡不少留御風憑虛昔癸卯秋客君之館國士相期意味渠欵一散不聚十有五年雖有尺書不如晤言天邑來歸甚欲君訪出憂入患如縶我鞅今年八月唁我一書豈謂此筆乃成别豫聞訃失驚飲泣奔弔但拊其棺無復談笑哀哉宏甫乃止於斯壯氣抑鬱亘為天霓舉世紛紛無能富貴君乃虛生使我長喟聞絶之際語音琅琅付托乃豫豈敢或忘豫於交情不間生死君雖無有有君之子隻雞斗酒來此哭君靈者不死尚其我聞雪坡集卷四十八
