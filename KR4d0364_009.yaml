body:
  text: 雪坡集卷九宋姚勉撰講義一西澗書院講書周官鄉大夫三年則大比考其德行道藝而興賢者能者鄉老及鄉大夫帥其吏與其衆寡以禮禮賓之厥明鄉老及鄉大夫羣吏獻賢能之書于王王再拜受之登于天府此成周六鄉取士之法鄉老二鄉公一人則三公也鄉大夫每鄉卿一人則六卿也興賢能之士而以三公六卿主之且又以賓之禮興之獻之於王則王拜而受登之於藏大寶王饎之天府敬士之至也此周之士所以貴也然成周所興賢能必取其為德行道藝之士德者六德也知仁聖義中和是也行者六行也孝友睦姻任恤是也藝者六藝也禮樂射御書數是也言德言行言藝而獨不言道蓋六德六行六藝無往而非道而道則實貫乎三者之間也舊説謂德行為賢道藝為能此説非是德行為賢藝為能有此三者則道在其中矣賢者亦有道而能者亦有道道蓋無所不包若只以道與藝為能則道之一字小矣論語所謂志於道據於德依於仁遊於藝志道在先而後據德依仁遊藝也此不以道言於首而言於中者正謂道行乎三者之中也古之賢能者必有德行道藝而後賓興之未先理會藝且要先理會德理會行理會道先本而後末也况所謂藝者又只是禮樂射御書數之事而非若後世之所謂文藝乎禮樂且以為藝則古人之藝可知矣知者始條理之事聖者終條理之事仁是本心天理之心義是裁制事物之宜忠即喜怒哀樂未發之中天下之大本和即是發而中節之和天下之達道無非是學道最緊要底事成周之世司徒以此教民鄉大夫以此興民便是人人皆理會此道既有此六德然後孝於父母友於兄弟睦於宗族姻於親戚任而信於朋友恤而惠於鄉閭兼有此六行而後可以學五禮六樂五射五御六書九數之藝猶論語所謂行有餘力則以學文也後世之士所尚者文詞所習者章句只是有古人六藝書之中一事耳所謂禮樂所謂射御所謂書數固已置之度外六藝且失其五而况六德六行哉間有天資暗合者僅能或孝友或睦姻或任恤耳知仁聖義忠和則未也此古之所以人人皆士君子而後世之士不古若歟有志於道者可無意哉今嵗又當科舉試士之年是月求賢之詔已下正是古人三年則大比之日賢師帥賢師儒作成於上吾澗堂諸君仰挹三劉先生之風而學于此無非可以應賢能之選者願益用功於道用功於德行而後用功於藝可乎孟子曰仁義忠信此天爵也公卿大夫此人爵也古之人修其天爵而人爵從之今之人修其天爵以要其人爵既得人爵則棄其天爵矣紫陽朱夫子曰修天爵以要人爵固已惑矣得人爵而棄其天爵其惑又甚焉今科目所以求人爵者也盍亦修其天爵可乎伊川程夫子曰或謂科舉事業奪人之功是不然一月之中十日為舉業餘日足可為學又曰人多説某不教人習舉業某何嘗不教人習舉業也若不習舉業而望及第却是責天理而不修人事但舉業既可以及第則已明道程夫子亦曰惟能誠心其文章雖不中不逺矣然則誠心固可用於文章而舉業儘無妨於道學也賢守二勸駕伊邇是即鄉老鄉大夫之賓興者在是矣願相與為德行道藝之賢能以應之以無負作成之意講義二顔淵問仁子曰克己復禮為仁一日克己復禮天下歸仁焉為仁由己而由人乎哉顔淵曰請問其目子曰非禮勿視非禮勿聽非禮勿言非禮勿動顔淵曰回雖不敏請事斯語矣大學曰所謂誠其意者毋自欺也如惡惡臭如好好色此之謂自謙故君子必慎其獨也小人間居為不善無所不至見君子而后厭然掩其不善而著其善人之視已如見其肺肝然則何益矣此謂誠於中形於外故君子必慎其獨也中庸曰道也者不可須臾離也可離非道也是故君子戒慎乎其所不覩恐懼乎其所不聞莫見乎隱莫顯乎微故君子慎其獨也某聞諸久軒蔡先生曰顔子四勿之學謹獨之學也為學之要莫大乎謹獨克己復禮為仁此至大至重之事而顔子請問其目夫子指其要處只是非禮勿視非禮勿聽非禮勿言非禮勿動四句以此見其謹獨之學乃學者用力之至緊至切處也某時聞此言竦然領會因悟中庸率性修道非易能也而首章兩端必歸重於君子謹其獨大學正心誠意非細事也而誠意一章兩歸重於君子必謹其獨顔淵問仁一段乃夫子傳授心法之精微大學中庸二書乃聖門教人為學之要妙而旨意融貫如此學者不可不知所用其力也朱夫子曰獨者人所不知己所獨知之地也人所不知而已獨知之乃常情之所共忽茍於此隱微之際人欲一萌動乎其間不知警覺至於放肆則人心之危者愈危道心之微者愈微天理之公奪於人欲之私矣仁者天地生物之心而人得之以為心者即所謂道即所謂天理之公人皆有之茍無此仁是無此心非所以為仁矣故學者以求仁為第一事求仁則是求其心也求其心是求其所以為人也人皆有此仁蔽於私欲則仁之本體若有虧欠然而本未嘗虧欠也克去己私復還天理仁之本體全矣禮者天理之節文動合於禮即天理之公也然而何以能復必克去己私則復何以能克必謹四勿於四非則克程先生曰非禮即是私意既是私意如何得仁須是克去己私復歸於禮方始是仁四勿者所以禁絶四非即謹獨之學也非禮一念方萌於中即已禁止而遏絶之非用功於人所不知己所獨知之地乎人所不知若可以隱微言也而已則知之明白昭晰孰甚於此果隱而微乎抑見而顯乎於此之時操存不力放心一恣奔迸四出隱者見微者顯矣故曰莫見乎隱莫顯乎微也人鮮克謹之惟顔子勇於任道聞夫子之言即請事斯語平時用力專在乎此有不善未嘗不知知之未嘗復行是也所謂有不善未嘗不知者非知他人之不善也己之一念微有不善即已知之既知之即絶之不復更見於言行此即是非禮勿視勿聽勿言勿動也非禮之視聽物誘自外而來非禮之言動情欲自內而出惟顔子先謹於視聽不惑於非禮則言動之間自能謹之不陷於非禮矣勿字是用力緊要字非不可有勿不可誣非才一萌即以勿之一念制之天理勝而人欲泯矣非者即是人心勿者即是道心也人有非心邪念第患不能自覺既能自覺即當思所以制之成湯以禮制心亦不過如此君子之所不可及者其惟人之所不見乎有不善未嘗不知此顔子有覺於非處知之未嘗復行此顔子用力於勿處顔子工夫到此故聖人於易贊其不逺復於語稱其三月不違仁稱其不遷怒不二過也顔子有不善未嘗不知此一知字即是覺即是大學致知知至之知知者此心神明朱夫子所謂妙衆理而宰萬物者也人莫不有此知而或不能使之表裏洞然則隱微之間真妄錯雜雖欲勉強以誠其意有不可得然則學者於念慮方萌之動人所不知己所獨知之際必也真知其孰為善孰為惡孰為禮孰為非燦然明白然後禁絶其不善則意誠而心正矣此克已復禮久而誠矣之説也故曰謹獨工夫乃學者用力之至緊至切處也人不知用此工夫故其為心出入而無鄉流蕩而忘返人所不知己所獨知之地不知所謹至於為惡之著人所共知而已則不知其為士也顛迷於姦聲亂色放曠於博奕飲酒自以為豪而不知人指目之為不才子矣其為吏也白晝攫金掩耳盜鐘而謂他人為不覺暮夜受餽四知昭列而謂他人為無知自以為可以欺人而不知人指目之為狼籍人矣既是私意如何得仁人之心不存則人之形徒具失其所以為人此其去禽獸不逺矣大學曰小人間居為不善無所不至見君子而後厭然掩其不善而著其善人之視己如見其肺肝然則何益矣此數語如畫出一小人情狀也與其作偽而勞且拙孰若作德而逸且休哉人所知亦如此人不知亦如此內外洞貫隱顯一如工夫至此打成一片本立效形又豈不不動而敬不言而信哉又豈不不賞而勸不怒而威哉又豈不篤敬而天下平哉謹獨之驗如此謹獨即是持敬聖賢立言雖異為旨則同敬者入道之門躋聖之級端正徑直更無他岐自古至今由聖及賢莫不於此用力彼有謂敬非聖門先務者是不知所用力也敬非所務不知心何從而存性何從而養陸氏之學所以大異於我文公者以此陸氏動曰只信此心而乃不以敬為存心之要直不可曉慈湖楊氏陸門髙弟每疑夫子毋意而大學乃欲誠意以為大學非孔門之書殊不知毋意是絶意之私誠意是存意之公意之私固不可有意之公又豈可無以意之公者為可無是惡非禮而併與勿者去之矣可乎哉一超頓悟不用工夫決無是理學者循序漸進但當學顔子之學顔子何學不過自謹獨持敬始而已此某聞於蔡先生者願與同舍之同志者共學以求仁焉判府寺丞既新夫子燕居之堂而於諸老先生從祀之中徹舊來陸氏之像厥有深意故某既敷述謹獨之説而末因及陸氏之所以異於程朱二先生者而與同志正其指歸是審進學之路頭也同志諸君其然之否講學三正誼書院訓學子有子曰其為人也孝弟而好犯上者鮮矣不好犯上而好作亂者未之有也君子務本本立而道生孝弟也者其為仁之本歟論語第一篇所記者多務本之意朱夫子所謂入道之門積德之基乃學者之先務有子者聖門髙弟論語之書多成於有子曾子門人之手故首篇即以有子之言繼於夫子三言之後而孝弟為仁一事又學者入道之門積德之基最急先務故又以有子此言先之其詔萬世蓋有深意孝悌之心人皆有之乃本心中自有非外邊生來孟子曰孩提之童無不知愛其親者及其長也無不知敬其兄者此皆自然而然所謂良能良知也天髙地下萬物散殊而禮制已行乎其間蓋皆是自然底道理有天地即有男女有男女即有夫婦有夫婦即有父子既有父子則子受父母劬勞鞠育之恩而孝已在乎其中矣人既有子非一子而止先生者為兄後生者為弟兄生在弟之先長者尊而幼者卑則弟之卑者必敬其兄之尊而悌己存乎其中矣又由此而分則父之兄弟為伯叔伯叔則謂己為姪己之兄弟為己子之伯叔父之兄弟則又為己子之伯祖叔祖由是而為再從三從由是別而為大宗小宗有父則有母有夫則有婦而父族母族妻族皆由是而有而謂之三族九族矣九族即三族合父族而論則原於一人之身合母族妻族而論則原於夫婦二人之身故一人之身散而為千萬人之身則理一而分殊千萬人之身皆原於一人之身則分殊而理一但自陽變隂合以來鍾為人物合下自有許多於許多中自然有髙有下故由是而有長幼長幼者父子之積也既有一家之長幼則又散而為千萬家之長幼有千萬家之長幼則不可無一人大為之長者以治之使其下皆聽命焉由是而有君臣君臣者又長幼之積也至於朋友則是自有長幼以來同門異户自然有志相同而道相合者相與講明義理而朋友立焉故三綱五常非聖人強立之皆順天下自然之理也孝悌者不過一順而已孝悌兩字能盡其道便治得天下何也通天下皆有父子皆有兄弟皆有夫婦使天下之人家家子孝而父慈家家弟恭而兄友家家夫義而婦聽朋友者專只講明此理以明教詔則天下太平矣君臣之分萬世常定矣又豈待為之君者威驅勢迫操刑罰法制以臨制天下而強天下以為臣哉故孟子曰人人親其親長其長而天下平人人皆知親其親皆知長其長天下豈有不平之理孟子教諸侯必曰謹庠序之教申之以孝悌之義又曰壯者以暇日修其孝悌忠信入以事其父兄出以事其長上可使制挺以撻秦楚之堅甲利兵矣孝悌兩字可敵堅甲利兵是豈小事蓋甲兵者主於爭而已其心未必順孝悌者以吾之順敵彼之爭爭者億萬人惟億萬心順者三千人惟一心也人徒見聖人説平天下在於治國治國在於齊家齊家在於修身修身在於正心正心在於誠意誠意在於致知致知在於格物平天下許大事却只原頭如此甚小遂以為聖人迂濶不切之談而言管商功利申韓刑名者往往相與笑之殊不知聖人乃是執要以御詳因心以為教從聖人之言則天下自然順服從管商申韓等言則天下不過強服強服者豈能得其心服哉故強服者其勢則必爭爭則亂順服者其心必順順則治亂者以逆治者以順也夫聖人豈自修其身而不問他人之身修與不修自齊其家而不問他人之家齊與不齊哉自修其身所以使天下皆化而修其身自齊其家所以使天下皆化而齊其家一國之人皆身修而家齊則國治矣天下之人皆身修而家齊則天下治矣故聖人不求之國不求之天下只求之身與家家齊而國自治國治而天下自平矣所謂格物致知誠意正心皆是理會修身事誠意正心要全此理格物致知要窮此理無非是理上推去也有子謂其為人也孝悌而好犯上者鮮矣不好犯上而好作亂者未之有也亦正是此意程夫子曰孝弟順德也故不好犯上豈復有逆理亂倫之事程夫子順德兩字説得極好孝悌是子愛其父弟愛其兄故謂之順德因人所固有亦謂之順德德順則無逆矣天下所以不治者只是民好作亂好作亂者豈不是平日以下犯上之人敢於以下犯上豈不是平日不能孝悌之人惟其不知有父則不知有兄不知有父兄則不知有長上不知有長上則豈知有君不知有君則乖爭凌犯之習成寇攘姦宄之俗熾反逆篡弒之事兆矣不孝悌其原甚微縱而至於犯上極而至於作亂其禍甚大人可以不孝悌哉孝悌是為仁之本故有子曰君子務本本立而道生孝弟也者其為仁之本歟言孝悌乃是本君子專務為此則本根既立而道自生孝悌是本仁是道故曰孝悌為仁之本為仁是為仁者之事猶言行仁也程夫子曰言行仁自孝悌而始又曰仁主於愛愛莫大於愛親故曰孝悌為仁之本孝悌者乃為仁之本非孝悌是仁之本也譬之造屋孝悌是箇屋基為仁是後來就上面造屋儻若不先築基如何可以造屋孝悌之人姿質好壞墣正便做得求仁底事仁者天理之公合天地萬物為一體自吾親之愛推而至於無所不愛孝悌者愛親故為仁之事從上面起去聖人又何以專教人以求仁哉蓋仁者吾性中之所固有也人不求吾之仁則是不識吾之性不識性安識心不識心終日猖狂妄動逆天悖理至於犯上作亂是去禽獸不逺矣何以為仁故孟子曰仁人心也又曰仁也者人也謂仁者乃人之心體得此仁而後可以為人易曰君子體仁足以長人蓋天下之人皆同此性同此仁吾體得仁則可以為天下人之長則是體仁不特可以為人又可以長人也人為天地之心盡得人道然後撑拄得天地故曰為天地立心此是多少大事吾聖人教人只是從孝悌上起夫子又曰弟子入則孝出則悌謹而信泛愛衆而親仁孝悌謹信便要愛衆親仁愛衆即是要盡仁之用親仁即是要為求仁之助聖人何嘗一語不教人求仁哉學者又豈可不以此為第一事哉講義四子襟刺學校廢也亂世則學校不修焉青青子襟悠悠我心縱我不往子寧不嗣音青青子佩悠悠我思縱我不往子寧不來挑兮達兮在城闕兮一日不見如三月兮此鄭人刺學校不修也學校不修雖上之人之過然亦下之學者自有以致之故詩中但責學者無一語為上之人怨其曰青青子襟子佩者指學子之衣服而言也青東方木也木屬仁古之學者以求仁為第一事故入學之服皆服青青青子襟青青子佩思學者相與服此襟帶此佩而遊于是學之中也學校廢則不來遊來歌矣故思之曰青青者子之襟也今不來遊於是焉能無思乎故曰悠悠我心又相與責之曰縱我今不往子寧不繼此音響而來乎此朋友責善之語也謂我之不往固非矣子而來猶可以不使學校無人也而不嗣音可乎下章却只換韻意與上同末章則深警責之矣挑達輕薄跳梁之貌城闕城門車馬往來之地紛華盛麗之衝也學者不在學校間則在城闕間矣此最害道雖聖門弟子如卜子夏亦曾從裏面打交衮來但是聖門弟子天理能勝人欲耳昔者子夏瘠而忽肥夫子怪之問其故子夏曰商入聞夫子之道而説出見紛華盛麗而喜二者交戰於胸中故瘠今則夫子之道勝故肥子夏當來豈不稍為紛華盛麗所惑但是又愛夫子之道故終於夫子之道勝人徒見子夏於肥之時方是夫子之道勝殊不知當來見紛華盛麗時與聞夫子之道時已有輕重淺深分數不同矣説字樂意深喜字樂意淺聞夫子之道即已深説見紛華盛麗處便只略略淺喜當受病時受得已輕故易於用藥也使當時見紛華盛麗而説聞夫子之道但喜便不易勝矣然子夏尚有此病若顔子則全無此病食簞飲瓢一如列鼎玉食不知是簞瓢在陋巷如華屋雕牆不知是陋巷故人不堪其憂顔子便不改其樂不但是樂又乃朝斯夕斯更無改易非深有見於夫子之道一於天理而無人欲能若是乎然古人為學直是真實更不作偽子夏見紛華盛麗而喜時直認是喜到不喜處真箇不喜却非是如今人心中實愛紛華盛麗到口中又強言不愛也此子夏在聖門所以為篤實懸鶉百結而不憂處貧賤如富貴也學者直是要到此田地鄭人責學者所以終以挑達城闕為戒者也城闕紛華盛麗之地人所以愛之者只是見未破耳歌樓舞館撞鐘擊鼓秦娥趙女窈窕列肆雕車翠幰充塞道路忽來倐往驟有即無無非假偽瞞弄之具無一事真實縱使人人留聰明於姦聲亂色放志意於浩飲狂歌連如是三朝五日不得息鼓舞之餘厭倦即生矣孰若開卷有益日對聖賢稍有所得其味無窮乎惟是這處看不入所以愛那處儻於此有所得則回視紛華盛麗殆猶草木榮華之飄風鳥獸好音之過耳也豈足道哉若存心於此則大害於學方其學時念念遊戲身雖學校心已城闕如此則於學問徒費日也故詩人深警之曰一日不見如三月兮言一日不在學校而挑達城闕便如是三箇月不學然則一日縱放其心便用三箇月日工夫亦趕不上也前輩謂撑船上灘著氣力撑不上一篙才慢退下十數丈矣今人玩嵗愒日宜其所學無長進也又豈止不見一日如三月而已乎挑達兩字最學者所當戒挑達有輕薄之意學問決不是輕薄底做得故聖人必曰君子不重則不威學則不固欲要有威儀欲要學得在已堅固須是於重字上著工夫重便是持敬輕便是無敬心重則放心可收拾輕則心轉放矣孟子曰學問之道無他求其放心而已矣且首言曰人有雞犬放則知求之有放心而不知求哀哉哀哉兩字此孟子緊切喚醒人處雞犬放失尚思求之心放不求是待此心不如雞犬也豈不哀哉講至此忽有一人問鄭亂世學校不修詩載在五公子爭以前至子産時相去已久如何是鄭人尚欲毁鄉校莫是學校不修之詩在欲毁鄉校後否曰非也不修但是上之人不留意下之人不入學耳非謂即毁去學宫也然此亦是國之學也鄉校者周之時二十五家為閭閭有孰五百家為遂遂有序二千五百家為黨黨有庠其時學遍天下鄉校蓋閭孰黨庠之類也國之學縱不修鄉之校却未廢逮鄭人遊于鄉校以議執政然後子太叔欲毁之賴子産不肯曰使夫人退而遊焉以議執政之善否其所善者吾則從之其所過者吾則改之是吾利也若之何毁之若非子産主張則亦毁之矣然鄭人亦有取毁之道聖人之教人聞人過如聞父母之名夫子居是邦不非其大夫非特包周身之防亦是重責己輕責人意思與人不求備檢身若不及與其議執政之善否孰若察吾身之善否乎今之人但知説他人不是未嘗檢察自家不是此一失雖某亦有之因戒學者亦以自警雪坡集卷九
