body:
  text: 雪坡集卷三十二宋姚勉撰書與太守陳舍人竊維英人偉士之見超出物表不在於尋常世俗之末故弗敢以寒暄問候語溷仰祈委照某伏自庚戌年遊京庠其時值執事以龍韜虎鈐之學冠天下多士魁躔炳耀可望而不可親惟日尊仰且聞前此在學舍時上書擊臺臣之奸鎮泉臺日以身拯朋友之難皆蹈危機而不顧義氣薄雲尤所起慕也豈謂有幸自天天子為髙安郡擇牧畀以麾節以殘破燬蕩之地人所畏避而還定安集之責公不辭難非世之英傑志在康濟者何以臻此某受㕓之氓仰庇蘇天自今日始松楸桑梓皆獲存全尤切自慶不獨為公朝得人慶也伏聞除書喜極欲舞而靈虯神螭變化莫測竟莫詢其蟠止之地無繇厠燕雀後疊辱枉顧謁謝弗能可勝抱愧兹審朱轓涖治𤣥纛開藩千里歡呼可想而見某欲旌賀悃輒奉尺書臯緩有誅尚祈矜貸江上奏捷北騎已無南牧政可為備禦計右相秋壑先生眷知明府尤厚宏材必可盡展布也鄉邦幸甚某末繇侍拜時暑向炎伏惟為廟朝民社重告成而後即有峻除京師百爾骫令一當遵奉與太守陳監簿某瑞之新昌人也今家於郛瑞素在僻鄉實為樂土何嘗識所謂兵革今年狗咬石之戍撤乃正月二十二日遂遭北敵之禍北敵既去鄉寇復挺乘亂劫財挾怨殺人者往往而是二月十五日宣閫趙相始檄李虎者來任經理是豈經理者哉瑞之民遭敵之禍猶輕遭寇之禍為重遭寇之禍猶淺遭虎之禍尤深瑞雖小邦財實饒裕舊樁新積計有銅鏹百萬餘緡去年鄉之寓居陳府判丈上中下微時官田府教上真下子嘗共懇舊使君陳刪修請於朝撥少費築一城以為保生靈之計城小費狹分功任事殆可如古所謂三旬而成陳刪修初甚然之竟搖於異議而止茫無備禦敵在五百里近耳何憚而不來魚肉斯民言之可痛然敵志金銀而已府庫則如故也厥後州吏焚州縣吏焚縣市井惡少焚市井府庫始為健吏惡少交有之而李虎之初來亦尚有三十萬也存於官者妄支搜於民者自若至四月十七日與陳武魁交割則僅餘二萬矣虎之禍不深乎使朝廷遣武魁往牧之時中間無僞作瑞民留李虎乞再任之請則朝廷所頒告命可以作人趨事赴功之心大家出力輸財足以為鄉里築治城壁之計猶可兾其修復也曾不半月而李虎復至鄉邦之民何其重不幸邪虎已南竄郡庶有瘳但今者上無守臣下無僚屬官府不立其亂必有甚於前李虎所屯之軍安保其不縱掠鄉井方定之寇安保其不再挺桑梓痛切於心不能自己此月初十日往告化地乞為瑞早擇良牧化地答以今欲以知廣德陳君往撫摩之且謂某曰此丈有氷壺之清且加意民事又曰乃某鄉人素知之時大理寺諸官同在坐化地復顧葉司直曰識此人否答曰識之果如師相所言某又言鄉邦無主乞早出命曰已擬進矣某感悅而退午後而命出又數日而趨行之命出雖某未及拜識私竊為鄉邦喜之敢乞薰慈矜念新治驅車遄往以慰竹馬歡迎之心幸甚幸甚鄉邦雖曰殘破二邑幸存猶可經理長才敏手尤是不難第某有千慮之愚敢獻涓埃以禆海嶽乞免今年上供以寬民力一也勿廢前日城築之規以防不測二也仍請前日陳武魁所給之告命以省科降三也乞籍前日李虎所卷之財賦以助經費四也乞押回李虎所屯驕恣之軍以紓郡計五也填本州廂禁虛籍之兵選本州麻塘寨伉健之卒以壯城守六也戢姦吏之變亂是非去黠譁之把持獄訟以息民隱七也寇盜之實殺人者誅之寇人而反誣人劫已者察之以釋寃憤八也土豪之實能戰敵者旌之里寓之冒功希賞者抑之以昭懲勸九也幕僚之亷勤公明者進之屬吏之隂受賄賂者退之以明曲直十也凡此十事略㫑髙明未見而言良深戰悚但見同館王大著言判府平日博採人言不棄葑菲可行者必見施行故敢狂僭伏惟憐其區區念鄉井之心而惠察之答太守陳監簿比者不揆僭躐以短書塵瀆仰䝉損答又辱推哀窮悼屈之念昭舉直錯枉之公尤深感篆郡兵西來又拜賜翰偶值匆匆去國禀答未能既次上饒方獲治狀具復臯緩戰悚伏祈矜恕某竊聞下車以來惠春威秋鏡明衡平千里畏愛幸甚幸甚繼自今某漱石枕流於泉林之間實在受賜一氓之列何如其喜築城一事誠如台諭當此郡帑赤立某何敢責去年之易於今日之難然遇明府長才如此今亦是人心畏難可以經理之時矣今不圖則瑞陽決無有城之日雖賢相秉鈞檄敵亦不敢再至敝鄉無城亦可然使有一城為他年悠久憑藉則是明府萬世之甘棠也惟明府實圖利之某汰斥之餘自當杜門省愆豈當復開口言事慨念鄉邦不能隱默强復一吐萬望赦而不誅某區區狷愚雖䝉君相眷知而忌嫉者衆加以時復妄發積忤於人此言者指其為履齊私人黨援履齊欲搖局面鐫秩放罷天子不加誅宰相不見斥罪大罰小亦可謂甚幸矣日俟威震未斧躓未嶺海之前皆明府為之二天也敢不稽首某旅窮無以供道里費方此干趙小山借一舟以歸得即可行伏謁非逺請驅委致頌禱輒剪浮辭仰兾台察答新昌應判縣某為邑受㕓氓乃不獲一識執事雖不識於目而已識於心執事蓋孝而忠仁而勇者也今年春敵自富川突至我瑞陽自太守而下至他邑令簿尉莫不委而去寇退則歸其官謂已修復至有以是求賞獨聞執事毅然弗去其邑誓以身死官邑民恃以按堵敵後二邑寇蜂起獨新昌無之間有鼠竊狗偷警其一即百懼環境帖息此非德化之素洽愛威之相濟安得至此執事又閉口絶不言功尤甚盛德某平日心敬執事及聞此益信所欽右相初坐廟堂某即以告願先賞以為天下勸右相甚然之獨以郡三易守臣未有以聞者亦嘗以書告之族黨鄉里朋友新候陳監簿至必有以請者也執事未嘗求以是為功某亦非以此內交要譽於執事顧天下公是之理如此耳故不敢以此聞左右遂久闕書使西來反辱翰墨賜益使人重愧也某族黨與先壟在新昌者䝉庇右幸得存全廬在髙安雖不為敵所燬而從父從兄出避於鄉者乃為强豪之寇所賊似此况味誤除何榮深恨不盡被二天之賜也邑士民德執事深有社稷尸祝之意近有書來俾某記其事雖筆拙不敢辭非久當有以求教使旋姑此具覆冗不能細伏祈矜照與萬京教書某奉别誨言倐四閲月拳拳尊仰未始敢忘曩斾從出修門時一簪盍甚欵兄歸未幾而某以罪斥去矣鳩止於枋鵬運而南升沉已異瞻望無從惟於泉石間拭目焰焰耳兹者伏審疏寵中禁講道外雍襟佩交歡縉紳胥慶惟是畿泮號小賢關天下之英俊所萃上又復開逰學之路侈袂方履輻輳皆來模範之儒不可輕畀式新擢用允謂得人尊年契兄長粹學清才氷潔玉立自合即著之木天米廪君相欲養其雅望故揚厯而後用之峻除只在旬月中要路亦特跬步間耳某前此所以欲得都騎小為武林之留庶幾兩次跋涉之役可省惟是恬靜之素不可奪必欲且為西山南浦之行歸歟未幾遂諧榮上某前之言驗矣今之言當即驗也嗣賀不一而足行其所志輝耀鄉邦幸甚某無似麋鹿之性只合山林鴛鷺之行豈其所稱且又方心拙喙動觸黃間之機汰斥宜矣亦可謂幸矣邦有道貧且賤焉雖自若可耻人之所惡已則不敢去也安故山而讀古書外無烽燧之憂內無水旱之苦荼亦甘矣有可賜教者毋吝是望某未卜瞻晤之期時中伏惟為斯文壽重即前穹擢有鄉里委願備牛馬走通提刑鄭南谷書某山棲淵潛本不當拜諸公貴人書然在門墻為子弟又不敢以此論仰祈矜照某昨者扄柴正緊咬菜甚甘忍腳不牢輕於一出且方心硬喙豈朝班人物雖無蛾眉之可嫉而衆女之謡諑蝟興指其為履齊私人斥之使去芰製荷衣退修初服甚宜也無所怨尤獨念丙辰返棹水鄉適遇先生商羊里第得承警誨如見天之廣大此行之歸則先生持節在閩可望而不可即吝萌遂茅塞耳在京時又䝉先生遺之書重之餽雖嘗肅報而辭不盡情甚以為不滿君相急賢即日先生鸞臺鳳閣上某山之巔而耕閒水之涯而釣寂瞻望當益逺念不可無一行字見勤翹道感激偶有便馹輒敷下忱仰冀垂察某附有微懇清漳僉判鄧從政名方淵溫陵人登癸丑第於某為同年而在使部為屬吏發身白屋無蚍蜉蟻子之援孰與翼而飛之者幸遇先生慨念寒畯不棄葑菲可有大造之望第列城百寮徯春風仰膏雨者不知其幾又無緣可以自見知某辱眷遇不薄求一羽言以干千鈞某以同年之義不得辭也此同年文而有吏材晹巖洪察院先生嘗薦舉之晹巖端人正士蓋必有以取之矣某何敢私於同年有情哉惟先生亮之答許司門書伏自去冬郭丈德甫自大府歸辱賜書極見愛厚匆匆具答未之能細也又勤使人逺餽函櫝尤感以愧某山林麋鹿之姿本非班行人物只當茂林清泉自安其適忍腳不固輕於出山然亦是去春澒洞之時主憂臣辱不敢潔其身以亂大倫只得出而不處或可吐其欲言之藴也君相眷知不次待遇甚非所稱亦由此故取嫉羣小遂觸駭機八月十一日輪對之疏讀之者已怒生癭矣十九日早宰執過新益堂㑹講周易正講到否卦某適當之因說六二包承尤前日之大人六三乃不中不正之人和附六二以取富貴致身髙位所包者羞愧而已雖自己不知耻而天下之人實耻之故聖人言其位不當此語遂大忤一執政說至九五繫于包桑又言休天下之否轉而為泰固善矣然天下之禍根不去則泰亦未可以長保孰為天下之禍根前日致亂之奸人已驅而復來者是也此語遂大忤一近幸是日雖䝉壑相先生有和而正粹而嚴六字之褒而忤者深惡之矣某但據經論理告儲君以否泰之所由致庶幾天下常泰而不否豈復顧一身之否哉不旬餘而以罪斥去退甚甘也但是憂治危明疚焉在念而又鄉間兵火之餘荆榛瓦皪在目流離者未復業勞來者不究心使人懷抱作惡以是多感成疾所幸一稔在望可作飽民日願相衮且留扄面凝定則江面亦無可事與擊壤父老雍容田里儘樂也尊年家兄慷慨拔俗之標卓犖不羣之度摘髭科第為時一出近在朝夕與退斥者却自不同毋煩軫記令弟瓜期在邇行道之初更望益加培植今年見邸報得西澗葉先生舉文華科目極為贊慶但此後出人之門必皆如西澗先生而後可否則當如前輩繳還舉削賦如公安用此門生者可也前日或為其場屋所知或與之鄉里有舊不妨略有私情然舉世自有公論不可如為元規塵所汙也此為其前此受人舉自代而言以逺大期吾同年不覺僭越亦以致其愛助怡怡之際願以朋友之切切偲偲者及之幸甚􅤤魚之惠極感無以報施黃檗山茶一掩聊奉晝瀹以搜攪胸中書傳之香秋風捷音嗣當貢賀仰冀尊察雪坡集卷三十二
