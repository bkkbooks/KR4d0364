body:
  text: 雪坡集卷五十宋姚勉撰墓志銘談氏孺人墓志銘余與興國軍教授豫章程君澥第南省同年程君兩年長以兄事之屨嘗迹其庭見其內外肅如僮奴指千皆紀綱之僕賔客日滿門教授兄談麈坐對未嘗頥指揮具酒殽而罍列爼陳水珍陸甘畢備樽既臥問有無必復進余每異其主孟之在中饋者必賢也已而詢之果然蓋謁于其族則族之人曰教授婦孺人也談氏諱幼玉豫章新建厚田人祖遵父畝皆以謹厚稱孺人在父母家已有徽譽父母疾嘗兩刲股肉為糜愈之既歸于程事重闈舅姑尤恪謹雞初鳴冠帔問起居三飯奉珍鮮侍立食既乃敢去節春秋朔望行家人禮奉觴上夀姑袁夫人歿哀毁過常繼姑今陳夫人尤愛其孝性勤約不事侈靡蠶績事必躬執紝執針皆號為精絶能琴棊尤喜閲書史誦袁氏世範甚習善相夫樂教子吾族之賢婦人也詢于其鄉則鄉之人曰孺人禮賔客恩戚姻樂賑乏絶嵗有祲必勸其夫下價發廩以濟飢慮細民少錢不能多糴則米其穀隨所糴多寡應之或不能糴則給之食仰糴者日千百全活甚衆富而好禮積而能散吾鄉之賢婦人也余既得所聞於其族與鄉意其賢益信寶祐戊午十一月教授以書來為孺人求銘則孺人以十月八日歿矣其族與鄉所稱及余所聞之賢婦者亡矣惜哉孺人以嘉定癸酉八月生以紹定庚寅歸程氏寶祐癸丑教授兄弟南省丙辰入對擢甲科子一律又以乙卯江西轉運司試貢今年十月姑陳夫人復受封孫逢吉亦秀爽顯貴方開正孺人享有榮祿之日也乃臥病九閲月而歿僅年四十有六歿之日去姑陳夫人受封時未兩旬浹蓋孺人以伏枕不能躬賀拜病遂增劇故其歿陳夫人尤痛悼之教授兄來求銘蓋將以開慶元年四月丁酉葬孺人于茅岡之鑑垣余也亦有悼亡之悲者也故於教授兄之悲不銘無以塞其意矧素知其賢且同年兄行之婦如嫂敢辭銘銘曰族稱孝鄉稱人溫且惠程之嬪事已之親以及夫之親理家其有倫天胡不夀之範世之婦人夫兮亡舉案之賔子兮不報斷機之諄石可泐悲不泯萬安周貢士墓志銘萬安周君公弼亮甫以丙辰正月乙卯客卒於京之富春有子夢星將以丁巳十一月庚申葬之金鼎山龜峰之原前期夢星以書告曰某素遊先生之門願假寵以光其幽敢請銘維周氏在廬陵與平園益國公同系後徙萬安髙祖睿擢元豐第終萬載令曾祖某祖某父某皆不仕君少篤學精虞夏商周書為文動數千言端平甲午與貢試禮部弗偶當路屢欲以武爵爵之君不可後洞寇作扞鄉井有功亦弗受官曰吾必取科第癸丑該恩試南省又弗利益力學至劬瘁且病乙卯冬小瘳復治任東親友交勸勿往君曰譬之武事吾寧馬革裹尸還葬耳竟旅死僅年五十有五吁亦壯矣僕常惜後世科目老天下英傑雄氣鋭志不肯自休者必死而後已雖有才且能不得自見於世失人亦多矣君有田可耕有圃可遊有亭榭可嬉有歌舞可娛皆不自足必欲取名第雖勇爵不願雖客死不悔可悲也雖然君平生恤窮周急雖不得於人深得於天旅櫬歸舟歷鄱陽湖春浪正髙至是帖然濟無虞天猶福善也雖名第不如志不在身在子孫夢星其念厥考求名之勤客死之哀期有成以慰君志銘曰志於求名不家之死寧死于京哀哉子能有成尚慰君平生豐城鄒君墓志銘始某未第時家四壁立讀書聲與腹雷並作過之者弗睨也孰有以子妻之者乙巳冬十月忽晨有數客至出延之坐不知中一人乃鄒君也去數日媒以書來曰豐城鄒君有息女不肯與凡子擇名士欲以為壻昔者微往見子則大喜以為母論其文在相法亦當富貴決意壻子或有短之者曰姚雖儒貧也屋數間且破瓦不覆椽日與天日相覿風旁雨上何以處君女鄒君笑曰之人也雖無屋可壻况猶有椽乎求士詔近矣之人且舉且第鄒君之意如此子以為何如時先君子聞此言大賢之即許諾明年丙午某試鄉舉不中選丁未遊太學復不遇人皆笑鄒君大誤君不之改戊申某始受室己酉不幸先室人即世笑鄒君誤者哄矣君亦不之顧又五年癸丑某始以集英廷唱賜進士第一人第時鄒君則留次女未嫁俟某之成名而繼之婚某亦感君之知己也罔敢背德義遂繼好前笑者方止咸服君有知人見某方竊祿斗升亦願奉兩家翁宦遊四方樂也嗚呼豈料某不孝不天至自京僅一月先君子棄我不兩年婦翁又棄我乎大德不報哀哀靡忘不為之銘是沒其素君諱一龍字伯驤世為豫章豐城東湖人後徙鄒舍曾祖某祖某父某皆有德而隱君和易謙厚質直謹信少厪於學事親孝為兄友田疇室屋皆擇取下者而以華腴讓其弟在鄉里雖田夫野老待之一以禮與物無忤好善急義每損己濟人姻黨間嘗有困於訟者君質田拯援之後竟不償貸君亦不問也有橫逆必自反犯而不校然剛腸嫉惡有悖於理道者未嘗與之坐視之如仇雖請召弗往及儒士至則愛之如父母倒屣迎御挽留繼日燕觴娛樂去則餽之贐他人之門可羅雀而君門外日有長者車轍性不嗜酒惟喜醖旨以飲客嵗所收僅足厨傳家無贏財人皆笑君不事産業務儲峙君則亦鄙其奴事錢粟也喜教子擇名師館之日夕偕寢食鏗然夜誦率至明發君坐其間聽之不翅彈絲吹竹之樂未嘗有欠伸態好儒嗜書蓋天性如此女不肯泛嫁子亦不肯輕娶以是歿之日二子皆未婚幼女亦未有適始娶陳氏早卒再娶李氏竹林先生之孫武岡宰恕己之女今提點淮東刑獄使者宗正丞義山之從女兄也前君二十年卒某之婦及君長子則其出三娶周氏皆儒族君生於嘉泰甲子之七月辛巳歿以寶祐乙卯之十有一月甲午僅年五十有二初苦痔繼以喘知弗可療乃卻藥不御將屬纊語不及私惟戒子讀書囑某與師以改葬其父及教子而已餘問者皆弗答麾家人使去曰吾不死婦人手沐頮已正枕衾逝于正寢聞者皆悼嘆於戲如君者當求之古人也今人蓋不多見犯姍笑擇寒士為子壻一不止又繼之雖不獲饗有其報其事則可書矣天雖不假之夀歿而有稱即壽也况所積者遐其後必昌歟有子二成大可大女子子三妙善妙莊則壻某者也妙端在室嵗丙辰君歿且期年矣宅兆未協卜某誤恩得召雖以祿養弗及不忍仕辭亦念君未葬不敢負所托改外太舅葬既有逺日十月庚申乃克相二孤奉襄事葬君于歸德鄉之粟田附先墓且樂丘也碣之阡以詔後銘曰嗚呼鄒君室此區其生之年雅好儒教子以經志勤渠擇壻一事最可書若此壻者世豈無識之未遇則罕如天嗇其年人所吁積譱之慶必有餘山中峩峩墓之廬過賢者墓當下車梅莊夫人墓志銘梅莊夫人鄒氏諱妙莊字美文豐城縣興仁鄉鄒舍里人髙安雪坡姚某之婦也曾祖諱某祖諱某父春谷先生諱某字伯驤母李氏知武岡恕己之女雍管安撫修己之猶子提點淮東刑獄使者義山之從女兄也某先娶夫人姊諱妙善字美韶亦端惠淑順生紹定戊子十月辛丑朔日之申九嵗失母克綜家事育弟妹至成人年二十有一歸于某某時甚窶無肯妻以子者外舅獨願女之家人更諫不聽卒許嫁竹堂既歸能安貧事某父極孝解其裝質以贍族親客至不戒而殽酒具靜重寡言通孝經論語孟子偕某夜讀書卒不寐達明某雖貧竹堂善經紀其家使至不乏而逸某以學族閭姻戚甚宜之不幸近一年己酉之五月生女榮至六月辛丑朔才二十日而歿次年榮亦殤某感外家知己不敢忘義不忍他娶服既除求繼好外族譁然莫之從夫人蓋亦怒其為是請者也獨外舅愛某以心卒不以夫人他許間有請婚卒議不合越五年癸丑某對大廷天子親賜以第一感念不忍負外舅復于大人再請盟外氏方許諾夫人曰是不易交易妻者亦可之將以是冬娶會十有一月先君棄諸孤不果丙辰二月乃克親迎夫人賢猶竹堂而又明敏英悟動率禮法自以不逮養舅姑四仲月恪恭祀事事尊者甚禮撫卑者甚恩先室無子歿後妾黃生子元夫告廟立而嫡之夫人歸愛元夫真若姊之子與己之子縫組裘履不少懈自訓之書謂外舅壻儒政為教子地延名師某家誨其二弟俾元夫就學焉室不置私庖有杯酒必與妯娌同飲而使某外飲兄弟賔客蓋未嘗夫婦自親瓶罍也義理相扶有過必救某間怒臧獲必警曰懲忿窒欲稍起私念必警曰克己復禮朝夕多賴其益好善喜義輕財周急初歸時某從妹及庶弟皆未婚夫人曰子且仕矣不可有未了婚嫁汲汲擇姻聞梧州趙司理孤女賢聘為叔姒而以從妹歸進士龔三德是年五月某得越幕七月誤恩蒙召辭弗俞九月除某祕書省正字夫人曰母急進姑了吾事必婚嫁豫弟妹葬遷其父祖十有一月末乃行婚喪凡四而兩三月為之治辦整如略不見難色送迎資聘大抵皆其衣珥無所惜也既偕某入京至中途三學上書言事士皆以罪逐纍纍滿道參相久軒先生且去國某駭所聞見憂得疾不欲往然恐傷夫人從仕意進退維谷未有攸處夫人曰人之出處如魚飲水冷暖自知尚何疑乎臣受君恩有過則諫諫而不聽則去母以妾故茍以直言得罪願同謫嶺海死不悔妾願為賢人妻不願徒為貴人妻也某甚壯其言時方有輕去重竄之戒某恐其時不得言越職言且得罪言而去罪必重夫人娠月已深某不忍以逺竄纍乃援老泉蘇公例辭召上封事且與丞相以書買舟自信江徑歸夫人喜即日屏金珠首飾遣人市煆石簪插之某問其故笑答曰荆叉布裙入山之服當爾某益欽嘆其勇丁巳正月歸至家戒某杜門謝客一意讀書初出以家事托某從兄嫂歸日一仍其舊率弟姒以聽雖羮藜飯糗一室如春閨門方肅肅有度三月而夫人死矣先是某長兄死無子族昭穆無宜當者尚未有以嗣夫人謂幸有娠女也自育之男也以為伯後元夫即吾之子矣嗚呼斯言也可以感天地及吾祖宗也乃竟以此死三月望之前一日臨蓐果生子但已死腹越七日丙午夫人遂亡病且亟猶命工縫以衣元夫某至今命元夫無敢衣之笥藏以識母德死之日猶戒某勿輕出再三誦猶吾大夫崔子也一句不能曉其意問之不答嗚呼其有所為也夫夫人為李氏甥李氏學自文公先生來且熟聞彭夫人相後林先生家法度務則而行之日讀論語孟子數篇間喜觀唐絶句詩尤愛誦文公先生武夷山十詠宛轉髙下其聲以歌之而不喜世所謂樂府姊妹皆能詩然皆不肯作曰非女子事也竹堂存時見某教其幼弟屬五言對以兩岸緑楊風命之竹堂以八磚紅藥日對意以屬某也某大駭其能梅莊與某過信之月巖愛其竒領姬御翩翩登之某在後望之如仙直至巖所命筆識嵗月題一絶云半壁行天柱倚空人間有此廣寒宫從今真似天邊月曾得嫦娥到此中自擇風雨不及處題之不因此題某亦莫知其能詩也其深靜皆如此厥後某索其倡賡輒不可性喜山水既西舟曰雖棄官不可棄山水登溪山堂飲而去某復以詩請曰此人迹所至之地安可留婦人姓名於是間卒不許噫夫人之志於此亦可觀也舟過番陽湖聞自是可往廬山意欣然欲行某不可約以秋而夫人不復秋矣哀哉夫人以庚寅六月辛酉朔日之已生與竹堂夫人諱同日在某家是日元夫為夀蹙額弗許常自謂疑與姊一人而二其生故身死同日與竹堂貌本異歸日舉動言笑家人皆以為甚類竹堂且嫁某皆一年又皆以蓐至大故是不可曉也嗚呼外舅以夫人姊妹壻某某未能以毫髮報但以謀嗣續故纍其二女皆早歿彼蒼者天何辜如斯福善夀仁理復安在外舅擇壻於貧且賤使其女得同其爵位富貴而居有之亦足少為好儒者之勸今其報乃如此為善者其懼矣雖然人有生而如死亦有死而如生某生天地間雖止兩年有婦二婦雖皆一年而歿然而一年之中百年義在某誓不負外舅知且有子元夫娶決不再矣俾元夫盡子職以報劬勞某也益自植立復植立其二弟使鄒之門户終顯有光外舅與二婦雖死不死過於生時是即善之終福仁之終夀也亦可以厲薄俗矣使某比之匪人茍不義富貴為世所罵笑以此易彼不惟外舅不欲二婦亦不欲也願賢而不願貴梅莊此語其某也終身之藥石乎銘吾之心且以銘墓墓與竹堂夫人同域葬以戊午三月壬申銘曰夫婦天理無古無今人孰不死不死者心姊賢早亡妹繼亦逝天欲觀豫終始斯義不尚夫貴願貴而賢斯言有味青史可傳揭銘于阡以詔萬古永言保之里二賢女葛母墓志銘嗚呼甚矣葛母之為賢也飭閨門勤絲枲睦族黨禮姻戚慈臧獲謹婦德相夫起家賢己未盡見其為賢也獨一事為難能生為人所稱歿不可以沒其實夫孝子亦多矣而孝於非生己之母者始足見其為孝慈母亦多矣而慈于非己生之子者始足見其為慈葛母賢己母某氏嫁于進士葛某有二子豐也以姊之子入繼謙也側室生也而母待二子如一慈愛之皆真若己出二子事母亦雍雍盡孝無間言母歿某往弔之二子執喪毁瘠泣出血盡哀觀其子之孝信其母之慈也葛母賢己二子請銘是宜銘母以某年某月生以某年某月歿十有一月乙酉葬于某里曾祖某祖某父某儒者流也二子皆有子今孫六人銘曰葛賢母葬于此姚子銘之噫世之為母者法之鄧仲翔墓志銘昔石莊范先生嘗為某言鄧君仲翔之賢也心已願識之嵗嘉熙丁酉秋鄉試揭姓名于郡城樓鄉貢額僅八人鄧氏乃都其二一則仲翔也當時一門盛事歆艷井里願識之意愈深矣既乃獲詣其家俊秀之林而拜焉信矣石莊先生之不誣也仲翔為人意氣軒然謙恭下士樂施好客博學強記歷代諸史爛然蟠其胸襟釃酒對客縱飲劇談古今治亂成敗之原君子小人正邪之辨舉數十行不遺一字千數百年如在目前音節清亮首末該貫聽者忘倦性尤友愛與其弟某塤倡箎和未嘗有違言忤色闔門千指雍如晏如雖家有餘資若不自知其富其視世之粟奴錢虜吝驕鄙俗之氣浮於顔面者相去不啻穹壤千萬接物和處事得與人信下至田夫野老嬰兒孺女皆得其歡心蓋嘗評其為人雅好賔客似陳孟公議論精博似習鑿齒兄弟友愛似薑伯淮處鄉公正似王彥方合古數人為一人今人未易多得也仲翔自丁酉登薦書明年試禮部不利寶祐丙辰且該恩再試方築室讀書益自磨勵而先二嵗仲翔歿矣齎志飲恨聞者為之惜嗚呼鄉舉可能也鄉評不可能也仲翔雖不及取髙科入仕以行其欲為之志然而生為人所稱歿為人所惜是不歿矣仲翔諱某號南齋其先建昌人九世祖某始家髙安曾祖某祖某父某皆隱不仕仲翔生於丙辰之三月歿以甲寅之十月僅年五十有九先娶陳氏生子士達繼趙繼徐皆前卒又繼袁皆宦族孫男二孫女三丙辰十有一月壬寅卜葬于吳塘東山之隂使來請銘為之銘曰嗚呼噫嘻仲翔已矣辨博之論不可聞已一封之土藏其胸中千數百年之史若人而不仕若人而遽死既不在其身尚福其子孫孫子雪坡集卷五十
