body:
  text: 雪坡集卷二十八宋姚勉撰書上丞相謝瀆山書癸丑某不避譴何輒控由衷之懇干溷鈞聽某循閲舊比例納公劄干乞陶鑄某今所請則異於斯某生長瑞陽瑞之貢額素狹終場近三千人而與貢之數僅八六之經而缺其二詞賦二千餘人而取其四英才多困職此之由每嵗大比四散溢出而試于諸路于監于漕得雋者常數十人則瑞亦不可謂無才之郡也端平初詔天下增貢額江西諸郡袁首增其二洪繼增其三瑞去天逺獨不能請瑞距臨江止九十里終場人數相埒而臨江貢士三十二人多瑞三倍此所以不能無不均之歎也某來奉大對時父某謂某曰吾兒若能至前名當折資受官乞增本州文解父教如此兹者誤恩首第某何敢背父之訓竊為已榮某今合得承事郎出身願從第二人恩例止受文林郎而以承事至儒林四資易增本州四名文解庶幾六經可全而詞賦亦不至重困某之所乞固前此所無之例而亦後此不可援之例大丞相奏而行之是即所謂例也某又恭念鄉邦舊號近上嫌名上即位初瑞産神芝以昭天命於是易賜今名以瑞此非他郡比也上紹寶圖三十年必世之仁洽於天下瑞倘可因是而拜上之仁乎與其使某以瑞之一士而獨拜異恩不若使瑞以一邦之士而皆拜異恩獨拜者其恩小皆拜者其恩大某非以要譽於鄉黨朋友也念鄉邦人士之久厄且父之教然也不能遵父之教是不孝於親矣不能推上之恩是不忠於君矣惟大丞相矜念而惠從之某退屏山林甘老選調九隕無悔廣明聖之德惠遐逺之士抑奔競之風一舉而三美具惟大丞相圖之干犯鈞嚴某下情無任戰栗俟命之至上大參徐意一書某不避譴何僭有由衷之懇干溷鈞聽仰祈矜察某生長瑞陽維邑之髙安實先正太師國公舊治之境台星聚照今人仰望其餘光而歌詠之甘棠蔽芾之隂大參必惠而念之也某敢僭倘乞以官回授其親朝廷固有例可從也然某之父欲為鄉里計而不為已計縱以官乞回授必非所樂也某近得家書又䝉父訓曰增解事不可不力請莫問做官但須行好事則父之意可見也大凡孝在養志以官易貢父意如此是亦以官回授其親之例矣朝廷以孝治天下能無念之乎一可以惠逺方窮厄之才二可以遂人子養志之請幸圗利之倘或不然某將無辭以復於大人惟有不受闕而去耳某又竊念鄉邦舊號近上嫌名上即位初瑞産神芝以昭文命於是易賜今名以瑞上紹寶圖今三十載仁洽天下瑞倘可因是而拜上之仁乎瑞蕞爾邦而聖君賢相發祥儲祉之地皆於此乎寓信非他邦比也惟大參相公矜察先正太師甘棠之舊因其親以及人之親而惠顧之干犯威嚴無任戰栗俟命之至與蔡中嶽書丙辰八月某中浣日伏願七月二十及是月初四日書及二十五日省遞至又得初五日書五六日間三榛寶翰恍然如對玉峙喜慰當如之何某伏䝉誤恩召赴闕下推原所自實由尊公大參吹送之力尊年丈揄揚之賜感佩盛心未易云喻其何足以當此又何足以報此雖然某尚竊有請焉非執事其誰與歸某薄命多艱僅竊末第歸不一月即罹大禍謀仕者所以為親計䘵不及養疾首痛心其視尊年丈身掇髙科青衫綵服備天下之三樂者何可企及今兹某雖不敢過先王之制强已從吉然一念及仕即覺泫然有痛於心是以從吉雖在二月朔而略不暇干廟堂求一小小差遣者此故之以也矩相以其不通書歸投豫之兩年越幕之闕雖欲以相困在某適得所願故省劄之至以其闕逺欣然受之兹辱賜召之恩拜尊公大參力薦上前之賜以君子得輿之日善類交集此正邦有道則仕之時走趨闕庭齒下士之列固所深願第某區區愚慮有未可者某祿未逮親未忍問仕其有請焉某之鄉邦解額素狹終場共三千人而貢之僅數八六經而缺其二詩賦二千餘人而取其四以是人才多困瑞距臨江止九十里臨江貢士三十二人多瑞三倍端平初天下增貢士額江西諸郡袁首增其二洪繼增其三瑞獨不能請每嵗大比惟有四散溢出而試於諸路耳瑞之士所以為甚可憫也某來奏對時父某謂某茍在前名當折資受官而以一官為鄉邦易增一解某今叨忝首第何敢背父之教徒求已榮某今得承事郎出身願從第二人恩例止受文林郎而以承事郎至儒林四資易增本州四名文解庶幾六經可全而詞賦亦不至重困謹已納劄廟堂䝉大丞相鈞判聚呈候奏用敢再瀆鈞嚴欲乞合處㑹言之際推天地造化之仁而成就之則鄉邦拜賜某不勝幸甚或者謂某曰恐如此是乃後人不可援之例朝廷必難其從是大不然使第一人而必增解是壞例也今某欲以減官而增之他日為第一人者承事郎之恩例自若也而何壞例之有乎又前此固有不願受官而乞回授父祖者朝廷每從其請某不可者一未服外勞驟然起家恐物論未允雖有福王故事某何敢企先正之萬一此未可者二某家貧無田可耕又念族序皆出同祖不忍異㸑藜羮蔬粥相與同之食指凡四百皆仰給於某一日舍而出仕復無以為贍可勝嗷嗷某有庶弟未婚有伯父位從妹未嫁留之以居不可挈之而行不可必及時為畢婚嫁而又非窶貧者旦夕之所可為其未可者三某有婦翁識某於賤貧妻之以子意殊可感去年不幸即世臨終付某以身後之事方以今冬為之舉襄若汲汲宦馳委而弗顧即是不可以託六尺之孤以此事君又將安用某自惟竊祿希榮此事甚眇而天理人情之有不容不然者所繫却大且當為其所當為而身之仕否不足計是以召命未敢祗拜且乞就鎮東僉幕明年十二月之闕真情所發非敢為是矯也主上親擢之恩豈容不報君臣之義如之何其廢之既已為臣父母不得而子故願盡吾之所以事親也而後出事吾君耳過庭之際為道以忱得如所請幸甚再答蔡中嶽書某伏被賜書且以尊道集及金陵問目為寄齊心伏讀書喜慰殆不可量有以知見道之明而衛道之嚴也昨有自閩來者亦頗能言尊年丈辨折三心之說道其略而其詳未之覩某欲見此不啻饑渴無從得之繼有自雙峰來得其所刋本講意雖略加改正而三心之說尚存某深謂不然即以告之朋友夫文公所謂察乎二者之間非謂察乎二心之間也使果謂察乎二心之間固不無疑而文公素無此論尚何疑哉夫不能察則人心也察則道心矣豈復他有心以察道心乎操則存舍則亡舍則人心操則道心今之操者即操前之舍者也學問之道求放心放則人心求則道心今之求者即求前之放者也人心生於氣形之私道心原於性命之正當以先後論而不當以對待論道心流則人心人心復則道心吾見其一心耳尚何以三心疑哉伏讀與葉平齊之書蓋皆某之所欲言者一辭不悖於理欽服降歎方今學者之失在於欲自名家突出先儒之上不知文公精思熟講立言以詔後之人其用功蓋非一日安得復有訛舛後學由此求之不啻足矣何以立異論為趙庸齊博學雄文忠忱清節不可謂非今之賢君子其失在得於愛徐太過耳蓋亦識之未破君子可欺以其方也得一明者覺之安知不幡然而改其延屈雙峰俾正講席蓋覺之一機在是雙峯輕於放過此蓋恐拂其情不復有不直則道不見之慮耳雖然見道則不可不明衛道則不可不嚴也大道所關豈可以異端惑公論所在豈可以私情撓不然文公何必切切與陸氏辨哉大兄驅同室之干戈為聖門而立幟斯道幸甚願終始主張之某雖不敏請櫜鞬以從答蕭大山國史某於先生弟子行也弟子事先生當不逺千里而往拜去先生二百里不能往拜先生乃先賜之書先生之求於後進甚於後進之求先生如某不敏何求乎友而不能施已不可况弟子行乎某之罪大矣先生又遜筆墨而命之文奚敢哉先生古之人也古之文也文章為當今第一人言必可以行世傳後舍先生其誰屬而先生輕以許之大懼不敢當謹以辭諸執事惟先生自當是筆昭勒雄製某亦受教焉不敢僭也先生倘不鄙夷之許其卒為弟子則某憂患稍間尚當背負荆篲以進謝於庭下再拜入文章門户先覺覺後或有所知則作丘明之傳以依夫子之經他日或可能也今則決不敢惟先生亮之雪坡集卷二十八
