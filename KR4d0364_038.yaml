body:
  text: 雪坡集卷三十八宋姚勉撰序混一內外疆域圖序地之有圖尚矣周司徒辨封域知廣輪姑勿論酇高密二侯開東西兩都漢亦以秦府所收圖城樓所披之圖為圖非直為觀美也伏波聚米而畫山川文饒建樓而籌險要意類是僕嘗愛坡翁作指掌圖自分野畫州至我朝元豐九域靡不載古今疆域之廣狹南北形勢之分合皆具一覽四海一日萬古蓋天下竒書也雖然此圖建炎以前可也中更丙午丁未之厄龍渡江而南之我藝祖皇帝與趙韓王雪爐之所經營如髙祖酇侯之規者己非復前日舊而我髙宗皇帝與魏沂諸公尅意恢復如光武髙密之為者有指疆土亦政有望於後之人也士有志於天下國家豈容諉曰度外事僕嘗過程君澥於西山酒間出書一編視其目則曰混一內外疆域圖問其自則曰得之蜀愛而刋之其法如坡翁指掌圖彚列區析江而淮襄而蜀河之南北山之東西若關四州若陜五路以至不毛之地窮髮之鄉隱抉顯披無所匿伏歷而閲之某險可據某罅可苴敵情不可以遁也某郡我境某縣我疆故物不可以委也僕為是可以續坡翁圖為二書任人家國者當人置一編几案程君與僕同中癸丑南宫試今兹行且入對上方考圖數貢冀興復於君宜進之一覽慨發睿衷近之則聚伏波之米吾蜀可收奚扼吭之憂籌文饒之樓吾廣可定奚幹腹之病大之則酇侯以一圖而開赤帝子之火德髙密以一圖而啓白水真人之中興皆分內事也是圖豈直為觀美哉圖之首編曰禹迹六合掌運必能運天下於掌復禹之迹而後可漢唐四子吾猶小之寶祐四年嵗在丙辰二月初吉同年生姚某序本朝長編節要綱目序寶祐丙辰十有二月某祇召入册府至上饒因聞時事感疾援老泉先生例上封事且辭西歸舟經豫章度除夕丁巳正月五日尾府大夫士班祝天子萬夀而行將行有眉山楊君道傳宋君可傳來扺江干以詩餞讀之詩皆有驚人句固己起某之畏矣楊君袖出書二帙帙題曰本朝通鑑長編節要綱目曰此吾先子柳溪先生之所用力也舊嘗刻摹行于世矣鶴山魏先生為之序引中更兵火舊梓毁於燼無遺僅遺此二帙所幸先子手澤尚存道傳欲繼其志復刋之鶴山序巳逸集亦不載顧無以冠其篇首願得一言何如某觀之蓋竒書也不可以泯不傳獨鶴山先生既序於其前某於先生無能為役何敢僭序於後再拜謝不敢楊君請之力則告之曰記事者必題其要纂言者必鈎其𤣥此韓退之讀書法也今觀先公之書也雖李氏之舊然而辭翦其浮事舉其要類總其萃年繫其時挈提以綱而紀載以目經綜而緯列璧合而珠連使讀之者可以便覽觀可以備遺忘可以識倫類可以記嵗月可以旁通而曲暢可以本具而末舉其有益于學者大矣司馬通鑑一書有節本有舉要厯有袁氏本末有朱夫子綱目今此書之節要辭翦其浮即司馬通鑑之自節本也此書之標題事舉其要即司馬通鑑之舉要厯也類總其萃年繫其時袁氏之本末也挈提以綱紀載以目即朱夫子之綱目也一書而諸體備焉用心亦勤矣此東萊先生所謂躬為其難而遺學者以易也用心亦仁矣父有此書子不忍沒其傳欲復刋摹以行乎世用心亦孝矣楊君其力為之他日成願以一本寄我滄洲漁唱集序天下之至樂者莫漁翁若也卷綸而收溪肥倒囊而沽晚醉扁舟一葉傲兀於煙波之上望而見者知其樂也而漁者不自知焉風髙浪愁霜沍水氷戚戚焉憂魚之不可得亦安知所謂樂能樂其樂其有道而漁者乎寄興於漁志不在魚寓身於舟意不在釣水光山色吾姬姜也鷗鄉鷺國吾菟裘也風蓑雨笠雪篷烟棹帶笭箵而舞獨速無往而不妙天下之趣故漁唱為自然之至文寡和之妙音焉滄洲鄧繼宗其有道而漁者歟味其詩飄飄然如航渺洋如釣寂莫嘗以卷謁大山蕭先生先生謂宜以滄洲漁唱目之先生漁戶長也其可之矣詎可不用先生之意字其詩乎豫亦樂漁者他日來子之舟願聞子之唱乃續而為滄洲漁唱之歌曰滄洲之月清兮可以浮我舲滄洲之雪皭兮可以垂我釣魚不必得兮筌巳忘知漁父之樂兮濠梁之莊歌巳遂書以為滄洲漁唱序適齊續藁序適齊胡君景顔前五年嘗以其詩稿寄豫俾序之矣屏湖張君應南來又以續稿寄俾再序近詩也其多又如此適齊於是年七十矣計日而定課隨物而有吟積嵗而成編思之敏得之易故續之富也他人年至此志與氣凋才與年盡豈復有能吟其情詠其性者適齊夷時不以富貴聲利役其心視世所慕尚真與浮埃飛溘等暇於執籌固不屑暇於蠟屐亦不為一意篇章殆以詩得全其天者火愈宿明愈新齒愈老詩愈壯筆雲飛而思泉湧無怪也衛武公年九十而作抑抑威儀之詩血氣雖衰志氣方盛夫是以能若此使適齊年過武公躋於百年期頥之域稿五年一續每續求豫序序至五六未己也夫不以富貴聲利之慕向以役其心而以詩全其天近於仁者之靜矣靜則夀矣夀以昌其詩於未艾序以夀其詩于無窮余又奚遜雖然君子謂刪後無詩古詩蓋未有能續者也詩至於續風雅其愈妙乎余願適齊更續之草堂詩稿序謝康樂搜詩中忽夢惠連遂得池塘生春草之句大喜以為神助必有驚人語也池塘生春草此五字何竒而謂之神哉嗚呼是乃所以為詩也不鉤章不棘句不嘔已心不鯁人喉其斯之謂詩矣黃君任伯以草塘名其集必有得乎此以豫言為如何景定元年春姚某書朱子雲詩集序豐城朱子雲徑氣如虹蓋干將莫邪二劍合而為一少年游江湖從戎淮蜀真有踢翻鸚鵡捶碎黃鶴氣象發而為詩自立一家句要皆湖海豪氣鑄成間有不合詩家尺度墨客畦徑不足為子雲疵也夫子雲豈肯作閨婦之檢押凍儒之口吻哉淵龍之吟飛霆走電不能為窮蛩之泣鐵笛之噴吼風涌濤不為卷葉吹笳之酸也顧欲以推敲辛苦鍛鍊一句一字者責之誤矣讀子雲之詩者當于子雲之氣觀之以子雲若而人直當使之腰霹靂弓背夜光劍涉焉耆躋居延揚武乎樂浪取上將軍封侯印佩之而乃卷藏來歸抱屈山林鬢䰄䰄欲一莖雪則子雲之發而為詩者所以吐此不平之氣也是氣也豈容遏之使終不得騁哉天驕子跳踉俗輩謂吟詩不能服敵不知吟詩固不可以卻敵此氣則直可以吞敵氣可以吞敵是詩亦可以卻敵也子雲當釋去手中漁竿再抽矢菆于房出清塞上塵擊牛釃酒犒士之餘橫槊賦詩賦萬馬不嘶聼號令諸藩無事樂耕耘之句歸報天子又分競病韻詩之是則子雲有用之作也非不平之鳴也真湖海之豪氣也子雲亦有意乎投班超之筆請自今日始送黃强立序文之不古久矣士之號能古文者艱其辭怪其字蹇其句讀耳以是為古如之何其古也文之所以妙者意也意不足而文有餘不若文有盡而意無窮也夫意無窮而後文有味意非文之所以妙乎雖然意必至于理理至焉意次焉唐韓退之理勝于辭李元賓辭勝於理或謂使天假元賓年必與退之埓是不然元賓年愈髙辭當愈勝决不勝退之之理也抑退之之理亦未為至也以博愛言仁以三品言性以外形骸以理自勝為識道理理云乎哉本朝自濓溪周先生以來至紫陽朱先生理學大明學者蓋易為力于易為力之中而不知用其力則可惜矣某于天下好古之士論文之所以為文鮮有合獨清江黃君强立能古文有聲聞余說是之未知余說之果是與非也强立其教之相與共學其是詞賦義約序壬子代劉簿作國初殿廷惟用賦狀元有至宰相者賦功用如此也吾瑞先達竹溪雷公亦以賦魁南宫位樞府由是以聲律鳴者愈衆搖鋒詞場賦為盛貢於鄉第于太常相繼也預計偕者須續食己酉輒倡義為約以奉之是年賦四人皆在約明年豫僥幸偕約中人擢第掌籍而試别頭者亦第賦四而第者三焉亦可為盛矣舊約曰得雋者陸續之兹弗敢渝謹捐金佐約相與充此義而大之石橋橫波䜟合連河掄魁之應必在是科當有以賦取狀元至宰相者豈止魁南宫位樞府哉榜中得人一時最盛敢以囑之同志願皆曰如約乙卯詞賦義約序魁躔麗天次舍不即遷秀靈發地氣脈必久萃此數也亦理也福之蕭鄭蘇之黃衛近時旴之陳張嚴之黃方所以相踵而魁天下歟吾鄉每詔嵗詞賦人必自為義約作勝氣壬子友人郴主簿劉君董約某代為之序首謂國初惟以賦取狀元第以張賦之軍非敢自許也癸丑誤忝親擢幸不辱斯序有如神發此語然則相踵而魁天下斯語當復驗矣某不敢數特為鄉曲作先驅耳吕聖功既以訓練將士賦魁天下胡周父嘗謂之曰待我明年作第二人却輸君一籌明年亦以不陳而成功賦魁天下吾鄉英傑如林豈無自許如周父者乎雖然為周父之科名可也里後學姚某書新昌義約序新昌瑞望邑也郡未以瑞芝易號時新昌邑有芝瑞於亭文于記故邑為三之最非近也古矣梅子真漢人所居今尉山是陶淵明晉人所居今故里是皆人物之最也而尤最於我朝士出就選必為天下最竹溪雷文簡公以南省魁天下某不肖癸丑亦濫恩焉士今愈最矣嵗戊午相率以為約取五百名中第一之義人五百金取玉殿傳金榜君恩賜狀頭詩為十籍分斂而専聚蚤計而預儲如京師者可無桂玉慮是約義矣願申有約焉吾里英才如林冠賢書首臚唱必跬相接竹溪之地步尤可拾級上某不足道也願相與如古人其能義不阿權門上書詆王氏義必扶正統願立孔子後如吾里子真者乎其能義不事小人即賦歸去來義不負晉朝惟書甲子號如吾里淵明者乎是所謂義也如是而後足為天下最願皆曰不背約髙安義約序試有約作勝氣也請以戰喻庾有糧則將勇軍有賞則士往矧提文陳之五兵鏖詞場之大敵者乎此義約之所以立也髙安舊有南宫義約今年鄧君仲翊主之且於約外捐金捷者人致其助意嘉矣是周瑜之兵魯肅又濟之也士氣其百倍乎拔幟而先登吾知必皆吾髙安之士矣瑞州經賦義約序詞賦明經今世皆進士士詣春官合為約義也分而二之有計多寡牟利心非義矣今復合名約曰又新龍門客又新之義也亦分者又合之義也雷之賦閔之經必又偕見於今矣某餘勇不足賈也景定辛酉詔嵗里生前敕賜進士第姚某書古洪三洲義約序三洲連出狀元豫章古䜟也嵗大比豫章之屬邑曰南昌曰新建曰豐城三邑合約萃費以給東上名三洲義約意亦𢎞矣豫章之士每詔嵗必於江之三洲視連否蓋豫章三邑皆濱於江江皆有洲三邑合此之謂三洲連矣義氣所發文光燭天狀元之應不在兹乎抑三邑英俊之林也合而為義上可尊主下可庇民無適而不可狀元及第未足道也願相與充此義而廣之助約序神龍之襄首㑹奮翼乎九霄必得水而後可噓而成雲噀而成雨龍固自能也雖然能輦萬斛之清波而助之豈不尤速神龍之變化哉於是乎有助約陳氏同宗義約序舉子裒入京之助而為約義也同宗相率而為約尢義也雖然姓之竒族之希助之微亦不可約姓著族巨約斯盛矣吾瑞多名門然著姓巨族陳氏為盛其始由九江之義門派而衍之派盛故儒盛儒盛故覔官應舉者盛每貢士科不乏陳姓俗有開榜必見陳之諺父子世其科兄弟家其貢趾相接也豫嘗取唐宋登科記觀之陳每盛於他姓端拱之堯叟咸平之堯咨紹興之同父繼自今復見之瑞矣雖然陳之所以盛有由也陳後舜也盛德必百世祀族之盛德之盛也斯約義矣願相與廣之在漢如仲舉如太丘如二方在本朝如後山如了翁如復齊相約而為是盛益盛矣姚亦舜後也敢援何毛朝同盟為族姓之義以附盟于宗可乎薄言助之而旁為之鼓以厲鄒氏同宗義約序瑞陽年來為義者盛嵗大比自三邑共為約各邑自為約外又有所謂同氣義約者昉于陳繼于蔡今復有鄒非相為習也為義者不厭夫多也鄒為瑞儒應舉者衆有以春秋連為貢首者有以詩學取薦名者又有以詞賦擢第者氣類之盛皆彬彬乎王國之英才卓卓乎棟梁之碩彥也其為約也則宜余又聞之六十年甲子一周周則氣數未必如舊其慶元丙辰魁天下者昭武大參鄒公也今兹又丙辰矣甲子周而氣數復矣其必有鄒之姓魁天下者乎鄒陽之言曰交龍襄首奮翼則浮雲出流霧雨咸集辰龍也大參之襄龍首蓋以龍之嵗與是約者再襄是龍敢以鄒陽之說告鄒氏之同約惠應廟塑魁星像序大乾主功名之神也行廟在新昌士奉之應如響欲相率像魁星以祀維吾新昌魁脈相續竹溪雷公以南省魁天下某不肖亦誤膺親擢焉譬之武事某特先驅破陳者爾建大將鼓旗者方來未巳也像魁星而祠之實甚宜抑梅亭李公贊魁星有曰魁一仲舒為漢典刑魁一僧孺稔唐禍形然則吾新昌繼自今魁天下者為仲舒而不為僧孺可也神必福之圓沙桂籍序淮尾沙圓宰相狀元建古䜟也癸丑七月藍君義行訪豫於期集所曰建之沙圓矣䜟必應義行有季父每賔興歲必為建之士輯卷以試子為我序之庶徼福焉余曰前輩有言科第必狀元仕宦必宰相學術必聖人言皆當以第一自處也建自紫陽先生暨二西山皆以聖人之學術為天下第一建之士膏漬馥熏久矣以第一之學術出而擢第一之科躋第一之仕餘事也圓沙云乎哉後之人當驗諸此籍贈富寧槐簡序京師之造槐笏者多矣獨朝天門富寧者為第一材竒而用周工備而價稱也故欲者趍焉首之圭鋭象生物之仁足之砥平象方外之義色貴乎潤象潔文貴乎直象剛秉是者其思有以稱是歟為魏鄭公諫笏為段太尉擊賊笏斯稱如手板拄頰但看西山焉攸用倒持流汗見逆渠而戰懾尤不足取也賣墨道人序神仙吕翁以賣墨遊人間一日入市小校人問墨價幾何翁曰十千衆笑弗顧翁磨少墨於硯而去有頃隙日射之洞硯表裏皆金色墨神仙戲術也一齊道人逰江湖遇翁輩得墨訣挾之以資逰戲古今謂良墨如良金好事者常爭寶之毋笑其索價之髙使徒留金色於硯而去是墨有逢矣贈悟上人序佛者悟上人求序於余請言某名之義儒佛異學余也安能序子之意雖然請誦豫所聞下學而上達儒之事也有上達而無下學佛之事也儒者下學而上達故灑掃應對可至於精義入神格物致知可推而治國平天下佛者有上達而無下學故執空寂以枯其心縛虛無以滅其性名為真如實際而實無真實者存名為應用周遍而實則不適於用此無他儒者則有形而上者之道而復有形而下者之器也佛者則舍形而下者之器而徒欲求形而上者之道也舍器而言道是道為無用之物矣學道焉用是故由儒之言則可以貫體用融顯微即無極太極之妙以立人極人極立而天地位萬物育佛也老也亦囿於吾道之中而獲安由佛老之言則必至於斁天經絶人紀天經斁人紀絶則天下必亂父子必相夷禽獸必食人佛也老也亦不能自安矣然則由吾之學乎由子之學乎於此可以悟矣吾之學通天下可行歷萬世無弊子之學則山林獨行者可為耳不可使天下皆行也使天下皆行必無君臣必無父子必無夫婦必無長幼朋友無朋友則人之義散無長幼則人之序乖無父子則人之親離無君臣則人之分瀆無夫婦則人之類滅雖欲寂滅為樂得乎故曰不可使天下皆行也天下不可皆行萬世顧可通行哉為儒者當悟此决不可捨儒之學而言佛為佛者當悟此决不可不逃佛之學而歸儒苟不能逃佛之學而歸儒亦當安於山林苦節獨行以隂受儒者之賜髙同父卷子紙序國重士士重文文重卷士入棘闈試有司輒焚香拜賢能書登王亦拜受之不重士乎選士必選文文之佳如青銅錢萬選亦萬中不重文乎玉之籍也以藻則玉重錦之包也以茅則錦辱上重我乃如此我乃不自重曰吾姑以藻吾文耳豈在卷何自輕其文如是哉故重其文者尤當重卷此髙氏同父所以得自重而又欲與朋友皆知所重也歲次戊午求士詔復自天而至士皆治卷求試同父欲率朋友略出費十一二而以巳資先市佳楮然後責償欲使士皆玉錦其文貴以藻而不賤以茅為有司所愛重取舉第如拾芥成巳成物之意厚朋友知自重其皆翕然和之乎己未三千禮樂字入對卷徹宸覽相君以金箆指讀上前皆此其基也同父髙氏過其名也蓋佳兆云雪坡集卷三十八
