body:
  text: 雪坡集巻五宋姚勉撰表賜第謝表癸丑伏以相上帝而作之君實兼師敎有天下而選於衆在得仁賢方獲望於清光遽寵承於異數叨榮過分報徳無涯中謝恭以堯舜親賢惟求實用漢唐取士始尚虛文利禄競趨風俗愈薄欲聿新乎聖化必首正於人心臣等識不通今志惟好古毋曲學以阿世蓋出真忱以直言而取人幸逢盛際求才棫樸垂問芻蕘咸造大廷對揚休命修道謂敎願立中庸之經明徳新民當知大學之本庶各安於趨向皆可副於選掄冒陳狂瞽之言簡在髙明之聽誤膺親擢未協僉謀茲葢恭遇皇帝陛下仁洽道豐行髙恩厚惟精惟一允執厥中無黨無偏皇建其極爰究心於選舉詳為法以搜羅遂使謬庸亦䝉甄拔臣等誓操素節仰答洪私懷仁義以事其君敢昧平生之志有謀猷則告於内願輸他日之忠賜聞喜宴謝表伏以恩叨賜第仰承晉日之清光禮寓肆筵載舉需雲之盛宴輝生觴豆喜動簪裳中謝竊以極榮者九陛之龍光殊遇者一時之燕衎野食苹而取義葢施諸羣臣嘉賔露在草以興歌獨言夫君子令徳敢謂儒科之始進亦蒙帝渥之下霑臣等文乏咀華學勤味道天涵地育久漸豐芑之仁霧滃雲蒸廼與鎬京之飲饋陳八簋酒拜三行歌且舞以有儀燕以敖而是則凡而飽德均此陶和茲葢恭遇皇帝陛下酌道之源求士如渴商惟醇之善政官不及私周既醉之太平人皆有行推至忱而與共俾嘉惠之恭承秩若無譁翕然胥樂臣等志存氷檗願匪膏粱飲之得盡其心肯狥醊醨之俗食焉不怠其事誓逃餐素之譏賜御製詩謝表伏以君賜之食式均鼎養之恩帝勸以歌庸示賁成之化儒科增重士類知榮中謝恭惟皇帝陛下聖筆成書王言作命堯章煥乎其有徳運乃文周道粲然復興功列于雅天頒一札風厲四方臣等欽睹昭回祇承訓廸作誦雖慚於吉甫美在任賢載賡竊效於臯陶謹毋隳事賜謝花表伏以恩霑露草萃生意於羣芳香動天葩散陽春於萬宇寵光所被枯卉皆萌中謝恭惟皇帝陛下中庸素根道徳為麗廣開衆正爰攬其英博采直言以華吾國特頒異貺昭示至榮臣等志慕埀馨學思就實孤忠報主敢求桃李之門潔操厲躬願在蕙蘭之畹賜氷謝表伏以湛露霑恩式綏宴衎頒氷示寵祇服光榮當暑之隆不寒而栗中謝恭惟皇帝陛下淵衷水止静鑒天昭臨政萬機凛如履薄謹㣲一念深戒坤凝載分玉井之珍增耀瓊林之集臣等敢不忠清秉節精白承休晛見陰消仰贊去邪之決天寒地浄願為固圉之圖東宫受冊賀皇帝表庚申伏以天付有家式重承祧之寄王命作冊丕昭唘後之謀寶厯無疆瑤圖有慶中賀恭惟皇帝陛下堯中舜一文顯武承身度凖繩示父子君臣長幼之道天常筆舌為典謨訓誥誓命之文將肇舉於明禋爰載崇於冡嗣上公授命百執在廷衮冕黻珽之度昭柷敔笙鏞之樂備於粲國家之盛典永綿宗社之丕基臣等忝列宫僚幸逢邦慶禆日就月將之徳自媿罔功作星輝海潤之歌願言歸美謝皇帝賜馬表許乘騎入東宫講讀伏以揣分僥覦濫厠露門之講蒙恩赫奕遽頒天廐之良得所未當感而益懼中謝竊以過闕則下庸見尊君之心俟駕而行亦豈為臣之禮獨以説經於儲舘遂令給傳於禁途策茲騏驥之材媿矣駑駘之質茲蓋恭遇皇帝陛下飛龍上治遹駿有聲馳騖乎仁義之途㳺觀於道徳之域尊禮經士唘廸後人盡忠嘉之羣心將之帛篚知勤勞於臣下酌以金罍憫茲出入之㣲勤假以超驤之上駟臣敢不竭其忠力範我馳驅躡彼遐蹤必陋漢唐之陳蹟導夫先路願趨堯舜之通衢沂邸賀皇帝肅清江上表庚申兼宫教時作中國猶太陽犯順豈容於庶類仁兵若時雨奏功大慰於羣黎王心載寜天下底定中賀恭惟皇帝陛下廟謨雄斷神武聖文昌厯開天等藝祖造邦之日輿圖拓地紹髙宗復古之勲屬者北人唘茲邊隙生靈塗炭中外淵氷罪已之詔一頒悔旤之天隨格及相同徳與神為謀王命于宣虎告成而式辟皇耆其武度董師而集功智勇協心將士用命三軍夾擊萬旅俱殱肯苻堅衂于淮淝佛狸殞于𤓰步皆天險之未越亦事機之幸乘未有安内夏於幾危挫北軍於已渡茂建丕烈前無古人江海一清盡復四民之業乾坤再造永垂萬世之基宜廟宜郊可歌可頌臣某義均休戚慶倍等倫舜舞兩階已喜班師而振旅武有七徳尚期保大以定功沂邸賀皇帝東宫正位表千歳皆安立嗣必子四方繼照麗正重明宗社尊隆臣民悦懌中賀恭惟皇帝陛下傳心堯舜嫓徳殷周寜王遺大寶龜昭嗣無疆之服孫謀以翼子燕式觀遹駿之聲契惟天惟祖之初心舉有國有家之曠典丕釐景命敷遺後人臣忝列宗支喜培國本安磐石夀旗翼祝天子之萬年隆岱嶽深河源慶皇基之億載沂邸賀皇帝太子入宫表伏審茂建青闈宻依紫禁端聖人之南面昭此大明位元子於東宫于以自副室家胥慶廟社有歸中賀恭惟皇帝陛下恭已操功宅尊麗正土階三尺昭令徳以示子孫世室九筵有成命而祀天地聿嚴主鬯爰重立儲載肅翬飛以安鶴駕爰居爰處來燕來寜臣屬在宗藩喜深厦賀虎闈尚齒知内先九族之親龍樓問安願上祝萬年之夀皇太子侍立參決謝皇帝表庚申兼太子舍人時作問安清禁方嚴子職之恪共立侍紫宸乃獲政機之觀決得於目擊授以心傳揣分未堪䝉恩過厚中謝恭惟皇帝陛下以聲為律其動應規昭其度昭其文示之令徳丕哉謨丕哉烈佑我後人肅然身敎之儀刑見于家法之純懿若稽嘉祐先宗祀以建儲上則天禧命宰臣而習事不以臣為幼侗而俾之繼紹不以臣為愚陋而誨之經綸拱親黼扆之日朝聳觀神斷之天造若明發蔀可學知方臣有獲多聞祇承允若視乃無時豫怠帥而不敢有加晉王治之懦庸夫何足效曾孫誦之道徳所願庶幾皇太子謝皇帝令百官詣東宫表鴻冊誕敭仰拜君親之茂眷鵷班移賀懼非臣子之敢當揣分僭踰拊躬惕厲中謝竊謂以儀辨等初無二上之尊事主比肩敢辱百僚之見獨以宗祧之至重特令品級之少殊外似聳於觀瞻中實深於戰栗茲蓋恭遇皇帝陛下接千載統垂萬世基以得人之謂仁念立嗣之必子昭徳而示有則以貽堯歴試而考言既云乃可禹固辭而稽首必曰汝諧肇建青宫俾承紫極茲舉正名之典又隆納謁之文臣敢不自牧以謙懋躋于敬見公少如保傅之禮寜有怠驕以英俊為師友之交決無私昵庶克堪於付託期不忝於繼承皇太子辭皇帝賜扇表伏蒙聖慈賜臣紫扇四把者龍光赫奕特頒列侍之儀雉尾森嚴頗近至尊之御未容僭受決不敢當欲望聖慈特賜蠲免雪坡集巻五
