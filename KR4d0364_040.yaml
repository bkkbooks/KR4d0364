body:
  text: 雪坡集卷四十宋姚勉撰說三友軒說豐邑黃君有軒名三友俾余說之余曰若之何而為三友也人有言曰松竹梅為歲寒三友子之軒森然而干雲霄者得無有是竹耶樛然而龍蛇走者得無有是松耶臞然而玉瘦皭然而氷寒者得無有是梅耶黃君曰非也吾不敢志此蓋志於魯論益者三友之言耳思得此友以輔吾仁也若然則余又何說哉晦庵朱夫子之說善矣友直則聞其過友諒則進於誠友多聞則進於明善哉斯說也夫改其過以進於善自明而誠以希乎聖人皆學者之事也此三友足以輔之其益可謂大矣雖然知益者之有三友而不知損者之亦三友辨之不明未必不初欲其益而陰墮於損也損友之三與益友之三正相反也可不察哉便辟則習於威儀而不能直矣善柔則工於媚說而不能諒矣便佞則習於口語而不能有聞見之實矣損之三與益之三不相反乎今人之取友夫孰不思其益哉然而畏聞乎正論樂近乎懦夫多識前言往行非己所能及之人則憚焉而不敢近有能奉己以順適和附而諂笑者則喜其無拂逆樂與之內交不知面諛者必背毁之人媚己者必賣己之輩其平居詡詡笑語以相取下者又皆臨小利害反眼落陷穽不救又下石者也是豈特有損於其德其身與家且為之損矣孰若夫直諒多聞之友有益無損哉有薰陶漸漬之益焉有嚴憚畏謹之益焉又有興起慕效之益焉是友者三而益者亦三也語又曰毋友不如己者然則勝己者其益者之友不如己者其損者之友歟抑人固未易知知人亦未易能直諒多聞之友益矣亦有似是而非者好訐以為直乞醯以為直證父攘羊以為直果直乎不貞之諒匹夫匹婦之諒言必信行必果硜硜然小人哉果諒乎學博而不反約强記而徒喪志能讀三墳五典八索九丘而不知祈招之詩以止王心果多聞乎是故直而好學則不絞信而近義則可行多聞而知道則不泛是又不可不知决擇也格之物竹挺而不屈近直松歲寒而不改近諒梅質而華近多聞子其植之軒見物之三友則思己之三友庶乎益者之居而損者之踈矣是說也即朱夫子說魯論之說也故以為三友軒說雪心說亢隂凝不昧其潔太陽耀不固其節潔豈我名節豈我貞此謝惠連賦雪句也世之人每賞此句豫曰是不知雪夫至潔而有節者莫雪若也乃曰潔豈我名節豈我貞辱吾雪矣此言也其清談之流弊歟雪之被物也四海一色掩故垢而皆新之潔矣歲不常有有則為瑞既瑞曾不淹之為久即收而去之不常為世俗所玩獨於岷峨太華深山窮谷則四時凝沍盛暑不爍此君子難進易退之風固窮嘉遁之操也而曰不固其節可乎藍君以雪心自號其詩亦曰雪心吟藁夫以雪為心必知雪之為雪者矣吐而為詩餘事耳若曰雪者倐有而倐滅心可乍存而乍亡則謝惠連不固其節之說也藍君必不是之取曰潔曰節君其似吾雪八窗說八窗玲瓏明喻也室有八窗而不為物所掩斯明矣人有五官而不為欲所蔽斯明矣是明也人皆有之患不能明之耳豐蔀見斗一隙之明也納約自牖一方之明也夫惟表裏俱徹而後可謂八窗玲瓏斯境也周子之光風霽月也程門之坐春立雪也邵子之空中樓閣而吕子之所謂洞然八荒皆在我闥也雖然未可以驟至此也虛室生白莊語也空明寂照禪語也不知其所以明而惟憑虛駕空以求之鮮不為老為佛矣然則所以明其明者何如曰格物以致其知真上人氷壑說炯如一段清氷出萬壑置在迎風寒露之玉壺杜子美句也壑清矣而氷焉不其愈清乎復以風露玉壺置又不其愈清乎嘗試與子觀之隂風怒吼萬葉盡枯寒霜曉凝臘雪夜積禽蹤絶獸影滅是壑無有惟氷皎然其清觀何如耶僧至真以氷壑自號清已抑氷有道當不以清而止請為子言之今夫水結則氷氷渙則復水方氷之結固劌然亷而確然堅也渙則皆化矣人之生也其有形也聚也氷也其死也歸吾真而復吾初也散也水也水凝則氷自無而有所謂精氣為物氷釋而水自有而無所謂遊魂為變謂水氷之所自出則可謂前所渙之氷復為後所凝之氷則不可謂天地之氣以復形而人則可謂今世之人即前世之人則不可苟悟於是輪回之說其可以息矣而死生可以無懼矣豫因氷而言及此真其於子之壑取氷而驗之始以豫言為不妄楊雲林方壺說海山方壺在烟雲縹眇間可聞不可見矧可尋覔巖阿結屋戶外引泉匯以方池而亭其上㶁㶁循除不舍晝夜北風時至霧靄凄迷對面不相覩已乃軒豁悠然見山不必逺涉蓬瀛但守方寸地不受一塵方壺之樂勿令費長房窺之此齊說文中子曰彼道之方也前輩謂其語不然夫有彼則有此以彼為道方則此非道之方矣此非道之方道乃在彼是道與我為二然則道遠人乎故論道者未有言彼道必曰此道論心者未有言彼心必曰此心此之義大矣哉取諸此不求諸彼孟子所謂我固有之也非由外鑠我也清湘賀君一馮以此名齊求其說於豫豫曷其告盍亦於此心求此道乎林伯可自齊說三山林伯可以自名齊取獨之義也獨之義大矣哉中庸之首章曰君子謹其獨大學之誠意章亦曰君子必謹其獨二書聖門之要書也其言皆主乎此信矣為學之要莫大乎此也何謂獨獨者人之所不知已所獨知之地也一念之作茍僞也覺而復之此顔子之所以為學也夫如是則可以自明其德矣自明其德則可以新民矣齊家以是治國平天下以是位天地育萬物以是獨之義大矣林君之處斯齊也所以用力以自之義者必若是而後可以為聖為賢若曰琴書以自適詩酒以自娛則自之義小請大之林君舊遊澗堂辱知余屢請言其自之義不敢辭輒書此以為自齊說未知林君然之否劉野字子相說上饒劉君野其師以子相字之復求其說於豫問其故曰野有相之道也豫曰然古之善相天下莫不於其在野占之伊之莘傅之巖革夏復殷之事業具焉相野之推也野相之基也格物致知誠意正心以修其身而盡吾明明德之事則推以新民家齊而國治國治而天下平盛德至善民之不能忘相業偉矣相不野之推野不相之基乎雖然古之人野不可以無相之學而不必其有相之時不聘於湯不夢於武丁耕築亦廊廟也若曰吾志在於相而不必在於學耕寬閒也惟饗鐘鼎之謀築寂寞也惟餌名位之計則在野而慕朝在朝而忘野出處進退之義皆失矣是野也將為野哉由也之野其弊至於禮樂不興刑罰不中民無所措手足矣然則可無學乎學烏在曰敬敬則能為循序漸進之功不敬則流為一超頓悟之徑僕師久軒蔡先生得於師說如此敢以告若又曰吾師經畈子師久軒當無復望其同則非學者審其是之意夫某則不敢贈仰巔峯先元二字說仰巔峯設閲人肆於三元樓前先唱第數日豫與一二友步月因過之戲書一元字俾解析巔峯曰元字添兩筆則先字必在人先又曰兀然而居第一甲一笑各散去未幾豫忝第一人賜第巔峯揖於馬前謂其言驗明日來期會所求豫詩之豫謂巔峯雖未嘗明許其為第一人也然紛紛往來中已能知其為第一甲亦難矣況謂之必在人先其亦第一人之類歟方未唱第時欲為狀元者何限巔峯亦難於許若豫則不必作狀元者偶然得之故巔峯亦偶然而中之歟冗不暇詩聊申元與先二字之義作數語以贈退之有言責在人先剛不為首其斯曰乾元善之義大可統天吾其求仁庶幾顔淵曾何足稱舉首褎然子會此理立峯之巔茍拂厥經其頥則顛書此贈之某亦勉旃贈僧半顛說唐有僧大顚宋有僧半顚人謂半顚得大顚之半也而其實不然韓退之與孟簡書稱大顚頗聰明識道理能外形骸以理自勝形骸亦理也天下豈有無物而有則者哉外形骸而求理大顚可謂之顚矣宋之有顚豈如是哉顚長於詩不茍作作必託興於物有關於世道有益於人國顚雖釋其形而不釋其心也猶以不釋其心而尚釋其形故未離乎顚之半使之髮其首冠其顛以其身為天下國家之用制禮作樂出風入雅不瑣瑣為山林長語扶世之顚而持其危顛之半必為不顚之全矣不明理之大顚又安敢望之哉後世亦將曰韓退之之稱大顚不若姚某之稱半顛景定元年春王正月寄顚詩後之三日又序以贈之送葛山人說豐城葛君德清數年遊江湖登匡廬眺揚瀾涉黃岡弔赤壁訪黃鶴問鸚鵡鱠武昌之魚浮洞庭之月而後遵大江歸劒水山川名勝厯厯足下班班胸中遂得妙山水之理如與青囊君神交心契遂縱談而及隂陽蓋得之於目悟之於心非閉門而學琴按圖而求驥也一日挾其兄德遠書之錦江造豫釣魚所立漁舟傍與余語山水之奧竦然其異之暨辭去請序其說夫山水之理余固能說之也太極剖開隂降陽升其初也天地間皆水也得風而凝柔者始堅故今之山皆波濤洶湧之狀而山之巔鑿之即有水山蓋清氣中之有查滓者故凝水則純乎清者故流也夫是以謂之融而為川結而為山山屬隂水屬陽也山屬隂故靜水屬陽故動為青囊學者不曰山水而曰風水又曰得水為上藏風次之莫先乎水也雖然山水流峙於天地之間山為肢體水為血脉其行其止蓋有自然之運造物者亦何常容心於其中行某龍降某勢出某穴主某王侯將相貴賤壽夭貧富哉屑屑而為之造物亦勞矣善地理者特原其所起識其所止而擇之則可以乘天地間流行之生氣而安耳妄焉窽之鑿之曰是得某形合某法可致富貴有是理哉卜黎水不吉卜澗瀍吉書之說風水也望楚與堂景山與京相其隂陽觀其流泉詩之說風水也四時所交風雨所會百物阜安乃建王國周官之說風水也有汾澮以流其惡且民從教十世之利卜遷于繹民茍利矣孤必與焉春秋傳之說風水也吾儒者六經中風水之說蓋如此德清儒者也而言風水盍亦知此說乎其能如衛文公之宅楚丘以說百姓乎抑能如邾之卜遷于繹以利民而不私己乎其能如晉之謀去故綘以民從教為十世利乎抑能如公劉之于豳斯館以厚於民乎其能如周公之卜澗卜瀍以定九鼎遷殷頑民乎抑能如周公之測土景求地中百物阜安乃建王國乎古之人相地皆以為民也故其利及數百年利於人而己亦利今之卜地者第欲求富貴以私於己而已夫使功不及物雖使子孫若世世享富且貴豈不愧哉況天地間未必有是理哉德清既以山水之學行乎人願以余山水之說告乎人余非臆說也謂余臆說請證諸詩書周官春秋鳳梟說禽之惡者有梟焉形厲而音粗心甚不仁見其類之弱者輒攫而食之常苦饑其欲逐逐終日若不能飽集高木四望有便利輒搏嗜無所得雖腐鼠臭蛇甘之人聞其聲亦輒憎之用徑弩毒矢必射梟死甚則並其子亦殺之丹穴有鳳竹食而梧棲亂隱而治見其見也萬禽隨之翼以為之宗人亦詫為美瑞未常有以彈射畢弋向者噫梟雖好食其類特弱小者耳如强大固亦末如之何也其於人亦奚所害而人則惡之惟恐其死之不速鳳雖不傷其類亦未有益於人也而人則愛之何也梟暴而鳳仁梟貪而鳳無欲也暴而貪者得惡仁而無欲者得愛人愛者壽人惡者不得其死理也天地間陽清之氣為善類隂濁之氣為惡類不能不生梟終亦必殺梟以此見隂不勝陽天道福善而禍惡然則世之人曷不為鳳而必為梟乎雪坡集卷四十
