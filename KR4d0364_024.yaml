body:
  text: 雪坡集卷二十四宋姚勉撰啓上程丞相啓伏審渙揚廷綍晉秉國鈞天子有臣七人久負經綸之望冢宰詔王八柄式隆輔相之權改紀方新迓衡有屬中外想聞其風采華夷交聳於聽觀恭惟大丞相樞使國公肅懿而惠和直溫而寬栗任天下之重信其為先覺之賢格君心之非有所謂大人之事頃居言責茂著忠忱善類所恃以無虞上意已知其可相王之喉舌既優賦政之功帝曰股肱尚任弼豫之責載登揆席爰易化絃擇人任責之成功特重𤣥齡之委得君専行乎國政豈如管氏之卑僂指近時驚心往事謂之將順其美而併失其救惡之職諉曰靖共爾位而遂銷乎好直之風守法惟困於孤寒闊略貴戚而弗問攬權雖聽於自用旁落左右而不收一整弊綱是在今日側聞八事之入告已慰四方之具瞻知之艱行之維艱終賴扶持之力改之貴繹之為貴端由啓沃之功昔魏公七事之陳至司馬五規之獻偉然逺業具在此書先正保衡罔俾商邦之専美程伯休父願言周雅之歌功某求道未聞受才不韻昔羣趨蘭省濫隨鶯谷之門生今新正槐庭首拜鶴書於郵使自惟何物敢纍大鈞矧因負米之願乖頓覺彈冠之念冷縱令從政未合造朝附致青雲豈在速驅於宦路立深暝雪誓當不辱於師門賀蔡參政啓伏諗敷告大廷晉陪近輔國皆曰可選臯陶伊尹之賢道之將行用周公仲尼之學真儒得政善類宅心聳寰海之具瞻非門人之私慶竊以道由天出心自古傳堯舜盛時罔非修齊治平之事秦漢叔世始為牽補架漏之規幸至我朝復承斯統然僅書傳於來世未能功被於當時自昔罕逢乃今有待恭惟大參相公先生𢎞深肅括明允篤誠祖西山而師考亭獨傳正學派伊洛而源洙泗蓋得真傳識貫精粗道該體用大學八者之條目妙㑹於心中庸九經之規模如指諸掌多於嘉績簡在上心擢之獻納之班委以經綸之寄遂繇兵管參秉國均吉士立政勱相國家式副用人之望二公𢎞化寅亮天地必推論道之賢屬時多屯積弊如蠱苞苴女謁清賄道以當嚴外戚宦官折姦萌而貴早夕谷毋容於駒縶朝岡宜集於鳳鳴風采聿新觀瞻斯慰知吾道之不為無用庶小人之罔或有辭聖賢之難得者時幸際風雲之慶㑹宇宙之不磨此理聳觀日月之昭垂勒彞鼎於明庭屹棟梁於道閫某名科徒躐祿養竟乖固知儋爵以析圭盍思移孝不得為親而負米何忍希榮未嘗通光範之書乃遽誤公車之召極知提挈欲惠作成尚願察於真忱俾少全其初志當圖國士之報以答先生之知張師德及文正之門斷無是事劉安世守溫公之學誓以終身通陳判府昌世啓伏審受册臨軒驅車蒞郡氷江理棹嘗登千仞之龍門錦水樓㕓又托萬間之燕厦喜我二天之獨有為公特地而一來將斂板於道傍先羾函於節下恭惟判府刪修判部侍郎長者君子古之吏師玉壺凝萬壑之氷清融表裏霜水洗九霄之月明入毫釐頃開廣信之藩茂著亷平之化百堵皆興而人不知役一介不取而官有餘財縮吏老姦造民大譽帝曰嘉止來歸立鵠之班公則翩然渺動冥鴻之志無寧外服未欲中朝眷古昔之竹州乃先公之棠舍詔謂西江之道院其撫朕師民歡東閣之郎君又為吾父凡此日迓軾熊之耆老皆前時騎竹馬之兒童獨是陋邦已非曩俗民窮似蟣賦毒於蛇嵗無萬億秭之登糴至什六七之取倉有紅粟而錢貫朽矧多化於歸舟野無青草而室磬垂孰興憐於破屋魯侯􅊩止齊國庶乎追孝于前一復其舊君陳宏周公之訓兹率厥常戶牖為漢相之時亦如此宰某忍寒甚慣炙熱不能竊第七年豈有鳳池之想反關四載頗安鷗海之盟回憶歸時深䝉異顧借尚方之劒者衆已駭其妄作用司農之印者人尤服其難能不圖再逢相視一笑幸以吾黨小子之簡得事是邦大夫之賢致私謁於翁歸斷無此請和新吟於嚴武或有所長謝陳判府賀生詩啓我辰之月直斗正愁得罵之多巨公之筆補天遂有生華之感得非所稱愧不敢當矧方念於劬勞何可堪於頌禱顧驪珠之滿掬難鯨錦之卷還某官民社宅生文章司命耆夀俊越在厥服藹令聞之素穹老成人尚有典刑追前修而獨立乃不遺於么麼而曲惠於生全唱郢人白雪之詞妙幼婦黃絹之語不恭是懼重拜惟慙謹篋笥之襲藏為子孫之輝耀君子夀夀天子還祝我公皇極福福庶民願同爾衆心丹永篆手墨未紬回童倅伏審疏恩天陛借重星屏虎檻宣威久服童君之善政漁竿借釣幸安姚子之閒居將披覩於雲天遂帡幪於風雨迎軒胥慶拜櫝有嚴恭惟某官碩望耆儒清名厚德受天粹氣得湘潭嶽麓之至清隨地政聲與石壁洪巖而俱峻盍聽星辰之履上乃將風月之權分清朝自近世以來半刺異初基之重以烏有子虛之課額當白崖赤打之浪頭網解取辦於鑿空事勢幾成於築底秪如道院本非有蟹之邦必也通才可勝展驥之任而况教適新於董學糶専主於平農民命幾何所重惟食士風壞矣在正其心宜有良規聳聞新政第虞裝趣不待席溫刺史相必考所行丕拜璽書之寵耆夀俊越在厥服人觀璧帛之迎某祿不逮親學難諧世盟鷗結社聊自樂於孤聞騎馬朝天終慚隨於羣隊分甘藜藿歸隱菰蒲欣聞佐郡之來端有事賢之幸燕雀之喜以賀厦知可依栖龍蛇之蟄以存身尚祈覆護回王倅市朝懶到自甘山人姚合之窮邦國不空喜有别駕王君之至風月平分之自始雲天覆幬之有歸贄名未徹於記曹委牘忽先於編戶恭惟某官英聲震地峻閥倚穹為留耕之諸孫所聞已異在㑹稽之羣從厥譽尤佳瑶林瓊柯無塵俗之姿栝柏豫章有廊廟之器故象賢崇德求忠必於其門而事君立身觀逺以其所主惟是淮堧之幕府獨狀天下之英才王通登將軍之門以竒自著元琳在司馬之府見器尤深發硎以還脫穎而出自合聽履於星辰之上胡為岸幘於山水之間蓋不欲同流而合汚是以若輕內而重外眷此髙安之郡事簡俗淳第非中熟之年民貧賦重吁旱苗之已槁慨糴數之甚繁嗟我人其誰生恃賢者以為命仁人之言其利博寬尚拜於一分大賢之德在民深是當先於百姓若時先正嘉惠清江世於此而具瞻民到今而受賜纘戎舊服追配前人此時相郡之規模他日濟時之事業讀沂國句知梅鼎之必調視晉公家覺槐隂之已滿某學惟好古樣缺入時徒能畎畝之不忘有懷莫吐非敢山林之益密求志所安第知掃軌於閒門罔覺乘軺之及境遂失前茅之拜且稽右櫝之恭如愧恧何幸矜赦爾隨州里之民而往役毋敢不欽舉家庭之學以砭愚庶終有立其為慶忭靡極傾殫回趙司理竊芘枌鄉久仰景星之耀升華李掾幸依愛日之春豈特受㕓而為氓蓋將就正於有道恭先弗果賀後為慚恭惟某官地望穹隆天姿粹潤雄辭徑氣陳思王繡虎之才道骨仙風李太白騎鯨之韻自證慈恩之佛合陪碧落之郎乃爾斜飛甘於亷取亨衢筮仕姑養望於珠曹當路貪賢復借重於花邑便合飛雙鳬而東覲胡為驅匹馬以西來得非欲行其一片活人之心故寧少迂此尺五近天之步乃眷髙安之郡實為􅍇俗之民頃因揚粃之在前每與刻木而為市攫金白晝豈如楊震之畏知䝉霧青天安得謝令之推去民其否往賢者鼎來嗟我國人真望葉公之如嵗告之天子願留侯霸以朞年第虞玉節之來又趣金鑾之召某懶於釣祿願此耕寬親養乖違仕何敢問君恩深重辭不獲俞方强治裝忽聆及戍遲吾行也尚能隨負弩之迎適我願兮當早聽驅車之叱回胡簿伏審筮仕友邦􅊩官簿正枋榆乃蜩鳩之止曽辱迂臨枳棘非鸞鳳所棲喜聞俯就未馳慶幅先枉賜函初非敵以下之可當欲不愧於中而不得恭惟某官學優而仕筆妙於年江夏黃香負天下無雙之譽洛陽賈誼能諸老未對之言摘髭巍科拾級膴仕便合凌青而遡紫尚煩稽墨以勾朱以卑飛培雲翼於九重以平進養霜蹄於萬里眷惟陋邑深積弊源伐檀多刺於狼貪刻木殆踰於猱猾聳聞新政載滌舊汙惟嚴於束濕可以使一罰而百懲惟潔於飲氷可以出獨清於衆濁有如賢者蓋易能之平生之志豈止榮身一命以上皆可及物昔明道先生之在鄠縣以德化人至紫陽夫子之仕同安以學造士卜其他日皆以此時仰企前修永有令聞某雖懷至慶尤切深期理萬事惟欲問胡公何敢願此人於執事讀十年不如詣主簿尚當請所益於下風回解頭李有開錦水偶連敢自詫黃姚之品筆鋒曽記果遂符緑李之魁驚耳一鳴拭目先覩矧幸同於經社尤喜倍於鄉人魯臯貢賀之先施鄭重貽緘之倒置恭惟某人賦姿甚穎有志竟成偉雛鳳之孤鶱自知親師取友之益隘篆蟲之小巧能為抱經束傳之勤月書屢占於上游嵗貢預期於首選果聞一日盡壓羣英旗蝥弧以先登前無勍敵靈姑銔之卜吉勇䇿勝勳此蓋閭師所書黨正所書是謂大夫曰可國人曰可月評久定天府宜升勉哉貢益郡之畋行矣繼廣川之董錦標重奪再為鳳凰山之榮金榜將傳已見鸕鷀洲之䜟某久知寶價式副硎期念嘗窺聖師親筆之書乃不立左氏學官之選聳觀傑出祗抱深慙歸耕徒羡於拾青就試亦甘於飲墨自量謭學猶玷誤恩羞揚粃之在前看積薪之居上李文正有三元之故事願踵英蹤公孫子權第一於大廷尚期正學編摩辭淺期望意深與鄒家定親誦鄒軻願為有室之言宜家是望秉姚崇必貴可嫁之識選壻方真偉矣髙風拔乎流俗賞目稠人之表盟心片語之間次孺子有志斯文頗能詠氷壺之賦長令娘擇賢而偶無暗投月璧之珍地鄰龍劔之英天侈雀屏之卜於諸少矜持之內獨重羲之在諸子踈俊之中能知彥國既諧合姓敢後問名恭陳繫臂之儀永結齊眉之好吹暖律以春燕谷願言蓬蓽之生輝奮學館而登瀛洲行見門闌之有喜定親啓伏以昔吾伯父嘗得壻於魁門今我宗人願請盟於鼎族益篤親親之義遂為世世之姻幸矣訂金榮哉倚玉恭惟某位小娘生奕世狀元之里夙帶天香自顧某位學生以寒谷小儒之家敢攀地望特孟氏之言願為有室而武功之女必嫁能詩須因判合之言仰拜王張之賜不云齊鄭之非偶乃若朱陳之為㛰義概雲天之九重和氣陽春之一脉鳳占協吉鴈幣贄恭既永好於百年亦可誇於流俗生於鄒而邇於孔己沾講道之風妻以姚而邑諸綸其有興家之望不腆菲禮具如嗣箋餉啓言念締好請盟已荷訂金之諾拜嘉受室願成種玉之緣既卜良期敢恭微禮惟男女及時之義非幣不交至㛰娶論財之風則吾豈敢二姓相孚於道義百年永托於姻㜕春然姚花暖我鄒律逮氷未泮輒陳鴈奠之儀當月仍圓拱俟鸞軿之下纒紅不腆嗣録具詳定親姚娶趙望髙閥閲宛同儒族之清喜動門闌幸托王孫之貴草木既欣於同味葭莩遂映於末光作對自天締盟卜日先君幼子粗修家學之箕裘令姪宗姬見謂公族之儀範頃因媒妁欲附㛰姻第相交儒素之風安敢效綺紈之習一言而合二姓以諧覬兹琴瑟之和鳴保我塤箎之怡聚此求儻遂所得良多猶子有家公既盡為兄之道及時為娶僕敢忘愛弟之情回定親姚答張登瀛之派己遙曾何足慕鳴珂之里相接乃遂榮攀氷語初聞天緣即合恭惟令郎璜宫秀選久巳聞張孺子可教之風庶女圭竇儒酸亦可謂姚祕書能詩之女題紅有兆納采登嘉勿云嫡庶之分殊自有父兄之義在但相與詩書之味願不為夸奓之風鴈幣禮陳已重千金之訂鳳樓書報佇觀三草之榮回定親姚答胡詩人姚氏之女不與凡流大姬胡公之姻式聮舊好寵承妙墨欲締嘉盟雖知巨族之難攀獨喜微宗之有托令猶子生居望族早能詩禮之傳舍姪女幼失慈親已備艱難之厯伏聞髙誼不鄙寒門略無夸奓之陋風但取詩書之同味如斯惠顧敢不敬恭娶女必貧素之家君既用溫公之法送門為箕帚之訓余敢忘王子之規雪坡集卷二十四
