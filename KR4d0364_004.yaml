body:
  text: 雪坡集卷四宋姚勉撰奏劄庚申輪對八月十一日上殿第一劄玉音問答附初入奏云臣疏謬無庸學未聞道癸丑䝉陛下親擢冠之多士之首臣感激知遇每思捐軀以報陛下丙辰蒙陛下以正字收召是時姦臣丁大全竊政臣見其欺君罔上不願與之比肩事主用不敢前去年又蒙陛下以校書郎賜召臣自叨忝以來未曾有一日實歷故不敢當乞仍舊班又蒙陛下矜從所欲曾未三月陛下又俾臣待罪校書郎臣纍辭不獲六月十六日供職至十八日又蒙陛下除臣兼太子舍人臣受恩愈深義當效報用不敢辭茲當班對獲望清光可謂千一之遇臣有管見劄子二件冒昧聞奏乞賜采覽玉音可之臣乃進讀臣昨蒙聖恩親擢賜第中值姦貪欺蔽不忍附和詭隨退處山林未報毫髮近叨收召曾未幾時陛下茂建儲宫妙選天下之端士為之輔翼臣以疏謝亦厠末僚又越故常俾陪講誦臣雖弗稱義不敢辭欲答殊知願忠職分臣奏云故事舍人但掌文翰蒙陛下特俾與講臣固弗敢當但臣謂效忠於陛下之子即所以效忠於陛下故不敢固辭玉音曰素知卿忠茲當班對亦安敢出位而言願以臣之職對臣伏見皇太子天姿髙明德性仁厚好學善問謙恭受言臣每欽嘆陛下真有為天下得人之仁皇太子真可主宗廟社稷之祭盡善盡美何以加茲玉音曰太子頗聰明可教臣奏云臣素不能佞但見皇太子實天縱聰明且又好學玉音曰尚賴卿等悉心輔導臣奏云敢不盡心臣又奏自古人君多以建儲為諱間有能建儲者又多昧於知子陛下上法仁宗髙宗既有與子之盛德又有知子之至明此行建立東宫可謂上符天心下合人志陛下作得此一事不差玉音曰卿等可為朕教之陛下近又命皇太子侍立昕朝參決庶務宰相執政為之師傅賔客日示以事而習之陛下之於教迪蓋無所不用其至矣雖然盍亦知所先務焉臣聞帝王之學與經生學士不同訓詁章句經生學士之學也修齊治平帝王之學也玉音曰極是其要在於格物以致其知而已此皇太子今日之急先務也格物者窮理之謂也臣奏云陛下此理洞貫胸中臣不必贅陳在皇太子則格物致知乃第一事能致知則知人之邪正識事之是非然後能用其正去其邪格其非存其是意方能誠心方能正自此天下可有治而無亂臣日侍東宫専為皇太子講明致知一件分别人心道心要於念頭動處看是人欲是天理若善念起則是天理是道心當存之若惡念起則是人欲是人心當克之玉音曰正要卿如此隨事以觀理然後能即理以應事天下之事衆矣其大綱領則莫若用人聽言臣奏云事事皆當窮理但帝王之學用人聽言是大綱領玉音曰極是說雖若迂事則甚切臣癸丑大廷奉對丙辰驛遞上書皆以斯二者為陛下告臣奏云臣癸丑廷對獻二策曰立中道以用天下之賢奬直言以作天下之氣丙辰趨召至上饒驛奏封事託丞相程元鳳繳奏亦只云願陛下保持用人聽言之初意臣今亦只是此說不敢有二心玉音曰是臣之愚戇無有二心今者備數宫僚所以告陛下之子者即前日之告陛下者也陛下所以教皇太子者在平日固甚嚴皇太子侍立參決之時所以觀法於陛下者在今日為尤切臣願陛下致謹於斯二者而教之書而不法後嗣何觀陛下固決無此失唘佑我後人咸以正罔缺必事事皆以正而後可謂之罔缺也臣奏云陛下今日委任賢相言路廣開羣才漸聚固無用人聽言之失但臣願陛下益謹之重之故臣引書曰唘佑我後人咸以正罔缺蓋事事皆正而後可謂之罔缺也玉音曰極是比者左庶子臣爚嘗為皇太子講司馬光論知伯才勝德一章切切乎君子小人之辨皇太子曰嘗觀國史中奏議每論君子小人二者真未易辨何以能辨玉音曰能有此問臣爚遂以嚴者易疏愛者易親之說反復陳之皇太子極然其說臣以是見皇太子欲致知於用人也臣奏云左庶子乃吏部侍郎臣王爚每與皇太子講說必極言正論皇太子必樂聽之天顔甚喜皇太子又嘗問臣曰書曰若藥弗瞑眩厥疾弗瘳如之何而為瞑眩之藥臣謹對曰毒藥苦口利於病忠言逆耳利於行逆耳之言苦口之藥也然而每難於聽當如伊尹所謂言逆於心必求諸道言遜於志必求諸非道然後能聽之皇太子亦然其說臣以是見皇太子欲致知於聽言也臣奏云臣恐與皇太子言者只是順不敢拂故欲皇太子致察於順與拂之間玉音曰是庶他日能從諫臣願陛下於其侍立之間參決之際教之以敬大臣體羣臣之事教之以內君子外小人之宜教之以左右罔匪正人教之以姻婭則無膴仕一賞而千萬人勸毋使一之有未足勸也四罪而天下咸服毋使一之有未能服也正人得以指邪人為邪邪人不得以指正人為邪使無復有姦臣敢倡朋黨之說以空國之君子蹙國之元氣則皇太子用人之知至矣玉音曰此都要太子曉得臣奏云所謂使無復有姦臣敢倡朋黨之說者今日雖無此議論但臣謂天下之事當防微杜漸若再有如丁大全者出則不可玉音曰極是教之以祖宗不罪言者之家法教之以祖宗置籍記言之舊規臣奏云上一事是仁宗聖訓有云朕未嘗以直言罪人下一事是趙鼎為臺諫髙宗置籍記其言事一月之間言四十事已施行者三十六事祖宗時言者肯於言祖宗樂於聽如此玉音曰有此事教之以舍己從人教之以改過不吝人臣固不當以訐而為直其有直而非訐者不可例以訐罪之也人臣固不當揚君之過以為已名其有為君謀而忠則姑聽其自為謀而過也臣奏云論語有曰惡訐以為直者臣見有一種好名士大夫専以訐為名又喜自矜其言殊不知已欲為龍逢比干則置君於何地桀紂其君孰若堯舜其君玉音曰是此魏徴所以願為良臣兼聽以為明不偏信以生暗達聰明目使無復有姦臣再立誹謗之禁以箝天下之口胎天下之禍則皇太子聽言之知至矣臣奏云此亦是指丁大全方其壅塞言路之時若能使人無異議然北敵之來非陛下聖明則蒙蔽而不得知矣玉音曰是此蓋陛下優為之事也前者姦相橫閹表裏肆欺天日似為之蒙蔽陛下一旦天造神斷如仁宗之竄丁謂孝宗之除甘升片紙斥去曾無留難克已工夫可謂非茍知之亦允蹈之者此皆皇太子之所當則效也臣奏云陛下前此固不曾縱其姦聽其橫但天下人不能無疑以為陛下之私臣今日待罪班底見陛下行此二事臣不勝欽歎以為此乃陛下克已工夫處臣日者侍講東宫皇太子嘗問如何是克已復禮為仁臣嘗舉陛下此二事即是克己蓋臣謂以古來事告皇太子逺而難知不若舉目前之事庶皇太子深信玉音曰正要卿如此繼自今皇太子學問思辨極所知而篤於行宗社無疆之福皆陛下遺之矣漢唐以來君不知道間有用人聽言之美尚收小康僅治之功然而非出真知但是暗合故聽言亦多勉强用人未免混淆有初鮮終莫克純一不知道者固如是也得堯舜禹湯文武之傳尚孔孟周程朱張之學千載獨陛下耳臣奏云漢唐以來人君之賢者但是尚藝文詞章所謂知道者只是佛老之道臣每拜讀御製皆深造四書閫奧故臣謂千載以來獨陛下是知道之君玉音曰何足當此陛下以是道傳之子使由格物致知之要得誠意正心之方自修身齊家而推以至於國治天下平之效斯世斯民實被吾道之福天下後世謂知道之君果能以道致天下之治而道非無用之物先聖賢之經傳不為空言吾道幸甚為萬世規是在陛下臣不勝拳拳取進止臣奏云自古時君皆以道為無用之物故少尊信故臣願陛下以道致天下之治更傳之聖子是又開萬世之治庶天下後世以為道實有用聖賢不是空言皆陛下主張斯道之賜臣不勝大願再三蒙玉音稱奬云卿言極當第二劄玉音問答附臣將讀第二劄奏云臣第一劄乃萬世之事此劄乞催監司郡守赴任乃今日急務亦一時之事玉音可之遂讀奏臣區區本職既言於前矣當世急務敢僭嗣陳姦貪唘戎徑敵侵軼賴陛下神聖相臣忠略迄奏膚公元祐相光遼人已戒生事玉音曰是戒邊吏不得生事紹興用鼎檄敵不敢渡江矣臣奏云髙宗時金敵亦曾渡江其時趙鼎主有進無退之議遂獲捷敵既去大作措置鼎曰今年以檄呼敵渡江亦不敢來今陛下任用賢相經武緯文亦決無去年透渡之事玉音曰正要經理然天下不多智者秋風在候創殘州縣人情岌岌常若敵之再來寇盜假哨以駭民居人束擔而虞禍臣奏云今經兵去處盜賊每假為敵哨以駭百姓臣鄉里一帶多如此近聞南方諸蠻亦然只為牧守更易不常無人鎮服所以如此玉音曰果是近來更易不常傷弓驚餌理固宜然探本索原亦豈無自良由所在牧守更易不常鎮定危疑罔有任責人心無主是以未安夫監司郡守所以承流而宣化者也封建不能古矣就郡縣之法而求治舍牧守將奚先使諸路皆賢監司則守必良諸州皆賢太守則令必不謬布滿天下莫不得人自可舉天下而皆治其要在精擇之於先久任之於後耳不精擇則徒久不久任則徒精漢宣帝刺史守相輒親見問擇之精也璽書勉勵增秩賜金任之久也政致中興其本由此厥今一年之間京師三易尹矣會稽再易帥矣臣歷數其故玉音曰皆是此猶安地也江西湖南廣右經敵之所詎可以尋常視之江西半歲六易漕臣湖南廣西洊易帥閫臣奏云江西漕臣初是趙汝暨次李介叔次印應飛次李遇龍次杜庶今方是陳夢斗湖南帥先是向士璧次李遇龍廣西先是李曾伯次趙汝暨憲臣漕臣亦皆更易多未至任聖容愀然曰今人多是辭不肯去臣奏云臣子之身君父之身也雖捐軀亦不可辭臣近在東宫與皇太子講禮記至四郊多壘此卿大夫之辱臣為皇太子言如去年敵在江上正四郊多壘之時若古人處此則以敵侵入境為自已之辱爭驅除之必欲洗雪其恥今時士大夫不肯以為辱但要謀身為避難計臣實不曉今之士大夫是如何玉音曰是臣州小壘閲守且三興國臨江撫信衡永桂陽武岡等郡易守皆再方當還定安集之急是豈疲勞迎送之時前者展布不能後者遷延未至江西則今僅一帥湖南則帥尚攝官監司郡守除授方新之人大抵皆未至也按圖則皆已有人考實則率多虛席寸隂當惜其可緩乎臣觀近日指揮趣湖南憲臣限一日起發臣謂不特湖南憲臣凡天下皆當如此臣奏云江西今但帥臣陸景思到任陳均為憲臣王佖為常平使者陳夢斗為轉運皆未到任湖南聞李遇龍未出蜀猶是朱應元以提刑權安撫司公事臣恐安撫司公事非提㸃刑獄者所可攝近日指揮趣黃夢桂限一日之任極是但天下監司皆當如此玉音曰是改鎮易擇代難寧前劣而後優毋倡絶而和寡寧用心力有餘之士毋任精神向瞶之人必如近日維揚帥臣方能逺過所代臣不知天下皆能如此否也臣奏云後之人勝前之人則易之是如不及則徒然易之如以李庭芝代杜庶此方是後勝於前如李庭芝臣謂久當使之帥維揚但是相臣以分道用人不欲用私客故止用元老趙葵逮葵不肯去朝廷方用庭芝維揚一火之餘豈可久無帥臣此已是遲但幸已到玉音甚以為然為國辦事之臣要無拘以文法假之嵗月責以功程勿一簣而虧其功勿中道而掣其肘臣觀大臣初至之日嘗有奏請欲嚴於命帥而久其任臣謂不特帥臣凡監司守令皆當如此也玉音曰是曾有此奏昔仁祖皇帝臨御歲久天下乂安用郭元為轉運至十有三年而守令清白不擾實惠及民令監司保薦再任家法可舉而行也玉音曰仁祖此事真可行陛下久於道而天下化人臣久於官而實政修治效庶其見矣願陛下與大臣力行之併取進止貼黃臣奏云此一段言去年諸處軍無紀律事臣聞用兵行師所以救天下之民豈可不利禦寇而利為寇去年漢鄂諸將屬大臣統隸者固皆整然有紀至於朝廷調遣趨江湖者臣但見左金吾一軍秋毫不犯耳玉音曰是其餘所至貪暴掠子女攘貨寶甚於敵也道路之間邸舍狼籍生意蕭然幸不遭敵禍者乃遭兵禍豈不重失陛下之人心哉臣奏云臣來時所親見逆旅無人籬壁傾倒問之則曰苦於過軍朝廷遣軍所以禦敵所以救民今乃為民之害豈不大失人心聖容蹙頞久之臣州瑞陽積峙頗厚銅鏹纍數十巨萬倉米亦可三十萬敵無所用也臣奏云江鄉論萬與京浙不同京浙是言舊會江鄉是言銅錢臣州之苖計八萬石丁大全橫斂和糴十四萬石又舊米及纍年和糴總領所未取去者共有三十許萬石臣去年勸守臣以此築城郭臣教習民兵守之臣是時雖未蒙陛下收召然念在鄉亦是報答陛下真肯以身扞敵後為人所沮臣不得遂其心正月三日方趨召才兩旬而敵已至使臣策獲行未必如此玉音曰知得小校吳思忠江東西宣閫本遣之戍豫章沒口聞敵已去瑞乃不稟宣閫之命提兵往來自謂敵退之後例有檢拾盜倉廩府庫之錢粟發城市富民之窖藏連艘梱載而去李虎繼至攝郡又盡其所未盡者而席卷之毫孔靡有遺者遂使瑞陽無力可以修復合舉城築為之孔艱今攝郡之將雖竄南荒所得既充未失為富而作俑之偏校猶有漏網者朝廷不知也臣奏云臣初亦不欲顯斥其人然念事君勿欺不敢不直言其事玉音曰須要施行臣願陛下自本出師戒飭將臣必用軍律太祖皇帝聖訓有曰茍犯吾法惟有劔耳願陛下馭軍以太祖之訓行之併乞睿照讀畢再奏云臣冒竭狂瞽儻有一得之愚可采乞賜留中仍乞降付三省樞密院玉音可之臣又奏云臣言無可采伏蒙玉音曲賜奬諭雖仰見陛下以虛受人從諫如流之美然臣無以當之臣職卑不敢殿上謝恩容臣拜下遂下殿再拜曲謝而退雪坡集卷四
