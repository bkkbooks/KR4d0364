body:
  text: 雪坡集卷四十六宋姚勉撰疏語太平興國寺再建淨土院接待榜昔日龍舒居士王公日休勸人念阿彌陀佛早修西方淨土謂一人念佛則彼處生一蓮花標其姓名身後即生其上此最是誘人為善之説然世人多不之信蓋有其故試相與言之極樂國不知有否果有之必在西方嘗以漢書考之張騫奉使西域有所謂身毒國注云即今天竺國佛經載釋迦如來嘗在天竺國及舍衛國説法則佛之所在是即佛國矣漢張騫曾到唐時三藏玄奘師往西國取經亦曾到雖曰佛國佛則久遷化矣但其佛法存耳天竺國及舍衛國雖與中國異亦是山川土地耳漢張騫唐玄奘初不見有所謂蓮花及人姓名標其上亦不曾見中國有何人死後生在彼處且張騫及玄奘之遊也經歷多少險難方到其處今中國之人在生曾逺遊者不過千百里又逺則萬里亦有一生不曾逺遊者亦有一生身居鄉落足不到州城府治者在生且如此則百年以後當生極樂國不知自何門而出何路而往何人為之指引何人與之糧食又何以能越險難借曰善念護持菩薩接引假如有十萬百萬人念佛皆當生淨土不知還有十萬菩薩百萬菩薩接引否盡中國人念佛生淨土西域小國能容之否又不可云佛國之外别有淨土也何况蓮花為物中國亦有之花葉根莖甚脆而薄人何以生其上縱生其上無屋宇何以庇風雨無几席何以供坐臥此皆誕謾恍惚之説立為此説雖欲化人人亦不信縱可化愚人亦不可化達者然則無淨土乎曰有諸佛教人只要清淨心地耳心地清淨即是西方淨土樂道無憂即是極樂世界七情不染即是七寶楊枝八難不侵即是八功德水貪愛之中頓回淡泊嗔怒之際忽放清涼即是猛火生蓮花愁憂煩惱攝之以順乖爭凌犯處之以和即是地獄化為天堂與人慈悲方便念念誠恪實地修行即是黃金為城琉璃為路故曰苦海無邊回頭是岸又何必外求極樂國也哉世之人不問賢聖不問智愚不問老幼皆同此純粹至善之性同此一性故皆同此理理之所在無今古無壞爛故曰常住以理曉人人心同之人誰不信故今日普化十方重建太平興國寺中一淨土院以間接待不敢再以人所不信之説相勸告只以人所同信之理相勸告也淨土院舊有之南渡建炎兵火遂成廢壞淨土之院雖廢壞而淨土之名與淨土之地則未嘗廢壞也今欲復興建之不欲只作尋常應奉香火院念天下皆有接待獨吾鄉無之近年雖有欲建立者然未有成就無他斬新建立平地上起風濤不如興舊起廢之為順也接待一寺所以苦欲建立者亦無他意但念人之常情飢則思餐倦則思息垢膩則思浣濯假如自己出在外方跋草涉水梳風櫛雨正此勞苦糧食且盡忽得一處號為接待不必糴而自有為之置食者不必賃而自有為之設榻者不必歸家而自有為之浣濯者到此地心豈不樂推已及人則人之在外者亦如此矣故今欲復興建太平興國寺淨土院以為此舉一可以修復破壞之處一可以普利雲水之計吾鄉佛國人有善心將共發歡喜心而成之矣今所欲成者乃欲建一水陸堂以為并包兼容之地建一藏殿以為運轉無窮之本緣雖大而易就事至簡而易行衆力為之不日成就今諸處建法堂建藏殿者甚衆尚皆蒙衆力喜捨况此欲濟人利物者哉人孰無是心哉或謂作善事可以求福此却不必論作善降之百祥積善之家必有餘慶善與福慶是一類事作善自是有福但不必求福耳不求為功而功立則功大不求獲福而福至則福大淨土既成善心堅固家家菩薩人人諸佛和氣薰蒸風雨調順國泰民安公私清吉則淨土極樂國世界只在眼前不必求之西方矣須至榜示者右伏以西方淨土不離當處一絲毫南寺伽藍包盡河沙千世界拈起舊時公案鼎新今日家風要敞開廣大道場不是作尋常律院運天龍寶藏轉法輪即轉食輪開水陸法堂無人相亦無我相普接十方雲水衆不問四海江湖人來不拒去不追困則眠飢則食緑楊枝時時甘露青蓮花步步人天發三菩提心腳跟下雙修福慧飲八功德水眼孔中便放光明衆力維持一時成就萬年不朽大地無邊壯觀重新恢復南渡建炎之氣象皇圖仰贊輝煌太平興國之規模昭揭通衢明知此意建淨土院疏吾州南招提舊有淨土院太平興國中諸剎一時建兵戈偶煨燼劫變法不變公案拈復新火裏優鉢現今當如是觀廣大作方便中開水陸堂日日法輪轉雲水任去來救度十方遍佛日耀萬古清風生八面須憑歡喜捨成此廣大願人生天地間石火與迅電及茲強健日宜作最上善各生慈悲心勿作人我見歡然施財力成就速如箭福報當不虛愈施愈充羡説偈恐未周更作儷語勸右伏以一片間田幾度賣來還自買千年公案這回拈出又重新壯觀復興家風大振堂開水陸普資百千萬億衆生藏湧龍宫一轉五千四十八卷成此無邊功果是名最上福田衆大檀越維持一剎那間成就四通八達不妨舊店新開一日三餐要使飢人飽去請揮椽筆速注寶銜太平寺內宫建法堂疏內宫立院招提中最號清幽外護有人剎那間復新創建締雨花之梵宇紆卷葉之回廊金雞銜粟於香積之厨玉猿獻果於法王之座密隱禪房花木靜依野圃松篁衲被都蒙自可焚香宴座竹笻來訪也能燒葉煎茶福有所歸是當必捨天慶觀建梓潼殿疏居梓潼七曲之山素昭靈響司桂祿九天之籍實主榮通在他邦皆有於行宫宜此郡欲興於盛觀惟茲新瑞素曰蜀江既山川英秀之同乃仙聖棲遊之素用裒衆力共建真祠就天慶觀寮取自天有慶之義號文昌道院為斯文大昌之符振作儒風主張吾道庶咸知於嚮慕以益勵於踐修校德行校隂功有如揭日出狀元出宰相式應連河南道堂作雲堂疏天道逍遙自有八景煙霞之趣人間遊戲可無十方雲水之居開敞琳堂欣迎羽駕鼓琴敲築招鳳喚龜煉鼎燒丹驂鸞馭鶴朗吟過玉沼髙臥看青山道人瀟灑清幽施主康寧富壽翠梁玉棟何須桂館柏臺玉鎖金龕便是蓬萊方丈化三官殿疏三元考校無非總攝於三官一念皈依自可興成於一殿燈龕花几經卷香爐日修崇奉之儀天與康寧之福圓成道果又何止百千萬年廣大善根不必齋正七十月建五雷醮疏雷乃發聲將屆震驚之候人誰無過盍殫禱謝之誠爰合羣資共修清醮里閭安泰民所欲天必從稼穡登豐今以始嵗其有請揮椽筆齊注寶銜蓋飾澄江橋疏跨虹脊於雙堤已誇偉觀甃龍鱗之萬瓦要著新功了茲一段因緣做箇十分結果惟暨茨惟丹雘如跂翼如翬飛大手周全即時了當揮金喜助真成元凱立橋衣錦榮歸自有相如題柱內宫寺求僧疏風雲借便即成變化之鯤鵬雨露沾恩須作峥嶸之龍象全憑傳世寶為覔護身符倘蒙檀越垂慈即以比丘得度掀翻席帽圓殿前剗草之機分付金欄結會上拈花之笑學佛便成佛知恩必報恩振太平千載遺風做錦江一段勝事請揮大手特注芳銜興善院求僧疏捨妄趨真即日脫皮換骨超凡入聖自今圓頂方袍大檀越不吝千金小沙彌頓成三寶種果得果知恩報恩余師姑募緣祠部疏并序本寺尼童妙清欲謀圓頂尚欠方兄須有富人為成妙果謹持短疏遍扣髙閎一筆周全三衣具足禮釋伽佛子為師因比丘尼身得度欲成正覺願了良因水到渠成花開子結定憑傳世寶為覓護身符若得都茶場官會八百千便有文思院敕綾三四尺花生筆底草剗殿前發歡喜心現圓滿相盡在金多長者重興鐵磨家風帖請瑩和尚住成覺松楸在望可勝瞻戀之懷香火結緣盍選精虔之主乃眷靈峰山寺舊為成覺道埸昔妙光禪中之宗師實先君方外之伴侣祐典座得溈山地兩腳踢倒淨瓶兒龎居士參馬祖禪一口吸盡西江水風松雨檜皆談般若雲溪月嶺普現全身生為杖屨盤礴之鄉歿作冠劍奉藏之所立無縫塔占最髙峯鹿不犯栽虎當巡境自古佛寂滅而為樂覺此山撑住之少人魔弱成強賊來欠打立得毗盧頂𩕳可無硬淨脊梁恭惟瑩公和尚苦志修行道心堅固利刀在手要斫開荆棘叢林把茅蓋頭便立起旃檀境界幾載精進總持之力一片慈悲供養之心昨者不憚勤勞力開荒翳非求自利欲結衆緣大展開我菩薩家風真踏得老和尚腳步謹扳灑掃便請承當變近來俗漢規模切莫關門喫飯立從前道者活計直須如地鋪心為諸天供佛齋僧為檀那種福添慧常惺惺如貓捕鼠要防寇盜來侵獨堂堂似虎靠山休被鬼神覷破我來廬墓山後結庵仰看雲俯聽泉許多快活晝訪茶曉隨粥好伴清間若夫萬象髙燥地之營一札功德林之賜罔極昊天之欲報尚期異日之可為猛辦堅心共圖勝果名垂不朽利及無邊佛法後付國王大臣熟思印記峰寺中甲天下竒秀更著琴書象駕入山龍神護法為梁道士撤土平生杯酒不隨浮世塵埃一瓣心香只為帝君殿宇如何羽化遽爾仙遊倘非去三清境上作妙行真人即是向七曲山中做侍香童子一靈不昧萬古長存聽我贈言為君撤土大衆畢竟末後一句作麼生道咦九轉丹成無罣礙飄然直上蔚藍天解道和尚出塔緣化疏解號妙光妙光和尚願力𢎞深初在藥山悟明祖意脅不沾席二十餘年末後廬阜山前爛泥田畔遇大質禪師深錐痛劄三際俱縱自此機鋒掣電拈出如來向上頂門一竅接物度人發明心地者甚衆不肯出世住院自向靈峯卓庵丙午嵗偶駐錫錦江崇果院中忽於三月七日沐浴辭衆端坐説偈而逝衆信就立塔於崇果遺言後當出塔復歸靈峰時節到來今欲迎歸本山建塔院立法堂崇奉香火永鎮山門仗十方之主盟立萬世之標榜功德圓就福報無邊伏以六祖真身亘古鎮南華法窟育王舍利至今留西浙名山况此妙光重來古佛瀾翻舌本掣電轟雷鐵打脊梁撑天拄地百尺竿放身捨命十字街運水搬柴大振宗風普沾法雨孤獨園中方談般若雙林樹下忽入涅槃直成無上菩提不比等間坐脫雖然是不曾生也不曽死誰知道恁麼去解恁麼來石縫裂開彌勒這畨重出世寶輪撥轉觀音無剎不現身曾有遺言後當出塔因緣啐啄時節到來直教今古播揚免使兒孫覆蓋當場獨露幻身原即法王身遍界不藏非相是名真實相放光動地返本還原永鎮山門謂似龍歸大海共成勝事莫教鷂過新羅成大莊嚴是真福德水陸孤魂榜語人人本具無非諸佛如來念念差殊遂有天堂地獄汝今諦受吾為敷宣諸佛子等覺性本圓善端均足只為迷聲戀色遂皆背覺合塵貪嗔癡愛那箇能除酒色財氣是人皆犯不敬佛法僧寶不悟幻化空身漂蕩愛河拘纒業網一旦眼光落地神識飄風各隨所造之業因遂致墮生於惡趣舉目是刀山劒樹更無酒肆茶坊轉身逢馬面牛頭不見栁腰花貌動經歷劫無有出期豈知死後三塗皆由三毒生前十惡即是十王若能悟妙靜明心又安有虛妄惡業欲與懴滌普遂超生今遇平等之筵普設無遮之會解寃釋結破暗開明飽汝以百味珍羞永除飢渴濯汝以八功德水頓使清涼各宜聽法聞經莫不回心向道衣中認寶火裏生蓮證無上佛果菩提超有漏人天福報罪花雕落翻身跳出鬼門關心鏡圓明舉足同遊華藏海孤魂浴榜語萬劫皆空本來無垢一塵不染即是真如各發三菩提心來浴八功德水脫離苦海超出愛河放寶光於佛殿中現真人於肉團上光爍爍露圓通妙相赤灑灑證清淨法身忽悟本因快似跋跎尊者既無欲染便見釋迦如來市心重建觀音閣緣化榜語觀音菩薩者人稱其名號或繪塑其容像隨即現身而為説法普陀落伽旃檀紫竹不離當處常在目前是以人天悉加崇仰四衢通透八面玲瓏晨鐘雷轟警醒羣夢夜燈月照燭破冥途天香寶花莊嚴供養鎮妖壓厲滅罪消災年穀豐登國土安泰功德無邊不可思議嵗在辛巳祝融扇災真如法身雖無虧損有漏勝果悉歸太虛成毁有時興復有數重新建立與舊奚殊今欲普化衆緣鼎創偉觀作大功德普利四生凡在見聞悉當喜捨造此閣已復度一僧崇香火為國焚修祈年豐稔此閣成就豈徒美觀禪衲律僧經社道友或此習定或此誦經隨所修為種種方便所宜捨施成就良因隨意結緣隨緣獲福證無上道皆自此中昔有僧問一善知識如何是佛答云於紅塵閙市中急著眼看去僧不會今於十字街頭重建觀音寶閣震大法雷雨大法雨東方既明市井闐擾歌哭笑樂忿怒喧啾車馬往來商賈貿易爭財奪利逐色隨聲正恁麼時業識茫茫塵勞衮衮忽然舉頭見此寶閣屹然不動六根瑩淨心地清涼如火裏蓮如紅爐雪豈不快哉妙果無邊不可蹉過欲宣此義榜語瀆陳十字街頭正好修最上福萬家叢裏豈無有箇中人欲觀音菩薩好展神通必多寶如來先開方便天飛傑閣普鎮妖邪雷吼洪鐘盡驚醉夢各宜喜捨便要速成浮世須臾何必去電中捉影福緣成就大家如火裏生蓮三寶證明萬年香火經藏院緣化建輪藏疏三禪二十四律太平以經院居先一藏五百餘函般若指金剛為最自大唐元和之際興論師説法感頑石點頭逮聖宋淳祐之間弼副正垂慈從定門開眼藏無樞而欲轉堂布施而可營重開香澗湔霜花再整修廊卷風葉多多益辦非由外處得來種種莊嚴皆自吾心流出是名不住相布施方稱沒童人提持點生鐵為黃金取青紫如拾芥太平寺化緣填溝栽松疏塞塹填坑且要一般平等深根固本直須萬古堅牢作檀那實地工夫祝聖主齊天夀算履平若砥欲四方皆嚮道之民福茂如松願一世在躋仁之域雪坡集卷四十六
