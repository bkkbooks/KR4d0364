body:
  text: 雪坡集卷三十四宋姚勉撰記江山第一樓記江山第一樓者豫章彭君英叔之所作也韓退之記豫章滕王閣以為江南第一有瓌偉絶特之稱且及其江山之好登望之樂命名之意蓋取諸此英叔以書來曰某之樓成矣未有記子科目第一人也願記之以無愧此江山之勝余未登斯樓未知其江山奚似既第之以一亦可以意知矣夫一羅帶之青橫萬玉篸之碧合開天地之圗畫納風月於窗几樵歌漁唱出沒煙靄溪蓑農蓽隱見有無謂之第一信乎其為絶勝也雖然以第一處其樓可不以第一處其身乎居第一之樓必也第一之人物科目之第一未足道也胡先生曰科第必作狀元官職必至宰相學術必至聖人言皆當以第一自處也然則狀元宰相未足以盡第一之事必學術至聖人而後可勉齊黃先生曰異日結果須作世間第一流人物西山周先生亦謂班固古今人物表不能别聖賢而異之嘗欲為之更定觀三先生之說則第一流人孰其當之考之古達而在上堯舜禹湯文武臯陶伊尹周公也窮而在下孔子顔子曽子子思孟子濓溪明道伊川橫渠紫陽南軒也秦漢以來無有諸葛孔明略近之必有若人然後可當第一之名而無愧功業次矣文章末矣志富貴下矣科目之第一未足道也彭君母曰卑之無甚髙論有為者亦若是彭君勿疑左氏書莊記夜宴左氏莊杜少陵詩目也莊不知何所矣獨其名與少陵俱存嘗即其詩想象之景物猶歷然在目有草堂有花徑有暗流水有風月林境之勝也檢有書燒有燭看有劍引有杯張有琴詠有詩詩罷有舟濟勝之具也濟勝之具雖有七而有書可檢乃莊中之第一事嘗謂何將軍山林中架書連屋左氏莊中燒燭檢書方與俗富貴家園池不類人生有此差樂髙安左氏季起家晉仙人黃萬石之鄉有莊焉築齊於斯而教子於斯子應珤亦穎然秀異今左氏莊視昔左氏莊未見其異也簷有梅庭有桂園有茂松修竹傍屋有溪齊視草堂梅桂視花徑茂松修竹視落月風林溪視花徑流水詩書琴劍杯燭扁舟之樂視昔皆具而獨取檢書一句名之曰莊季起可謂知所好尚者謁記於豫豫其曷敢辭因為記其築莊教子讀書之役而併為言書莊之義夫田疇廬舍之富則曰莊今以書為莊不于其田于其書也耕固不如學也而士之學則當如農之耕及時而修之計日而課之播於春薅於夏及秋而成矣士之學也不當爾乎吾見夫世之學者日玩月愒積至嵗而猶夫人也可乎哉學之所謂成非止能舉子業能墨客騷人詩文之謂也非止能决䇿發科得名位爵祿之謂也亦曰士希賢賢希聖聖希天耳季起以是詔其子可乎齊東之室曰崇德西之室曰廣業德者性之得於天者也業者德之見於事者也崇德者其播且薅廣業者其成而穫也書莊之收固如此也左氏其懋之所成必大矣左氏有丘明好惡與聖人同身受聖人所修之經而衍之以為傳傳所載如民受天地中以生敬必有德等語皆格言大訓非有得於聖門之大學者不及此傳又有言曰夫學殖也左氏傳之所謂學殖即今左氏之所謂書莊乎是又在唐左氏莊之上也故豫願左氏父子勿安於杜少陵詩中之左氏而進於聖門之左氏胡氏勤有堂記詩書勤乃有退之訓符語也延平胡君敬仲名其教子之堂曰勤有是之取請記之夫詩書所以載道也有詩書於已豈不欲有斯道於已哉勤乃克之是非止習訓詁工詞章也亦非止釣名位干爵祿也退之之於符也訓之以詩書訓之以勤有是矣公相之府文章之貴豈訓哉金銀車之誤宜也胡君之教子必不爾書曰功崇惟志業廣惟勤功者修齊治平之功也業者修辭立誠之業也勤乎當用力於此龔簡甫芳潤閣記教子而不教之以聖賢不愛其子也受教而學不至於聖賢不愛其身也人亦孰不知聖賢之為美哉為人父者知聖賢之為美可不願之於其子為人子者知聖賢之為美可不願之於其身教與學交願而後教子者為愛子愛身者為愛親止慈止孝之道始備西山龔簡甫來告曰某有子天周年幾冠矣雖一子不敢不教某所燕息之室曰竹窗環以竹而教子讀書之室有閣焉曰芳潤閣之前雜蒔四時花使以序榮閣之外竹竹之外池可以取名者甚夥皆不之尚而顧扁之芳潤取陸士衡文賦所謂漱六藝之芳潤者將俾天周學於六藝以芳潤其身願得一言以為小子教焉余曰君之欲使而子芳潤其身豈止如陸士衡欲為文章而已哉吾知君不過摘其賦之字而意則有在矣試即君閣之所有格於物而觀之其芳也其潤也浮花不足言君嗜竹嘗試觀閣外之竹乎英英青青蒸蒸菁菁如珩斯蒼如矛斯剛如簀斯密如膏斯澤涵藴乎風雨蕩摩乎雲霄凌盛寒而不摧扞炎熱而不受四時一碧生意滃浡是竹之芳也然使根磽瘠而不腴藂嵤確而常燥則是竹敗矣帚焉而已耳惟竹之與池鄰也滋液􅒓溉色澤映帶故幹之穿沙也而淨藤之媚漣也而清陰之蔭於水也而幽曄沃裛郁常與他所之竹異故詩曰瞻彼淇澳緑竹猗猗言竹以淇水之潤而盛也此衛武公所以為文章歟故大學以比道學焉以比自修焉以比恂栗威儀焉以比盛德至善焉有斐君子之文章豈陸士衡所謂文章而已哉記曰和順積中英華發外和順潤也英華芳也誠於中形於外德之潤身也此聖賢之學也君曰昔吾嘗摳衣於𢎞齊其知此矣愛子而教也當教此愛身而學也當學此寶祐元年癸丑十月髙安姚某記萬誠翁愛賢堂記同年萬定翁之兄誠翁名其攸寧之堂曰愛賢取人皆愛珠玉我愛子孫賢義也誠翁謂豫曰珠玉世同愛也子若孫苟不能有徒愛虞劍而共池衛璧而已氏照乘在魏申則虜連城入秦嬰則降有無等也吾知不若賢子孫矣使吾子孫廣袤田宅吾弗愛使吾子孫輝朱映紫吾未愛使吾子孫學博而文華吾愛矣亦未甚愛可愛獨賢耳吾非與世異愛也富且貴而賢必不驕以鄙學且文而賢必不矜以浮吾固願賢也為人祖為人父以賢起家易為人子為人孫以賢世家難子而孫孫而復子易子賢於父孫賢於祖難輿子於曽思孫於孔不敢當亦不敢望伯溫和中為之父而純正文正為之子文穆文靖為之祖而東萊成公為之孫韋濟翁之遁翁紫巖氏之南軒氏又其次槐庭之王麥舟之范忠文之夢得申國之滎陽蘇之長公楊之伯子賢皆可睎也諂教咸肉誘贊府居訓符吾弗為恐子孫亦不吾愛欲師新或附曹羣忘漢超叛鑒吾亦弗愛矣吾固願賢也子以吾言為何如可則子為我記之余曰是名言也萬石之有君兄弟賢矣君又愛子孫賢天其以是明珠大玉副君之愛哉萬之後必大矣吾為君賀抑賢子孫有道家種德則子孫之不賢者不生身行道則子孫象賢者必法世務學則子孫賢賢者必儒是三者信有證願以吾言併君言記之誠翁諾遂書以為記寶祐五年丁巳夏六月年家弟瑞陽姚某記并書胡氏雙清堂記心迹雙清杜少陵詩語也迹者心之表心者迹之裏迹之清心之清也舉孝亷而濁如泥迹清而心未之清也門如市而心如水心清而迹未之清也雖然天下亦安有是理哉如是則心迹之判矣王通氏之言然矣而可乎是故心清則迹與之清雙清一事也豐城胡君景顔喜為詩以雙清名其堂蓋取少陵意朝斯夕斯往往皆清具長嘯乎暑風朗詠乎明月雨于蓬雪于屐敲氷于硯滴露于筆人見胡君取乎在天之清者然也搘笻而觀于山放棹而遊於水叢溪以竹陰徑以松根石以梅畹蘭沼蓮亭桂藩菊人見胡君取乎在地之清者然也匣有琴栅有鶴架有書壁有劍屏有書几有棊樽有酒門有佳客人見胡君取乎人物之清者然也雖然是皆迹也使胡君胸中無風月氷霜雨露之清則在天之清者天耳胸中無山水竹石松梅蓮桂蘭菊之清則在地之清者地耳胸中無琴鶴書劍棊畫賔酒之清則在人物之清者人耳物耳於胡君乎何預胡君之迹之清胡君之心之清之發也以是清為詩宜皆清語余嘗愛胡君之詩有曰飯後到茶茶後酒松邊有鶴鶴邊琴以此一聨語推之是非真有心迹雙清之樂者乎雖然是清未可小之也鍾天地靈禀五行英得全清者為聖清多濁少者為賢澄其濁以全其清蓋以賢希聖之事然則心清者將有所為也杜少陵豈足以盡此哉故曰是清未可小之也寶祐癸丑秋九月錦河姚某記并書趙氏村屋記趙某家世服冕乘軒食膏粱而燠綺繒佳公子也而扁所居曰一村或疑之曷疑之君非村乎生者也非村乎居者也而曷從知村之趣夫其渠渠夏屋榱隱月而棟入雲豈知夫茅椽而槿籬松關而竹隧崇臺峻榭歌窈眇而舞妖冶豈知夫蓑笠而牧角耨耕而農謳水陸畢陳乎方丈之間豈僅羹芹飯笋之餉錦縠眩爛於曬衣之庭豈僅紡績繅繭之聲不知乎此而欲樂乎此有是理耶疑之誠是也而非知君者也夫君身鍾鼎而心山林迹囂塵而興髙逸不傲然以貴公子自詫而顧退然欲以寒素自居故雖紛華盛麗之中而有幽閒蕭𣪚之意宅廣宇如邃隱聽曼樂如山謡不甘乎芳鮮而羡藜糗之甘不樂乎麗靡而味桑麻之樂一淡然之間而村墟之幽事皆目中矣豈必真生乎是居乎是而後能知其趣耶雖然此猶假之者也非身之者也若夫有山可薇有水可漁候雞窗而讀書騎牛韉而覔詩暑座竹松冬爐芋栗春秋社而豚酒非真處於村者不能有是也此又豫之所素樂者子未必真知之也試以告焉如樂之甘與子分席黃氏好山記清江黃君唐卿字其室曰好山取陳文惠公好山雲斂明月雨晴句唐卿郭其處者也而山是愛趣清矣閣峯清江之望天下之竒山也唐卿有室焉實對之每推窗揭簾即與山面欣然神㑹如見故人字山之意矣蓋以此觀之山蒼岑碧巘簪植屏列朝霏暮嵐紫翠蒨絢雪立清峻雨藏冥濛應貌千萬皆山之好也而雲斂雨晴之時殆與幽人爽士胸次一故山之好於是時為冠雖然山不能自好也人實好之首陽山之好也以夷齊商於山之好也以四皓東山有謝安載酒遊而東山重南山有陶淵明采菊見而南山髙夀山有李太白樓其間夀山顯飯顆山有杜少陵過其下飯顆山名廬山好以白樂天劉凝之孤山好以林和靖東坡老子山固多好亦未盡好也人則好之矣終南山而捷徑少室山而索價北山而辱人移文竒章讀書於後隆之山貛郎騎驢於鍾山之半山之好固自若而又有纍其好者矣是故人必不貪多錢好官必不好便宜田宅必不溺人之所欲之好色去物欲以好其心謹踐履以好其躬新好之詩大好之文時出間作羽翼風雅不止為黃絹幼婦之好而造理窟詣道閫夫子之門且未安於肩牆室家之好焉則視山無愧與山俱好矣人未有無好者也多為所不好者雜必去其所不好者而後好者粹文惠之詩雖意主於景然以理㑹之雲斂而山好雨晴而月明斯非人欲蟬蛻天理春融之境乎生香不斷之語以浩然氣取天水相通之語與苖格鳳儀觀可也五峯先生見紫陽夫子甕牖翠屏之詩而答以山中出雲雨太虗一洗晴空山更好之句體立用具視雲斂月明之語有以異乎未可徒以詩觀也仁者靜之樂山主靜求仁學者先務前之好其山者猶未足多尚巍乎程子龍門山有遺歌卓乎紫陽武夷山有道韻相與共學可也唐卿得於易者也養山泉之䝉止兼山之艮用工蓋久矣豫尚奚贅雖然友道貴切切偲偲故願唐卿亦自好以好此山不敢為每事好之司馬辛居安水閣記天下之至清莫山水若也而水於山清尤勝有山而無水清弗具古之人結廬築亭必于江湖于澗溪于陂池者蓋以是也松垣先生之從子字曰居安家于釀溪之上去其家二里許怪石壁立清流帶縈創復閣以為遊宴之所其有得於古人之遺意乎市橋栁細江路梅香即少陵之浣溪也水田白鷺陰木黃鸝即摩詰之輞川也茂林修竹清流激湍即右軍之蘭亭也采山釣水可茹可食即李願之盤谷也緑野有堂日醉賔客即裴晉公之午橋莊也青山屋上流水屋下即司馬公之獨樂園也居安性好客是水復宜釀釀而熟則與客而遊于此或杖而屨或楫而舟仰青山俯碧灣傲古木蔭叢竹坐怪石釣清流飲酒賦詩上下斯閣醉歌笑舞沙鷗林鳥相與忘形騎氣馭風飄飄乎欲遊於八極之表清樂顧可量哉未仕而隱居則為少陵為摩詰為李願為羲之巳仕而歸休則為晉公為司馬窮達一此水豈徒閣云乎雖然居安之樂在此水乎否也在此閣乎否也豫嘗觀居安賦斯閣之詩有吟風弄月之趣居安之樂其諸異乎人之樂歟此樂也客不可得而問居安不可得而言有欲知此樂其必於清風明月之夜登斯閣而游泳乎清風明月之天周沂叟沂齊記豐城周君沂字沂叟復號以沂齊有味乎浴沂舞雩之樂也昔濓溪周夫子語河南二程先生以求孔顔之樂處㸃之樂即孔顔之樂歟斯樂何樂也與天為徒與道為一虛室白而纎塵去太空澄而萬境融華卷列鼎不足以為榮肥馬輕裘不足以為安托言乎浴至潔存也托言乎風至和暢也舞以動其機籟詠以陶其性情歸而造其閫域斯樂其飲水曲肱視富貴如浮雲心齊坐忘適簞瓢於陋巷之樂歟此孔子顔曽之樂而周程亦樂之吟光風弄霽月玩庭之草愛沼之蓮望川之花柳此樂有異乎否也惟能求其樂故能樂其樂夫子曰好之者不如樂之者學而極於樂其至矣乎人鮮能久矣沂叟濂溪之支派也故能因其語二程之言而求其樂之處欣然有味乎浴沂舞雩之樂而名以是而字以是而號其齊以是非有志於道能之乎要當益用其力於學極而至於樂之處可也緇其冠深其衣即春服之襜如開門受徒其徒林林即冠者童子之翼如濯足滄浪即水之沂晞髮喬木即壇之雩浴斯舞舞斯詠詠斯歸由士以希賢由賢以希聖由聖以希天一天混融無古無今吾不知孰為孔子孰為顔曽孰為周程又孰為我也學而極於樂其樂至矣乎雖然斯樂也勿輕以語人雪坡集卷三十四
